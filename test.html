<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 페이지 | 바다비 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;          /* 깊은 바다 블랙 배경 */
            --card-bg: #030812;            /* 미드나잇 블루 카드 배경 */
            --accent: #003366;            /* 메인 감청색 */
            --accent-bright: #3385ff;    /* 강조 포인트 블루 */
            --accent-glow: rgba(0, 51, 102, 0.7);
            --text-main: #f0faff;         /* 아이스 화이트 메인 텍스트 */
            --text-sub: #5c7285;          /* 차분한 블루 그레이 서브 텍스트 */
            --border: #0a1425;            /* 어두운 네이비 테두리 */
        }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }

        /* 공통 카드 스타일 */
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; padding: 25px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* 헤더/제목 스타일 */
        h2 { 
            font-size: 18px; margin-top: 0; 
            color: var(--accent-bright); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 12px; margin-bottom: 20px; 
            text-transform: uppercase; letter-spacing: 1px; 
        }

        /* 버튼 스타일 */
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #0a1a30;
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 13px;
            border: 1px solid var(--accent);
            transition: 0.3s;
            cursor: pointer;
        }
        .btn:hover {
            background: var(--accent-bright);
            border-color: var(--accent-bright);
            color: #fff;
        }

        /* 하단 푸터 */
        footer {
            text-align: center; padding: 40px 10px; 
            color: var(--text-sub); font-size: 11px; 
            border-top: 1px solid var(--border); 
            margin-top: auto; width: 100%; box-sizing: border-box;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .wrapper { gap: 15px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div style="display: flex; justify-content: flex-start;">
        <a href="index.html" class="btn">← 메인으로 돌아가기</a>
    </div>

    <main class="card">
        <h2>제목을 입력하세요</h2>
        
        <div id="content-area">
            <p style="color: var(--text-sub); line-height: 1.6;">
                여기에 내용을 입력하거나 JavaScript를 통해 동적으로 데이터를 불러올 수 있습니다. 
                기존의 '깊은 바다' 테마 스타일이 모두 적용되어 있습니다.
            </p>
        </div>
    </main>

    <footer style="opacity: 0.7;">
        <p><strong>바다비 비공식 팬 아카이브</strong></p>
        <p>모든 권리는 원저작권자에게 있으며 요청 시 수정·삭제됩니다.</p>
    </footer>
</div>

</body>
</html>
