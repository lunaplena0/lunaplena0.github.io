<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎶 바다비 노래기록 🎶</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/loading.css"> 
    <link rel="stylesheet" href="css/mainpages.css">
    <link rel="stylesheet" href="songstats/songstats2.css">
</head>
    
<body>
    <div id="loading-overlay">
    <div id="wave-text" class="wave-text"></div></div>
        
<div class="wrapper">
    <header class="card header-box">
    <div class="title-group">
        <h1 class="page-title">🎶노래 기록장</h1>
        <p class="page-desc">전체, 월별, 연도별 노래기록</p>
    </div>
    
    <div class="header-buttons" style="display: flex; gap: 8px;">
        <a href="songlist.html" class="btn">📊 이전 통계</a>
        <a href="index.html" class="btn">← 메인으로</a>
    </div>
</header>

    <main class="card content-card">
    <h2>상세 정보</h2>
    
   <div class="stats-filter">
    <button class="filter-btn active" onclick="updateDateFilter('all', this)">전체</button>
    <button class="filter-btn" onclick="updateDateFilter('monthly', this)">월별</button>
    <button class="filter-btn" onclick="updateDateFilter('yearly', this)">연도별</button>
    
    <div id="date-selectors" style="display: none; margin-left: auto; gap: 5px;">
    <select id="select-year" onchange="onYearChange()"></select>
    <select id="select-month" onchange="applyDateFilter()" style="display: none;"></select>
</div>
</div>

<div id="content-area">
    <p style="text-align:center; padding:50px;">데이터를 불러오는 중입니다...</p>
</div>

</main>

    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>
</div>
    <div id="song-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content card">
        <div class="modal-header">
            <h3 id="modal-title">곡 제목</h3>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
            <div class="modal-info">
                <p><strong>🎤 </strong> <span id="modal-artist">-</span></p>
                <p><strong>가창 횟수:</strong> <span id="modal-count">0</span>회</p>
            </div>
            <p><strong>부른 날짜</strong></p>
            <div id="modal-dates" class="date-list">
                </div>
        </div>
    </div>
</div>
    <script src="js/loading.js"></script>
    <script src="songstats/songstats.js"></script>
</body>
</html>
