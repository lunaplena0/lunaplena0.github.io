<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 페이지 | 바다비 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mainpages.css">
</head>
<body>
<div class="wrapper">
    <header class="card header-box">
    <div class="title-group">
        <h1 class="page-title">페이지 제목</h1>
        <p class="page-desc">이 페이지에 대한 간단한 보조 설명을 이곳에 작성하세요.</p>
    </div>
    <a href="index.html" class="btn">← 메인으로</a>
</header>

    <main class="card content-card">
        <div class="calendar-header">
            <h3>2024년 5월</h3>
            <div class="calendar-nav">
                </div>
        </div>

        <div class="calendar-grid">
            <div class="day-label">일</div>
            <div class="day-label">월</div>
            <div class="day-label">화</div>
            <div class="day-label">수</div>
            <div class="day-label">목</div>
            <div class="day-label">금</div>
            <div class="day-label">토</div>

            <div class="other-month"></div>
            <div class="other-month"></div>
            <div class="other-month"></div>
            <div>
                <span class="date-num">1</span>
                <div class="event">정기 뱅송</div>
            </div>
            <div><span class="date-num">2</span></div>
            <div><span class="date-num">3</span></div>
            <div><span class="date-num">4</span></div>

            <div><span class="date-num">5</span></div>
            <div class="today">
                <span class="date-num">6</span>
                <div class="event" style="background-color: #ff9f43;">유튜브 업로드</div>
            </div>
            <div><span class="date-num">7</span></div>
            <div><span class="date-num">8</span></div>
            <div><span class="date-num">9</span></div>
            <div><span class="date-num">10</span></div>
            <div><span class="date-num">11</span></div>

            </div>
    </main>

    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>
</div>
</body>
</html>
