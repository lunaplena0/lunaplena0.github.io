<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 메인 페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 로딩 바 컨테이너 */
/* 화면 전체를 덮는 로딩 레이어 */
#loading-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(1, 3, 6, 0.8); /* 배경을 약간 어둡게 */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
    visibility: visible;
}

/* 로딩 애니메이션 (원형 스피너) */
.loader-circle {
    width: 50px;
    height: 50px;
    border: 3px solid var(--accent);
    border-top: 3px solid var(--accent-bright);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
    box-shadow: 0 0 15px var(--accent-glow);
}

/* 로딩 글자 애니메이션 */
.loader-text {
    color: var(--accent-bright);
    font-size: 14px;
    letter-spacing: 2px;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        :root {
            /* 기존 트위치 테마색을 깊은 바다 테마색으로 변경 */
            --bg-color: #010306;          /* 깊은 바다 블랙 배경 */
            --card-bg: #030812;            /* 미드나잇 블루 카드 배경 */
            --accent: #003366;          /* 메인 감청색 (링크 테두리 등) */
            --accent-bright: #3385ff;    /* 강조 포인트 블루 (제목, 텍스트) */
            --accent-glow: rgba(0, 51, 102, 0.7);
            --text-main: #f0faff;         /* 아이스 화이트 메인 텍스트 */
            --text-sub: #5c7285;          /* 차분한 블루 그레이 서브 텍스트 */
            --border: #0a1425;            /* 어두운 네이비 테두리 */
        }

        body { 
            background-color: var(--bg-color); 
            /* 타이머와 동일한 배경 그라데이션 적용 */
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 10px;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; box-sizing: border-box;
            overflow: hidden;
        }

        .wrapper { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 15px; padding: 10px 0; }

        .card { 
            background: var(--card-bg); 
            border-radius: 12px; padding: 20px; 
            border: 1px solid var(--border); 
            display: flex; position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .profile-box { align-items: center; gap: 20px; background: linear-gradient(145deg, #051020, #02050a); }
        
        .profile-img { 
            width: 90px; height: 90px; border-radius: 50%; background: #0a1a30; 
            flex-shrink: 0; 
            border: 3px solid var(--accent-bright); /* 보라색 테두리를 블루로 변경 */
            box-shadow: 0 0 15px var(--accent-glow);
            background-size: cover; background-position: center;
            cursor: default; 
        }

        .profile-info { flex-grow: 1; min-width: 0; }
        .profile-info h1 { margin: 0 0 2px; font-size: 22px; font-weight: 700; color: var(--text-main); }
        .profile-info p { 
            color: var(--text-sub); margin: 0 0 8px; font-size: 13px; 
            max-width: 450px; line-height: 1.4;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .link-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .link-btn { 
            padding: 5px 12px; background: #0a1a30; border-radius: 6px; 
            color: var(--text-main); text-decoration: none; font-size: 11px; 
            border: 1px solid var(--accent); transition: 0.3s; 
        }
        .link-btn:hover { background: var(--accent-bright); border-color: var(--accent-bright); color: #fff; } /* 호버 시 블루로 변경 */

        .live-status-inline {
            margin-left: auto; text-align: center; padding: 0 25px; 
            border-left: 1px solid var(--border); /* 보라색 실선을 블루 실선으로 변경 */
            min-width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        .offline { background: #1a2638; color: var(--text-sub); } /* 오프라인 배지 어둡게 조정 */
        #stream-title-inline { font-size: 16px; font-weight: bold; margin-bottom: 2px; color: var(--accent-bright); } /* 방송 중일 때 블루로 강조 */
        #last-stream-time { font-size: 11px; color: var(--text-sub); }

        .bottom-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px; 
            align-items: stretch;
        }
        .bottom-section .card { 
            flex-direction: column; padding: 15px; height: auto; box-sizing: border-box; min-width: 0;
        }

        h2 { font-size: 13px; margin-top: 0; color: var(--accent-bright); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; } /* 제목을 블루로 강조 */

        .item-row { 
            padding: 8px; 
            border-bottom: 1px solid var(--border); /* 보라색 하단선을 블루로 변경 */
            font-size: 12px; 
            border-radius: 6px; transition: 0.2s; cursor: pointer;
            min-height: 65px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box;
        }
        .item-row:hover { 
        background: rgba(255, 255, 255, 0.03); /* 아주 살짝 밝아지는 느낌 */
        }
        .item-date { font-size: 10px; color: var(--text-sub); margin-bottom: 2px; }
        
        .vod-row { flex-direction: row !important; align-items: center; gap: 10px; }
        .vod-thumb { 
            width: 70px; height: 40px; background: #0a1a30; border-radius: 4px; 
            flex-shrink: 0; background-size: cover; background-position: center; 
            border: 1px solid var(--border); /* 썸네일 테두리 추가 */
        }

        .schedule-row { flex-direction: row !important; justify-content: space-between; cursor: default; }
        .day { font-weight: bold; color: var(--text-sub); }

        .today-highlight { 
            background: rgba(51, 133, 255, 0.08) !important; /* 오늘 일정 하이라이트를 보라색에서 블루 틴트로 변경 */
            border: 1px solid var(--accent-bright) !important; 
            transform: scale(1.01); 
            box-shadow: 0 0 10px rgba(51, 133, 255, 0.15);
        }

        .today-tag { background: var(--accent-bright); color: #fff; border-radius: 3px; margin-left: 4px; } /* 오늘 태그 블루로 변경 */

        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 900px) {
            body { overflow: auto; }
            .profile-box { flex-direction: column; padding-bottom: 20px; }
            .live-status-inline { margin-left: 0; border-left: none; border-top: 1px solid var(--border); padding: 15px 0; width: 100%; }
            .bottom-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader-circle"></div>
    <div class="loader-text">정보를 정리하고 있어요 . . .</div>
</div>
    
    <div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img" onclick="location.href='blue-note.html'"></div>
            <div class="profile-info">
                <h1 id="user-nick">로딩 중...</h1>
                <p id="user-desc">정보를 불러오고 있습니다.</p>
                <div class="link-list" id="link-list">
    <a href="https://www.sooplive.com/station/bababi" class="link-btn" target="_blank" style="border-color: var(--accent-bright);">📺 방송국</a>
    <a href="songlist.html" class="link-btn" target="_self" style="border-color: var(--accent-bright);">📖 노래책</a>
    
    <div id="extra-links-target" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
</div>
            </div>
            <div class="live-status-inline">
                <div class="badge offline">OFFLINE</div>
                <div id="stream-title-inline">방송 준비 중</div>
                <div id="last-stream-time">최근 방송: 확인 중</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div id="schedule-container"></div>
        </div>
        <div class="card" id="post-container"><h2>📢 최근 게시물</h2></div>
        <div class="card" id="vod-container"><h2>🎬 최근 다시보기</h2></div>
    </div>

    <footer style="text-align: center; padding: 15px 20px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 5px;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6;">
        <strong>바다비 비공식 팬 아카이브</strong><br>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        비영리로 운영되며, 정보 갱신시 이전 데이터가 2분정도 나타날 수 있습니다.
    </p>
</footer>
</div>

<script>
    // 기존 스크립트 로직은 절대 건드리지 않습니다.
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';
    const SONG_BOOK_URL = 'songlist.html'; 

    async function init() {
    const overlay = document.getElementById('loading-overlay');
    
    try {
        // 로딩창 표시
        overlay.style.opacity = '1';
        overlay.style.visibility = 'visible';

        const cacheBuster = `&t=${new Date().getTime()}`;
        const finalUrl = TSV_URL + cacheBuster;

        const response = await fetch(finalUrl, {
            cache: 'no-store',
            headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' }
        });

        if (!response.ok) throw new Error('Network error');

        const text = await response.text();
        const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            const profile = rows[2];
            const liveData = rows[6]; 
            const updateTimeData = rows[1] ? rows[1][5] : null; 
            const statusBox = document.querySelector('.live-status-inline');

            const isOnline = liveData && liveData[5] !== "방송 정보 없음" && liveData[5] !== undefined;

            if (isOnline) {
                const bTitle = liveData[5];
                const bTime = liveData[6];
                const bGrade = liveData[7];
                const bSubOnly = liveData[8];
                const bPwd = liveData[9];

                let onlineBadge = `<div class="badge" style="background:#d32f2f; color:white; margin-bottom:0; padding: 2px 8px; font-size: 9px;">ONLINE</div>`;
                let subTagsHtml = '';
                const subStyle = `padding: 1px 5px; font-size: 8px; margin: 0; background:#121f33; line-height: 1; border: 1px solid var(--border);`;

                if (!["X", "-"].includes(bGrade)) subTagsHtml += `<span class="badge" style="${subStyle} color:#FFAB91;">19</span>`;
                if (!["X", "-"].includes(bSubOnly)) subTagsHtml += `<span class="badge" style="${subStyle} color:#B39DDB;">구독+</span>`;
                if (!["X", "-"].includes(bPwd)) subTagsHtml += `<span class="badge" style="${subStyle} color:#90A4AE;">비밀번호</span>`;

                statusBox.innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 3px; margin-bottom: 5px;">
                        ${onlineBadge}
                        <div style="display: flex; gap: 3px; flex-wrap: wrap; justify-content: center;">
                            ${subTagsHtml}
                        </div>
                    </div>
                    <a href="https://play.sooplive.com/bababi" target="_blank" id="stream-title-inline" class="ellipsis" 
                       style="max-width:180px; color:var(--accent-bright); font-size:15px; margin-bottom:1px; text-decoration:none; display:block; cursor:pointer;">
                       ${bTitle}
                    </a>
                    <div id="last-stream-time" style="color:var(--text-sub); font-size:10px;">시작: ${bTime}</div>
                `;
            } else {
                const lastTime = (profile && profile[3]) ? profile[3].trim() : "확인 중";
                statusBox.innerHTML = `
                    <div class="badge offline">OFFLINE</div>
                    <div id="stream-title-inline" style="color: var(--text-sub);">방송 준비 중</div>
                    <div id="last-stream-time">최근 방송: ${lastTime}</div>
                `;
            }

            if (profile) {
                document.getElementById('user-nick').innerText = profile[0] || '닉네임';
                document.getElementById('user-desc').innerText = profile[1] || '';
                if(profile[2]) document.querySelector('.profile-img').style.backgroundImage = `url('${profile[2]}')`;
            }

            if (updateTimeData) {
                let updateEl = document.getElementById('update-time');
                if (!updateEl) {
                    updateEl = document.createElement('div');
                    updateEl.id = 'update-time';
                    updateEl.style.cssText = "font-size: 9px; color: var(--text-sub); margin-top: 8px; opacity: 0.6;";
                    statusBox.appendChild(updateEl);
                }
                updateEl.innerText = `갱신: ${updateTimeData}`;
            }

            renderLinks(rows[5]);
            renderPosts(rows.slice(8, 13));
            renderVODs(rows.slice(16, 21));
            renderSchedule(rows.slice(24, 29));

        } catch (e) { 
        console.error("Data Load Error:", e);
        const textEl = document.querySelector('.loader-text');
        if(textEl) textEl.innerText = "ERROR LOADING DATA";
    } finally {
        setTimeout(() => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
                document.body.style.overflow = 'auto'; // 스크롤 다시 허용
            }, 500);
        }, 800);
    }
}

    // 렌더링 함수 내의 보라색 강조 효과들도 블루로 교체합니다.
    function renderLinks(extraLinks) {
    const targetBox = document.getElementById('extra-links-target');
    if (!targetBox) return;

    // Cloudflare 캐시로 인한 중복 생성 방지: 내부를 한 번 비우고 시작합니다.
    targetBox.innerHTML = '';

    if (extraLinks && Array.isArray(extraLinks)) {
        extraLinks.forEach(l => {
            // 빈 칸이거나 형식이 맞지 않으면 건너뜁니다.
            if (!l || !l.includes(': ')) return;

            const [name, ...urlParts] = l.split(': ');
            const url = urlParts.join(': ').trim();
            
            // 유효한 URL 형태일 때만 버튼을 생성합니다.
            if (url.startsWith('http')) {
                const a = document.createElement('a');
                a.className = 'link-btn';
                a.href = url;
                a.target = '_blank';
                a.innerText = name.trim();
                a.style.borderColor = 'var(--accent-bright)';
                targetBox.appendChild(a);
            }
        });
    }
}

    function renderPosts(data) {
        const postBox = document.getElementById('post-container');
        const postData = data.filter(p => p[1] && p[1].trim() !== "");
        let html = '<h2>📢 최근 게시물</h2>';
        postData.forEach(p => {
            const isNotice = p[3]?.trim() === 'O' ? '<span style="color:var(--accent-bright); margin-left: 5px;">📌</span>' : ''; 
            html += `<div class="item-row" onclick="window.open('${p[2]}', '_blank')" style="display: flex; flex-direction: row; align-items: center;">
                        <div style="flex: 1; min-width: 0;">
                            <div class="item-date">${p[0]}</div>
                            <div class="ellipsis">${p[1]}</div>
                        </div>
                        ${isNotice}
                    </div>`;
        });
        postBox.innerHTML = html;
    }

    function renderVODs(data) {
        const vodBox = document.getElementById('vod-container');
        const vodData = data.filter(v => v[1] && v[1].trim() !== "");
        let html = '<h2>🎬 최근 다시보기</h2>';
        vodData.forEach(v => {
            const isPin = v[4]?.trim() === 'O' ? '<span style="color:var(--accent-bright); margin-left: 5px; flex-shrink: 0;">📌</span>' : '';
            
            html += `<div class="item-row vod-row" onclick="window.open('${v[2]}', '_blank')" style="display: flex; flex-direction: row; align-items: center;">
                        <div class="vod-thumb" style="background-image:url('${v[3]}')"></div>
                        <div style="flex:1; min-width:0; display: flex; flex-direction: column; justify-content: center;">
                            <div class="item-date">${v[0]}</div>
                            <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                                <div class="ellipsis" style="font-size:11px; flex: 1;">${v[1]}</div>
                                ${isPin}
                            </div>
                        </div>
                    </div>`;
        });
        vodBox.innerHTML = html;
    }

    function renderSchedule(data) {
        const container = document.getElementById('schedule-container');
        if(!container) return;
        container.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('en-CA'); 
        data.forEach(row => {
            const date = row[0]?.trim() || '';   
            const day = row[1]?.trim() || '';    
            const time = row[2]?.trim() || '';   
            const content = row[3]?.trim() || ''; 
            const category = row[4]?.trim() || ''; 
            if(!date && !content) return; 
            const isToday = date === todayStr;
            const rowDiv = document.createElement('div');
            rowDiv.className = `item-row schedule-row ${isToday ? 'today-highlight' : ''}`;
            const timeInfo = time ? `<span style="color:var(--accent-bright); font-weight:bold;">${time}</span>` : '';
            rowDiv.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:1px; flex:1; min-width:0;">
                    <span class="day" style="font-size:10px;">${date} (${day})${isToday ? '<span class="badge today-tag" style="font-size:8px; padding:1px 4px;">TODAY</span>' : ''}</span>
                    <div style="font-size:12px; color:var(--text-main); display:flex; align-items:center; gap:5px;">
                        ${timeInfo} <span class="ellipsis">${content || '일정 없음'}</span>
                    </div>
                </div>
                <div style="font-size:10px; color:var(--text-sub);">${category}</div>
            `;
            container.appendChild(rowDiv);
        });
    }

    window.onload = () => { init(); setInterval(init, 60000); };
</script>
</body>
</html>
