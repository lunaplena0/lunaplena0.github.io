<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 | 노래기록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mainpages.css">
    <link rel="stylesheet" href="songstats/songstats.css">
</head>
<body>
<div class="wrapper">
    <header class="card header-box">
    <div class="title-group">
        <h1 class="page-title">바다비 | 노래기록</h1>
        <p class="page-desc">바다비의 노래 통계</p>
    </div>
    <a href="index.html" class="btn">← 메인으로</a>
</header>

    <main class="card content-card">
    <h2>상세 정보</h2>
    
   <div class="stats-filter">
    <button class="filter-btn active" onclick="showStats('all')">전체</button>
    <button class="filter-btn" onclick="updateDateFilter('monthly')">월별</button>
    <button class="filter-btn" onclick="updateDateFilter('yearly')">연도별</button>
    
    <div id="date-selectors" style="display: none; margin-left: auto; gap: 5px;">
    <select id="select-year" onchange="onYearChange()"></select>
    <select id="select-month" onchange="applyDateFilter()" style="display: none;"></select>
</div>
</div>

<div id="content-area">
    <p style="text-align:center; padding:50px;">데이터를 불러오는 중입니다...</p>
</div>

</main>

    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>
</div>
    <script src="songstats/songstats.js"></script>
</body>
</html>
