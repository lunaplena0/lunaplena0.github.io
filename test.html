<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 노래책 리스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- 로딩 영역 CSS (눈물기록소와 동일하게 통일) --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(1, 3, 6, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            visibility: visible;
        }

        .wave-text {
            color: #3385ff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
        }

        .wave-text span {
            display: inline-block;
            animation: wave 1.6s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% {
                transform: translateY(-10px);
                color: #fff;
                text-shadow: 0 0 10px rgba(51, 133, 255, 0.7);
            }
        }
        /* -------------------------- */

        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent-bright: #3385ff;
            --accent-dark: #003366;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
        }

        * { box-sizing: border-box; }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #010306 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; 
            overflow: hidden; /* 로딩 중 스크롤 방지 */
            min-height: 100vh;
        }

        .wrapper { 
            width: 100%; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .header-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 25px; 
            border: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent-bright); display: flex; align-items: baseline; gap: 12px; }
        .song-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; }
        .sync-info { font-size: 11px; color: var(--text-sub); margin-top: 5px; opacity: 0.7; }
        
        .header-btns { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; background: #0a1a30; }
        .btn:hover { background: var(--accent-bright); color: #fff; border-color: var(--accent-bright); }

        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-input { 
            flex: 1; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 15px 20px; 
            border-radius: 12px; 
            color: #fff; 
            outline: none; 
            width: 100%; 
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-bright); box-shadow: 0 0 10px rgba(51, 133, 255, 0.2); }

        .song-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; width: 100%; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #0a1425; padding: 15px 20px; font-size: 13px; color: var(--accent-bright); text-align: left; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid var(--border); word-break: break-all; color: var(--text-main); }
        
        tr:hover { background: rgba(255, 255, 255, 0.03); }

        .tag-badge { display: inline-block; padding: 2px 9px; border-radius: 50px; font-size: 10px; font-weight: bold; margin-left: 8px; color: white; vertical-align: middle; }
        .tag-200 { background-color: #d32f2f; }
        .tag-300 { background-color: #f57c00; }
        .tag-기타 { background-color: #2e7d32; }
        .tag-default { background-color: #455a64; }

        @media (max-width: 600px) {
            .wrapper { padding: 20px 12px; }
            .header-card { flex-direction: column; align-items: flex-start; gap: 15px; padding: 20px; }
            .header-btns { width: 100%; }
            .header-btns .btn { flex: 1; text-align: center; }
            th:nth-child(1), td:nth-child(1) { width: 50px !important; padding: 12px 8px; }
            th:nth-child(2), td:nth-child(2) { width: auto !important; padding: 12px 8px; }
            th:nth-child(3), td:nth-child(3) { width: 110px !important; padding: 12px 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div id="wave-text" class="wave-text"></div>
</div>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>🎶 바다비 노래책 
                <span class="song-count-info">
                    노래 : <span id="total-count">0</span>곡 | 기타 : <span id="guitar-count">0</span>곡
                </span>
            </h1>
            <div id="update-time" class="sync-info">데이터 로드 중...</div>
        </div>
        <div class="header-btns">
            <a href="stats.html" class="btn">📊 통계</a>
            <a href="index.html" class="btn">🏠 홈으로</a>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="songSearch" class="search-input" placeholder="곡 제목이나 가수를 검색하세요..." onkeyup="filterSongs()">
    </div>

    <div class="song-card">
        <table>
            <thead><tr><th style="width:80px;">번호</th><th>노래제목</th><th style="width:280px;">가수</th></tr></thead>
            <tbody id="song-list-body"></tbody>
        </table>
    </div>
    <footer style="text-align: center; padding: 15px 20px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 5px;">
        <p style="margin: 0; opacity: 0.7;">팬심으로 제작된 비영리 페이지입니다.</p>
    </footer>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIfrVC6MakrvA_D8rsQeTT6oaX_0w4bc8I_aaJuoQi4g_AuuvFi-nCP_lnHwvoSAsFKxagrzhoPy_J/pub?gid=0&single=true&output=tsv";
    
    window.allSongs = [];

    // 파도 텍스트 생성기
    function prepareWaveText(text) {
        const container = document.getElementById('wave-text');
        if (!container) return;
        container.innerHTML = ''; 
        const letters = text.split('').map(char => char === ' ' ? '&nbsp;' : char);
        letters.forEach((letter, index) => {
            const span = document.createElement('span');
            span.innerHTML = letter;
            span.style.animationDelay = `${index * 0.1}s`;
            container.appendChild(span);
        });
    }

    window.onload = async () => {
        const overlay = document.getElementById('loading-overlay');
        prepareWaveText("노래책을 펼치고 있어요 . . .");

        const cacheBuster = `&t=${new Date().getTime()}`;
        const finalUrl = sheetUrl + cacheBuster;

        try {
            const res = await fetch(finalUrl, {
                cache: 'no-store',
                headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' }
            });

            if (!res.ok) throw new Error("Network Error");

            const tsv = await res.text();
            const lines = tsv.split(/\r?\n/).filter(line => line.trim() !== "");
            const tbody = document.getElementById('song-list-body');
            
            let html = ''; 
            let total = 0;
            let guitar = 0;
            window.allSongs = [];

            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split('\t').map(item => item.trim());
                if (parts.length < 2 || !parts[0]) continue;

                total++;
                const originalTitle = parts[0]; 
                const artist = parts[1] || "Unknown"; 

                const tagMatch = originalTitle.match(/^\[([^\]]+)\]/);
                let displayTitle = originalTitle;
                let tagHtml = '';

                if (tagMatch) {
                    const fullTag = tagMatch[0];
                    const tagText = tagMatch[1];
                    displayTitle = originalTitle.replace(fullTag, '').trim();
                    
                    let tagClass = 'tag-default';
                    if (tagText.includes("200")) tagClass = 'tag-200';
                    else if (tagText.includes("300")) tagClass = 'tag-300';
                    else if (tagText.includes("기타")) {
                        tagClass = 'tag-기타';
                        guitar++;
                    }
                    tagHtml = `<span class="tag-badge ${tagClass}">${tagText}</span>`;
                }

                window.allSongs.push({ originalTitle, artist });

                html += `<tr>
                    <td>${total}</td>
                    <td class="song-title">${displayTitle}${tagHtml}</td>
                    <td class="song-artist">${artist}</td>
                </tr>`;
            }
            
            tbody.innerHTML = html;
            document.getElementById('total-count').textContent = total;
            document.getElementById('guitar-count').textContent = guitar;
            
            const now = new Date();
            document.getElementById('update-time').textContent = `최근 동기화: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

        } catch (err) {
            console.error("데이터 로드 실패:", err);
            document.getElementById('song-list-body').innerHTML = `<tr><td colspan="3" style="text-align:center; color:#ff4b4b; padding:40px;">데이터를 불러오지 못했습니다.</td></tr>`;
        } finally {
            // 로딩 종료 처리
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.visibility = 'hidden';
                    document.body.style.overflow = 'auto'; // 성공/실패 여부 관계없이 스크롤 복구
                }, 500);
            }, 800);
        }
    };

    function filterSongs() {
        const filter = document.getElementById('songSearch').value.toUpperCase();
        const rows = document.querySelectorAll("#song-list-body tr");
        
        rows.forEach(row => {
            const title = row.querySelector('.song-title')?.textContent.toUpperCase() || "";
            const artist = row.querySelector('.song-artist')?.textContent.toUpperCase() || "";
            if (title.includes(filter) || artist.includes(filter)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    }
</script>
</body>
</html>
