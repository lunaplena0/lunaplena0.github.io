<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 메인 페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link id="favicon" rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="js/common.js"></script>
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/index.css"> 
    <style>
        /* 오른쪽 하단 플로팅 위젯 스타일 */
        .floating-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            padding: 12px 15px 15px 15px;
            z-index: 500;
            
            /* 배경 투명 설정 (0.6은 60% 정도의 불투명도) */
            background: rgba(5, 16, 32, 0.6); 
            backdrop-filter: blur(8px); /* 뒤쪽 배경을 살짝 흐리게 해서 글자 가독성 확보 */
            
            border: 1px solid rgba(51, 133, 255, 0.4);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: #f0faff;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .widget-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #3385ff;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        #timer {
            font-size: 22px !important; /* 위젯에 맞는 크기 */
            font-weight: 700;
            margin: 5px 0;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
            display: block;
        }
        /* 새로 추가된 하단 메시지 스타일 */
.widget-message {
    font-size: 11px;
    color: #3385ff; /* 강조색 또는 흰색(#fff)으로 변경 가능 */
    margin-bottom: 5px;
    font-weight: 400;
    opacity: 0.9;
}

        .target-date-small {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* 헤더 영역 (제목 + 닫기버튼) */
.widget-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(51, 133, 255, 0.2);
}

.widget-title {
    font-size: 12px;
    font-weight: 700;
    color: #3385ff;
    letter-spacing: 1px;
}

/* 기존 닫기 버튼 위치 수정 */
.close-widget-btn {
    position: static; /* 절대 위치 해제 */
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    opacity: 0.5;
    line-height: 1;
}
        
        .close-widget-btn:hover { opacity: 1; }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .floating-widget {
                bottom: 15px;
                right: 15px;
                width: 160px;
                padding: 10px;
            }
            #timer { font-size: 18px !important; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div id="wave-text" class="wave-text"></div>
</div>
    
<div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img" onclick="location.href='blue-note.html'"></div>
            <div class="profile-info">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h1 id="user-nick" style="margin-bottom: 0;">로딩 중...</h1>
                </div>
                <p id="user-desc">정보를 불러오고 있습니다.</p>
                
                <div class="link-list" id="link-list">
                    <a href="https://www.sooplive.com/station/bababi" class="link-btn" target="_blank" style="border-color: var(--accent-bright);" title="방송국 가기">🏠</a>
                    <a href="songlist.html" class="link-btn" target="_self" style="border-color: var(--accent-bright);">📖 노래책</a>
                    <a href="vodlist.html" class="link-btn" target="_self" style="border-color: var(--accent-bright);">🎬 VOD 기록함</a>
                    <div id="extra-links-target" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
                </div>
            </div>
            <div class="live-status-inline">
                <div class="badge offline">OFFLINE</div>
                <div id="stream-title-inline">방송 준비 중</div>
                <div id="last-stream-time">최근 방송: 확인 중</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div id="schedule-container"></div>
        </div>
        <div class="card" id="post-container"><h2>📢 최근 게시물</h2></div>
        <div class="card" id="vod-container"><h2>🎬 최근 다시보기</h2></div>
    </div>

    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>

    <div id="dday-widget" class="floating-widget" onclick="handleWidgetClick()" style="cursor: pointer;">
    <div class="widget-header">
        <span class="widget-title">Coming Soon</span>
        <button class="close-widget-btn" onclick="event.stopPropagation(); closeWidget();">×</button>
    </div>

    <div class="widget-label">BADABI Coming Soon</div>
    <span id="timer">00:00:00:00</span>
    <div id="widget-msg" class="widget-message">클릭 시 카운트다운으로 이동합니다</div>    
    <div class="target-date-small">2026.04.20 16:00</div>
</div>
</div>

<script>
    function closeWidget() {
        document.getElementById('dday-widget').style.display = 'none';
    }

    let destinationUrl = "timer.html"; 

    function handleWidgetClick() {
        window.location.href = destinationUrl;
    }

    const TARGET_DATE = new Date("2026-04-20T16:00:00").getTime();
    // 1시간을 밀리초로 계산 (3600초 * 1000)
    const ONE_HOUR_AFTER = 3600000; 

    function updateTimer() {
        const now = new Date().getTime();
        const diff = TARGET_DATE - now;
        const widget = document.getElementById('dday-widget');
        const timerEl = document.getElementById('timer');
        const msgEl = document.getElementById('widget-msg');

        if (!timerEl || !widget) return;

        // 1. 방송 시작 후 1시간이 지났을 때만 위젯을 숨김
        if (diff <= -ONE_HOUR_AFTER) {
            widget.style.display = 'none';
            return;
        }

        // 2. 시간 상태에 따른 처리
        if (diff <= 0) {
            // --- 방송 시작 후 (0분 ~ 60분 사이) ---
            destinationUrl = "https://play.sooplive.com/bababi";
            timerEl.innerText = "LIVE NOW"; // 타이머 대신 표시할 문구
            timerEl.style.color = "#ff4d4d"; // 빨간색 강조
            msgEl.innerText = "클릭 시 방송 페이지로 이동합니다";
            msgEl.style.color = "#ff4d4d";
        } 
        else if (diff <= 300000) { 
            // --- 방송 시작 5분 전 ---
            destinationUrl = "https://play.sooplive.com/bababi";
            msgEl.innerText = "클릭 시 방송 페이지로 이동합니다";
            msgEl.style.color = "#ff4d4d";
            
            // 타이머 시간 계산
            formatTimer(diff, timerEl);
        } 
        else {
            // --- 평상시 ---
            destinationUrl = "timer.html";
            msgEl.innerText = "클릭 시 타이머 페이지로 이동합니다";
            msgEl.style.color = "#3385ff";
            
            formatTimer(diff, timerEl);
        }
    }

    // 타이머 포맷팅 함수 분리
    function formatTimer(diff, element) {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        let timeString = "";
        if(days > 0) timeString += days + "d ";
        timeString += String(hours).padStart(2, '0') + ":" + 
                      String(mins).padStart(2, '0') + ":" + 
                      String(secs).padStart(2, '0');
        
        element.innerText = timeString;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>
<script src="js/loading.js"></script>
<script src="js/index.js"></script>
</body>
</html>
