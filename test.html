<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Integrated Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050608;
            --panel: #0d0f14;
            --accent: #00ffa3; /* 생동감 넘치는 민트 그린 */
            --text: #ffffff;
            --text-dim: #71717a;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Pretendard', sans-serif; 
            height: 100vh; overflow: hidden; /* 스크롤 없이 한 화면에 고정 */
            display: flex; justify-content: center; align-items: center;
        }

        /* 전체 대시보드 레이아웃 */
        .dashboard {
            width: 95vw; height: 90vh;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: auto 1fr auto;
            gap: 15px;
        }

        /* 패널 공통 스타일 */
        .panel {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 상단 헤더: 실시간 상태 및 요약 */
        .header-panel {
            grid-column: 1 / -1;
            flex-direction: row; justify-content: space-between; align-items: center;
            padding: 15px 30px;
        }
        .live-status { display: flex; align-items: center; gap: 15px; }
        .live-indicator { 
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800;
            background: #1e1e1e; color: var(--text-dim);
        }
        .is-live .live-indicator { background: #ff2d55; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        /* 좌측: 프로필 및 링크 */
        .sidebar-left { grid-row: 2 / 4; }
        .profile-box { text-align: center; margin-bottom: 25px; }
        .avatar { 
            width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px;
            border: 2px solid var(--accent); background-size: cover;
        }
        .nav-links { display: flex; flex-direction: column; gap: 8px; }
        .nav-btn {
            padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px;
            text-decoration: none; color: var(--text); font-size: 13px;
            transition: 0.2s; border: 1px solid transparent;
        }
        .nav-btn:hover { background: rgba(0, 255, 163, 0.1); border-color: var(--accent); color: var(--accent); }

        /* 중앙: 핵심 스케줄 (가장 넓게) */
        .main-panel { grid-row: 2; }
        .section-title { 
            font-size: 14px; font-weight: 800; color: var(--accent); 
            margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
        }
        .schedule-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; height: 100%;
        }
        .day-card {
            background: rgba(255,255,255,0.02); border-radius: 12px; padding: 15px;
            border: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .day-card.today { border-color: var(--accent); background: rgba(0, 255, 163, 0.05); }
        .day-name { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
        .day-content { font-size: 13px; font-weight: 600; line-height: 1.4; }

        /* 우측: 최근 게시물 & VOD 통합 */
        .sidebar-right { grid-row: 2 / 4; gap: 20px; display: flex; flex-direction: column; }
        .scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .list-item {
            padding: 10px 0; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: 0.2s;
        }
        .list-item:hover { transform: translateX(5px); }
        .list-item .meta { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
        .list-item .title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 하단 바: VOD 썸네일 가로 정렬 */
        .bottom-panel { grid-column: 2; height: 120px; flex-direction: row; gap: 15px; align-items: center; }
        .vod-strip { display: flex; gap: 12px; width: 100%; }
        .vod-card { 
            flex: 1; height: 80px; border-radius: 8px; background-size: cover; 
            position: relative; cursor: pointer; border: 1px solid var(--border);
        }
        .vod-card:hover { border-color: var(--accent); }
        .vod-overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
            padding: 4px 8px; font-size: 10px; border-radius: 0 0 8px 8px;
        }

        @media (max-width: 1100px) {
            body { overflow: auto; height: auto; }
            .dashboard { display: flex; flex-direction: column; height: auto; width: 100%; padding: 10px; }
            .schedule-grid { grid-template-columns: 1fr; }
            .bottom-panel { height: auto; flex-direction: column; }
        }
    </style>
</head>
<body id="live-root">

<div class="dashboard">
    <header class="panel header-panel">
        <div class="live-status">
            <span class="live-indicator">OFFLINE</span>
            <span id="live-title" style="font-size: 14px; font-weight: 600;">방송 데이터를 연결 중입니다...</span>
        </div>
        <div style="font-size: 11px; color: var(--text-dim);" id="sync-time">LAST SYNC: --:--:--</div>
    </header>

    <aside class="panel sidebar-left">
        <div class="profile-box">
            <div class="avatar" id="profile-img"></div>
            <h2 id="user-nick" style="font-size: 20px; font-weight: 800;">Loading</h2>
            <p id="user-desc" style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">...</p>
        </div>
        <div class="nav-links">
            <div class="section-title">QUICK LINKS</div>
            <a href="https://www.sooplive.com/station/bababi" target="_blank" class="nav-btn">📺 방송국 메인</a>
            <a href="songlist.html" class="nav-btn">📖 노래책 데이터</a>
            <div id="extra-links" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </aside>

    <main class="panel main-panel">
        <div class="section-title">WEEKLY BROADCAST SCHEDULE</div>
        <div class="schedule-grid" id="schedule-target"></div>
    </main>

    <footer class="panel bottom-panel">
        <div class="section-title" style="writing-mode: vertical-lr; margin-bottom: 0; margin-right: 15px;">RECENT VOD</div>
        <div class="vod-strip" id="vod-target"></div>
    </footer>

    <aside class="panel sidebar-right">
        <div class="section-title">COMMUNITY POSTS</div>
        <div class="scroll-area" id="post-target"></div>
    </aside>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';

    async function fetchData() {
        try {
            const response = await fetch(`${TSV_URL}&t=${new Date().getTime()}`);
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            // 데이터 할당
            const profile = rows[2];
            const links = rows[5];
            const live = rows[6];
            const posts = rows.slice(8, 15);
            const vods = rows.slice(16, 21);
            const schedule = rows.slice(24, 29);

            // UI 업데이트
            updateProfile(profile, live);
            updateLinks(links);
            updateSchedule(schedule);
            updatePosts(posts);
            updateVODs(vods);
            
            document.getElementById('sync-time').innerText = `LAST SYNC: ${new Date().toLocaleTimeString()}`;
        } catch (e) { console.error("Data error", e); }
    }

    function updateProfile(p, l) {
        document.getElementById('user-nick').innerText = p[0];
        document.getElementById('user-desc').innerText = p[1];
        document.getElementById('profile-img').style.backgroundImage = `url('${p[2]}')`;
        
        const isOnline = l && l[5] !== "방송 정보 없음" && l[5] !== undefined;
        const root = document.getElementById('live-root');
        const title = document.getElementById('live-title');
        const indicator = document.querySelector('.live-indicator');

        if(isOnline) {
            root.classList.add('is-live');
            indicator.innerText = 'LIVE';
            title.innerText = l[5];
        } else {
            root.classList.remove('is-live');
            indicator.innerText = 'OFFLINE';
            title.innerText = `최근 방송: ${p[3] || '정보 없음'}`;
        }
    }

    function updateSchedule(data) {
        const target = document.getElementById('schedule-target');
        const todayStr = new Date().toLocaleDateString('en-CA');
        target.innerHTML = data.map(row => `
            <div class="day-card ${row[0] === todayStr ? 'today' : ''}">
                <div class="day-name">${row[0]} (${row[1]})</div>
                <div class="day-content">${row[3] || '휴방'}</div>
                <div style="font-size:10px; color:var(--text-dim); margin-top:auto;">${row[4] || ''}</div>
            </div>
        `).join('');
    }

    function updatePosts(data) {
        const target = document.getElementById('post-target');
        target.innerHTML = data.filter(r => r[1]).map(r => `
            <div class="list-item" onclick="window.open('${r[2]}', '_blank')">
                <div class="meta">${r[0]}</div>
                <div class="title">${r[3] === 'O' ? '📌 ' : ''}${r[1]}</div>
            </div>
        `).join('');
    }

    function updateVODs(data) {
        const target = document.getElementById('vod-target');
        target.innerHTML = data.filter(r => r[1]).map(r => `
            <div class="vod-card" style="background-image:url('${r[3]}')" onclick="window.open('${r[2]}', '_blank')">
                <div class="vod-overlay ellipsis">${r[1]}</div>
            </div>
        `).join('');
    }

    function updateLinks(links) {
        const target = document.getElementById('extra-links');
        target.innerHTML = links ? links.filter(l => l.includes(': ')).map(l => {
            const [name, url] = l.split(': ');
            return `<a href="${url}" target="_blank" class="nav-btn">${name}</a>`;
        }).join('') : '';
    }

    window.onload = () => { fetchData(); setInterval(fetchData, 60000); };
</script>
</body>
</html>
