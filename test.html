<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Archive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 지정해주신 깊은 바다 테마색 */
            --bg: #010306;
            --card-bg: #030812;
            --accent: #3385ff; /* 강조 블루 */
            --accent-dark: #003366; 
            --text-p: #f0faff;
            --text-s: #5c7285;
            --border: #0a1425;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-p); 
            font-family: 'Noto Sans KR', sans-serif; 
            padding: 20px;
            line-height: 1.6;
        }

        /* 로딩 레이어 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-circle {
            width: 40px; height: 40px; border: 3px solid var(--accent-dark);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr 320px;
            gap: 20px;
        }

        /* 공통 카드 스타일 (유지) */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-s);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: var(--accent);
        }

        /* 좌측: 프로필 섹션 */
        .profile-side { display: flex; flex-direction: column; gap: 20px; }
        .profile-main { text-align: center; }
        .avatar {
            width: 110px; height: 110px;
            background: #0a1425; border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid var(--accent);
            box-shadow: 0 0 15px rgba(51, 133, 255, 0.3);
            background-size: cover; background-position: center;
        }
        .streamer-name { font-size: 1.4rem; font-weight: 700; color: var(--text-p); }
        
        /* 중앙 콘텐츠 */
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        
        .item-list { list-style: none; }
        .item-row {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            cursor: pointer;
            border-radius: 8px;
        }
        .item-row:hover { background: rgba(51, 133, 255, 0.05); }
        .item-date { font-size: 0.75rem; color: var(--accent); font-weight: 600; }
        .item-title { font-size: 0.95rem; font-weight: 500; margin-top: 2px; }

        /* VOD 전용 스타일 */
        .vod-row { display: flex; gap: 12px; align-items: center; }
        .vod-thumb { 
            width: 80px; height: 45px; background: #000; border-radius: 6px; 
            flex-shrink: 0; background-size: cover; background-position: center;
            border: 1px solid var(--border);
        }

        /* 스케줄 전용 스타일 (타임라인 디자인 유지) */
        .history-item {
            padding-left: 15px;
            border-left: 2px solid var(--border);
            margin-bottom: 15px;
            position: relative;
        }
        .history-item::after {
            content: ''; position: absolute; left: -6px; top: 5px;
            width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
        }
        .today-highlight {
            background: rgba(51, 133, 255, 0.1);
            border-radius: 8px; padding: 10px;
            border-left: 2px solid var(--accent);
        }

        /* 우측: 링크 및 상태 */
        .info-side { display: flex; flex-direction: column; gap: 20px; }
        .link-btn {
            display: block; padding: 10px; background: #0a1425; 
            border-radius: 8px; border: 1px solid var(--border);
            color: var(--text-p); text-decoration: none; font-size: 0.9rem;
            transition: 0.3s; margin-bottom: 8px;
        }
        .link-btn:hover { border-color: var(--accent); background: rgba(51, 133, 255, 0.1); }

        .status-card { 
            background: linear-gradient(135deg, var(--accent-dark), #051020);
            border: 1px solid var(--accent);
        }

        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 1100px) {
            .container { grid-template-columns: 1fr; }
            .profile-side, .info-side { order: 2; }
            .main-content { order: 1; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader-circle"></div>
    <div style="font-size: 12px; color: var(--text-s);">아카이브 동기화 중...</div>
</div>

<div class="container">
    <div class="profile-side">
        <div class="card profile-main">
            <div class="avatar" id="profile-img"></div>
            <h1 class="streamer-name" id="user-nick">Loading...</h1>
            <p id="user-desc" style="margin-top: 15px; font-size: 0.9rem; color: var(--text-s);"></p>
        </div>

        <div class="card">
            <h3 class="section-title">Schedule</h3>
            <div id="schedule-container" class="item-list"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h3 class="section-title">Recent Posts</h3>
            <div id="post-container" class="item-list"></div>
        </div>

        <div class="card">
            <h3 class="section-title">Recent VODs</h3>
            <div id="vod-container" class="item-list"></div>
        </div>
    </div>

    <div class="info-side">
        <div class="card status-card" id="live-status-box">
            <p style="font-size: 0.75rem; font-weight: 700; opacity: 0.8;">BROADCAST STATUS</p>
            <div id="stream-title" style="font-size: 1.1rem; font-weight: 700; margin-top: 5px;">Checking...</div>
        </div>

        <div class="card">
            <h3 class="section-title">Official Links</h3>
            <div id="social-links">
                <a href="https://www.sooplive.com/station/bababi" class="link-btn" target="_blank">📺 SOOP 방송국</a>
                <a href="songlist.html" class="link-btn">📖 노래책</a>
                <div id="extra-links"></div>
            </div>
        </div>
        
        <footer style="font-size: 10px; color: var(--text-s); text-align: center; opacity: 0.6;">
            Fan Archive Project © 2026<br>Data updated every 1 min.
        </footer>
    </div>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';

    async function init() {
        const overlay = document.getElementById('loading-overlay');
        try {
            const response = await fetch(`${TSV_URL}&t=${new Date().getTime()}`);
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            // 1. 프로필 & 상태
            const profile = rows[2];
            const liveData = rows[6];
            
            if (profile) {
                document.getElementById('user-nick').innerText = profile[0];
                document.getElementById('user-desc').innerText = profile[1];
                document.getElementById('profile-img').style.backgroundImage = `url('${profile[2]}')`;
            }

            const isOnline = liveData && liveData[5] !== "방송 정보 없음" && liveData[5] !== undefined;
            const statusBox = document.getElementById('live-status-box');
            if (isOnline) {
                statusBox.style.background = "linear-gradient(135deg, #d32f2f, #8e0000)";
                document.getElementById('stream-title').innerHTML = `<a href="https://play.sooplive.com/bababi" target="_blank" style="color:white; text-decoration:none;">LIVE: ${liveData[5]}</a>`;
            } else {
                statusBox.style.background = "linear-gradient(135deg, var(--accent-dark), #051020)";
                document.getElementById('stream-title').innerText = "Currently Offline";
            }

            // 2. 데이터 렌더링
            renderSchedule(rows.slice(24, 29));
            renderPosts(rows.slice(8, 13));
            renderVODs(rows.slice(16, 21));
            renderExtraLinks(rows[5]);

        } catch (e) {
            console.error(e);
        } finally {
            setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.style.visibility = 'hidden', 500); }, 500);
        }
    }

    function renderSchedule(data) {
        const container = document.getElementById('schedule-container');
        const todayStr = new Date().toLocaleDateString('en-CA');
        container.innerHTML = '';
        data.forEach(row => {
            if (!row[0]) return;
            const isToday = row[0].trim() === todayStr;
            const div = document.createElement('div');
            div.className = `history-item ${isToday ? 'today-highlight' : ''}`;
            div.innerHTML = `
                <div class="item-date">${row[0]} (${row[1]}) ${isToday ? '<span>[TODAY]</span>' : ''}</div>
                <div class="item-title">${row[2] ? `<b>${row[2]}</b> ` : ''}${row[3] || '일정 없음'}</div>
                <div style="font-size: 0.75rem; color: var(--text-s);">${row[4] || ''}</div>
            `;
            container.appendChild(div);
        });
    }

    function renderPosts(data) {
        const container = document.getElementById('post-container');
        container.innerHTML = '';
        data.filter(p => p[1]).forEach(p => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.onclick = () => window.open(p[2], '_blank');
            row.innerHTML = `
                <div class="item-date">${p[0]}</div>
                <div class="item-title ellipsis">${p[3] === 'O' ? '📌 ' : ''}${p[1]}</div>
            `;
            container.appendChild(row);
        });
    }

    function renderVODs(data) {
        const container = document.getElementById('vod-container');
        container.innerHTML = '';
        data.filter(v => v[1]).forEach(v => {
            const row = document.createElement('div');
            row.className = 'item-row vod-row';
            row.onclick = () => window.open(v[2], '_blank');
            row.innerHTML = `
                <div class="vod-thumb" style="background-image:url('${v[3]}')"></div>
                <div style="flex:1; min-width:0;">
                    <div class="item-date">${v[0]}</div>
                    <div class="item-title ellipsis">${v[1]}</div>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function renderExtraLinks(links) {
        const container = document.getElementById('extra-links');
        container.innerHTML = '';
        if (links) {
            links.forEach(l => {
                if (!l || !l.includes(': ')) return;
                const [name, url] = l.split(': ');
                const a = document.createElement('a');
                a.className = 'link-btn';
                a.href = url.trim();
                a.target = '_blank';
                a.innerText = name.trim();
                container.appendChild(a);
            });
        }
    }

    window.onload = () => { init(); setInterval(init, 60000); };
</script>
</body>
</html>
