<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Archive | Layout</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-radius: 24px; /* 손그림의 둥근 느낌 반영 */
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 메인 그리드 레이아웃 (손그림 구도 반영) */
        .grid-container {
            display: grid;
            grid-template-columns: 300px 1fr 1fr; /* 왼쪽 고정, 오른쪽 가변 */
            grid-template-rows: auto 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid #334155;
            border-radius: var(--border-radius);
            padding: 20px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        /* 1. 방송 정보 (왼쪽 상단) */
        .box-stream-info {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }

        /* 2. 방송인 정보 + 링크 (왼쪽 하단) */
        .box-profile {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            display: flex;
            flex-direction: column;
        }

        .profile-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: #334155;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .link-group {
            margin-top: auto;
            display: grid;
            gap: 8px;
        }

        .link-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--accent);
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid transparent;
        }

        .link-item:hover { border-color: var(--accent); }

        /* 3. 주간 일정 (오른쪽 상단 긴 박스) */
        .box-schedule {
            grid-column: 2 / 4;
            grid-row: 1 / 2;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            text-align: center;
        }

        .day-box { font-size: 0.8rem; padding: 5px; background: #0f172a; border-radius: 8px; }

        /* 4. 게시글 (중앙 하단) */
        .box-posts {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }

        .post-item {
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-size: 0.9rem;
        }

        /* 5. 다시보기 (우측 하단) */
        .box-replay {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
        }

        .replay-thumb {
            width: 100%;
            height: 80px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* 모바일 대응 */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
            .box-schedule, .box-posts, .box-replay { grid-column: 1 / 2; }
        }
    </style>
</head>
<body>

<div class="grid-container">
    <section class="card box-stream-info">
        <span class="title">방송 정보</span>
        <p style="font-size: 0.9rem; color: var(--text-dim);">현재 방송: OFF</p>
    </section>

    <section class="card box-profile">
        <span class="title">방송인 정보</span>
        <div class="profile-img"></div>
        <p><strong>이름:</strong> 스트리머A</p>
        <p style="font-size: 0.85rem; color: var(--text-dim);">
            여기에 소개글이 들어갑니다. 최대 5줄 정도의 깔끔한 설명을 추천합니다.
        </p>
        
        <div class="link-group">
            <span class="title" style="font-size: 0.9rem; border:none; margin:0;">링크</span>
            <a href="#" class="link-item">치지직</a>
            <a href="#" class="link-item">유튜브</a>
            <a href="#" class="link-item">인스타그램</a>
            <a href="#" class="link-item">트위터</a>
            <a href="#" class="link-item">디스코드</a>
        </div>
    </section>

    <section class="card box-schedule">
        <span class="title">주간 일정</span>
        <div class="schedule-grid">
            <div class="day-box">월<br>20:00</div>
            <div class="day-box">화<br>20:00</div>
            <div class="day-box">수<br>휴방</div>
            <div class="day-box">목<br>20:00</div>
            <div class="day-box">금<br>20:00</div>
            <div class="day-box">토<br>18:00</div>
            <div class="day-box">일<br>휴방</div>
        </div>
    </section>

    <section class="card box-posts">
        <span class="title">게시글</span>
        <div class="post-item">최근 공지사항 제목입니다.</div>
        <div class="post-item">이벤트 당첨자 발표 안내</div>
        <div class="post-item">팬아트 게시판 베스트 소식</div>
        <div class="post-item">굿즈 2차 판매 수량 안내</div>
        <div class="post-item">정기 점검 관련 공지</div>
    </section>

    <section class="card box-replay">
        <span class="title">다시보기</span>
        <div>
            <div class="replay-thumb"></div>
            <div style="font-size: 0.85rem; margin-bottom: 10px;">[다시보기] 26.04.15 방송</div>
            <div class="replay-thumb"></div>
            <div style="font-size: 0.85rem;">[다시보기] 26.04.14 방송</div>
            </div>
    </section>
</div>

</body>
</html>
