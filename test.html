<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 VOD 기록함</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent: #003366;
            --accent-bright: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #16243a;
        }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 1250px; display: flex; flex-direction: column; gap: 12px; }

        .card { 
            background: var(--card-bg); border-radius: 10px; padding: 12px 15px; 
            border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column;
        }

        .profile-box { 
            display: flex !important; 
            flex-direction: row !important;
            justify-content: space-between !important; 
            align-items: center !important; 
            background: linear-gradient(145deg, #051020, #02050a); 
        }
        
        .profile-info { text-align: left; }
        .profile-info h1 { margin: 0; font-size: 20px; letter-spacing: -0.5px; }
        .profile-info p { margin: 3px 0 0; font-size: 12px; color: var(--text-sub); }

        .header-buttons { display: flex; gap: 8px; flex-shrink: 0; }
        .link-btn { 
            padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold;
            text-decoration: none; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center;
            white-space: nowrap;
        }
        .btn-summary { background: rgba(51, 133, 255, 0.1); border: 1px solid var(--accent-bright); color: var(--text-main); }
        .btn-summary:hover { background: var(--accent-bright); color: #fff; }
        .btn-back { background: rgba(92, 114, 133, 0.1); border: 1px solid var(--text-sub); color: var(--text-sub); }
        .btn-back:hover { background: var(--text-sub); color: #fff; }

        .bottom-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1.8fr; 
            gap: 12px; 
            align-items: stretch;
        }

        h2 { font-size: 12px; color: var(--accent-bright); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin: 0 0 10px 0; letter-spacing: 0.5px; }

        .item-row { 
            padding: 5px 4px; border-bottom: 1px solid rgba(22, 36, 58, 0.5); 
            font-size: 12.5px; flex: 1; display: flex; flex-direction: column; justify-content: center; 
        }
        .item-row:last-child { border-bottom: none; }

        .stat-label { color: var(--text-sub); font-size: 10.5px; }
        .stat-value { font-size: 14px; font-weight: bold; margin-top: 2px; }

        .graph-bar-container { width: 100%; background: #051020; height: 4px; border-radius: 2px; margin-top: 5px; }
        .graph-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-bright)); border-radius: 2px; }

        .rank-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(4, auto);   
            grid-auto-flow: column;                
            column-gap: 12px; 
            height: 100%;
        }
        .rank-item { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(22, 36, 58, 0.3); font-size: 11.5px; }
        .rank-item:hover {
    background: rgba(51, 133, 255, 0.1);
    border-radius: 5px;
}
        .rank-item:not([style*="background: rgba"]) :hover {
    background: rgba(22, 36, 58, 0.5);
    border-radius: 6px;
}
        .rank-badge { 
            display: inline-block; min-width: 18px; height: 18px; line-height: 18px; 
            text-align: center; background: #1a2638; border-radius: 3px; 
            font-size: 10px; margin-right: 6px; color: var(--text-sub); font-weight: bold;
        }
        .top-rank { background: var(--accent-bright); color: #fff; }

        /* VOD List Styles */
        .vod-list { display: flex; flex-direction: column; gap: 8px; }
        .vod-item {
        display: flex; align-items: center; gap: 15px;
        padding: 10px; background: rgba(22, 36, 58, 0.3);
        border-radius: 8px; border: 1px solid transparent;
        transition: 0.2s;
    }
    .vod-item:hover { border-color: var(--accent-bright); background: rgba(51, 133, 255, 0.05); }
        /* 썸네일 박스 스타일 */
    .vod-thumb {
        width: 100px; /* 16:9 비율 유지용 */
        aspect-ratio: 16 / 9;
        background: #16243a;
        border-radius: 4px;
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
    }
    .vod-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* 이미지가 꽉 차게 */
    }
      .vod-date { 
        display: flex; flex-direction: column; align-items: center;
        min-width: 60px; text-align: center; 
        border-right: 1px solid var(--border); padding-right: 12px;
        flex-shrink: 0;
    }

    .date-day { font-size: 13px; font-weight: bold; color: var(--text-main); }
    .date-duration { font-size: 10px; color: #ffcc00; margin-top: 4px; white-space: nowrap; }

    .vod-info { flex: 1; min-width: 0; }
    .vod-title { 
        font-size: 13.5px; font-weight: bold; color: var(--text-main); 
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
    }
    .vod-meta { margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
    .vod-tag { font-size: 9.5px; color: var(--text-sub); background: #16243a; padding: 1px 5px; border-radius: 3px; }
        .btn-watch {
            padding: 6px 10px; font-size: 11px; background: var(--accent); color: white;
            text-decoration: none; border-radius: 4px; font-weight: bold; transition: 0.2s; flex-shrink: 0;
        }
        .btn-watch:hover { background: var(--accent-bright); }

        /* 팝업(모달) 배경 */
.modal {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0;
    width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(5px); align-items: center; justify-content: center;
}

/* 팝업창 박스 */
.modal-content {
    background: var(--card-bg); border: 1px solid var(--border);
    width: 95%; max-width: 500px; 
    max-height: 85vh; /* 화면 높이의 85%까지만 커짐 */
    border-radius: 15px;
    position: relative; 
    display: flex; flex-direction: column; /* 헤더와 바디 분리용 */
    overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 닫기 버튼 */
.close-btn {
    position: absolute; top: 15px; right: 20px; color: var(--text-sub);
    font-size: 24px; cursor: pointer; z-index: 100; /* 최상단 고정 */
    background: var(--card-bg); padding: 0 5px; border-radius: 50%;
}
.close-btn:hover { color: var(--text-main); }

/* 팝업 내부 콘텐츠 */
.modal-body { 
    overflow-y: auto; /* 세로 스크롤 활성화 */
    flex: 1; 
    scrollbar-width: thin; /* 파이어폭스 스크롤바 조절 */
    scrollbar-color: var(--accent) transparent;
}
/* 크롬/사파리 스크롤바 디자인 */
.modal-body::-webkit-scrollbar { width: 6px; }
.modal-body::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 10px; }
.modal-body::-webkit-scrollbar-track { background: transparent; }

/* 팝업 상단 이미지 고정 해제 (본문과 함께 스크롤되도록 본문 안으로 이동) */
.modal-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-bottom: 1px solid var(--border); }
.modal-details { padding: 20px; }
.modal-details h3 { margin: 0 0 15px 0; font-size: 18px; color: var(--text-main); line-height: 1.5; }
.modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.info-item { background: rgba(22, 36, 58, 0.5); padding: 10px; border-radius: 8px; }
.info-item label { display: block; font-size: 10px; color: var(--text-sub); margin-bottom: 4px; }
.info-item span { font-size: 13px; font-weight: bold; color: var(--accent-bright); }
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; }

        /* 요약 팝업 전용 스타일 */
.summary-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab-btn { 
    flex: 1; padding: 10px; background: none; border: none; color: var(--text-sub); 
    cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s;
}
.tab-btn.active { color: var(--accent-bright); border-bottom: 2px solid var(--accent-bright); }

.tab-content { display: none; animation: fadeIn 0.3s; }
.tab-content.active { display: block; }

.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.summary-item { background: rgba(22, 36, 58, 0.4); padding: 15px; border-radius: 10px; text-align: center; }
.summary-item label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 5px; }
.summary-item div { font-size: 16px; font-weight: bold; color: var(--text-main); }
.summary-full { grid-column: span 2; background: linear-gradient(145deg, #051020, #030812); border: 1px solid var(--accent); }

       .diff-text {
    display: block;
    font-size: 11px;
    margin-top: 4px;
    font-weight: bold;
}
.vod-list {
    max-height: 200px;
    overflow-y: auto;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
}
.truncate {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
} 
        @media (max-width: 800px) {
            .bottom-section { grid-template-columns: 1fr; }
            .rank-grid { 
                grid-template-columns: repeat(2, 1fr); 
                grid-template-rows: repeat(6, auto); 
                grid-auto-flow: column;
            }
            .vod-item { gap: 10px; padding: 12px; }
            .vod-thumb { width: 80px; } /* 모바일에서는 썸네일 축소 */
        .vod-date { min-width: 50px; padding-right: 8px; }
        .date-day { font-size: 12px; }
        .vod-title { white-space: normal; -webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; }
            .btn-watch { display: none; }
        }
    </style>
</head>

    <script>
    // 1. 구글 시트 웹 게시 CSV URL (여기에 복사한 URL을 넣으세요)
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv";

document.addEventListener("DOMContentLoaded", function() {
    loadSheetData();
});

// 통계 계산용 ID를 HTML 태그에 맞춰 설정하기 위해 선택자 준비
function updateTagStatistics(data) {
    let totalVods = 0;
    let totalSec = 0;
    let plusTotalSec = 0;
    let maxSec = 0;
    let minSec = Infinity;
    let maxDate = "";
    
    const tagCount = {};
    let totalTagInstances = 0;

    // 1. 데이터 순회 및 기본 수치 계산
    data.forEach(row => {
        if (!row['날짜']) return;
        totalVods++;

        const currentSec = timeToSeconds(row['다시보기 총시간']);
        totalSec += currentSec;

        if (row['구독플러스여부'] === '예') {
            plusTotalSec += currentSec;
        }

        if (currentSec > maxSec) {
            maxSec = currentSec;
            maxDate = row['날짜'];
        }
        if (currentSec > 0 && currentSec < minSec) minSec = currentSec;

        // 태그 추출 및 카운트
        let rowTags = row['컨텐츠 종류'] ? row['컨텐츠 종류'].split(',').map(t => t.trim()) : [];
        if (row['구독플러스여부'] === '예') rowTags.push('구독+');
        if (row['성인인증 필요 여부'] === '예') rowTags.push('19');

        rowTags.forEach(tag => {
            if (tag && tag !== '-') {
                tagCount[tag] = (tagCount[tag] || 0) + 1;
                totalTagInstances++;
            }
        });
    });

    // 2. 메인 대시보드 상단 수치 업데이트
    document.getElementById('statTotalTime').innerText = secondsToText(totalSec);
    const plusPercent = totalSec > 0 ? Math.round((plusTotalSec / totalSec) * 100) : 0;
    document.getElementById('statPlusTimeRatio').innerText = `${secondsToText(plusTotalSec)} (${plusPercent}%)`;
    document.getElementById('statMaxTime').innerText = secondsToText(maxSec);
    const avgSec = totalVods > 0 ? Math.floor(totalSec / totalVods) : 0;
    document.getElementById('statAvgTime').innerText = secondsToText(avgSec);
    document.getElementById('statMinTime').innerText = (minSec === Infinity) ? '-' : secondsToText(minSec);

    // 3. 태그 데이터 정렬
    const sortedTags = Object.entries(tagCount).sort((a, b) => b[1] - a[1]);

    // 4. [태그 비중 (Top 5)] 카드 업데이트
    const ratioContainer = document.querySelector('.card:nth-child(2)'); 
    if (ratioContainer) {
        let ratioHtml = '<h2>📈 통합 태그 비중 (Top 5)</h2>';
        const top5 = sortedTags.slice(0, 5);
        const othersCount = sortedTags.slice(5).reduce((acc, curr) => acc + curr[1], 0);

        top5.forEach(([name, count]) => {
            const percentage = Math.round((count / totalTagInstances) * 100);
            // 4번 섹션 내 barColor 결정 로직 (필요시 수정)
const barColor = name.includes('구독') ? '#ffcc00' : (name.includes('19') || name.includes('성인') ? '#ff4444' : 'var(--accent-bright)');
            ratioHtml += `
                <div class="item-row">

// 시간 변환 보조 함수들 (기존과 동일하게 유지)
function timeToSeconds(timeStr) {
    if (!timeStr || timeStr === '-') return 0;
    const parts = timeStr.split(':').map(Number);
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    return 0;
}

function secondsToText(totalSeconds) {
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    return `${h}시간 ${m}분`;
}

let groupedData = {}; // { "2026": { "04": [...], "03": [...] } }

// 1. 데이터 초기 그룹화 (loadSheetData 완료 시 호출)
function initializeReportData(data) {
    groupedData = {};
    const yearSelect = document.getElementById('selectYear');
    const years = new Set();

    data.forEach(row => {
        if (!row['날짜']) return;
        const [y, m] = row['날짜'].split('-');
        if (!groupedData[y]) groupedData[y] = {};
        if (!groupedData[y][m]) groupedData[y][m] = [];
        groupedData[y][m].push(row);
        years.add(y);
    });

    // 연도 셀렉트박스 채우기
    yearSelect.innerHTML = Array.from(years).sort().reverse()
        .map(y => `<option value="${y}">${y}년</option>`).join('');
    
    // 이벤트 리스너 등록
    document.getElementById('selectYear').addEventListener('change', updateReport);
    document.getElementById('selectMonth').addEventListener('change', updateReport);
}

// 2. 리포트 업데이트 함수
function updateReport() {
    const targetYear = document.getElementById('selectYear').value;
    const targetMonth = document.getElementById('selectMonth').value;

    let currentData = [];
    let prevData = [];

    if (targetMonth === 'all') {
        // 연도별 데이터 처리 및 작년 데이터 비교 로직 (생략 가능)
        currentData = Object.values(groupedData[targetYear] || {}).flat();
        prevData = Object.values(groupedData[parseInt(targetYear)-1] || {}).flat();
    } else {
        // 월별 데이터 처리 및 전달 데이터 비교
        currentData = groupedData[targetYear]?.[targetMonth] || [];
        const prevMonth = parseInt(targetMonth) === 1 ? '12' : (parseInt(targetMonth)-1).toString().padStart(2, '0');
        const prevYear = parseInt(targetMonth) === 1 ? (parseInt(targetYear)-1).toString() : targetYear;
        prevData = groupedData[prevYear]?.[prevMonth] || [];
    }

    renderStats(currentData, prevData);
    renderCategorySummary(currentData);
    renderRptVodList(currentData);
}

// 3. 수치 및 비교 렌더링
function renderStats(curr, prev) {
    const currTotal = curr.reduce((acc, r) => acc + timeToSeconds(r['다시보기 총시간']), 0);
    const prevTotal = prev.reduce((acc, r) => acc + timeToSeconds(r['다시보기 총시간']), 0);
    
    // 시간 표시 및 차이 계산
    document.getElementById('rptTotalTime').innerText = secondsToText(currTotal);
    setDiff('diffTotalTime', currTotal, prevTotal, "시간");

    // 방송 횟수 표시 및 차이 계산
    document.getElementById('rptCount').innerText = `${curr.length}회`;
    setDiff('diffCount', curr.length, prev.length, "회");

    // 평균 시간
    const currAvg = curr.length > 0 ? currTotal / curr.length : 0;
    const prevAvg = prev.length > 0 ? prevTotal / prev.length : 0;
    document.getElementById('rptAvgTime').innerText = secondsToText(currAvg);
    setDiff('diffAvgTime', currAvg, prevAvg, "분");
}

function setDiff(id, curr, prev, unit) {
    const el = document.getElementById(id);
    if (prev === 0) { el.innerText = ""; return; }
    const diff = curr - prev;
    const color = diff >= 0 ? "#ff4444" : "#3385ff";
    const sign = diff >= 0 ? "▲" : "▼";
    // 시간/분 단위 변환 로직 필요 시 추가
    el.style.color = color;
    el.innerText = `${sign} ${Math.abs(Math.round(diff / (unit === "회" ? 1 : 60)))} ${unit}`;
}

// 카테고리별(게임, 노래 등) 텍스트 요약
function renderCategorySummary(data) {
    const categories = {
        'game': { icon: '🎮', label: '게임 기록', items: {} },
        'song': { icon: '🎤', label: '노래 기록', items: {} },
        'content': { icon: '🎬', label: '콘텐츠 기록', items: {} }
    };

    data.forEach(r => {
        const process = (key, category) => {
            if (r[key] && r[key] !== '-' && r[key] !== '0') {
                r[key].split(',').forEach(item => {
                    let name = item.split('(')[0].trim();
                    if (name) {
                        categories[category].items[name] = (categories[category].items[name] || 0) + 1;
                    }
                });
            }
        };
        process('게임(시간)', 'game');
        process('노래(시간)', 'song');
        process('컨텐츠(시간)', 'content');
    });

    const generateHtml = (cat) => {
        const sortedItems = Object.entries(cat.items).sort((a, b) => b[1] - a[1]);
        let html = `<div>
                        <b style="color:var(--accent-bright); font-size:14px; display:block; margin-bottom:10px;">${cat.icon} ${cat.label}</b>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;">`;
        
        if (sortedItems.length > 0) {
            html += sortedItems.map(([name, count]) => `
                <div style="background:rgba(255,255,255,0.05); padding:8px 12px; border-radius:6px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:12px; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${name}">${name}</span>
                    <strong style="font-size:11px; color:var(--accent-bright);">${count}회</strong>
                </div>
            `).join('');
        } else {
            html += `<span style="font-size:12px; color:var(--text-sub); grid-column: 1/-1;">데이터 없음</span>`;
        }
        html += `</div></div>`;
        return html;
    };

    document.getElementById('rptCategory').innerHTML = 
        generateHtml(categories.game) + 
        generateHtml(categories.song) + 
        generateHtml(categories.content);
    
    // 리포트용 태그 리스트 업데이트 (전체 출력)
    renderRptTags(data);
}

        { label: '🎮 게임', key: '게임(시간)' },
        { label: '🎤 노래', key: '노래(시간)' },
        { label: '💬 소통', key: '소통(시간)' },
        { label: '🎬 컨텐츠', key: '컨텐츠(시간)' }
    ];

    let detailHtml = '';
    details.forEach(d => {
        const val = data[d.key];
        // 데이터가 유효한 경우에만 (예: -, 0 등이 아닐 때)
        if (val && val !== '-' && val !== '0' && val !== '0시간') {
            // 쉼표로 구분된 항목들을 배열로 변환
            const subItems = val.split(',');
            
            detailHtml += `
                <div style="width:100%; margin-top:12px;">
                    <label style="display:block; font-size:11px; color:var(--accent-bright); margin-bottom:6px; font-weight:bold;">${d.label}</label>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        ${subItems.map(item => `
                            <div style="background:rgba(22, 36, 58, 0.6); padding:8px 12px; border-radius:6px; border:1px solid var(--border); font-size:12px; color:var(--text-main);">
                                ${item.trim()}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    });

    tagContainer.innerHTML = typeHtml + detailHtml;

    document.getElementById('vodModal').style.display = 'flex';
}
// 기존 팝업 닫기 및 요약 로직 유지
function closeModal() { document.getElementById('vodModal').style.display = 'none'; }
function openSummary(e) { e.preventDefault(); document.getElementById('summaryModal').style.display = 'flex'; }
function closeSummary() { document.getElementById('summaryModal').style.display = 'none'; }
function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

window.onclick = function(event) {
    if (event.target.classList.contains('modal')) {
        closeModal();
        closeSummary();
    }
}
    </script>
