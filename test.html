<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 페이지 | 바다비 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent: #003366;
            --accent-bright: #3385ff;
            --accent-glow: rgba(0, 51, 102, 0.7);
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
        }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 15px; }

        .card { 
            background: var(--card-bg); 
            border-radius: 12px; padding: 20px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* 상단 헤더 박스 스타일 */
        .header-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            background: linear-gradient(145deg, #051020, #02050a);
        }

        /* 제목과 설명을 묶는 컨테이너 */
.title-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0; /* 텍스트 넘침 방지 */
}

.page-title {
    margin: 0;
    font-size: 20px;
    color: var(--accent-bright);
    font-weight: 700;
    letter-spacing: -0.5px;
}

/* 추가된 보조 설명 스타일 */
.page-desc {
    margin: 0;
    font-size: 13px;
    color: var(--text-sub);
    opacity: 0.9;
    line-height: 1.4;
}

        /* 버튼 스타일 */
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 14px;
            background: #0a1a30;
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 13px;
            border: 1px solid var(--accent);
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn:hover {
            background: var(--accent-bright);
            border-color: var(--accent-bright);
            color: #fff;
        }

        /* 메인 콘텐츠 영역 */
        .content-card { min-height: 300px; }
        h2 { 
            font-size: 15px; margin-top: 0; 
            color: var(--text-sub); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px; margin-bottom: 15px; 
            text-transform: uppercase; 
        }

        footer {
            text-align: center; padding: 30px 10px; 
            color: var(--text-sub); font-size: 11px; 
            border-top: 1px solid var(--border); 
            margin-top: 20px;
        }

        /* 모바일 대응 */
        @media (max-width: 900px) {
    .header-box { 
        flex-direction: row; /* 가로 배열 유지 */
        align-items: center; 
        padding: 15px; 
    }
    .page-title { font-size: 17px; }
    .page-desc { font-size: 11px; } /* 모바일에서 설명 크기 축소 */
    .btn { padding: 6px 10px; font-size: 12px; }
}
    </style>
</head>
<body>

<div class="wrapper">
    <header class="card header-box">
    <div class="title-group">
        <h1 class="page-title">페이지 제목</h1>
        <p class="page-desc">이 페이지에 대한 간단한 보조 설명을 이곳에 작성하세요.</p>
    </div>
    <a href="index.html" class="btn">← 메인으로</a>
</header>

    <main class="card content-card">
        <h2>상세 정보</h2>
        <div id="content-area">
            <p style="color: var(--text-sub); line-height: 1.6; margin: 0;">
                내용을 이곳에 채워 넣어주세요.
            </p>
        </div>
    </main>

    <footer style="opacity: 0.7;">
        <p><strong>바다비 비공식 팬 아카이브</strong></p>
        <p>모든 권리는 원저작권자에게 있으며 요청 시 수정·삭제됩니다.</p>
    </footer>
</div>

</body>
</html>
