<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신청 목록 관리</title>
    <style>
        :root { 
            --main-bg: #0e0e10; 
            --chroma-bg: #00ff00; 
            --accent: #9147ff;
        }
        
        body.chromakey { --main-bg: var(--chroma-bg); }

        body { 
            background: var(--main-bg); 
            color: #efeff1; 
            font-family: sans-serif; 
            padding: 15px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box; 
            transition: background 0.3s; 
        }

        h2 { color: var(--accent); font-size: 16px; margin: 0 0 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .head-btns { display: flex; gap: 8px; align-items: center; }
        
        #list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        
        .item { display: flex; gap: 6px; margin-bottom: 8px; }
        .l-box { flex: 1; display: flex; align-items: center; padding: 6px 10px; background: #26262c; border-radius: 6px; border: 1px solid #2f2f35; min-width: 0; }
        .num { width: 20px; font-size: 10px; font-weight: bold; color: var(--accent); flex-shrink: 0; }
        .tit { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; width: 100%; }
        .done { text-decoration: line-through; opacity: 0.4; }
        
        /* ✨ 배지 스타일 추가 */
        .tag-badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 50px;
            font-size: 9px;
            font-weight: bold;
            margin-left: 6px;
            color: white;
            flex-shrink: 0;
        }
        .tag-200 { background-color: #ff4b4b; }
        .tag-300 { background-color: #ff9100; }
        .tag-기타 { background-color: #4caf50; }
        .tag-default { background-color: #5b5b63; }

        .r-box { display: flex; gap: 4px; padding: 4px 8px; background: #26262c; border-radius: 6px; border: 1px solid #2f2f35; align-items: center; }
        .btn { padding: 3px 6px; font-size: 10px; background: #3a3a3d; border: none; color: white; border-radius: 4px; cursor: pointer; }
        
        .in-area { position: relative; padding-top: 15px; border-top: 1px solid #2f2f35; display: flex; gap: 8px; }
        input { flex: 1; background: #18181b; border: 1px solid #3a3a3d; border-radius: 6px; padding: 10px; color: white; outline: none; font-size: 13px; }
        .add-v { background: var(--accent); border: none; padding: 0 15px; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        #auto { position: absolute; bottom: 60px; left: 0; width: calc(100% - 80px); background: #26262c; border: 1px solid var(--accent); border-radius: 6px; max-height: 150px; overflow-y: auto; display: none; z-index: 10; }
        .a-item { padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #333; }
        .a-item:hover { background: #3a3a3d; color: var(--accent); }

        .util-btn { font-size: 11px; cursor: pointer; color: #efeff1; background: #26262c; border: 1px solid #3a3a3d; padding: 5px 8px; border-radius: 6px; transition: 0.2s; }
        .util-btn:hover { background: #3a3a3d; }
        .util-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        .util-btn.clear { color: #ff4b4b; border-color: #442a2a; }
        .util-btn.clear:hover { background: #442a2a; }
    </style>
</head>
<body>
    <h2>
        🎵 실시간 신청 관리
        <div class="head-btns">
            <button id="chromaBtn" class="util-btn" onclick="toggleChroma()">🟢 크로마키 ON</button>
            <button class="util-btn" onclick="location.reload()">🔄 새로고침</button>
            <button class="util-btn clear" onclick="clearAll()">🗑️ 전체삭제</button>
        </div>
    </h2>

    <ul id="list"></ul>

    <div class="in-area">
        <div id="auto"></div>
        <input type="text" id="in" placeholder="곡 제목 입력..." autocomplete="off">
        <button class="add-v" onclick="addReq()">추가</button>
    </div>

    <script>
        const p = window.opener; 
        const listEl = document.getElementById('list');
        const inEl = document.getElementById('in');
        const autoEl = document.getElementById('auto');
        const chromaBtn = document.getElementById('chromaBtn');

        function getReqs() {
            if (p && p.requests) return p.requests;
            return JSON.parse(localStorage.getItem('streamerRequests')) || [];
        }

        function getAllSongs() {
            if (p && p.allSongs) return p.allSongs;
            return JSON.parse(localStorage.getItem('allSongsCache')) || [];
        }

        function sync(newList) {
            localStorage.setItem('streamerRequests', JSON.stringify(newList));
            if (p) p.requests = newList; 
            render();
        }

        // ✨ 렌더링 시 태그를 배지로 변환하는 로직 추가
        function render() {
            const reqs = getReqs();
            listEl.innerHTML = reqs.map((r, i) => {
                const tagMatch = r.title.match(/^\[([^\]]+)\]/);
                let displayTitle = r.title;
                let tagHtml = '';

                if (tagMatch) {
                    const fullTag = tagMatch[0];
                    const tagText = tagMatch[1];
                    const pureTitle = r.title.replace(fullTag, '').trim();
                    
                    let tagClass = 'tag-default';
                    if (tagText.includes("200")) tagClass = 'tag-200';
                    else if (tagText.includes("300")) tagClass = 'tag-300';
                    else if (tagText.includes("기타")) tagClass = 'tag-기타';

                    displayTitle = pureTitle;
                    tagHtml = `<span class="tag-badge ${tagClass}">${tagText}</span>`;
                }

                return `
                <li class="item">
                    <div class="l-box">
                        <span class="num">${i+1}</span>
                        <span class="tit ${r.completed ? 'done' : ''}">${displayTitle}${tagHtml}</span>
                    </div>
                    <div class="r-box">
                        <button class="btn" onclick="move(${i}, -1)">▲</button>
                        <button class="btn" onclick="move(${i}, 1)">▼</button>
                        <button class="btn" style="color:#4caf50" onclick="toggle(${i})">V</button>
                        <button class="btn" style="color:#ff4b4b" onclick="remove(${i})">X</button>
                    </div>
                </li>`;
            }).join('');
        }

        function addReq() {
            const val = inEl.value.trim();
            if(!val) return;
            const reqs = getReqs();
            reqs.push({ title: val, completed: false });
            inEl.value = '';
            autoEl.style.display = 'none';
            sync(reqs);
            listEl.scrollTop = listEl.scrollHeight;
        }

        function clearAll() {
            if(confirm("정말로 모든 신청 목록을 삭제하시겠습니까?")) sync([]);
        }

        function toggleChroma() {
            const isChroma = document.body.classList.toggle('chromakey');
            if(isChroma) {
                chromaBtn.classList.add('active');
                chromaBtn.innerText = "🟣 크로마키 OFF";
            } else {
                chromaBtn.classList.remove('active');
                chromaBtn.innerText = "🟢 크로마키 ON";
            }
        }

        function toggle(i) { 
            const reqs = getReqs();
            reqs[i].completed = !reqs[i].completed; 
            sync(reqs);
        }

        function remove(i) { 
            const reqs = getReqs();
            reqs.splice(i, 1); 
            sync(reqs);
        }

        function move(i, dir) {
            const reqs = getReqs();
            if (i + dir < 0 || i + dir >= reqs.length) return;
            [reqs[i], reqs[i + dir]] = [reqs[i + dir], reqs[i]];
            sync(reqs);
        }

        inEl.onkeypress = (e) => { if(e.keyCode === 13) addReq(); };

        inEl.oninput = () => {
            const v = inEl.value.toUpperCase();
            const songs = getAllSongs();
            autoEl.innerHTML = '';
            if(!v || !songs.length) { autoEl.style.display = 'none'; return; }
            const ms = songs.filter(s => s.toUpperCase().includes(v)).slice(0, 10);
            if(ms.length > 0) {
                ms.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'a-item'; d.textContent = m;
                    d.onclick = () => { inEl.value = m; autoEl.style.display = 'none'; addReq(); };
                    autoEl.appendChild(d);
                });
                autoEl.style.display = 'block';
            } else autoEl.style.display = 'none';
        };

        window.onload = render;
        window.onfocus = render;
    </script>
</body>
</html>
