<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신청 목록 관리</title>
    <style>
        /* 1. ✨ 핵심: html과 body 모두 배경을 투명하게 강제 지정 */
        html, body { 
            background: transparent !important; 
            background-color: rgba(0, 0, 0, 0) !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body { 
            color: #efeff1; 
            font-family: sans-serif; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
        }

        /* 2. 배경만 담당하는 레이어 (슬라이더로 조절되는 부분) */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(14, 14, 16, 1); /* 초기값 불투명 */
            z-index: -1; 
            transition: background-color 0.1s ease;
        }

        /* --- 이하 디자인 동일 --- */
        :root { --accent: #9147ff; }
        #list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; z-index: 1; }
        .item { display: flex; gap: 6px; margin-bottom: 8px; }
        .l-box { flex: 1; display: flex; align-items: center; padding: 6px 10px; background: rgba(38, 38, 44, 0.9); border-radius: 6px; border: 1px solid rgba(47, 47, 53, 0.5); min-width: 0; }
        .num { width: 20px; font-size: 10px; font-weight: bold; color: var(--accent); flex-shrink: 0; }
        .tit { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .r-box { display: flex; gap: 4px; padding: 4px 8px; background: rgba(38, 38, 44, 0.9); border-radius: 6px; border: 1px solid rgba(47, 47, 53, 0.5); align-items: center; }
        .btn { padding: 3px 6px; font-size: 10px; background: #3a3a3d; border: none; color: white; border-radius: 4px; cursor: pointer; }
        
        .bottom-controls { padding: 10px 0; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #2f2f35; margin-top: 10px; }
        .ctrl-row { display: flex; gap: 8px; align-items: center; }
        .opacity-slider-wrap { flex: 1; display: flex; align-items: center; gap: 10px; background: #18181b; padding: 5px 12px; border-radius: 6px; border: 1px solid #3a3a3d; }
        input[type=range] { flex: 1; cursor: pointer; accent-color: var(--accent); }

        .in-area { padding-top: 5px; display: flex; gap: 8px; }
        input[type=text] { flex: 1; background: #18181b; border: 1px solid #3a3a3d; border-radius: 6px; padding: 10px; color: white; font-size: 13px; }
        .add-v { background: var(--accent); border: none; padding: 0 15px; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>

    <ul id="list"></ul>

    <div class="bottom-controls">
        <div class="ctrl-row">
            <div class="opacity-slider-wrap">
                <label style="font-size: 11px; color: #adadb8;">배경 투명도</label>
                <input type="range" id="bgOpacity" min="0" max="100" value="100" oninput="updateBgOpacity(this.value)">
                <span id="opacityVal" style="font-size:10px; min-width:25px;">100%</span>
            </div>
        </div>
        <div class="ctrl-row">
            <button class="btn" style="flex:1; padding:10px;" onclick="location.reload()">🔄 새로고침</button>
            <button class="btn" style="flex:1; padding:10px; color:#ff4b4b;" onclick="sync([])">🗑️ 전체삭제</button>
        </div>
    </div>

    <div class="in-area">
        <input type="text" id="in" placeholder="곡 제목 입력..." onkeypress="if(event.keyCode==13) addReq()">
        <button class="add-v" onclick="addReq()">추가</button>
    </div>

    <script>
        const p = window.opener; 
        const bgLayer = document.getElementById('bg-layer');
        const opacityVal = document.getElementById('opacityVal');

        function updateBgOpacity(val) {
            const alpha = val / 100;
            // 배경 레이어의 투명도만 조절
            bgLayer.style.backgroundColor = `rgba(14, 14, 16, ${alpha})`;
            opacityVal.innerText = val + "%";
            localStorage.setItem('listBgOpacity', val);
        }

        function init() {
            const saved = localStorage.getItem('listBgOpacity') || "100";
            document.getElementById('bgOpacity').value = saved;
            updateBgOpacity(saved);
            render();
        }

        function getReqs() { return (p && p.requests) ? p.requests : JSON.parse(localStorage.getItem('streamerRequests')) || []; }
        function sync(newList) { localStorage.setItem('streamerRequests', JSON.stringify(newList)); if (p) p.requests = newList; render(); }

        function render() {
            const reqs = getReqs();
            document.getElementById('list').innerHTML = reqs.map((r, i) => `
                <li class="item">
                    <div class="l-box"><span class="num">${i+1}</span><span class="tit">${r.title}</span></div>
                    <div class="r-box"><button class="btn" onclick="remove(${i})">X</button></div>
                </li>`).join('');
        }

        function addReq() {
            const val = document.getElementById('in').value.trim();
            if(!val) return;
            const reqs = getReqs();
            reqs.push({ title: val, completed: false });
            document.getElementById('in').value = '';
            sync(reqs);
        }

        function remove(i) { const reqs = getReqs(); reqs.splice(i, 1); sync(reqs); }

        window.onload = init;
    </script>
</body>
</html>
