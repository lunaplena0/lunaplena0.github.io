<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래 통계 - 바다비 비공식 팬 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { marine: { deep: '#060e16', reef: '#112235', foam: '#e3f2fd', cyan: '#00e5ff', mint: '#05ffa6', coral: '#ff5c8a', border: 'rgba(0, 229, 255, 0.12)' } } } } }
    </script>
    <style>
        body { background-color: #060e16; background-image: radial-gradient(circle at 50% 0%, #0d233a 0%, #060e16 70%); background-attachment: fixed; }
        #stats-container { min-height: 500px; }
        @keyframes loadingBar {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body class="text-marine-foam min-h-screen pb-20">

    <!-- 로딩 오버레이 -->
    <div id="loading-overlay" class="fixed inset-0 bg-marine-deep z-50 flex flex-col items-center justify-center transition-all duration-700 opacity-100">
        <div class="relative flex flex-col items-center">
            <div class="relative mb-8">
                <i class="fa-solid fa-submarine text-marine-cyan text-5xl animate-bounce"></i>
                <div class="absolute -top-2 -right-2 w-3 h-3 bg-marine-mint rounded-full animate-ping"></div>
            </div>
            <p id="loading-text" class="font-bold tracking-[0.2em] text-sm text-marine-foam animate-pulse">
                노래기록을 정리하고 있어요 . . .
            </p>
            <div class="w-32 h-1 bg-marine-reef mt-6 rounded-full overflow-hidden">
                <div class="h-full bg-marine-cyan animate-[loadingBar_2s_ease-in-out_infinite]"></div>
            </div>
        </div>
    </div>

    <nav class="border-b border-marine-border bg-marine-deep/90 backdrop-blur-md sticky top-0 z-40 px-4 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-black text-sm tracking-widest text-marine-foam">BABABI ARCHIVE</span>
            <div class="flex items-center gap-4">
                <a href="https://meloming.com/channel/badabi" class="text-xs font-bold text-marine-cyan hover:underline">바다비 노래책</a>
                <a href="index.html" class="text-xs font-bold text-marine-cyan hover:underline">메인으로 돌아가기</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-8">
    <!-- 총 곡 수 -->
    <div class="bg-marine-reef border border-marine-border p-3 rounded-xl text-center">
        <div class="text-marine-spray text-[10px] uppercase tracking-widest mb-0.5">총 곡 수</div>
        <div id="total-song-count" class="text-marine-cyan text-lg font-display font-black">0</div>
    </div>
    <!-- 최근 30일 애창곡 -->
    <div class="bg-marine-reef border border-marine-border p-3 rounded-xl text-center">
        <div class="text-marine-spray text-[10px] uppercase tracking-widest mb-0.5">최근 30일 애창곡</div>
        <div id="top-song-30" class="text-marine-cyan text-lg font-display font-black truncate">--</div>
    </div>
    <!-- 최근 30일 최다 아티스트 -->
    <div class="bg-marine-reef border border-marine-border p-3 rounded-xl text-center">
        <div class="text-marine-spray text-[10px] uppercase tracking-widest mb-0.5">최근 30일 최다 아티스트</div>
        <div id="top-artist-30" class="text-marine-mint text-lg font-display font-black truncate">--</div>
    </div>
    <!-- 30일간 신규 곡 -->
    <div class="bg-marine-reef border border-marine-border p-3 rounded-xl text-center">
        <div class="text-marine-spray text-[10px] uppercase tracking-widest mb-0.5">30일간 신규 곡</div>
        <div id="new-song-count-30" class="text-marine-coral text-lg font-display font-black">0</div>
    </div>
</div>

        <div class="mb-8">
    <input type="text" id="search-input" placeholder="곡 제목 또는 가수 이름으로 검색..." 
           class="w-full bg-marine-reef border border-marine-border rounded-xl p-3 text-sm text-marine-foam focus:outline-none focus:border-marine-cyan transition-all placeholder:text-marine-spray/50"
           oninput="handleSearch(this.value)">
</div>

        <div class="bg-marine-reef border border-marine-border rounded-3xl p-6 shadow-xl">
            <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-music text-marine-cyan"></i> 전체 노래 목록
            </h2>
            <div id="stats-container" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const DETAIL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv';
        const META_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmWkxsDxTFSxtnLX0nBapwtNcSW9FQiTDv61z9F89_lqZNq5pKGgmuaAKGo5Fd1r4_hfDtxSqSYdpf/pub?gid=0&single=true&output=tsv';

        let sortedSongs = [];
        let metaMap = new Map();
        let currentPage = 1;
        let searchTerm = "";
        const ITEMS_PER_PAGE = 50;

        function prepareWaveText(msg) {
            const el = document.getElementById('loading-text');
            if(el) el.innerText = msg;
        }

        // 로딩 종료 함수
        function hideLoadingOverlay() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 700);
            }
        }

        function parseSheetDate(dateStr) {
            if (!dateStr) return null;
            let clean = dateStr.toString().replace(/[() ]/g, '').trim();
            if (clean.includes('-')) return new Date(clean);
            if (clean.includes('.')) {
                const parts = clean.split('.');
                const year = parts[0].length === 2 ? `20${parts[0]}` : parts[0];
                return new Date(`${year}-${parts[1]}-${parts[2]}`);
            }
            return null;
        }

        // 시간 문자열(mm:ss)을 초로 변환하는 함수
        function timeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            return 0;
        }

        function handleSearch(val) {
            searchTerm = val.toLowerCase();
            currentPage = 1;
            renderPage();
        }

        function loadMore() {
            currentPage++;
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('stats-container');
            const filteredSongs = sortedSongs.filter(([title, occurrences]) => {
                const normalizedTitle = title.replace(/,/g, '').replace(/\([^)]*\)/g, '').trim();
                const metas = metaMap.get(normalizedTitle);
                const broadcastDate = parseSheetDate(occurrences[0].date);
                let bestMeta = metas ? metas[0] : { artist: '정보 없음', genre: '-' };
                if (metas && metas.length > 1) {
                    const match = metas.find(m => m.date && Math.abs(m.date - broadcastDate) <= 86400000);
                    if (match) bestMeta = match;
                }
                return title.toLowerCase().includes(searchTerm) || bestMeta.artist.toLowerCase().includes(searchTerm);
            });

            const end = currentPage * ITEMS_PER_PAGE;
            const songsToRender = filteredSongs.slice(0, end);
            const fragment = document.createDocumentFragment();
            
            songsToRender.forEach(([title, occurrences]) => {
                const normalizedTitle = title.replace(/,/g, '').replace(/\([^)]*\)/g, '').trim();
                const metas = metaMap.get(normalizedTitle);
                const broadcastDate = parseSheetDate(occurrences[0].date);
                let bestMeta = metas ? metas[0] : { artist: '정보 없음', genre: '-' };
                if (metas && metas.length > 1) {
                    const match = metas.find(m => m.date && Math.abs(m.date - broadcastDate) <= 86400000);
                    if (match) bestMeta = match;
                }

                const div = document.createElement('div');
    // 항목 간 구분선 스타일
    div.className = "border-b border-marine-border group hover:bg-marine-reef/20 transition-colors";
    
    div.innerHTML = `
        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full p-4 flex items-center justify-between">
            <!-- 그리드 적용: PC에서는 60%/30%/10% 비율 유지 -->
            <div class="grid grid-cols-[6fr_3fr_1fr] items-center w-full gap-2">
                
                <!-- 제목 (60%) -->
                <div class="font-bold text-marine-foam group-hover:text-marine-cyan transition-colors truncate text-xs sm:text-sm text-left pr-2">
                    ${title}
                </div>

                <!-- 아티스트 및 정보 (30%) -->
                <div class="text-[10px] sm:text-[11px] text-marine-spray flex items-center justify-end sm:justify-start gap-2 overflow-hidden">
                    <span class="text-marine-mint truncate max-w-[80px] sm:max-w-none">${bestMeta.artist}</span>
                    <span class="text-marine-border hidden sm:inline">|</span>
                    <span class="shrink-0 hidden sm:inline">${occurrences.length}회</span>
                </div>

                <!-- 화살표 (10%) -->
                <div class="text-marine-spray/50 text-xs text-right shrink-0">
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                
            </div>
        </button>
        <div class="hidden p-4">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
                ${occurrences.map(occ => `
                    <a href="${occ.vodUrl}" target="_blank" rel="noopener noreferrer" class="block p-2 bg-marine-reef/30 border border-marine-border rounded text-center hover:border-marine-cyan transition-all">
                        <div class="text-[10px] sm:text-[11px] font-bold text-marine-foam">${occ.date}</div>
                    </a>
                `).join('')}
            </div>
        </div>
    `;
    fragment.appendChild(div);
});

            if (end < filteredSongs.length) {
                const btn = document.createElement('button');
                // py-4(상하 패딩 16px)를 py-2(상하 패딩 8px)로 줄여 버튼 높이를 낮춤
                btn.className = "w-full py-2 text-marine-cyan font-bold hover:bg-marine-reef/50 rounded-xl border border-marine-border transition-all mt-4";
                btn.innerText = `더보기 (${end} / ${filteredSongs.length})`;
                btn.onclick = loadMore;
                fragment.appendChild(btn);
            }
            container.innerHTML = '';
            container.appendChild(fragment);
        }

        async function initStats() {
            const overlay = document.getElementById('loading-overlay');
            try {
                const [detailRes, metaRes] = await Promise.all([
                    fetch(DETAIL_URL).then(r => r.text()),
                    fetch(META_URL).then(r => r.text())
                ]);

                const normalize = (str) => str.replace(/,/g, '').replace(/\([^)]*\)/g, '').trim();

                metaRes.split(/\r?\n/).slice(1).forEach(row => {
                    const cols = row.split('\t');
                    if (!cols[0]) return;
                    const title = normalize(cols[0]);
                    if (!metaMap.has(title)) metaMap.set(title, []);
                    metaMap.get(title).push({ artist: cols[1] || '정보 없음', genre: cols[2] || '-', date: parseSheetDate(cols[3]) });
                });

                const rows = detailRes.split(/\r?\n/).slice(1);
                let latestDate = new Date(0);
                rows.forEach(row => {
                    const d = parseSheetDate(row.split('\t')[0]);
                    if (d && d > latestDate) latestDate = d;
                });
                const thirtyDaysAgo = new Date(latestDate.getTime() - (30 * 24 * 60 * 60 * 1000));
                
                const songGroups = new Map();
                const allOccurrences = [];
                const oldSongs = new Set();
                let totalPlayCount = 0;

                rows.forEach(row => {
                    const cols = row.split('\t');
                    if (cols.length < 9) return;
                    const dateVal = parseSheetDate(cols[0]);
                    const link = cols[2];
                    const songListRaw = cols[8];
                    if (!songListRaw || songListRaw.trim() === '-') return;

                    songListRaw.split(',').forEach(rawSong => {
                        const title = rawSong.split('(')[0].trim();
                        if (!title) return;
                        
                        // 시간 추출 및 URL 처리
                        const timeMatch = rawSong.match(/\(([^)]+)\)/);
                        const time = timeMatch ? timeMatch[1] : null;
                        const seconds = timeToSeconds(time);
                        const vodUrl = seconds > 0 ? `${link}${link.includes('?') ? '&' : '?'}change_second=${seconds}` : link;

                        if (!songGroups.has(title)) songGroups.set(title, []);
                        songGroups.get(title).push({ date: cols[0], vodUrl, time });
                        
                        totalPlayCount++;
                        if (dateVal && dateVal >= thirtyDaysAgo) allOccurrences.push({ title, date: cols[0] });
                        else oldSongs.add(title);
                    });
                });

                sortedSongs = Array.from(songGroups.entries()).sort((a, b) => b[1].length - a[1].length);
                document.getElementById('total-song-count').innerText = totalPlayCount;

                const songCount30 = {}, artistCount30 = {};
                allOccurrences.forEach(s => {
                    songCount30[s.title] = (songCount30[s.title] || 0) + 1;
                    const meta = metaMap.get(normalize(s.title));
                    const artist = meta ? meta[0].artist : '정보 없음';
                    artistCount30[artist] = (artistCount30[artist] || 0) + 1;
                });

                const topSong30 = Object.entries(songCount30).sort((a, b) => b[1] - a[1])[0];
                const topArtist30 = Object.entries(artistCount30).sort((a, b) => b[1] - a[1])[0];
                const newSongsCount = [...new Set(allOccurrences.map(s => s.title))].filter(s => !oldSongs.has(s)).length;

                document.getElementById('top-song-30').innerText = topSong30 ? topSong30[0] : '-';
                document.getElementById('top-artist-30').innerText = topArtist30 ? topArtist30[0] : '-';
                document.getElementById('new-song-count-30').innerText = newSongsCount;

                renderPage();
                // 로딩 숨김 (페이드 아웃 효과)
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.classList.add('hidden'); }, 500);
            } catch (err) { 
                console.error("데이터 로드 실패:", err); 
                // 2. 예외 처리 보완: 에러 발생 시 로딩 화면 즉시 제거
                overlay.style.display = 'none';
            }
        }
        document.addEventListener('DOMContentLoaded', initStats);

        const CONFIG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';

async function updateFavicon() {
    try {
        const response = await fetch(CONFIG_URL + `&t=${Date.now()}`);
        const text = await response.text();
        const rows = text.split(/\r?\n/).map(row => row.split('\t'));
        
        // 3번째 줄(index 2), 3번째 칸(index 2)의 URL 가져오기
        const newFaviconUrl = rows[2][2]?.trim(); 

        if (newFaviconUrl && newFaviconUrl.startsWith('http')) {
            // 1. 기존 파비콘 태그 찾기 (없으면 새로 생성)
            let favicon = document.querySelector("link[rel~='icon']");
            if (!favicon) {
                favicon = document.createElement('link');
                favicon.rel = 'icon';
                document.head.appendChild(favicon);
            }
            
            // 2. URL 적용 (캐시 방지용 쿼리스트링 추가)
            favicon.href = newFaviconUrl + `?t=${Date.now()}`;
            
            console.log("Favicon updated to:", newFaviconUrl);
        }
    } catch (e) {
        console.error("Favicon update error:", e);
    }
}

// 페이지가 열리자마자 실행
updateFavicon();

    </script>
    
</body>
</html>
