<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래 통계 - 바다비 비공식 팬 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { marine: { deep: '#060e16', reef: '#112235', foam: '#e3f2fd', cyan: '#00e5ff', mint: '#05ffa6', coral: '#ff5c8a', border: 'rgba(0, 229, 255, 0.12)' } } } } }
    </script>
    <style>
        body { background-color: #060e16; background-image: radial-gradient(circle at 50% 0%, #0d233a 0%, #060e16 70%); }
    </style>
</head>
<body class="text-marine-foam min-h-screen pb-20">

    <nav class="border-b border-marine-border bg-marine-deep/90 backdrop-blur-md sticky top-0 z-40 px-4 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-display font-black text-sm tracking-widest text-marine-foam">SONG STATISTICS</span>
            <a href="index.html" class="text-xs font-bold text-marine-cyan hover:underline">메인으로 돌아가기</a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-marine-reef border border-marine-border p-4 rounded-2xl text-center">
                <div class="text-marine-spray text-[10px] uppercase tracking-widest">총 곡 수</div>
                <div id="total-song-count" class="text-marine-cyan text-2xl font-display font-black">0</div>
            </div>
        </div>

        <div class="bg-marine-reef border border-marine-border rounded-3xl p-6 shadow-xl">
            <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-music text-marine-cyan"></i> 전체 노래 목록
            </h2>
            <div id="stats-container" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const DETAIL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv';
        const META_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmWkxsDxTFSxtnLX0nBapwtNcSW9FQiTDv61z9F89_lqZNq5pKGgmuaAKGo5Fd1r4_hfDtxSqSYdpf/pub?gid=0&single=true&output=tsv';

        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            return 0;
        }

        async function initStats() {
            try {
                const [detailRes, metaRes] = await Promise.all([
                    fetch(DETAIL_URL).then(r => r.text()),
                    fetch(META_URL).then(r => r.text())
                ]);

                const metaMap = new Map();
                metaRes.split(/\r?\n/).slice(1).forEach(row => {
                    const [title, artist, genre] = row.split('\t');
                    if (title) {
                        const cleanTitle = title.replace(/,/g, '').replace(/\([^)]*\)/g, '').trim();
                        metaMap.set(cleanTitle, { artist, genre });
                    }
                });

                const songGroups = new Map(); // 노래별 그룹화 저장
                let totalSongCount = 0;

                detailRes.split(/\r?\n/).slice(1).forEach(row => {
                    const cols = row.split('\t');
                    if (cols.length < 9) return; 

                    const date = cols[0];
                    const songListRaw = cols[8];
                    const link = cols[2];

                    if (!songListRaw || songListRaw.trim() === '-') return;

                    songListRaw.split(',').forEach(rawSong => {
                        const cleanSong = rawSong.trim();
                        if (!cleanSong) return;

                        const title = cleanSong.split('(')[0].trim();
                        const timeMatch = cleanSong.match(/\(([^)]+)\)/);
                        const time = timeMatch ? timeMatch[1] : '';
                        const seconds = timeToSeconds(time);
                        const vodUrl = seconds > 0 ? `${link}${link.includes('?') ? '&' : '?'}change_second=${seconds}` : link;

                        if (!songGroups.has(title)) songGroups.set(title, []);
                        songGroups.get(title).push({ date, vodUrl, time });
                        totalSongCount++;
                    });
                });

                const statsContainer = document.getElementById('stats-container');
                let html = '';
                
                songGroups.forEach((occurrences, title) => {
    const normalizedTitle = title.replace(/,/g, '').trim();
    const meta = metaMap.get(normalizedTitle) || { artist: '정보 없음', genre: '-' };

    html += `
        <div class="bg-marine-deep/40 border border-marine-border rounded-xl overflow-hidden mb-3">
            <!-- 노래 제목 버튼 -->
            <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full p-4 flex justify-between items-center hover:bg-marine-reef/50 transition-colors">
                <div class="text-left">
                    <div class="font-bold text-marine-foam">${title}</div>
                    <div class="text-[11px] text-marine-spray mt-1">${meta.artist} | ${meta.genre} | ${occurrences.length}회</div>
                </div>
                <div class="text-marine-cyan text-sm"><i class="fa-solid fa-chevron-down"></i></div>
            </button>
            
            <!-- 펼쳐지는 VOD 목록 (상자 디자인) -->
            <div class="hidden bg-marine-reef/20 p-3 space-y-2 border-t border-marine-border">
                ${occurrences.map(occ => `
                    <a href="${occ.vodUrl}" target="_blank" class="flex justify-between items-center p-3 bg-marine-deep/60 border border-marine-border rounded-lg hover:border-marine-cyan hover:bg-marine-reef/50 transition-all group">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-marine-foam group-hover:text-marine-cyan">${occ.date}</span>
                            <span class="text-[10px] text-marine-spray">방송 기록 이동</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-mono text-xs text-marine-foam/70">${occ.time}</span>
                            <i class="fa-solid fa-play-circle text-marine-cyan text-sm opacity-50 group-hover:opacity-100"></i>
                        </div>
                    </a>
                `).join('')}
            </div>
        </div>
    `;
});

                statsContainer.innerHTML = html;
                document.getElementById('total-song-count').innerText = totalSongCount;
            } catch (err) {
                console.error("데이터 로드 실패:", err);
            }
        }
        document.addEventListener('DOMContentLoaded', initStats);
    </script>
</body>
</html>
