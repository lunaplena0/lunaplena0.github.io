<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 정보메인 (Enhanced Visual)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #02050a;
            --card-bg: #0b1424;          /* 조금 더 밝은 네이비로 시인성 확보 */
            --accent: #0047ab;           /* 깊은 코발트 블루 */
            --accent-bright: #4da3ff;    /* 더 밝고 선명한 하늘색 */
            --accent-glow: rgba(77, 163, 255, 0.3);
            --text-main: #ffffff;
            --text-sub: #8da2b5;         /* 서브 텍스트를 살짝 더 밝게 */
            --border: #1e2d45;           /* 경계선 명도 대비 증가 */
        }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, #0c1a32 0%, #02050a 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 40px 20px;
            display: flex; justify-content: center; 
            min-height: 100vh; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 25px; }

        /* 카드 디자인 시각적 강화 */
        .card { 
            background: var(--card-bg); 
            border-radius: 16px; padding: 25px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .profile-box { align-items: center; gap: 30px; display: flex; }
        
        .profile-img { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 4px solid var(--accent-bright);
            box-shadow: 0 0 20px var(--accent-glow);
            background-size: cover; background-position: center;
        }

        .profile-info h1 { margin: 0 0 10px; font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .profile-info p { 
            color: var(--text-sub); margin: 0 0 20px; font-size: 16px; 
            line-height: 1.6; max-width: 600px;
        }

        /* 버튼 시각성 강화 */
        .social-links { display: flex; gap: 12px; }
        .link-btn { 
            padding: 10px 20px; background: rgba(77, 163, 255, 0.1); border-radius: 8px; 
            color: var(--accent-bright); text-decoration: none; font-size: 14px; font-weight: 500;
            border: 1px solid var(--accent-bright); transition: 0.2s;
        }
        .link-btn:hover { background: var(--accent-bright); color: #fff; transform: translateY(-2px); }

        /* 우측 라이브 상태창 강조 */
        .live-status-inline {
            margin-left: auto; text-align: center; padding: 10px 40px; 
            border-left: 2px solid var(--border);
            min-width: 220px;
        }

        .badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 800; letter-spacing: 1px; }
        #stream-title-inline { font-size: 20px; font-weight: 700; margin: 10px 0; color: var(--accent-bright); text-decoration: none; display: block; }

        /* 하단 3열 구성 (PC 시각성 최적화) */
        .bottom-section { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; }

        h2 { 
            font-size: 18px; color: var(--accent-bright); margin-bottom: 20px; 
            display: flex; align-items: center; gap: 8px;
            border-bottom: 2px solid var(--accent); padding-bottom: 10px;
        }

        /* 리스트 아이템 가시성 개선 */
        .item-row { 
            padding: 15px; border-bottom: 1px solid var(--border); 
            border-radius: 10px; margin-bottom: 5px; cursor: pointer;
        }
        .item-row:hover { background: rgba(255, 255, 255, 0.03); border-color: var(--accent-bright); }
        .item-date { font-size: 12px; color: var(--text-sub); margin-bottom: 5px; }
        
        /* 스케줄 강조 디자인 */
        .schedule-row { background: rgba(255,255,255,0.01); border: 1px solid transparent; }
        .today-highlight { 
            background: linear-gradient(90deg, rgba(77,163,255,0.1) 0%, transparent 100%) !important;
            border-left: 4px solid var(--accent-bright) !important;
        }

        .vod-thumb { 
            width: 100px; height: 56px; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @media (max-width: 1024px) {
            .bottom-section { grid-template-columns: 1fr; }
            .profile-box { flex-direction: column; text-align: center; }
            .live-status-inline { margin: 0; border-left: none; border-top: 1px solid var(--border); width: 100%; padding: 20px 0; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img" style="background-image: url('https://via.placeholder.com/120');"></div>
            <div class="profile-info">
                <h1 id="user-nick">로딩 중...</h1>
                <p id="user-desc">정보를 불러오고 있습니다. 잠시만 기다려주세요.</p>
                <div class="social-links" id="social-links"></div>
            </div>
            <div class="live-status-inline">
                <div class="badge offline">OFFLINE</div>
                <a href="#" id="stream-title-inline">방송 준비 중</a>
                <div id="last-stream-time" style="font-size: 13px; color: var(--text-sub);">최근 방송 데이터 로딩 중</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div id="schedule-container"></div>
        </div>
        <div class="card">
            <h2>📢 최근 게시물</h2>
            <div id="post-container"></div>
        </div>
        <div class="card">
            <h2>🎬 다시보기</h2>
            <div id="vod-container"></div>
        </div>
    </div>
</div>

<script>
    // 기존 스크립트 로직은 절대 건드리지 않습니다.
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';
    const SONG_BOOK_URL = 'https://lunaplena0.github.io/songlist.html'; 

    async function init() {
        try {
            const cacheBuster = `&t=${new Date().getTime()}`;
            const finalUrl = TSV_URL + cacheBuster;

            const response = await fetch(finalUrl, {
                cache: 'no-store',
                headers: {
                    'Pragma': 'no-cache',
                    'Cache-Control': 'no-cache'
                }
            });

            if (!response.ok) throw new Error('Network error');

            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            const profile = rows[2];
            const liveData = rows[6]; 
            const updateTimeData = rows[1] ? rows[1][5] : null; 
            const statusBox = document.querySelector('.live-status-inline');

            const isOnline = liveData && liveData[5] !== "방송 정보 없음" && liveData[5] !== undefined;

            if (isOnline) {
                const bTitle = liveData[5];
                const bTime = liveData[6];
                const bGrade = liveData[7];
                const bSubOnly = liveData[8];
                const bPwd = liveData[9];

                let onlineBadge = `<div class="badge" style="background:#d32f2f; color:white; margin-bottom:0; padding: 2px 8px; font-size: 9px;">ONLINE</div>`;
                let subTagsHtml = '';
                const subStyle = `padding: 1px 5px; font-size: 8px; margin: 0; background:#121f33; line-height: 1; border: 1px solid var(--border);`;

                if (!["X", "-"].includes(bGrade)) subTagsHtml += `<span class="badge" style="${subStyle} color:#FFAB91;">19</span>`;
                if (!["X", "-"].includes(bSubOnly)) subTagsHtml += `<span class="badge" style="${subStyle} color:#B39DDB;">구독+</span>`;
                if (!["X", "-"].includes(bPwd)) subTagsHtml += `<span class="badge" style="${subStyle} color:#90A4AE;">비밀번호</span>`;

                statusBox.innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 3px; margin-bottom: 5px;">
                        ${onlineBadge}
                        <div style="display: flex; gap: 3px; flex-wrap: wrap; justify-content: center;">
                            ${subTagsHtml}
                        </div>
                    </div>
                    <a href="https://play.sooplive.com/bababi" target="_blank" id="stream-title-inline" class="ellipsis" 
                       style="max-width:180px; color:var(--accent-bright); font-size:15px; margin-bottom:1px; text-decoration:none; display:block; cursor:pointer;">
                       ${bTitle}
                    </a>
                    <div id="last-stream-time" style="color:var(--text-sub); font-size:10px;">시작: ${bTime}</div>
                `;
            } else {
                const lastTime = (profile && profile[3]) ? profile[3].trim() : "확인 중";
                statusBox.innerHTML = `
                    <div class="badge offline">OFFLINE</div>
                    <div id="stream-title-inline" style="color: var(--text-sub);">방송 준비 중</div>
                    <div id="last-stream-time">최근 방송: ${lastTime}</div>
                `;
            }

            if (profile) {
                document.getElementById('user-nick').innerText = profile[0] || '닉네임';
                document.getElementById('user-desc').innerText = profile[1] || '';
                if(profile[2]) document.querySelector('.profile-img').style.backgroundImage = `url('${profile[2]}')`;
            }

            if (updateTimeData) {
                let updateEl = document.getElementById('update-time');
                if (!updateEl) {
                    updateEl = document.createElement('div');
                    updateEl.id = 'update-time';
                    updateEl.style.cssText = "font-size: 9px; color: var(--text-sub); margin-top: 8px; opacity: 0.6;";
                    statusBox.appendChild(updateEl);
                }
                updateEl.innerText = `갱신: ${updateTimeData}`;
            }

            renderLinks(rows[5]);
            renderPosts(rows.slice(8, 13));
            renderVODs(rows.slice(16, 21));
            renderSchedule(rows.slice(24, 29));

        } catch (e) { console.error("Data Load Error:", e); }
    }

    // 렌더링 함수 내의 보라색 강조 효과들도 블루로 교체합니다.
    function renderLinks(extraLinks) {
        const linkBox = document.getElementById('social-links');
        linkBox.innerHTML = '';
        const basicBtns = [
            { name: '📺 방송국', url: 'https://www.sooplive.com/station/bababi' },
            { name: '📖 노래책', url: SONG_BOOK_URL }
        ];
        basicBtns.forEach(btn => {
            const a = document.createElement('a');
            a.className = 'link-btn';
            a.href = btn.url;
            a.target = btn.name === '📖 노래책' ? '_self' : '_blank';
            a.innerText = btn.name;
            a.style.borderColor = 'var(--accent-bright)'; /* 기본 링크 테두리를 블루로 설정 */
            linkBox.appendChild(a);
        });
        if (extraLinks) {
            extraLinks.forEach(l => {
                if (l && l.includes(': ')) {
                    const [name, ...urlParts] = l.split(': ');
                    const a = document.createElement('a');
                    a.className = 'link-btn';
                    a.href = urlParts.join(': ').trim();
                    a.target = '_blank';
                    a.innerText = name.trim();
                    linkBox.appendChild(a);
                }
            });
        }
    }

    function renderPosts(data) {
        const postBox = document.getElementById('post-container');
        const postData = data.filter(p => p[1] && p[1].trim() !== "");
        let html = '<h2>📢 최근 게시물</h2>';
        postData.forEach(p => {
            const isNotice = p[3]?.trim() === 'O' ? '<span style="color:var(--accent-bright); margin-left: 5px;">📌</span>' : ''; 
            html += `<div class="item-row" onclick="window.open('${p[2]}', '_blank')" style="display: flex; flex-direction: row; align-items: center;">
                        <div style="flex: 1; min-width: 0;">
                            <div class="item-date">${p[0]}</div>
                            <div class="ellipsis">${p[1]}</div>
                        </div>
                        ${isNotice}
                    </div>`;
        });
        postBox.innerHTML = html;
    }

    function renderVODs(data) {
        const vodBox = document.getElementById('vod-container');
        const vodData = data.filter(v => v[1] && v[1].trim() !== "");
        let html = '<h2>🎬 방송 다시보기</h2>';
        vodData.forEach(v => {
            const isPin = v[4]?.trim() === 'O' ? '📌 ' : '';
            html += `<div class="item-row vod-row" onclick="window.open('${v[2]}', '_blank')">
                        <div class="vod-thumb" style="background-image:url('${v[3]}')"></div>
                        <div style="flex:1; min-width:0;">
                            <div class="item-date">${v[0]}</div>
                            <div class="ellipsis" style="font-size:11px;">${isPin}${v[1]}</div>
                        </div>
                    </div>`;
        });
        vodBox.innerHTML = html;
    }

    function renderSchedule(data) {
        const container = document.getElementById('schedule-container');
        if(!container) return;
        container.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('en-CA'); 
        data.forEach(row => {
            const date = row[0]?.trim() || '';   
            const day = row[1]?.trim() || '';    
            const time = row[2]?.trim() || '';   
            const content = row[3]?.trim() || ''; 
            const category = row[4]?.trim() || ''; 
            if(!date && !content) return; 
            const isToday = date === todayStr;
            const rowDiv = document.createElement('div');
            rowDiv.className = `item-row schedule-row ${isToday ? 'today-highlight' : ''}`;
            const timeInfo = time ? `<span style="color:var(--accent-bright); font-weight:bold;">${time}</span>` : '';
            rowDiv.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:1px; flex:1; min-width:0;">
                    <span class="day" style="font-size:10px;">${date} (${day})${isToday ? '<span class="badge today-tag" style="font-size:8px; padding:1px 4px;">TODAY</span>' : ''}</span>
                    <div style="font-size:12px; color:var(--text-main); display:flex; align-items:center; gap:5px;">
                        ${timeInfo} <span class="ellipsis">${content || '일정 없음'}</span>
                    </div>
                </div>
                <div style="font-size:10px; color:var(--text-sub);">${category}</div>
            `;
            container.appendChild(rowDiv);
        });
    }

    window.onload = () => { init(); setInterval(init, 60000); };
</script>

</body>
</html>
