<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한눈에 모아보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; padding: 20px 0; }

        /* 카드 공통 스타일 */
        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 25px; 
            border: 1px solid #2f2f35; display: flex; flex-direction: column;
            box-sizing: border-box;
        }

        /* 상단 프로필 영역 */
        .profile-box { 
            flex-direction: row; align-items: center; gap: 30px; 
            background: linear-gradient(145deg, #18181b, #1d1d21); 
        }
        
        .profile-img { 
            width: 100px; height: 100px; border-radius: 50%; background: #2f2f35; 
            flex-shrink: 0; border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(145, 71, 255, 0.2);
            background-size: cover; background-position: center;
        }

        .profile-info { flex-grow: 1; min-width: 0; }
        .profile-info h1 { margin: 0 0 5px; font-size: 24px; font-weight: 700; }
        .profile-info p { 
            color: var(--text-sub); margin: 0 0 12px; font-size: 14px; 
            line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .social-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .link-btn { 
            padding: 6px 12px; background: #26262c; border-radius: 6px; 
            color: var(--text-main); text-decoration: none; font-size: 12px; 
            border: 1px solid #3a3a3d; transition: 0.2s;
        }
        .link-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* 라이브 상태창 */
        .live-status-inline {
            margin-left: auto; text-align: center; padding: 0 20px 0 40px; 
            border-left: 1px solid #2f2f35; min-width: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 하단 그리드 레이아웃 */
        .bottom-section { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
        }

        h2 { font-size: 14px; margin: 0 0 15px 0; color: var(--accent); border-bottom: 1px solid #2f2f35; padding-bottom: 10px; }

        /* 리스트 아이템 공통 */
        .item-row { 
            padding: 12px; border-bottom: 1px solid #26262c; font-size: 13px; 
            border-radius: 8px; transition: 0.2s; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center;
        }
        .item-row:hover { background: rgba(255, 255, 255, 0.05); }
        .item-row:last-child { border: none; }
        .item-date { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        
        .vod-row { flex-direction: row; align-items: center; gap: 12px; }
        .vod-thumb { width: 70px; height: 40px; background: #2f2f35; border-radius: 4px; flex-shrink: 0; background-size: cover; }

        .schedule-row { flex-direction: row; justify-content: space-between; cursor: default; align-items: flex-end; }
        .today-highlight { background: rgba(145, 71, 255, 0.1) !important; border: 1px solid var(--accent) !important; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .offline { background: #3a3a3d; color: var(--text-sub); }
        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 900px) {
            .bottom-section { grid-template-columns: 1fr; }
            .profile-box { flex-direction: column; text-align: center; }
            .live-status-inline { margin-left: 0; border-left: none; border-top: 1px solid #2f2f35; padding: 20px 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img"></div>
            <div class="profile-info">
                <h1 id="user-nick">Loading...</h1>
                <p id="user-desc">데이터를 불러오는 중입니다.</p>
                <div class="social-links" id="social-links"></div>
            </div>
            <div class="live-status-inline" id="live-status-area">
                </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div id="schedule-container"></div>
        </div>
        <div class="card">
            <h2>📢 최근 게시물</h2>
            <div id="post-container"></div>
        </div>
        <div class="card">
            <h2>🎬 방송 다시보기</h2>
            <div id="vod-container"></div>
        </div>
    </div>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';
    
    async function init() {
        try {
            const response = await fetch(`${TSV_URL}&t=${Date.now()}`, { cache: 'no-store' });
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            const profile = rows[2] || [];
            const liveData = rows[6] || [];
            const updateTime = rows[1] ? rows[1][5] : '';

            // 1. 프로필 업데이트
            document.getElementById('user-nick').innerText = profile[0] || '닉네임';
            document.getElementById('user-desc').innerText = profile[1] || '';
            if(profile[2]) document.querySelector('.profile-img').style.backgroundImage = `url('${profile[2]}')`;

            // 2. 라이브 상태 업데이트
            renderLiveStatus(liveData, profile[3], updateTime);

            // 3. 각 섹션 렌더링
            renderLinks(rows[5]);
            renderPosts(rows.slice(8, 13));
            renderVODs(rows.slice(16, 21));
            renderSchedule(rows.slice(24, 31));

        } catch (e) {
            console.error("Data Load Error:", e);
        }
    }

    function renderLiveStatus(live, lastTime, updateTime) {
        const area = document.getElementById('live-status-area');
        const isOnline = live[5] && !["방송 정보 없음", "X", "-"].includes(live[5]);

        if (isOnline) {
            area.innerHTML = `
                <div class="badge" style="background:#d32f2f; color:white;">ONLINE</div>
                <div class="ellipsis" style="font-size:16px; font-weight:bold; width:180px; margin-bottom:5px;">${live[5]}</div>
                <div style="font-size:12px; color:var(--accent); font-weight:bold;">${live[6]} 시작</div>
                <div style="font-size:10px; opacity:0.5; margin-top:10px;">갱신: ${updateTime}</div>
            `;
        } else {
            area.innerHTML = `
                <div class="badge offline">OFFLINE</div>
                <div style="font-size:16px; font-weight:bold; margin-bottom:5px; color:var(--text-sub);">방송 준비 중</div>
                <div style="font-size:12px; color:var(--text-sub);">최근: ${lastTime || '정보 없음'}</div>
                <div style="font-size:10px; opacity:0.5; margin-top:10px;">갱신: ${updateTime}</div>
            `;
        }
    }

    function renderLinks(links) {
        const box = document.getElementById('social-links');
        box.innerHTML = `<a href="https://www.sooplive.com/station/bababi" class="link-btn" target="_blank" style="border-color:var(--accent)">📺 방송국</a>`;
        if(links) {
            links.forEach(l => {
                if(l && l.includes(': ')) {
                    const [name, url] = l.split(': ');
                    box.innerHTML += `<a href="${url.trim()}" class="link-btn" target="_blank">${name}</a>`;
                }
            });
        }
    }

    function renderPosts(data) {
        const container = document.getElementById('post-container');
        container.innerHTML = data.filter(r => r[1]).map(r => `
            <div class="item-row" onclick="window.open('${r[2]}', '_blank')">
                <div class="item-date">${r[0]}</div>
                <div class="ellipsis">${r[3] === 'O' ? '📌 ' : ''}${r[1]}</div>
            </div>
        `).join('');
    }

    function renderVODs(data) {
        const container = document.getElementById('vod-container');
        container.innerHTML = data.filter(r => r[1]).map(r => `
            <div class="item-row vod-row" onclick="window.open('${r[2]}', '_blank')">
                <div class="vod-thumb" style="background-image:url('${r[3]}')"></div>
                <div style="min-width:0; flex:1;">
                    <div class="item-date">${r[0]}</div>
                    <div class="ellipsis">${r[1]}</div>
                </div>
            </div>
        `).join('');
    }

    function renderSchedule(data) {
        const container = document.getElementById('schedule-container');
        const today = new Date().toLocaleDateString('en-CA');
        container.innerHTML = data.filter(r => r[0] || r[3]).map(r => `
            <div class="item-row schedule-row ${r[0] === today ? 'today-highlight' : ''}">
                <div style="min-width:0; flex:1;">
                    <div class="item-date">${r[0]} (${r[1]})</div>
                    <div class="ellipsis"><b>${r[2] || ''}</b> ${r[3] || '휴방'}</div>
                </div>
                <div style="font-size:10px; color:var(--text-sub);">${r[4] || ''}</div>
            </div>
        `).join('');
    }

    window.onload = init;
    setInterval(init, 60000);
</script>
</body>
</html>
