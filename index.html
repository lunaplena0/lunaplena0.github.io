<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한눈에 모아보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; padding: 40px 0; }

        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 30px; 
            border: 1px solid #2f2f35; display: flex; position: relative;
        }

        .profile-box { align-items: center; gap: 30px; background: linear-gradient(145deg, #18181b, #1d1d21); }
        
        .profile-img { 
            width: 110px; height: 110px; border-radius: 50%; background: #2f2f35; 
            flex-shrink: 0; border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(145, 71, 255, 0.2);
            background-size: cover; background-position: center;
        }

        .profile-info { flex-grow: 1; min-width: 0; }
        .profile-info h1 { margin: 0 0 5px; font-size: 26px; font-weight: 700; }
        .profile-info p { 
            color: var(--text-sub); margin: 0 0 15px; font-size: 14px; 
            max-width: 450px; line-height: 1.6;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .social-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .link-btn { 
            padding: 8px 16px; background: #26262c; border-radius: 8px; 
            color: var(--text-main); text-decoration: none; font-size: 13px; 
            border: 1px solid var(--accent); transition: 0.3s; 
        }
        .link-btn:hover { background: var(--accent); color: white; }

        .live-status-inline {
            margin-left: auto; text-align: center; padding: 0 40px; border-left: 1px solid #2f2f35; 
            min-width: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .badge { display: inline-block; padding: 5px 14px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .badge.offline { background: #3a3a3d; color: var(--text-sub); }
        #stream-title-inline { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        #last-stream-time { font-size: 12px; color: var(--text-sub); }

        .bottom-section { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; 
        }
        .bottom-section .card { flex-direction: column; padding: 25px; min-width: 0; }

        h2 { font-size: 14px; margin-top: 0; color: var(--accent); border-bottom: 1px solid #2f2f35; padding-bottom: 12px; margin-bottom: 15px; }

        .item-row { 
            padding: 10px; border-bottom: 1px solid #26262c; font-size: 13px; 
            border-radius: 8px; transition: 0.2s; cursor: pointer;
            min-height: 66px; display: flex; flex-direction: column; justify-content: center;
        }
        .item-row:hover { background: rgba(255, 255, 255, 0.05); }
        .item-row:last-child { border: none; }
        .item-date { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        
        .vod-row { flex-direction: row !important; align-items: center; gap: 12px; }
        .vod-thumb { width: 80px; height: 45px; background: #2f2f35; border-radius: 4px; flex-shrink: 0; background-size: cover; background-position: center; }

        .schedule-row { flex-direction: row !important; justify-content: space-between; cursor: default; }
        .today-highlight { background: rgba(145, 71, 255, 0.15) !important; border: 1px solid var(--accent) !important; }
        .today-tag { font-size: 9px; background: var(--accent); color: white; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 900px) {
            .profile-box { flex-direction: column; padding-bottom: 40px; }
            .live-status-inline { margin-left: 0; border-left: none; border-top: 1px solid #2f2f35; padding: 20px 0; width: 100%; }
            .bottom-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img"></div>
            <div class="profile-info">
                <h1 id="user-nick">불러오는 중...</h1>
                <p id="user-desc">잠시만 기다려주세요.</p>
                <div class="social-links" id="social-links">
                    </div>
            </div>
            <div class="live-status-inline" id="live-area">
                <div class="badge offline">CHECKING</div>
                <div id="stream-title-inline">데이터 확인 중</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div id="schedule-container"></div>
        </div>
        <div class="card">
            <h2>📢 최근 게시물</h2>
            <div id="post-container"></div>
        </div>
        <div class="card">
            <h2>🎬 방송 다시보기</h2>
            <div id="vod-container"></div>
        </div>
    </div>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';

    async function init() {
        try {
            const res = await fetch(`${TSV_URL}&t=${Date.now()}`, { cache: 'no-store' });
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            const profile = rows[2] || [];
            const liveData = rows[6] || [];

            // 1. 프로필 & 버튼 복구
            document.getElementById('user-nick').innerText = profile[0] || '닉네임';
            document.getElementById('user-desc').innerText = profile[1] || '';
            if(profile[2]) document.querySelector('.profile-img').style.backgroundImage = `url('${profile[2]}')`;

            // 버튼 생성 로직
            const linkBox = document.getElementById('social-links');
            linkBox.innerHTML = `<a href="https://www.sooplive.com/station/bababi" class="link-btn" target="_blank">📺 방송국</a>`;
            linkBox.innerHTML += `<a href="https://lunaplena0.github.io/songlist.html" class="link-btn">📖 노래책</a>`;
            
            if(rows[5]) {
                rows[5].forEach(link => {
                    if(link && link.includes(': ')) {
                        const [name, url] = link.split(': ');
                        linkBox.innerHTML += `<a href="${url.trim()}" class="link-btn" target="_blank">${name}</a>`;
                    }
                });
            }

            // 2. 라이브 상태 복구
            const liveArea = document.getElementById('live-area');
            const isOnline = liveData[5] && !["방송 정보 없음", "X", "-"].includes(liveData[5]);
            
            if(isOnline) {
                liveArea.innerHTML = `
                    <div class="badge" style="background:#d32f2f; color:white;">ONLINE</div>
                    <div id="stream-title-inline" class="ellipsis" style="width:200px;">${liveData[5]}</div>
                    <div id="last-stream-time" style="color:var(--accent); font-weight:bold;">시작: ${liveData[6]}</div>
                `;
            } else {
                liveArea.innerHTML = `
                    <div class="badge offline">OFFLINE</div>
                    <div id="stream-title-inline">방송 준비 중</div>
                    <div id="last-stream-time">최근 방송: ${profile[3] || '확인 중'}</div>
                `;
            }

            // 3. 하단 리스트 복구
            renderList('schedule-container', rows.slice(24, 31), 'schedule');
            renderList('post-container', rows.slice(8, 13), 'post');
            renderList('vod-container', rows.slice(16, 21), 'vod');

        } catch (e) { console.error("데이터 로드 실패:", e); }
    }

    function renderList(id, data, type) {
        const container = document.getElementById(id);
        const today = new Date().toLocaleDateString('en-CA');
        container.innerHTML = '';

        data.forEach(r => {
            if(!r[1] && type !== 'schedule') return;
            const div = document.createElement('div');
            div.className = 'item-row';
            
            if(type === 'schedule') {
                const isToday = r[0] === today;
                if(isToday) div.classList.add('today-highlight');
                div.style.flexDirection = 'row';
                div.style.justifyContent = 'space-between';
                div.innerHTML = `
                    <div style="min-width:0; flex:1;">
                        <div class="item-date">${r[0]} (${r[1]})${isToday ? '<span class="today-tag">TODAY</span>' : ''}</div>
                        <div class="ellipsis"><b>${r[2] || ''}</b> ${r[3] || '일정 없음'}</div>
                    </div>
                    <div style="font-size:11px; color:var(--text-sub); align-self:center;">${r[4] || ''}</div>
                `;
            } else if(type === 'post') {
                div.onclick = () => window.open(r[2], '_blank');
                div.innerHTML = `
                    <div class="item-date">${r[0]}</div>
                    <div class="ellipsis">${r[3] === 'O' ? '📌 ' : ''}${r[1]}</div>
                `;
            } else if(type === 'vod') {
                div.classList.add('vod-row');
                div.onclick = () => window.open(r[2], '_blank');
                div.innerHTML = `
                    <div class="vod-thumb" style="background-image:url('${r[3]}')"></div>
                    <div style="min-width:0; flex:1;">
                        <div class="item-date">${r[0]}</div>
                        <div class="ellipsis">${r[1]}</div>
                    </div>
                `;
            }
            container.appendChild(div);
        });
    }

    window.onload = init;
    setInterval(init, 60000);
</script>
</body>
</html>
