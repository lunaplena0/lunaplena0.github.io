<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 메인 페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 3, 6, 0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease; visibility: visible;
        }
        .loader-circle {
            width: 50px; height: 50px; border: 3px solid var(--accent);
            border-top: 3px solid var(--accent-bright); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .loader-text {
            color: var(--accent-bright); font-size: 14px; letter-spacing: 2px;
            font-weight: bold; animation: pulse 1.5s infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        :root {
            --bg-color: #010306; --card-bg: #030812; --accent: #003366;
            --accent-bright: #3385ff; --accent-glow: rgba(0, 51, 102, 0.7);
            --text-main: #f0faff; --text-sub: #5c7285; --border: #0a1425;
        }
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 10px; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; box-sizing: border-box; overflow: hidden;
        }
        .wrapper { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 15px; padding: 10px 0; }
        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            border: 1px solid var(--border); display: flex; position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .profile-box { align-items: center; gap: 20px; background: linear-gradient(145deg, #051020, #02050a); }
        .profile-img { 
            width: 90px; height: 90px; border-radius: 50%; background: #0a1a30; 
            flex-shrink: 0; border: 3px solid var(--accent-bright);
            box-shadow: 0 0 15px var(--accent-glow); background-size: cover; 
            background-position: center; cursor: default; 
        }
        .profile-info { flex-grow: 1; min-width: 0; }
        .profile-info h1 { margin: 0 0 2px; font-size: 22px; font-weight: 700; color: var(--text-main); }
        .profile-info p { 
            color: var(--text-sub); margin: 0 0 8px; font-size: 13px; 
            max-width: 450px; line-height: 1.4; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis;
        }
        .social-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .link-btn { 
            padding: 5px 12px; background: #0a1a30; border-radius: 6px; 
            color: var(--text-main); text-decoration: none; font-size: 11px; 
            border: 1px solid var(--accent-bright); transition: 0.3s; 
        }
        .link-btn:hover { background: var(--accent-bright); border-color: var(--accent-bright); color: #fff; }
        .live-status-inline {
            margin-left: auto; text-align: center; padding: 0 25px; 
            border-left: 1px solid var(--border); min-width: 180px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        .offline { background: #1a2638; color: var(--text-sub); }
        #stream-title-inline { font-size: 16px; font-weight: bold; margin-bottom: 2px; color: var(--accent-bright); }
        #last-stream-time { font-size: 11px; color: var(--text-sub); }
        .bottom-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: stretch; }
        .bottom-section .card { flex-direction: column; padding: 15px; height: auto; box-sizing: border-box; min-width: 0; }
        h2 { font-size: 13px; margin-top: 0; color: var(--accent-bright); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .item-row { 
            padding: 8px; border-bottom: 1px solid var(--border); font-size: 12px; 
            border-radius: 6px; transition: 0.2s; cursor: pointer; min-height: 65px; 
            display: flex; flex-direction: column; justify-content: center; box-sizing: border-box;
        }
        .item-row:hover { background: rgba(255, 255, 255, 0.03); }
        .item-date { font-size: 10px; color: var(--text-sub); margin-bottom: 2px; }
        .vod-row { flex-direction: row !important; align-items: center; gap: 10px; }
        .vod-thumb { width: 70px; height: 40px; background: #0a1a30; border-radius: 4px; flex-shrink: 0; background-size: cover; background-position: center; border: 1px solid var(--border); }
        .schedule-row { flex-direction: row !important; justify-content: space-between; cursor: default; }
        .day { font-weight: bold; color: var(--text-sub); }
        .today-highlight { background: rgba(51, 133, 255, 0.08) !important; border: 1px solid var(--accent-bright) !important; transform: scale(1.01); box-shadow: 0 0 10px rgba(51, 133, 255, 0.15); }
        .today-tag { background: var(--accent-bright); color: #fff; border-radius: 3px; margin-left: 4px; }
        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @media (max-width: 900px) {
            body { overflow: auto; }
            .profile-box { flex-direction: column; padding-bottom: 20px; }
            .live-status-inline { margin-left: 0; border-left: none; border-top: 1px solid var(--border); padding: 15px 0; width: 100%; }
            .bottom-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="loading-overlay">
    <div class="loader-circle"></div>
    <div class="loader-text">정보를 정리하고 있어요 . . .</div>
</div>
<div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img" onclick="location.href='blue-note.html'"></div>
            <div class="profile-info">
                <h1 id="user-nick">로딩 중...</h1>
                <p id="user-desc">정보를 불러오고 있습니다.</p>
                <div class="social-links" id="social-links">
                    <a href="https://www.sooplive.com/station/bababi" class="link-btn" target="_blank">📺 방송국</a>
                    <a href="songlist.html" class="link-btn" target="_self">📖 노래책</a>
                </div>
            </div>
            <div class="live-status-inline">
                <div class="badge offline">OFFLINE</div>
                <div id="stream-title-inline">방송 준비 중</div>
                <div id="last-stream-time">최근 방송: 확인 중</div>
            </div>
        </div>
    </div>
    <div class="bottom-section">
        <div class="card"><h2>📅 방송 스케줄</h2><div id="schedule-container"></div></div>
        <div class="card" id="post-container"><h2>📢 최근 게시물</h2></div>
        <div class="card" id="vod-container"><h2>🎬 방송 다시보기</h2></div>
    </div>
    <footer style="text-align: center; padding: 15px 20px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 5px;">
        <p style="margin: 0; opacity: 0.7;">팬심으로 제작된 비영리페이지입니다.<br>
        정보는 공개 데이터를 바탕으로 하며 클릭 시 방송국으로 연결됩니다.</p>
    </footer>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';
    const SONG_BOOK_URL = 'songlist.html';

    async function init() {
        const overlay = document.getElementById('loading-overlay');
        try {
            const cacheBuster = `&t=${new Date().getTime()}`;
            const response = await fetch(TSV_URL + cacheBuster, { cache: 'no-store' });
            if (!response.ok) throw new Error('Network error');
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));
            const profile = rows[2];
            const liveData = rows[6];
            const statusBox = document.querySelector('.live-status-inline');
            const isOnline = liveData && liveData[5] !== "방송 정보 없음" && liveData[5] !== undefined;

            if (isOnline) {
                statusBox.innerHTML = `
                    <div class="badge" style="background:#d32f2f; color:white;">ONLINE</div>
                    <a href="https://play.sooplive.com/bababi" target="_blank" id="stream-title-inline" class="ellipsis" style="text-decoration:none;">${liveData[5]}</a>
                    <div id="last-stream-time">시작: ${liveData[6]}</div>`;
            } else {
                statusBox.innerHTML = `
                    <div class="badge offline">OFFLINE</div>
                    <div id="stream-title-inline" style="color: var(--text-sub);">방송 준비 중</div>
                    <div id="last-stream-time">최근 방송: ${profile ? profile[3] : '확인 중'}</div>`;
            }

            if (profile) {
                document.getElementById('user-nick').innerText = profile[0] || '닉네임';
                document.getElementById('user-desc').innerText = profile[1] || '';
                if(profile[2]) document.querySelector('.profile-img').style.backgroundImage = `url('${profile[2]}')`;
            }

            renderPosts(rows.slice(8, 13));
            renderVODs(rows.slice(16, 21));
            renderSchedule(rows.slice(24, 29));
        } catch (e) { console.error(e); }
        finally {
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.visibility = 'hidden'; document.body.style.overflow = 'auto'; }, 500);
            }, 800);
        }
    }

    function renderPosts(data) {
        const postBox = document.getElementById('post-container');
        let html = '<h2>📢 최근 게시물</h2>';
        data.filter(p => p[1]).forEach(p => {
            html += `<div class="item-row" onclick="window.open('${p[2]}', '_blank')"><div class="item-date">${p[0]}</div><div class="ellipsis">${p[1]}</div></div>`;
        });
        postBox.innerHTML = html;
    }

    function renderVODs(data) {
        const vodBox = document.getElementById('vod-container');
        let html = '<h2>🎬 방송 다시보기</h2>';
        data.filter(v => v[1]).forEach(v => {
            html += `<div class="item-row vod-row" onclick="window.open('${v[2]}', '_blank')"><div class="vod-thumb" style="background-image:url('${v[3]}')"></div><div class="ellipsis">${v[1]}</div></div>`;
        });
        vodBox.innerHTML = html;
    }

    function renderSchedule(data) {
        const container = document.getElementById('schedule-container');
        container.innerHTML = '';
        data.forEach(row => {
            if(!row[0] && !row[3]) return;
            const rowDiv = document.createElement('div');
            rowDiv.className = 'item-row schedule-row';
            rowDiv.innerHTML = `<div><span class="day">${row[0]} (${row[1]})</span><br>${row[3]}</div><div style="font-size:10px;">${row[4] || ''}</div>`;
            container.appendChild(rowDiv);
        });
    }

    window.onload = () => { init(); setInterval(init, 60000); };
</script>
</body>
</html>
