<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한눈에 모아보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; padding: 40px 0; }

        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 30px; 
            border: 1px solid #2f2f35; display: flex; position: relative;
            flex-direction: column; /* 기본 방향 설정 */
        }

        .profile-box { flex-direction: row; align-items: center; gap: 30px; background: linear-gradient(145deg, #18181b, #1d1d21); }
        
        .profile-img { 
            width: 110px; height: 110px; border-radius: 50%; background: #2f2f35; 
            flex-shrink: 0; border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(145, 71, 255, 0.2);
            background-size: cover; background-position: center;
            cursor: pointer; 
        }

        .profile-info { flex-grow: 1; min-width: 0; }
        .profile-info h1 { margin: 0 0 5px; font-size: 26px; font-weight: 700; }
        .profile-info p { 
            color: var(--text-sub); margin: 0 0 10px; font-size: 14px; 
            max-width: 450px; line-height: 1.6;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .social-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .link-btn { padding: 7px 15px; background: #26262c; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 12px; border: 1px solid #3a3a3d; transition: 0.3s; }
        .link-btn:hover { background: var(--accent); border-color: var(--accent); }

        .live-status-inline {
            margin-left: auto; text-align: center; padding: 0 40px; border-left: 1px solid #2f2f35; 
            min-width: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .badge { display: inline-block; padding: 5px 14px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .badge.offline { background: #3a3a3d; color: var(--text-sub); }
        #stream-title-inline { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        #last-stream-time { font-size: 12px; color: var(--text-sub); }

        .bottom-section { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; align-items: stretch;
        }

        h2 { font-size: 14px; margin-top: 0; color: var(--accent); border-bottom: 1px solid #2f2f35; padding-bottom: 12px; margin-bottom: 15px; }

        .content-list { display: flex; flex-direction: column; gap: 0; }

        .item-row { 
            padding: 10px; border-bottom: 1px solid #26262c; font-size: 13px; 
            border-radius: 8px; transition: 0.2s; cursor: pointer;
            min-height: 66px; display: flex; flex-direction: column; justify-content: center;
        }
        .item-row:hover { background: rgba(255, 255, 255, 0.05); }
        .item-row:last-child { border: none; }
        
        .item-date { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        .vod-row { flex-direction: row !important; align-items: center; gap: 12px; }
        .vod-thumb { width: 80px; height: 45px; background: #2f2f35; border-radius: 4px; flex-shrink: 0; background-size: cover; background-position: center; }

        .schedule-row { flex-direction: row !important; justify-content: space-between; cursor: default; }
        .today-highlight { background: rgba(145, 71, 255, 0.15) !important; border: 1px solid var(--accent) !important; transform: scale(1.02); }
        .today-tag { font-size: 9px; background: var(--accent); color: white; padding: 2px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 900px) {
            .profile-box { flex-direction: column; padding-bottom: 40px; }
            .live-status-inline { margin-left: 0; border-left: none; border-top: 1px solid #2f2f35; padding: 20px 0; width: 100%; }
            .bottom-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img" onclick="location.href='blue-note.html'"></div>
            <div class="profile-info">
                <h1 id="user-nick">로딩 중...</h1>
                <p id="user-desc">정보를 불러오고 있습니다.</p>
                <div class="social-links" id="social-links"></div>
            </div>
            <div class="live-status-inline" id="live-status-area">
                <div class="badge offline">OFFLINE</div>
                <div id="stream-title-inline">방송 준비 중</div>
                <div id="last-stream-time">최근 방송: 확인 중</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div id="schedule-container" class="content-list"></div>
        </div>
        <div class="card">
            <h2>📢 최근 게시물</h2>
            <div id="post-container" class="content-list"></div>
        </div>
        <div class="card">
            <h2>🎬 방송 다시보기</h2>
            <div id="vod-container" class="content-list"></div>
        </div>
    </div>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';
    const SONG_BOOK_URL = 'https://lunaplena0.github.io/songlist.html'; 

    async function init() {
        try {
            const response = await fetch(`${TSV_URL}&t=${new Date().getTime()}`, { cache: 'no-store' });
            if (!response.ok) throw new Error('Network response was not ok');
            
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            const profile = rows[2];
            const liveData = rows[6]; 
            const statusBox = document.getElementById('live-status-area');

            // 1. 프로필 업데이트
            if (profile) {
                document.getElementById('user-nick').innerText = profile[0] || '닉네임';
                document.getElementById('user-desc').innerText = profile[1] || '';
                if(profile[2]) document.querySelector('.profile-img').style.backgroundImage = `url('${profile[2]}')`;
            }

            // 2. 라이브 상태 업데이트
            const isOnline = liveData && liveData[5] && !["방송 정보 없음", "X", "-"].includes(liveData[5]);
            if (isOnline) {
                let tagsHtml = `<div class="badge" style="background:#d32f2f; color:white;">ONLINE</div>`;
                if (!["X", "-"].includes(liveData[7])) tagsHtml += ` <span class="badge" style="background:#2f2f35; color:#FFAB91;">${liveData[7]}</span>`;
                statusBox.innerHTML = `
                    <div style="margin-bottom:8px;">${tagsHtml}</div>
                    <div id="stream-title-inline" class="ellipsis" style="max-width:200px; color:white;">${liveData[5]}</div>
                    <div id="last-stream-time" style="color:white; font-weight:bold;">시작: ${liveData[6]}</div>
                `;
            } else {
                statusBox.innerHTML = `
                    <div class="badge offline">OFFLINE</div>
                    <div id="stream-title-inline">방송 준비 중</div>
                    <div id="last-stream-time">최근 방송: ${profile[3] || '확인 중'}</div>
                `;
            }

            // 3. 리스트 렌더링 (구조 유지형)
            renderLinks(rows[5]);
            renderPosts(rows.slice(8, 13));
            renderVODs(rows.slice(16, 21));
            renderSchedule(rows.slice(24, 30));

        } catch (e) { console.error("Data Load Error:", e); }
    }

    function renderLinks(extraLinks) {
        const linkBox = document.getElementById('social-links');
        linkBox.innerHTML = '';
        const btns = [{ name: '📺 방송국', url: 'https://www.sooplive.com/station/bababi' }, { name: '📖 노래책', url: SONG_BOOK_URL }];
        
        btns.forEach(btn => {
            const a = document.createElement('a');
            a.className = 'link-btn'; a.href = btn.url; a.innerText = btn.name;
            a.target = btn.name.includes('노래책') ? '_self' : '_blank';
            linkBox.appendChild(a);
        });

        if (extraLinks) {
            extraLinks.forEach(l => {
                if (l && l.includes(': ')) {
                    const [name, url] = l.split(': ');
                    const a = document.createElement('a');
                    a.className = 'link-btn'; a.href = url.trim(); a.innerText = name.trim(); a.target = '_blank';
                    linkBox.appendChild(a);
                }
            });
        }
    }

    function renderPosts(data) {
        const container = document.getElementById('post-container');
        container.innerHTML = '';
        data.filter(p => p[1]).forEach(p => {
            const pin = p[3] === 'O' ? '📌 ' : '';
            const div = document.createElement('div');
            div.className = 'item-row';
            div.onclick = () => window.open(p[2], '_blank');
            div.innerHTML = `<div class="item-date">${p[0]}</div><div class="ellipsis">${pin}${p[1]}</div>`;
            container.appendChild(div);
        });
    }

    function renderVODs(data) {
        const container = document.getElementById('vod-container');
        container.innerHTML = '';
        data.filter(v => v[1]).forEach(v => {
            const div = document.createElement('div');
            div.className = 'item-row vod-row';
            div.onclick = () => window.open(v[2], '_blank');
            div.innerHTML = `
                <div class="vod-thumb" style="background-image:url('${v[3]}')"></div>
                <div style="flex:1; min-width:0;">
                    <div class="item-date">${v[0]}</div>
                    <div class="ellipsis" style="font-size:12px;">${v[1]}</div>
                </div>`;
            container.appendChild(div);
        });
    }

    function renderSchedule(data) {
        const container = document.getElementById('schedule-container');
        container.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('en-CA');

        data.forEach(row => {
            if(!row[0] && !row[3]) return;
            const isToday = row[0] === todayStr;
            const div = document.createElement('div');
            div.className = `item-row schedule-row ${isToday ? 'today-highlight' : ''}`;
            div.innerHTML = `
                <div style="flex:1; min-width:0;">
                    <span class="item-date" style="font-weight:bold;">${row[0]} (${row[1]})${isToday ? '<span class="today-tag">TODAY</span>' : ''}</span>
                    <div class="ellipsis" style="color:var(--text-main); font-size:13px;">
                        <span style="color:var(--accent); font-weight:bold;">${row[2] || ''}</span> ${row[3] || '일정 없음'}
                    </div>
                </div>
                <div style="font-size:11px; color:var(--text-sub); align-self:center;">${row[4] || ''}</div>`;
            container.appendChild(div);
        });
    }

    window.onload = () => { init(); setInterval(init, 60000); };
</script>
</body>
</html>
