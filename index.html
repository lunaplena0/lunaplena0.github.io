<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent-color: #9147ff; /* 보라색 포인트 */
            --live-color: #eb0400;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-card {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #2f2f35;
        }

        /* 상단 프로필 구역 */
        .header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(145, 71, 255, 0.1) 0%, rgba(24, 24, 27, 1) 100%);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .status-badge.live {
            background: var(--live-color);
            color: white;
            box-shadow: 0 0 15px var(--live-color);
            animation: pulse 2s infinite;
        }

        .status-badge.offline {
            background: #3a3a3d;
            color: var(--text-sub);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { margin: 10px 0; font-size: 22px; font-weight: 700; }
        .viewer-count { color: var(--text-sub); font-size: 14px; }

        /* 중앙 구분선 */
        .divider {
            height: 1px;
            background: #2f2f35;
            margin: 0 20px;
        }

        /* 방송 기록 구역 */
        .history-section {
            padding: 20px;
        }

        .history-title {
            font-size: 15px;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-item {
            background: #1f1f23;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #3a3a3d;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(5px);
            background: #26262c;
        }

        .history-date {
            font-size: 11px;
            color: var(--text-sub);
            display: block;
            margin-bottom: 4px;
        }

        .history-text {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 하단 업데이트 시간 */
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: #5b5b63;
        }
    </style>
</head>
<body>

<div class="dashboard-card">
    <div class="header">
        <div id="badge" class="status-badge offline">OFFLINE</div>
        <h1 id="title">방송 정보를 불러오는 중...</h1>
        <div id="viewers" class="viewer-count">수집된 데이터가 없습니다.</div>
    </div>

    <div class="divider"></div>

    <div class="history-section">
        <div class="history-title">🕒 최근 방송 기록</div>
        <ul id="history-list" class="history-list">
            </ul>
    </div>

    <div class="footer">
        최근 업데이트: <span id="last-update">-</span>
    </div>
</div>

<script>
    // 자바스크립트는 나중에 공기계 데이터와 연결할 때 채울게요!
</script>

</body>
</html>
