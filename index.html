<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한눈에 모아보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --live: #eb0400;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;   
            box-sizing: border-box;
        }

        .wrapper { 
            width: 100%; 
            max-width: 1100px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            padding: 40px 0; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 30px; 
            border: 1px solid #2f2f35; 
            display: flex; 
            position: relative;
        }

        .profile-box { 
            align-items: center; 
            gap: 30px; 
            background: linear-gradient(145deg, #18181b, #1d1d21);
        }
        
        .profile-img { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            background: #2f2f35; 
            flex-shrink: 0; 
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(145, 71, 255, 0.2);
        }

        .profile-info { flex-grow: 1; }
        .profile-info h1 { margin: 0 0 5px; font-size: 26px; font-weight: 700; }
        .profile-info p { color: var(--text-sub); margin: 0 0 20px; font-size: 14px; max-width: 450px; line-height: 1.6; }

        .social-links { display: flex; gap: 10px; }
        .link-btn { padding: 7px 15px; background: #26262c; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 12px; border: 1px solid #3a3a3d; transition: 0.3s; }
        .link-btn:hover { background: var(--accent); border-color: var(--accent); }

        .live-status-inline {
            margin-left: auto; text-align: center; padding: 0 40px; border-left: 1px solid #2f2f35; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .badge { display: inline-block; padding: 5px 14px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .badge.offline { background: #3a3a3d; color: var(--text-sub); }
        #stream-title-inline { font-size: 18px; font-weight: bold; }

        .bottom-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .bottom-section .card { flex-direction: column; padding: 25px; min-height: 280px; }
        h2 { font-size: 14px; margin-top: 0; color: var(--accent); border-bottom: 1px solid #2f2f35; padding-bottom: 12px; margin-bottom: 15px; }

        .item-row { padding: 12px 10px; border-bottom: 1px solid #26262c; font-size: 13px; border-radius: 8px; }
        .item-row:last-child { border: none; }
        .item-date { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        
        .vod-row { display: flex; gap: 12px; align-items: center; }
        .vod-thumb { width: 70px; height: 40px; background: #2f2f35; border-radius: 4px; flex-shrink: 0; }

        .schedule-row { display: flex; justify-content: space-between; }
        .day { font-weight: bold; color: var(--text-sub); }

        /* 오늘 날짜 강조 스타일 */
        .today-highlight {
            background: rgba(145, 71, 255, 0.15);
            border: 1px solid var(--accent) !important;
            color: #fff;
            transform: scale(1.02);
        }
        .today-highlight .day { color: var(--accent); }
        .today-tag { font-size: 9px; background: var(--accent); color: white; padding: 2px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }

        @media (max-width: 900px) {
            body { align-items: flex-start; }
            .profile-box { flex-direction: column; padding-bottom: 40px; }
            .live-status-inline { margin-left: 0; border-left: none; border-top: 1px solid #2f2f35; padding: 20px 0; width: 100%; }
            .bottom-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-section">
        <div class="card profile-box">
            <div class="profile-img"></div>
            <div class="profile-info">
                <h1>닉네임</h1>
                <p>스트리머의 개성이 드러나는 소개글입니다.</p>
                <div class="social-links">
                    <a href="#" class="link-btn">SOOP 방송국</a>
                    <a href="#" class="link-btn">유튜브</a>
                    <a href="#" class="link-btn">노래책</a>
                </div>
            </div>
            <div class="live-status-inline">
                <div class="badge offline">OFFLINE</div>
                <div id="stream-title-inline">방송 준비 중</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div id="schedule-container">
                </div>
        </div>

        <div class="card">
            <h2>📢 최근 게시물</h2>
            <div class="item-row">
                <div class="item-date">2026.04.05</div>
                <div>공지사항 제목이 표시됩니다.</div>
            </div>
            <div class="item-row">
                <div class="item-date">2026.04.03</div>
                <div>중요한 소식을 확인하세요.</div>
            </div>
        </div>

        <div class="card">
            <h2>🎬 방송 다시보기</h2>
            <div class="item-row vod-row">
                <div class="vod-thumb"></div>
                <div>
                    <div class="item-date">2026.04.04</div>
                    <div>최근 방송 다시보기 제목</div>
                </div>
            </div>
            <div class="item-row vod-row">
                <div class="vod-thumb"></div>
                <div>
                    <div class="item-date">2026.04.02</div>
                    <div>지난 방송 다시보기 제목</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 각 요일별 방송 시간 설정
    const scheduleData = [
        { day: '일요일', time: '20:00 ~' },
        { day: '월요일', time: '20:00 ~' },
        { day: '화요일', time: '휴방' },
        { day: '수요일', time: '20:00 ~' },
        { day: '목요일', time: '20:00 ~' },
        { day: '금요일', time: '22:00 ~' },
        { day: '토요일', time: '21:00 ~' }
    ];

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        const todayIdx = new Date().getDay(); // 0(일) ~ 6(토)
        
        // 오늘이 3번째(인덱스 2)에 오도록 배열 재배치
        // [그저께, 어제, 오늘, 내일, 모레]
        const displayIndices = [
            (todayIdx + 5) % 7, // 그저께
            (todayIdx + 6) % 7, // 어제
            todayIdx,           // 오늘
            (todayIdx + 1) % 7, // 내일
            (todayIdx + 2) % 7  // 모레
        ];

        displayIndices.forEach((idx, i) => {
            const item = scheduleData[idx];
            const isToday = idx === todayIdx;
            
            const row = document.createElement('div');
            row.className = `item-row schedule-row ${isToday ? 'today-highlight' : ''}`;
            
            row.innerHTML = `
                <span class="day">
                    ${item.day} ${isToday ? '<span class="today-tag">TODAY</span>' : ''}
                </span>
                <span>${item.time}</span>
            `;
            
            container.appendChild(row);
        });
    }

    window.onload = renderSchedule;
</script>

</body>
</html>
