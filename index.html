<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';

    // [고정 설정] 노래책 링크 (여기에 실제 주소를 넣으세요)
    const SONG_BOOK_URL = 'https://your-songbook-link.com'; 

    async function init() {
        try {
            const response = await fetch(TSV_URL);
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(row => row.split('\t'));

            // 1. 프로필 및 최근 방송 시간 (3행)
            const profile = rows[2];
            if (profile) {
                document.getElementById('user-nick').innerText = profile[0] || '닉네임';
                document.getElementById('user-desc').innerText = profile[1] || '';
                if(profile[2]) document.querySelector('.profile-img').style.backgroundImage = `url('${profile[2]}')`;
                
                // 최근 방송 시간 (D3)
                const lastTime = profile[3] ? profile[3].trim() : "";
                document.getElementById('last-stream-time').innerText = lastTime ? `최근 방송: ${lastTime}` : "최근 방송 없음";
            }

            // 2. 소셜 링크 (노래책 고정 + 시트 6행 추가)
            const linkBox = document.getElementById('social-links');
            linkBox.innerHTML = ''; // 초기화

            // [고정] 노래책 버튼 먼저 생성
            const songBtn = document.createElement('a');
            songBtn.className = 'link-btn';
            songBtn.href = SONG_BOOK_URL;
            songBtn.target = '_blank';
            songBtn.innerText = '📖 노래책';
            songBtn.style.borderColor = 'var(--accent)'; // 강조 효과
            linkBox.appendChild(songBtn);

            // [추가] 시트 6행의 다른 링크들 붙이기
            const extraLinks = rows[5];
            if (extraLinks) {
                extraLinks.forEach(l => {
                    if (l && l.includes(': ')) {
                        const [name, ...urlParts] = l.split(': ');
                        const a = document.createElement('a');
                        a.className = 'link-btn';
                        a.href = urlParts.join(': ').trim();
                        a.target = '_blank';
                        a.innerText = name.trim();
                        linkBox.appendChild(a);
                    }
                });
            }

            // 3. 최근 게시물 (9~12행) - 고정글(D열 'O') 최상단
            const postBox = document.getElementById('post-container');
            const postData = rows.slice(8, 12).filter(p => p[1] && p[1].trim() !== "");
            postData.sort((a, b) => (b[3]?.trim() === 'O' ? 1 : 0) - (a[3]?.trim() === 'O' ? 1 : 0));

            let postHtml = '<h2>📢 최근 게시물</h2>';
            postData.forEach(p => {
                const isNotice = p[3]?.trim() === 'O' ? '📌 ' : '';
                postHtml += `
                    <div class="item-row" onclick="window.open('${p[2]}', '_blank')">
                        <div class="item-date">${p[0]}</div>
                        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${isNotice}${p[1]}</div>
                    </div>`;
            });
            postBox.innerHTML = postHtml;

            // 4. 다시보기 (17~20행) - 고정 VOD(E열 'O') 최상단
            const vodBox = document.getElementById('vod-container');
            const vodData = rows.slice(16, 20).filter(v => v[1] && v[1].trim() !== "");
            vodData.sort((a, b) => (b[4]?.trim() === 'O' ? 1 : 0) - (a[4]?.trim() === 'O' ? 1 : 0));

            let vodHtml = '<h2>🎬 방송 다시보기</h2>';
            vodData.forEach(v => {
                const isPin = v[4]?.trim() === 'O' ? '📌 ' : '';
                vodHtml += `
                    <div class="item-row vod-row" onclick="window.open('${v[2]}', '_blank')">
                        <div class="vod-thumb" style="background-image:url('${v[3]}')"></div>
                        <div style="flex:1; min-width:0;">
                            <div class="item-date">${v[0]}</div>
                            <div style="font-size:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${isPin}${v[1]}</div>
                        </div>
                    </div>`;
            });
            vodBox.innerHTML = vodHtml;

        } catch (e) { console.error(e); }
        renderSchedule();
    }
    function renderSchedule() {
        const scheduleData = [
            { day: '일요일', time: '20:00 ~' }, { day: '월요일', time: '20:00 ~' },
            { day: '화요일', time: '휴방' }, { day: '수요일', time: '20:00 ~' },
            { day: '목요일', time: '20:00 ~' }, { day: '금요일', time: '22:00 ~' },
            { day: '토요일', time: '21:00 ~' }
        ];
        const container = document.getElementById('schedule-container');
        const todayIdx = new Date().getDay(); 
        const displayIndices = [(todayIdx+5)%7, (todayIdx+6)%7, todayIdx, (todayIdx+1)%7, (todayIdx+2)%7];

        container.innerHTML = '';
        displayIndices.forEach(idx => {
            const item = scheduleData[idx];
            const isToday = idx === todayIdx;
            const row = document.createElement('div');
            row.className = `item-row schedule-row ${isToday ? 'today-highlight' : ''}`;
            row.innerHTML = `<span class="day">${item.day}${isToday ? '<span class="today-tag">TODAY</span>' : ''}</span><span>${item.time}</span>`;
            container.appendChild(row);
        });
    }

    window.onload = init;
</script>
</body>
</html>
