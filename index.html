<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --live: #eb0400;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0;
        }

        /* 1. 상단 배너 & 프로필 */
        .banner {
            height: 250px;
            background: linear-gradient(45deg, #1f1f23, var(--accent));
            position: relative;
        }

        .profile-section {
            max-width: 1100px;
            margin: -60px auto 30px;
            padding: 0 20px;
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }

        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 5px solid var(--bg-color);
            background: #2f2f35;
            object-fit: cover;
        }

        .profile-info h1 { margin: 0 0 5px; font-size: 32px; }
        .profile-info p { color: var(--text-sub); margin: 0; }

        /* 2. 메인 컨텐츠 레이아웃 (그리드) */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr; /* 좌측 2, 우측 1 비율 */
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 { font-size: 18px; margin-top: 0; color: var(--accent); border-bottom: 1px solid #2f2f35; padding-bottom: 10px; }

        /* 게시글 스타일 */
        .post-item {
            padding: 15px 0;
            border-bottom: 1px solid #26262c;
        }
        .post-item:last-child { border: none; }
        .post-date { font-size: 12px; color: var(--text-sub); }

        /* 방송 상태 배지 (애니메이션) */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .badge.live { background: var(--live); animation: pulse 2s infinite; }
        .badge.offline { background: #3a3a3d; }

        /* 스케줄 표 */
        .schedule-grid { font-size: 14px; }
        .schedule-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #26262c; }
        .day { font-weight: bold; color: var(--text-sub); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            .profile-section { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

<div class="banner"></div>

<div class="profile-section">
    <div class="profile-img"></div>
    <div class="profile-info">
        <h1>닉네임</h1>
        <p>여기에 한 줄 소개글을 적어보세요. (예: 종합 게임 스트리머입니다!)</p>
    </div>
</div>

<div class="main-container">
    <div class="content-left">
        <div class="card">
            <h2>📢 최근 게시글</h2>
            <div class="post-item">
                <div class="post-date">2026.04.05</div>
                <div>오늘 방송은 저녁 8시에 시작합니다!</div>
            </div>
            <div class="post-item">
                <div class="post-date">2026.04.03</div>
                <div>어제 방송 다시보기가 업로드 되었습니다.</div>
            </div>
        </div>
    </div>

    <div class="content-right">
        <div class="card" style="text-align: center;">
            <div class="badge offline" id="status-badge">OFFLINE</div>
            <div id="stream-title" style="font-weight: bold; margin-bottom: 5px;">방송 준비 중</div>
            <div id="viewer-count" style="font-size: 13px; color: var(--text-sub);">최근 업데이트: -</div>
        </div>

        <div class="card">
            <h2>📅 방송 스케줄</h2>
            <div class="schedule-grid">
                <div class="schedule-row"><span class="day">월요일</span> <span>20:00 ~</span></div>
                <div class="schedule-row"><span class="day">화요일</span> <span>휴방</span></div>
                <div class="schedule-row"><span class="day">수요일</span> <span>20:00 ~</span></div>
                <div class="schedule-row"><span class="day">목요일</span> <span>20:00 ~</span></div>
                <div class="schedule-row"><span class="day">금요일</span> <span>22:00 ~</span></div>
                <div class="schedule-row"><span class="day">토요일</span> <span>랜덤</span></div>
                <div class="schedule-row"><span class="day">일요일</span> <span>휴방</span></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
