<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 길을 잃었어요 | 바다비 비공식 팬 아카이브</title>
    <!-- Tailwind CSS & FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        marine: {
                            deep: '#060e16',      /* 심해 배경 */
                            void: '#0a1622',      
                            reef: '#112235',      /* 카드 배경 */
                            shallow: '#1a334d',   /* 호버 강조색 */
                            foam: '#e3f2fd',      /* 메인 텍스트 */
                            spray: '#8fa5b5',     /* 서브 텍스트 */
                            cyan: '#00e5ff',      /* 네온 사이언 */
                            mint: '#05ffa6',      /* 네온 그린 */
                            coral: '#ff5c8a',     /* 산호초 핑크 */
                            border: 'rgba(0, 229, 255, 0.12)'
                        }
                    },
                    fontFamily: {
                        display: ['Noto Sans KR', 'sans-serif'],
                        body: ['Noto Sans KR', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif']
                    }
                }
            }
        }
    </script> 
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #060e16;
            background-image: radial-gradient(circle at 50% 0%, #0d233a 0%, #060e16 70%);
        }
        /* 스크롤바 제어 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(6, 14, 22, 0.5); }
        ::-webkit-scrollbar-thumb {
            background: #112235;
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #00e5ff; }

        @keyframes bubbleUp {
            0% { transform: translateY(120%) scale(0.6); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100px) scale(1.1); opacity: 0; }
        }
        .bubble-effect {
            position: absolute;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(5, 255, 166, 0.05));
            border-radius: 50%;
            pointer-events: none;
            animation: bubbleUp 6s infinite linear;
        }
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spinSlow 4s linear infinite;
        }
        .word-keep { word-break: keep-all; overflow-wrap: break-word; }
    </style>
</head>
    
<body class="text-marine-spray min-h-screen flex flex-col justify-between overflow-x-hidden">

    <!-- 상단 네비게이션 바 -->
    <nav class="border-b border-marine-border bg-marine-deep/90 backdrop-blur-md sticky top-0 z-40 px-4 sm:px-6 py-3.5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="font-display font-black text-sm tracking-widest text-marine-foam hover:text-marine-cyan transition-colors">BABABI ARCHIVE</a>
        </div>
    </nav>

    <!-- 메인 404 컨텐츠 영역 -->
    <main class="max-w-3xl mx-auto px-4 sm:px-6 my-auto py-12 w-full">
        <div class="bg-marine-reef border border-marine-border rounded-3xl p-8 sm:p-12 relative overflow-hidden shadow-2xl text-center flex flex-col items-center">
            <!-- 배경 데코레이션 블러 및 방울 효과 -->
            <div class="absolute -top-16 -right-16 w-64 h-64 bg-marine-cyan/5 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-16 -left-16 w-64 h-64 bg-marine-coral/5 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-40">
                <div class="bubble-effect w-3 h-3 left-10" style="animation-delay: 0s; animation-duration: 5s;"></div>
                <div class="bubble-effect w-5 h-5 left-1/4" style="animation-delay: 1.5s; animation-duration: 7s;"></div>
                <div class="bubble-effect w-4 h-4 left-3/4" style="animation-delay: 0.8s; animation-duration: 6s;"></div>
            </div>

            <!-- 바다비.png 이미지 + 회전하는 테두리 -->
            <div class="relative mb-6 z-10 w-28 h-28 flex items-center justify-center">
                <!-- 회전하는 원형 로딩 링 테두리 -->
                <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-marine-cyan border-r-marine-mint animate-spin-slow"></div>
                
                <!-- 중심에 고정된 바다비.png 이미지 -->
                <div class="w-20 h-20 rounded-full overflow-hidden shadow-xl border border-marine-border bg-marine-reef flex items-center justify-center">
                    <img src="바다비.png" alt="바다비" class="w-full h-full object-cover">
                </div>
            </div>

            <!-- 404 에러 코드 (Orbitron 폰트 활용) -->
            <h1 class="font-orbitron font-black text-6xl sm:text-7xl tracking-wider text-marine-foam mb-3 z-10">
                4<span class="text-marine-cyan">0</span>4
            </h1>

            <!-- 안내 문구 -->
            <h2 class="font-bold text-lg sm:text-xl text-marine-foam mb-3 z-10 word-keep">
                길을 잃어버렸어요! 심해 너무 깊은 곳인가 봐요.
            </h2>
            <p class="text-marine-spray text-xs sm:text-sm leading-relaxed max-w-lg mb-8 z-10 word-keep">
                요청하신 페이지가 사라졌거나, 주소가 잘못 입력되었습니다.<br>
                데이터 해류를 따라 아래의 주요 페이지로 이동해 보세요.
            </p>

            <!-- 버튼 영역: 메인으로/이전페이지 상단, 하단 4개 1x4 배치 -->
            <div class="flex flex-col gap-2.5 w-full max-w-xl z-10">
                <!-- 첫 번째 줄: 메인으로 & 이전 페이지 -->
                <div class="grid grid-cols-2 gap-2.5">
                    <a href="index.html" class="flex items-center justify-center gap-2 px-4 py-3 bg-marine-cyan hover:bg-marine-mint text-marine-deep transition-all duration-300 rounded-xl text-xs font-black shadow-lg shadow-marine-cyan/20">
                        <i class="fa-solid fa-house"></i> 메인으로
                    </a>
                    <button onclick="history.back()" class="flex items-center justify-center gap-2 px-4 py-3 bg-marine-shallow/40 hover:bg-marine-shallow border border-marine-border text-marine-foam transition-all duration-300 rounded-xl text-xs font-bold">
                        <i class="fa-solid fa-arrow-left"></i> 이전 페이지
                    </button>
                </div>
                
                <!-- 두 번째 줄: 월간일정, 노래통계, 눈물 노트, VOD 통계 (1x4 배치, 모바일에서는 2개씩 정렬) -->
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2.5">
                    <a href="calendar2.html" class="flex items-center justify-center gap-1.5 px-3 py-3 bg-marine-shallow/40 hover:bg-marine-cyan hover:text-marine-deep border border-marine-cyan/30 text-marine-foam transition-all duration-300 rounded-xl text-xs font-bold shadow-sm group">
                        <i class="fa-solid fa-calendar-days text-marine-cyan group-hover:text-marine-deep transition-colors"></i> 월간일정
                    </a>
                    <a href="songstats2.html" class="flex items-center justify-center gap-1.5 px-3 py-3 bg-marine-shallow/40 hover:bg-marine-cyan hover:text-marine-deep border border-marine-cyan/30 text-marine-foam transition-all duration-300 rounded-xl text-xs font-bold shadow-sm group">
                        <i class="fa-solid fa-chart-simple text-marine-cyan group-hover:text-marine-deep transition-colors"></i> 노래통계
                    </a>
                    <a href="crynote.html" class="flex items-center justify-center gap-1.5 px-3 py-3 bg-marine-shallow/40 hover:bg-marine-cyan hover:text-marine-deep border border-marine-cyan/30 text-marine-foam transition-all duration-300 rounded-xl text-xs font-bold shadow-sm group">
                        <i class="fa-solid fa-book-open text-marine-cyan group-hover:text-marine-deep transition-colors"></i> 눈물 노트
                    </a>
                    <a href="vodlist.html" class="flex items-center justify-center gap-1.5 px-3 py-3 bg-marine-shallow/40 hover:bg-marine-cyan hover:text-marine-deep border border-marine-cyan/30 text-marine-foam transition-all duration-300 rounded-xl text-xs font-bold shadow-sm group">
                        <i class="fa-solid fa-clapperboard text-marine-cyan group-hover:text-marine-deep transition-colors"></i> VOD 통계
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- 공식 안내 및 카피라이트 푸터 영역 -->
    <footer style="text-align: center; padding: 20px 10px; color: #b3cde0; font-size: 11px; border-top: 1px solid rgba(0, 229, 255, 0.12); margin-top: 20px; width: 100%; box-sizing: border-box;">
        <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
            <strong style="display: block; margin-bottom: 5px; color: #e3f2fd; font-size: 12px;">바다비 비공식 팬 아카이브</strong>
            모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
            <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
        </p>
    </footer>

</body>
</html>
