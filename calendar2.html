<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월간 일정 - 바다비 아카이브</title>
    <!-- Tailwind CSS & FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { marine: {
                deep: '#060e16', reef: '#112235', foam: '#e3f2fd', 
                cyan: '#00e5ff', mint: '#05ffa6', coral: '#ff5c8a', 
                border: 'rgba(0, 229, 255, 0.12)', shallow: '#1a334d'
            }},
            fontFamily: {
                display: ['Orbitron', 'Noto Sans KR', 'sans-serif'],
                body: ['Noto Sans KR', 'sans-serif']
            }}}
        }
    </script>
    <style>
        body { 
            background-color: #060e16;
            background-image: radial-gradient(circle at 50% 0%, #0d233a 0%, #060e16 70%);
            background-attachment: fixed;
            color: #e3f2fd; 
            font-family: 'Noto Sans KR', sans-serif; 
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        .calendar-cell { 
            min-height: 100px; cursor: pointer; 
            background-color: rgba(17, 34, 53, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 229, 255, 0.05); 
        }
        .empty-cell { border: 1px solid rgba(0, 229, 255, 0.05); }
        .calendar-cell:hover { background: rgba(0, 229, 255, 0.1) !important; }
        .day-label { text-align: center; font-size: 0.75rem; font-weight: 900; color: #00e5ff; padding: 0.5rem 0; border-bottom: 2px solid rgba(0, 229, 255, 0.2); }
        .date-num { color: #00e5ff; font-weight: bold; font-size: 0.875rem; }
        #date-detail-info {
            background: rgba(17, 34, 53, 0.6) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.2) !important;
        }
        @keyframes loadingBar { 0% { transform: translateX(-100%); } 50% { transform: translateX(0%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body class="pb-32">

    <!-- 로딩 오버레이 -->
    <div id="loading-overlay" class="fixed inset-0 bg-marine-deep z-[100] flex flex-col items-center justify-center transition-all duration-700">
        <div class="relative flex flex-col items-center">
            <i class="fa-solid fa-submarine text-marine-cyan text-5xl animate-bounce mb-8"></i>
            <p class="font-display tracking-[0.2em] text-sm text-marine-foam animate-pulse">일정을 확인하고 있어요...</p>
            <div class="w-32 h-1 bg-marine-reef mt-6 rounded-full overflow-hidden">
                <div class="h-full bg-marine-cyan animate-[loadingBar_2s_ease-in-out_infinite]"></div>
            </div>
        </div>
    </div>

    <!-- 상단 네비게이션 -->
    <nav class="border-b border-marine-border bg-marine-deep/90 backdrop-blur-md sticky top-0 z-40 px-4 py-3.5 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-display font-black text-sm tracking-widest text-marine-foam">BABABI ARCHIVE</span>
            <a href="index.html" class="text-xs font-bold text-marine-cyan hover:text-marine-mint transition">메인으로</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
        <div class="flex justify-between items-center mb-6">
            <h2 id="current-month-display" class="font-display text-xl font-black text-marine-cyan tracking-widest">LOADING...</h2>
            <select id="month-select" class="bg-marine-reef text-white px-3 py-1.5 rounded-lg border border-marine-cyan/30 text-sm focus:outline-none focus:border-marine-cyan"></select>
        </div>
        
        <div id="calendar-body" class="calendar-grid border-t border-l border-marine-border rounded-tl-lg overflow-hidden"></div>
        
        <div id="date-detail-info" class="mt-8 p-6 rounded-2xl hidden shadow-2xl">
            <div id="status-display-area"></div>
        </div>
    </div>

    <!-- 하단 고정 상태 바 -->
    <div class="fixed bottom-0 left-0 right-0 border-t border-marine-border bg-marine-deep/95 backdrop-blur-lg z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between text-xs text-marine-foam/70">
            <span id="live-status-text">날짜를 클릭하여 일정을 확인하세요.</span>
            <span class="font-display text-marine-cyan font-bold">LIVE STATUS</span>
        </div>
    </div>   

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8obAx_3kA2YbdK5stQqyyWWgnakjlEjLXjS6hLzQRU5gb4XeewNQUVpxkDQtQGyivJAG86GqxziOn/pub?gid=0&single=true&output=tsv';
        const CONFIG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';
        let allEvents = [];

        async function fetchSchedule() {
            try {
                const response = await fetch(TSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                let lastValidDate = "";

                allEvents = rows.map(row => {
                    const columns = row.split('\t');
                    if (columns.length < 5) return null;
                    let [date, time, type, title, content, replayUrl] = columns.map(col => col ? col.trim() : "");
                    let displayTime = time === "-" ? (type === "방송" ? "휴방" : type) : time;
                    if (!date) date = lastValidDate; else lastValidDate = date;
                    return { date: '20' + date.replace(/\./g, '-'), time: displayTime, type, title: title === "-" ? "" : title, content, replayUrl };
                }).filter(ev => ev);

                const now = new Date();
                const currentYM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const availableMonths = [...new Set(allEvents.map(e => e.date.substring(0, 7)))].sort();
                
                const monthSelect = document.getElementById('month-select');
                availableMonths.forEach(ym => {
                    const option = document.createElement('option');
                    option.value = ym;
                    option.innerText = ym.replace('-', '년 ') + '월';
                    if (ym === currentYM) option.selected = true;
                    monthSelect.appendChild(option);
                });
                renderCalendar(monthSelect.value || availableMonths[availableMonths.length - 1]);
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 700);
            } catch (e) { console.error(e); }
        }

        function renderCalendar(yearMonth) {
            const [year, month] = yearMonth.split('-').map(Number);
            const firstDay = new Date(year, month - 1, 1).getDay();
            const lastDate = new Date(year, month, 0).getDate();
            document.getElementById('current-month-display').innerText = `${year}년 ${month}월`;
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';
            ['일','월','화','수','목','금','토'].forEach(d => {
                const div = document.createElement('div'); div.className = 'day-label'; div.innerText = d; body.appendChild(div);
            });
            for (let i = 0; i < firstDay; i++) { const div = document.createElement('div'); div.className = 'empty-cell'; body.appendChild(div); }
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'calendar-cell p-2';
                cell.innerHTML = `<div class="date-header"><span class="date-num">${d}</span></div>`;
                cell.onclick = () => showDateInfo(dateStr);
                allEvents.filter(e => e.date === dateStr).forEach(ev => {
                    const colorClass = ev.time === '휴방' ? 'text-marine-coral' : 'text-marine-cyan';
                    cell.innerHTML += `<div class="text-[10px] ${colorClass} mt-1 truncate">🔹${ev.time}</div>`;
                });
                body.appendChild(cell);
            }
        }

        function showDateInfo(dateStr) {
            const dayEvents = allEvents.filter(e => e.date === dateStr);
            const infoBox = document.getElementById('date-detail-info');
            const displayArea = document.getElementById('status-display-area');
            const liveText = document.getElementById('live-status-text');

            if (dayEvents.length > 0) {
                displayArea.innerHTML = `<div class="space-y-4">` + dayEvents.map(ev => {
                    const timeColor = ev.time === '휴방' ? 'text-marine-coral' : 'text-marine-cyan';
                    return `<div class="border-b border-marine-border pb-3 last:border-0">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs ${timeColor} font-bold">[${ev.type}] ${ev.time}</span>
                            ${ev.replayUrl && ev.replayUrl !== "-" ? `<a href="${ev.replayUrl}" target="_blank" class="text-[10px] text-marine-mint underline">다시보기</a>` : ''}
                        </div>
                        <div class="text-marine-foam font-bold">${ev.title || ''}</div>
                    </div>`;
                }).join('') + `</div>`;
                liveText.textContent = `선택한 날짜: ${dateStr.replace(/-/g, '.')} (${dayEvents.length}개 일정)`;
                infoBox.classList.remove('hidden');
                infoBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else infoBox.classList.add('hidden');
        }

        fetchSchedule();
    </script>
</body>
</html>
