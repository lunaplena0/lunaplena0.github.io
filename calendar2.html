<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월간 일정 - 바다비 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { marine: {
                deep: '#060e16', reef: '#112235', foam: '#e3f2fd', 
                cyan: '#00e5ff', mint: '#05ffa6', coral: '#ff5c8a', 
                border: 'rgba(0, 229, 255, 0.12)', shallow: '#1a334d'
            }},
            fontFamily: {
                display: ['Noto Sans KR', 'sans-serif'], 
                body: ['Noto Sans KR', 'sans-serif']
            }}}
        }
    </script>
    <style>
        body { 
            background-color: #060e16;
            background-image: radial-gradient(circle at 50% 0%, #0d233a 0%, #060e16 70%);
            background-attachment: fixed;
            color: #e3f2fd; 
            font-family: 'Noto Sans KR', sans-serif; 
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        .calendar-cell { 
            min-height: 100px; cursor: pointer; 
            background-color: rgba(17, 34, 53, 0.4);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(0, 229, 255, 0.05);
            border-bottom: 1px solid rgba(0, 229, 255, 0.05);
        }
        .empty-cell { 
            border-right: 1px solid rgba(0, 229, 255, 0.05);
            border-bottom: 1px solid rgba(0, 229, 255, 0.05);
        }
        .calendar-cell:hover { background: rgba(0, 229, 255, 0.1) !important; }
        .day-label { text-align: center; font-size: 0.75rem; font-weight: 900; color: #00e5ff; padding: 0.5rem 0; border-bottom: 2px solid rgba(0, 229, 255, 0.2); border-right: 1px solid rgba(0, 229, 255, 0.05); }
        .day-label:last-child { border-right: none; }
        .date-num { color: #00e5ff; font-weight: bold; font-size: 0.875rem; }
        #date-detail-info {
            background: rgba(17, 34, 53, 0.6) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.2) !important;
        }
        @keyframes loadingBar { 0% { transform: translateX(-100%); } 50% { transform: translateX(0%); } 100% { transform: translateX(100%); } }
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spinSlow 4s linear infinite; }
    </style>
</head>
<body class="pb-16">

    <!-- 전체 화면 로딩 오버레이 (바다비.png 적용) -->
    <div id="loading-overlay" class="fixed inset-0 bg-marine-deep z-[100] flex flex-col items-center justify-center transition-all duration-700 opacity-100">
        <div class="relative flex flex-col items-center">
            <!-- 메인 이미지 + 회전하는 원형 로딩 링 -->
            <div class="relative mb-8 w-28 h-28 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-marine-cyan border-r-marine-mint animate-spin-slow"></div>
                <div class="w-20 h-20 rounded-full overflow-hidden shadow-xl border border-marine-border bg-marine-reef flex items-center justify-center">
                    <img src="바다비.png" alt="로딩 중" class="w-full h-full object-cover">
                </div>
            </div>
            
            <p class="font-display tracking-[0.2em] text-sm text-marine-foam animate-pulse">일정을 확인하고 있어요 . . .</p>
            
            <div class="w-32 h-1 bg-marine-reef mt-6 rounded-full overflow-hidden">
                <div class="h-full bg-marine-cyan animate-[loadingBar_2s_ease-in-out_infinite]"></div>
            </div>
        </div>
    </div>

    <nav class="border-b border-marine-border bg-marine-deep/90 backdrop-blur-md sticky top-0 z-40 mb-8 px-4 sm:px-6 py-3.5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-display font-black text-sm tracking-widest text-marine-foam">BABABI ARCHIVE</span>
            <a href="test.html" class="text-xs font-bold text-marine-cyan hover:text-marine-mint transition">메인으로</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
            <h2 id="current-month-display" class="font-display text-xl font-black text-marine-cyan tracking-widest">LOADING...</h2>
            <!-- 년도, 월 드롭다운 분리 -->
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <select id="year-select" class="bg-marine-reef text-white px-3 py-1.5 rounded-lg border border-marine-cyan/30 text-sm focus:outline-none focus:border-marine-cyan flex-1 sm:flex-none"></select>
                <select id="month-select" class="bg-marine-reef text-white px-3 py-1.5 rounded-lg border border-marine-cyan/30 text-sm focus:outline-none focus:border-marine-cyan flex-1 sm:flex-none"></select>
            </div>
        </div>
        
        <div id="calendar-body" class="calendar-grid border-t border-l border-r border-b border-marine-border rounded-lg overflow-hidden"></div>
        <!-- 항상 1개 일정 크기 정도의 최소 높이를 유지하도록 수정 (hidden 제거 및 최소 높이 스타일 부여) -->
        <div id="date-detail-info" class="mt-8 px-5 py-4 rounded-2xl shadow-2xl min-h-[100px] flex items-center justify-center">
            <div id="status-display-area" class="w-full">
                <p class="text-xs text-marine-foam/50 text-center">날짜를 클릭하여 상세 일정을 확인하세요.</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 border-t border-marine-border bg-marine-deep/95 backdrop-blur-lg z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between text-xs text-marine-foam/70">
            <span id="live-status-text">날짜를 클릭하여 일정을 확인하세요.</span>
        </div>
    </div>    

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8obAx_3kA2YbdK5stQqyyWWgnakjlEjLXjS6hLzQRU5gb4XeewNQUVpxkDQtQGyivJAG86GqxziOn/pub?gid=0&single=true&output=tsv';
        const CONFIG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ3nX6onmaf-ZHhXGox2s4ChGos7ki7iFjQ_47lArZR6dV935gCIbLbvlDDAS65rTEnswSLIk_7v3R/pub?gid=0&single=true&output=tsv';
        let allEvents = [];
        let availableYearMonths = [];

        async function updateFavicon() {
            try {
                const response = await fetch(CONFIG_URL + `&t=${Date.now()}`);
                const text = await response.text();
                const rows = text.split(/\r?\n/).map(row => row.split('\t'));
                const newFaviconUrl = rows[2] ? rows[2][2]?.trim() : null; 
                if (newFaviconUrl && newFaviconUrl.startsWith('http')) {
                    let favicon = document.querySelector("link[rel~='icon']");
                    if (!favicon) {
                        favicon = document.createElement('link');
                        favicon.rel = 'icon';
                        document.head.appendChild(favicon);
                    }
                    favicon.href = newFaviconUrl + `?t=${Date.now()}`;
                }
            } catch (e) { console.error("Favicon update error:", e); }
        }

        async function fetchSchedule() {
            try {
                const response = await fetch(TSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                let lastValidDate = "";
                allEvents = rows.map(row => {
                    const columns = row.split('\t');
                    if (columns.length < 5) return null;
                    let [date, time, type, title, content, replayUrl] = columns.map(col => col ? col.trim() : "");
                    let displayTime = time === "-" ? (type === "방송" ? "휴방" : type) : time;
                    if (!date) date = lastValidDate; else lastValidDate = date;
                    return { date: '20' + date.replace(/\./g, '-'), time: displayTime, type, title: title === "-" ? "" : title, content, replayUrl };
                }).filter(ev => ev);

                const now = new Date();
                const currentY = String(now.getFullYear());
                const currentM = String(now.getMonth() + 1).padStart(2, '0');
                
                availableYearMonths = [...new Set(allEvents.map(e => e.date.substring(0, 7)))].sort();
                
                initYearSelect();
                
                const years = [...new Set(availableYearMonths.map(ym => ym.substring(0, 4)))];
                let targetYear = years.includes(currentY) ? currentY : years[years.length - 1];
                document.getElementById('year-select').value = targetYear;
                
                updateMonthSelect(targetYear);
                
                let targetYM = `${targetYear}-${currentM}`;
                if (!availableYearMonths.includes(targetYM)) {
                    targetYM = availableYearMonths[availableYearMonths.length - 1];
                }
                document.getElementById('month-select').value = targetYM.substring(5, 7);
                
                renderCalendar(targetYM);
                
                const loadingOverlay = document.getElementById('loading-overlay');
                if (loadingOverlay) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => loadingOverlay.style.display = 'none', 700);
                }
            } catch (e) { 
                console.error(e); 
                const loadingOverlay = document.getElementById('loading-overlay');
                if (loadingOverlay) {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => loadingOverlay.style.display = 'none', 700);
                }
            }
        }

        function initYearSelect() {
            const yearSelect = document.getElementById('year-select');
            yearSelect.innerHTML = '';
            const years = [...new Set(availableYearMonths.map(ym => ym.substring(0, 4)))];
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.innerText = `${year}년`;
                yearSelect.appendChild(option);
            });
        }

        function updateMonthSelect(selectedYear) {
            const monthSelect = document.getElementById('month-select');
            monthSelect.innerHTML = '';
            const months = availableYearMonths
                .filter(ym => ym.startsWith(selectedYear))
                .map(ym => ym.substring(5, 7));
            
            months.forEach(month => {
                const option = document.createElement('option');
                option.value = month;
                option.innerText = `${Number(month)}월`;
                monthSelect.appendChild(option);
            });
        }

        function renderCalendar(yearMonth) {
            const [year, month] = yearMonth.split('-').map(Number);
            const firstDay = new Date(year, month - 1, 1).getDay();
            const lastDate = new Date(year, month, 0).getDate();
            document.getElementById('current-month-display').innerText = `${year}년 ${month}월`;
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';
            
            ['일','월','화','수','목','금','토'].forEach(d => {
                const div = document.createElement('div'); div.className = 'day-label'; div.innerText = d; body.appendChild(div);
            });
            
            for (let i = 0; i < firstDay; i++) { const div = document.createElement('div'); div.className = 'empty-cell'; body.appendChild(div); }
            
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month - 1, d).getDay();
                
                let dateColorClass = 'text-marine-foam'; 
                if (dayOfWeek === 0) dateColorClass = 'text-marine-coral';
                if (dayOfWeek === 6) dateColorClass = 'text-blue-400';

                const cell = document.createElement('div');
                cell.className = 'calendar-cell p-2';
                cell.onclick = () => showDateInfo(dateStr);
                
                cell.innerHTML = `<div class="date-header"><span class="date-num ${dateColorClass}">${d}</span></div>`;
                
                allEvents.filter(e => e.date === dateStr).forEach(ev => {
                    const isOff = ev.time.includes('휴방') || ev.type.includes('휴방');
                    const colorClass = isOff ? 'text-white font-semibold' : 'text-marine-cyan'; 
                    cell.innerHTML += `<div class="text-[8px] md:text-[10px] ${colorClass} mt-1 truncate">🔹${ev.time}</div>`;
                });
                
                body.appendChild(cell);
            }
        }

        function showDateInfo(dateStr) {
            const dayEvents = allEvents.filter(e => e.date === dateStr);
            const displayArea = document.getElementById('status-display-area');
            const liveText = document.getElementById('live-status-text');

            if (dayEvents.length > 0) {
                displayArea.innerHTML = `<div class="space-y-4">` + dayEvents.map(ev => {
                    const timeColor = ev.time.includes('휴방') ? 'text-white font-bold' : 'text-marine-cyan';
                    return `<div class="border-b border-marine-border pb-3 last:border-0">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs ${timeColor}">[${ev.type}] ${ev.time}</span>
                            ${ev.replayUrl && ev.replayUrl !== "-" ? `<a href="${ev.replayUrl}" target="_blank" class="text-[10px] text-marine-mint underline">게시글 또는 VOD링크</a>` : ''}
                        </div>
                        <div class="text-marine-foam font-bold">${ev.title || ''}</div>
                    </div>`;
                }).join('') + `</div>`;
                liveText.textContent = `선택한 날짜: ${dateStr.replace(/-/g, '.')} (${dayEvents.length}개 일정)`;
            } else {
                displayArea.innerHTML = `<p class="text-xs text-marine-foam/50 text-center">등록된 일정이 없습니다.</p>`;
                liveText.textContent = `선택한 날짜: ${dateStr.replace(/-/g, '.')} (일정 없음)`;
            }
        }

        document.getElementById('year-select').addEventListener('change', (e) => {
            const selectedYear = e.target.value;
            updateMonthSelect(selectedYear);
            const monthSelect = document.getElementById('month-select');
            const selectedMonth = monthSelect.value;
            renderCalendar(`${selectedYear}-${selectedMonth}`);
        });

        document.getElementById('month-select').addEventListener('change', (e) => {
            const selectedYear = document.getElementById('year-select').value;
            const selectedMonth = e.target.value;
            renderCalendar(`${selectedYear}-${selectedMonth}`);
        });

        updateFavicon();
        fetchSchedule();
    </script>
    
    <footer style="text-align: center; padding: 20px 10px; color: #b3cde0; font-size: 11px; border-top: 1px solid rgba(0, 229, 255, 0.12); margin-top: 20px; width: 100%; box-sizing: border-box;">
        <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
            <strong style="display: block; margin-bottom: 5px; color: #e3f2fd; font-size: 12px;">바다비 비공식 팬 아카이브</strong>
            모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
            <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
        </p>
    </footer>
</body>
</html>
