<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #02050a;
            --accent: #003366; 
            --accent-glow: rgba(0, 51, 102, 0.7);
            --accent-bright: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --scale: 1; 
            --blur: 25px;
            --pulse-duration: 2s; 
            --pulse-amount: 1.02; 
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
        }

        .timer-wrapper { text-align: center; width: 100%; }

        .label {
            font-size: 14px; 
            color: var(--accent-bright);
            font-weight: bold; letter-spacing: 5px;
            margin-bottom: 20px; text-transform: uppercase;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        #timer {
            font-size: clamp(30px, 8vw, 80px);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            transform: scale(var(--scale));
            text-shadow: 0 0 var(--blur) var(--accent-glow), 0 0 calc(var(--blur) / 2) var(--accent);
            /* 박동이 빨라질 때 끊기지 않도록 transition 최적화 */
            transition: transform 0.15s ease-out, text-shadow 0.3s ease;
            will-change: transform, text-shadow;
        }

        .dynamic-pulse {
            animation: heartBeat var(--pulse-duration) infinite ease-in-out;
        }

        @keyframes heartBeat {
            0% { transform: scale(var(--scale)); }
            50% { transform: scale(calc(var(--scale) * var(--pulse-amount))); }
            100% { transform: scale(var(--scale)); }
        }

        .coming-soon { color: var(--accent-bright) !important; }
        .target-date { font-size: 14px; color: var(--text-sub); opacity: 0.8; }
    </style>
</head>
<body>

<div class="timer-wrapper">
    <div class="label">BADABI Coming Soon</div>
    <div id="timer">로드 중...</div>
    <div class="target-date" id="target-display">2026.04.19 16:00:00</div>
</div>

<script>
    const TARGET_DATE = new Date("2026-04-09T19:34:00").getTime();
    let isRedirecting = false; // 중복 실행 방지 플래그

    function updateTimer() {
        if (isRedirecting) return; // 이동 중이면 실행 중단

        const now = new Date().getTime();
        const diff = TARGET_DATE - now;
        const timerEl = document.getElementById('timer');

        if (diff <= 0) {
            isRedirecting = true;
            timerEl.innerText = "이동 중..."; 
            window.location.href = "https://play.sooplive.com/bababi";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        // 텍스트 업데이트
        timerEl.innerText = (days > 0) ? `${days} : ${String(hours).padStart(2, '0')} : ${String(mins).padStart(2, '0')} : ${String(secs).padStart(2, '0')}` :
                           (hours > 0) ? `${hours} : ${String(mins).padStart(2, '0')} : ${String(secs).padStart(2, '0')}` :
                           (mins > 0) ? `${mins} : ${String(secs).padStart(2, '0')}` : `${secs}`;

        // 스케일 및 애니메이션 로직
        let scale = 1;
        if (diff <= 300000) scale = 1.05; 
        if (diff <= 240000) scale = 1.1;  
        if (diff <= 180000) scale = 1.15; 
        if (diff <= 120000) scale = 1.2;  
        if (diff <= 60000)  scale = 1.25; 
        document.documentElement.style.setProperty('--scale', scale);

        if (diff <= 120000) {
            timerEl.classList.add('dynamic-pulse');
            timerEl.classList.add('coming-soon');

            let duration, amount;
            if (diff > 90000) { duration = "2.0s"; amount = 1.02; }
            else if (diff > 60000) { duration = "1.5s"; amount = 1.03; }
            else if (diff > 30000) { duration = "1.2s"; amount = 1.04; }
            else if (diff > 15000) { duration = "0.7s"; amount = 1.05; }
            else if (diff > 10000) { duration = "0.6s"; amount = 1.06; }
            else { duration = "0.5s"; amount = 1.07; }

            document.documentElement.style.setProperty('--pulse-duration', duration);
            document.documentElement.style.setProperty('--pulse-amount', amount);
        }
    }

    // 0.1초마다 체크하여 더 정밀하게 반응
    const timerInterval = setInterval(updateTimer, 100);
    updateTimer();
</script>

</body>
</html>
