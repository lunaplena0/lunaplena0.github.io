<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050a10;
            --accent: #0097a7;   /* 글씨: 기존보다 명도를 낮춘 깊은 푸른색 */
            --accent-light: #00e5ff; /* 광채: 대비를 위해 밝게 유지 */
            --accent-glow: rgba(0, 229, 255, 0.3);
            --text-main: #00b8d4; /* 기본 글씨색도 어두운 청록/푸른 계열 */
            --text-sub: #455a64;  
            --scale: 1; 
            --blur: 30px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #07121d 0%, #050a10 100%);
        }

        .timer-wrapper { text-align: center; width: 100%; }

        .label {
            font-size: 14px; color: var(--accent);
            font-weight: bold; letter-spacing: 5px;
            margin-bottom: 20px; text-transform: uppercase;
            opacity: 0.8;
        }

        #timer {
            font-size: clamp(30px, 8vw, 80px);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            transform: scale(var(--scale));
            
            /* 초기 광채 설정 */
            text-shadow: 0 0 var(--blur) var(--accent-glow);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), text-shadow 0.3s ease, color 0.5s ease;
            will-change: transform, text-shadow;
        }

        /* 1분 전: 은은한 광채 박동 */
        .glow-pulse { animation: glowPulse 1.5s infinite ease-in-out; }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 var(--blur) var(--accent-glow); }
            50% { text-shadow: 0 0 calc(var(--blur) * 1.5) rgba(0, 229, 255, 0.6); }
        }

        /* 마지막 10초: 글씨 + 광채 + 크기 통합 박동 */
        .final-pulse { animation: finalPulse 0.8s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes finalPulse {
            0%, 100% { 
                transform: scale(var(--scale));
                text-shadow: 0 0 var(--blur) var(--accent-glow);
                opacity: 1;
            }
            50% { 
                transform: scale(calc(var(--scale) * 1.1)); /* 크기 확대 */
                text-shadow: 0 0 calc(var(--blur) * 2.5) rgba(0, 229, 255, 0.9); /* 광채 폭발 */
                color: var(--accent-light); /* 글씨도 순간적으로 밝아짐 */
                opacity: 0.9;
            }
        }

        .coming-soon { color: var(--accent) !important; }
        .target-date { font-size: 14px; color: var(--text-sub); opacity: 0.6; }
    </style>
</head>
<body>

<div class="timer-wrapper">
    <div class="label">BADABI Coming Soon</div>
    <div id="timer">로드 중...</div>
    <div class="target-date" id="target-display">2026.04.20 16:00:00</div>
</div>

<script>
    const TARGET_DATE = new Date("2026-04-20T16:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = TARGET_DATE - now;
        const timerEl = document.getElementById('timer');

        if (diff <= 0) {
            timerEl.innerText = "OPEN";
            timerEl.style.color = "var(--accent-light)";
            timerEl.style.setProperty('--scale', '1.4');
            timerEl.classList.remove('final-pulse');
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        let timeString = "";
        if (days > 0) {
            timeString += `${days} : ${String(hours).padStart(2, '0')} : ${String(mins).padStart(2, '0')} : ${String(secs).padStart(2, '0')}`;
        } else if (hours > 0) {
            timeString += `${hours} : ${String(mins).padStart(2, '0')} : ${String(secs).padStart(2, '0')}`;
        } else if (mins > 0) {
            timeString += `${mins} : ${String(secs).padStart(2, '0')}`;
        } else {
            timeString += `${secs}`;
        }
        timerEl.innerText = timeString;

        // 단계별 확대
        let scale = 1;
        if (diff <= 300000) scale = 1.05; 
        if (diff <= 240000) scale = 1.1;  
        if (diff <= 180000) scale = 1.15; 
        if (diff <= 120000) scale = 1.2;  
        if (diff <= 60000)  scale = 1.25; 
        document.documentElement.style.setProperty('--scale', scale);

        // 연출 제어
        if (diff <= 300000) timerEl.classList.add('coming-soon');

        if (diff <= 59000 && diff > 10000) {
            timerEl.classList.add('glow-pulse');
            timerEl.classList.remove('final-pulse');
        } else if (diff <= 10000) {
            timerEl.classList.remove('glow-pulse');
            timerEl.classList.add('final-pulse'); // 10초 전: 글씨+광채 통합 박동
        }
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
