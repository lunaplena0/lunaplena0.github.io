<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050a10; /* 깊은 바다색 */
            --accent: #00e5ff;   /* 사이언 블루 */
            --accent-glow: rgba(0, 229, 255, 0.4);
            --text-main: #f0faff;
            --text-sub: #8da2b5;
            
            /* 제어용 변수 */
            --scale: 1; 
            --blur: 30px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #0a1420 0%, #050a10 100%);
        }

        .timer-wrapper { text-align: center; width: 100%; }

        .label {
            font-size: 14px; color: var(--accent);
            font-weight: bold; letter-spacing: 5px;
            margin-bottom: 20px; text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        #timer {
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            transform: scale(var(--scale));
            text-shadow: 0 0 var(--blur) var(--accent-glow);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), text-shadow 0.3s ease;
            will-change: transform, text-shadow;
        }

        /* 1분 전: 배경 광채 심장 박동 */
        .glow-pulse { animation: glowPulse 1s infinite; }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 var(--blur) var(--accent-glow); }
            50% { text-shadow: 0 0 calc(var(--blur) * 2) rgba(0, 229, 255, 0.8); }
            100% { text-shadow: 0 0 var(--blur) var(--accent-glow); }
        }

        /* 10초 전: 전체 박동 */
        .final-pulse { animation: finalPulse 0.5s infinite; }
        @keyframes finalPulse {
            0% { transform: scale(var(--scale)); }
            50% { transform: scale(calc(var(--scale) * 1.05)); }
            100% { transform: scale(var(--scale)); }
        }

        .coming-soon { color: var(--accent) !important; }
        .target-date { font-size: 14px; color: var(--text-sub); opacity: 0.8; }
    </style>
</head>
<body>

<div class="timer-wrapper">
    <div class="label">BADABI Coming Soon</div>
    <div id="timer">로드 중...</div>
    <div class="target-date" id="target-display">2026.04.09 16:01:00</div>
</div>

<script>
    const TARGET_DATE = new Date("2026-04-09T16:01:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = TARGET_DATE - now;
        const timerEl = document.getElementById('timer');

        if (diff <= 0) {
            timerEl.innerText = "OPEN";
            timerEl.classList.add('coming-soon');
            timerEl.style.setProperty('--scale', '1.4');
            return;
        }

        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        // 1. 단위 생략 및 초 단위 처리 (한 자릿수일 때 0 제거)
        let timeString = "";
        if (mins > 0) {
            timeString += `${mins}: `;
            timeString += `${String(secs).padStart(2, '0')}초`;
        } else {
            // 1분 미만일 때: 한 자릿수면 0초 형식으로 출력
            timeString += `${secs}`;
        }
        timerEl.innerText = timeString;

        // 2. 단계별 확대 로직 (5분~1분)
        let scale = 1;
        if (diff <= 300000) scale = 1.05; // 5분
        if (diff <= 240000) scale = 1.1;  // 4분
        if (diff <= 180000) scale = 1.15; // 3분
        if (diff <= 120000) scale = 1.2;  // 2분
        if (diff <= 60000)  scale = 1.25; // 1분
        
        document.documentElement.style.setProperty('--scale', scale);

        // 3. 연출 추가 (광채 박동 및 컬러 변경)
        if (diff <= 300000) {
            timerEl.classList.add('coming-soon');
        }

        // 59초 전부터 광채 박동 시작
        if (diff <= 59000 && diff > 10000) {
            timerEl.classList.add('glow-pulse');
            timerEl.classList.remove('final-pulse');
        } 
        // 10초 전부터는 전체 박동으로 전환
        else if (diff <= 10000) {
            timerEl.classList.remove('glow-pulse');
            timerEl.classList.add('final-pulse');
        }
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
