<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #02050a;
            --accent: #003366; 
            --accent-glow: rgba(0, 51, 102, 0.7);
            --accent-bright: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --scale: 1; 
            --blur: 25px;
            /* 애니메이션 속도 제어를 위한 변수 (기본값 0) */
            --pulse-duration: 0s; 
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
        }

        .timer-wrapper { text-align: center; width: 100%; }

        .label {
            font-size: 14px; 
            color: var(--accent-bright);
            font-weight: bold; letter-spacing: 5px;
            margin-bottom: 20px; text-transform: uppercase;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        #timer {
            font-size: clamp(30px, 8vw, 80px);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            transform: scale(var(--scale));
            text-shadow: 0 0 var(--blur) var(--accent-glow), 0 0 calc(var(--blur) / 2) var(--accent);
            /* 부드러운 박동을 위해 transition 조정 */
            transition: transform 0.3s ease-out, text-shadow 0.3s ease;
            will-change: transform, text-shadow;
        }

        /* 심장 박동 애니메이션 */
        .heartbeat {
            animation: heartbeat var(--pulse-duration) infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes heartbeat {
            0% { transform: scale(var(--scale)); }
            10% { transform: scale(calc(var(--scale) * 1.08)); }
            20% { transform: scale(var(--scale)); }
            30% { transform: scale(calc(var(--scale) * 1.05)); }
            40% { transform: scale(var(--scale)); }
        }

        .coming-soon { color: var(--accent-bright) !important; }
        .target-date { font-size: 14px; color: var(--text-sub); opacity: 0.8; }
    </style>
</head>
<body>

<div class="timer-wrapper">
    <div class="label">BADABI Coming Soon</div>
    <div id="timer">로드 중...</div>
    <div class="target-date" id="target-display">2026.04.09 16:30:00</div>
</div>

<script>
    const TARGET_DATE = new Date("2026-04-09T16:30:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = TARGET_DATE - now;
        const timerEl = document.getElementById('timer');

        if (diff <= 0) {
            timerEl.innerText = "OPEN";
            timerEl.classList.remove('heartbeat'); // 오픈 시 박동 멈춤
            timerEl.style.setProperty('--scale', '1.4');
            timerEl.classList.add('coming-soon');
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        let timeString = (days > 0) ? `${days} : ${String(hours).padStart(2, '0')} : ${String(mins).padStart(2, '0')} : ${String(secs).padStart(2, '0')}` :
                         (hours > 0) ? `${hours} : ${String(mins).padStart(2, '0')} : ${String(secs).padStart(2, '0')}` :
                         (mins > 0) ? `${mins} : ${String(secs).padStart(2, '0')}` : `${secs}`;
        
        timerEl.innerText = timeString;

        // 1. 기본 크기 단계별 확대 (이전과 동일)
        let scale = 1;
        if (diff <= 300000) scale = 1.05; 
        if (diff <= 240000) scale = 1.1;  
        if (diff <= 180000) scale = 1.15; 
        if (diff <= 120000) scale = 1.2;  
        if (diff <= 60000)  scale = 1.25; 
        document.documentElement.style.setProperty('--scale', scale);

        // 2. 단계별 박동 속도 제어 (애니메이션 주기)
        if (diff <= 300000) {
            timerEl.classList.add('heartbeat');
            timerEl.classList.add('coming-soon');
            
            let duration = "0s";
            if (diff > 240000) duration = "5s";      // 5분 전: 아주 천천히
            else if (diff > 180000) duration = "4s"; // 4분 전: 조금씩 빨라짐
            else if (diff > 120000) duration = "3s"; // 3분 전
            else if (diff > 60000) duration = "2s";// 2분 전
            else if (diff > 10000) duration = "1s";  // 1분 전: 본격적인 박동
            else duration = "0.6s";                  // 10초 전: 매우 빠르게 (지금처럼)

            document.documentElement.style.setProperty('--pulse-duration', duration);
        }
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
