<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .timer-wrapper { text-align: center; }

        .label {
            font-size: 14px; color: var(--accent);
            font-weight: bold; letter-spacing: 5px;
            margin-bottom: 20px; text-transform: uppercase;
        }

        #timer {
            font-size: clamp(40px, 10vw, 80px); /* 화면 크기에 따라 폰트 조절 */
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(145, 71, 255, 0.3);
            margin-bottom: 10px;
        }

        .target-date { font-size: 14px; color: var(--text-sub); opacity: 0.8; }

        /* 뒤로가기 버튼 (필요 시 주석 해제) */
        .back-link {
            margin-top: 40px; display: inline-block;
            color: var(--text-sub); text-decoration: none;
            font-size: 13px; border-bottom: 1px solid var(--text-sub);
            padding-bottom: 2px; transition: 0.3s;
        }
        .back-link:hover { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

<div class="timer-wrapper">
    <div class="label">Next Stream Coming Soon</div>
    <div id="timer">00d 00:00:00</div>
    <div class="target-date" id="target-display">Target: 2026.04.15 16:00:00</div>
    <a href="index.html" class="back-link">메인으로 돌아가기</a>
</div>

<script>
    // 목표 시간 설정 (2026년 4월 15일 16시)
    const TARGET_DATE = new Date("2026-04-15T16:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = TARGET_DATE - now;

        const timerEl = document.getElementById('timer');

        if (diff <= 0) {
            timerEl.innerText = "00d 00:00:00";
            timerEl.style.color = "var(--accent)";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        // 출력 형식: 00d 00:00:00
        timerEl.innerText = 
            `${String(days).padStart(2, '0')}일 ` +
            `${String(hours).padStart(2, '0')}시간 ` +
            `${String(mins).padStart(2, '0')}분 ` +
            `${String(secs).padStart(2, '0')}초`;
    }

    // 1초마다 업데이트
    setInterval(updateTimer, 1000);
    updateTimer(); // 즉시 실행
</script>

</body>
</html>
