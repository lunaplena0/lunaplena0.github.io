<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Day Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .timer-wrapper { text-align: center; width: 100%; }

        .label {
            font-size: 14px; color: var(--accent);
            font-weight: bold; letter-spacing: 5px;
            margin-bottom: 20px; text-transform: uppercase;
        }

        #timer {
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(145, 71, 255, 0.3);
            margin-bottom: 10px;
            transition: all 0.5s ease; /* 부드러운 확대 효과 */
        }

        /* 5분 전 강조 애니메이션 */
        .highlight {
            color: var(--accent) !important;
            transform: scale(1.2);
            text-shadow: 0 0 50px rgba(145, 71, 255, 0.6) !important;
        }

        .target-date { font-size: 14px; color: var(--text-sub); opacity: 0.8; }
    </style>
</head>
<body>

<div class="timer-wrapper">
    <div class="label">BADABI Coming Soon</div>
    <div id="timer">로드 중...</div>
    <div class="target-date" id="target-display">2026.04.20 16:00:00</div>
</div>

<script>
    // 목표 시간 설정
    const TARGET_DATE = new Date("2026-04-09T15:59:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = TARGET_DATE - now;
        const timerEl = document.getElementById('timer');

        if (diff <= 0) {
            timerEl.innerText = "0초";
            window.location.replace("https://www.sooplive.com/"); 
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        // 1. 단위 생략 로직
        let timeString = "";
        if (days > 0) timeString += `${days}일 `;
        if (days > 0 || hours > 0) timeString += `${String(hours).padStart(2, '0')}시간 `;
        if (days > 0 || hours > 0 || mins > 0) timeString += `${String(mins).padStart(2, '0')}분 `;
        timeString += `${String(secs).padStart(2, '0')}초`;

        timerEl.innerText = timeString;

        // 2. 확대 카운트다운 연출 (5분 = 300,000ms 이하일 때)
        if (diff <= 300000) {
            timerEl.classList.add('highlight');
        } else {
            timerEl.classList.remove('highlight');
        }
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
