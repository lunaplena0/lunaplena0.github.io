<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Songlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --tag-200: #5c16ff; 
            --tag-300: #ff8c00;
            --tag-guitar: #8b572a; 
            --box-bg: #26262c; /* 상자 배경색 */
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 60px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .header-card { background: var(--card-bg); border-radius: 16px; padding: 30px; border: 1px solid #2f2f35; display: flex; justify-content: space-between; align-items: center; }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); display: flex; align-items: baseline; gap: 12px; }
        .song-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; }

        .header-btns { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; cursor: pointer; transition: 0.3s; }
        .special-btn { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        /* --- 팝업창 개선 --- */
        .modal-container {
            position: fixed; top: 50px; left: 50px; z-index: 1000; display: none;
            width: 540px; 
            background: var(--card-bg); border: 1px solid var(--accent);
            border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .modal-header { background: #1f1f23; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2f2f35; border-radius: 16px 16px 0 0; cursor: default; }
        .modal-header h2 { margin: 0; font-size: 15px; color: var(--accent); }

        .modal-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        #request-list { 
            list-style: none; padding: 0 5px 0 0; margin: 0; 
            max-height: 500px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 10px;
        }
        
        #request-list::-webkit-scrollbar { width: 6px; }
        #request-list::-webkit-scrollbar-thumb { background: #3a3a3d; border-radius: 10px; }

        /* 개별 아이템: 두 개의 상자로 분리 */
        .request-item { display: flex; gap: 8px; align-items: stretch; }
        
        /* 왼쪽 곡 제목 상자 */
        .req-left-box { 
            flex: 1; display: flex; align-items: center; 
            padding: 8px 12px; background: var(--box-bg); 
            border-radius: 8px; border: 1px solid #2f2f35;
            min-width: 0; 
        }
        .req-num { width: 22px; font-size: 11px; font-weight: bold; color: var(--accent); flex-shrink: 0; }
        .req-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .req-title.completed { text-decoration: line-through; color: var(--text-sub); opacity: 0.5; }
        
        /* 오른쪽 버튼 상자 */
        .req-right-box { 
            display: flex; gap: 4px; padding: 6px 10px; 
            background: var(--box-bg); border-radius: 8px; 
            border: 1px solid #2f2f35; flex-shrink: 0;
            align-items: center;
        }
        .req-btn { padding: 4px 6px; font-size: 10px; background: #3a3a3d; border: none; color: var(--text-main); border-radius: 4px; cursor: pointer; }
        .req-btn:hover { background: #4a4a4d; }

        /* 하단 입력창 구역 */
        .request-input-wrapper { position: relative; display: flex; gap: 8px; border-top: 1px solid #2f2f35; padding-top: 15px; }
        .request-input { flex: 1; background: #26262c; border: 1px solid #3a3a3d; border-radius: 8px; padding: 10px 15px; color: white; font-size: 13px; outline: none; }
        
        /* 자동완성을 입력창 아래로 배치 (요청 사항) */
        .autocomplete-list {
            position: absolute; 
            top: 52px; /* 입력창 아래로 위치 변경 */
            left: 0; width: calc(100% - 80px);
            background: #26262c; border: 1px solid var(--accent); border-radius: 8px;
            max-height: 150px; overflow-y: auto; z-index: 1001; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #333; }
        .autocomplete-item:hover { background: #3a3a3d; color: var(--accent); }

        /* 기타 테이블 스타일 생략(기존 유지) */
        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-input { flex: 1; background: var(--card-bg); border: 1px solid #2f2f35; padding: 15px 20px; border-radius: 12px; color: #fff; outline: none; }
        .song-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f1f23; padding: 15px 20px; font-size: 13px; color: var(--text-sub); text-align: left; }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #26262c; }
    </style>
</head>
<body>

<div id="modal" class="modal-container">
    <div class="modal-header" id="modalHeader">
        <h2>🎵 실시간 신청 곡 관리</h2>
        <span style="cursor:pointer;" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body">
        <ul id="request-list"></ul>
        <div class="request-input-wrapper">
            <input type="text" id="reqInput" class="request-input" placeholder="곡 제목 입력..." autocomplete="off">
            <button class="btn special-btn" onclick="addRequest()">추가</button>
            <div id="autocompleteBox" class="autocomplete-list"></div>
        </div>
    </div>
</div>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>🎶 노래책 <span class="song-count-info">총 노래 : <span id="total-count">0</span>곡</span></h1>
            <div class="sync-info">마지막 업데이트: <span id="last-sync">--:--</span></div>
        </div>
        <div class="header-btns">
            <button class="btn special-btn" onclick="openModal()">💎 신청목록 관리</button>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="songSearch" class="search-input" placeholder="곡 검색..." onkeyup="filterSongs()">
    </div>
    <div class="song-card">
        <table>
            <thead><tr><th style="width:60px;">번호</th><th>노래제목</th><th style="width:180px;">가수</th></tr></thead>
            <tbody id="song-list-body"></tbody>
        </table>
    </div>
</div>

<script>
    // 기존 스크립트 로직 유지하되 renderRequests만 구조 변경
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";
    let allSongs = []; let requests = [];

    function openModal() { document.getElementById('modal').style.display = 'block'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    window.onload = () => {
        fetch(sheetUrl).then(res => res.text()).then(csv => {
            const lines = csv.split('\n');
            const tbody = document.getElementById('song-list-body');
            let html = ''; let total = 0;
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].replace(/"/g,'').split(',');
                if (parts.length < 2) continue;
                total++;
                allSongs.push(parts[0].trim());
                html += `<tr><td>${total}</td><td>${parts[0].trim()}</td><td>${parts[1].trim()}</td></tr>`;
            }
            tbody.innerHTML = html;
            document.getElementById('total-count').textContent = total;
        });
    };

    function addRequest() {
        const val = document.getElementById('reqInput').value.trim();
        if(!val) return;
        requests.push({ title: val, completed: false });
        document.getElementById('reqInput').value = '';
        document.getElementById('autocompleteBox').style.display = 'none';
        renderRequests();
    }

    function renderRequests() {
        const list = document.getElementById('request-list');
        list.innerHTML = requests.map((req, i) => `
            <li class="request-item">
                <div class="req-left-box">
                    <span class="req-num">${i + 1}</span>
                    <span class="req-title ${req.completed ? 'completed' : ''}">${req.title}</span>
                </div>
                <div class="req-right-box">
                    <button class="req-btn" onclick="moveReq(${i}, -1)">▲</button>
                    <button class="req-btn" onclick="moveReq(${i}, 1)">▼</button>
                    <button class="req-btn" style="color:#4caf50" onclick="toggleDone(${i})">V</button>
                    <button class="req-btn" style="color:#ff4b4b" onclick="removeReq(${i})">X</button>
                </div>
            </li>
        `).join('');
        list.scrollTop = list.scrollHeight;
    }

    // 이하 기존 moveReq, toggleDone, removeReq 함수 동일 사용
    function toggleDone(i) { requests[i].completed = !requests[i].completed; renderRequests(); }
    function removeReq(i) { requests.splice(i, 1); renderRequests(); }
    function moveReq(i, dir) {
        if (i + dir < 0 || i + dir >= requests.length) return;
        [requests[i], requests[i + dir]] = [requests[i + dir], requests[i]];
        renderRequests();
    }

    // 자동완성 (아래로 뜨도록 이벤트 수정)
    const reqInput = document.getElementById('reqInput');
    const autoBox = document.getElementById('autocompleteBox');
    reqInput.addEventListener('input', function() {
        const val = this.value.toUpperCase();
        autoBox.innerHTML = '';
        if (!val) { autoBox.style.display = 'none'; return; }
        const matches = allSongs.filter(s => s.toUpperCase().includes(val)).slice(0, 10);
        if (matches.length > 0) {
            matches.forEach(m => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.textContent = m;
                div.onclick = () => { reqInput.value = m; autoBox.style.display = 'none'; };
                autoBox.appendChild(div);
            });
            autoBox.style.display = 'block';
        } else autoBox.style.display = 'none';
    });

    // 드래그 로직 동일
    const modal = document.getElementById('modal');
    const header = document.getElementById('modalHeader');
    let isDragging = false, offset = { x: 0, y: 0 };
    header.onmousedown = (e) => { isDragging = true; offset.x = e.clientX - modal.offsetLeft; offset.y = e.clientY - modal.offsetTop; };
    document.onmousemove = (e) => { if (isDragging) { modal.style.left = (e.clientX - offset.x) + 'px'; modal.style.top = (e.clientY - offset.y) + 'px'; } };
    document.onmouseup = () => isDragging = false;
</script>
</body>
</html>
