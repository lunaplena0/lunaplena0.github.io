<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Songlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --tag-200: #5c16ff; 
            --tag-300: #ff8c00;
            --tag-guitar: #8b572a; 
            --box-bg: #26262c;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 60px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .header-card { background: var(--card-bg); border-radius: 16px; padding: 30px; border: 1px solid #2f2f35; display: flex; justify-content: space-between; align-items: center; }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); display: flex; align-items: baseline; gap: 12px; }
        .song-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; }
        .sync-info { font-size: 11px; color: #5b5b63; margin-top: 5px; }

        .header-btns { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; cursor: pointer; transition: 0.3s; }
        .special-btn { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        /* --- 신청 목록 아이템 스타일 (좌우 축소) --- */
        .request-item { display: flex; gap: 6px; align-items: stretch; margin-bottom: 8px; }
        
        .req-left-box { 
            flex: 1; display: flex; align-items: center; 
            padding: 6px 10px; /* 상하좌우 여백 축소 */
            background: var(--box-bg); 
            border-radius: 6px; border: 1px solid #2f2f35; min-width: 0; 
        }
        .req-num { width: 18px; font-size: 10px; font-weight: bold; color: var(--accent); flex-shrink: 0; }
        .req-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .req-title.completed { text-decoration: line-through; color: var(--text-sub); opacity: 0.5; }
        
        .req-right-box { 
            display: flex; gap: 3px; padding: 4px 8px; /* 버튼 상자 여백 축소 */
            background: var(--box-bg); border-radius: 6px; 
            border: 1px solid #2f2f35; flex-shrink: 0; align-items: center;
        }
        .req-btn { padding: 3px 5px; font-size: 10px; background: #3a3a3d; border: none; color: var(--text-main); border-radius: 4px; cursor: pointer; }

        /* 입력 및 자동완성 */
        .request-input-wrapper { position: relative; display: flex; gap: 8px; margin-top: 15px; }
        .request-input { flex: 1; background: #26262c; border: 1px solid #3a3a3d; border-radius: 8px; padding: 10px 12px; color: white; font-size: 13px; outline: none; }
        
        .autocomplete-list {
            position: absolute; top: 50px; left: 0; width: calc(100% - 80px);
            background: #26262c; border: 1px solid var(--accent); border-radius: 8px;
            max-height: 150px; overflow-y: auto; z-index: 1001; display: none;
        }
        .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #333; }
        .autocomplete-item:hover { background: #3a3a3d; color: var(--accent); }

        /* 검색 및 테이블 */
        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-input { flex: 1; background: var(--card-bg); border: 1px solid #2f2f35; padding: 15px 20px; border-radius: 12px; color: #fff; outline: none; }
        .song-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f1f23; padding: 15px 20px; font-size: 13px; color: var(--text-sub); text-align: left; }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #26262c; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>🎶 노래책 
                <span class="song-count-info">
                    총 노래 : <span id="total-count">0</span>곡 | 기타 : <span id="guitar-count">0</span>곡
                </span>
            </h1>
            <div class="sync-info">마지막 업데이트: <span id="last-sync">--:--</span></div>
        </div>
        <div class="header-btns">
            <button class="btn special-btn" onclick="openManageWindow()">💎 신청목록 관리 (새 창)</button>
            <a href="index.html" class="btn">🏠 홈으로</a>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="songSearch" class="search-input" placeholder="곡 제목이나 가수를 검색하세요..." onkeyup="filterSongs()">
    </div>

    <div class="song-card">
        <table>
            <thead><tr><th style="width:60px;">번호</th><th>노래제목</th><th style="width:180px;">가수</th></tr></thead>
            <tbody id="song-list-body"></tbody>
        </table>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";
    let allSongs = [];

    window.onload = () => {
        fetch(sheetUrl).then(res => res.text()).then(csv => {
            const lines = csv.split('\n');
            const tbody = document.getElementById('song-list-body');
            document.getElementById('last-sync').textContent = lines[0].split(',')[2]?.replace(/"/g,'') || "--:--";
            let html = ''; let total = 0, guitar = 0;
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].replace(/"/g,'').split(',');
                if (parts.length < 2) continue;
                total++;
                if (parts[0].includes("[기타]")) guitar++;
                allSongs.push(parts[0].trim());
                html += `<tr><td>${total}</td><td>${parts[0].trim()}</td><td>${parts[1].trim()}</td></tr>`;
            }
            tbody.innerHTML = html;
            document.getElementById('total-count').textContent = total;
            document.getElementById('guitar-count').textContent = guitar;
        });
    };

    // --- 새 창 띄우기 로직 ---
    function openManageWindow() {
        const win = window.open("", "ManageWindow", "width=560,height=700,top=100,left=100,scrollbars=yes");
        
        // 새 창의 HTML 구조 생성
        win.document.write(`
            <html>
            <head>
                <title>신청 목록 관리</title>
                <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
                <style>
                    body { background-color: #0e0e10; color: #efeff1; font-family: 'Noto Sans KR', sans-serif; padding: 20px; }
                    h2 { color: #9147ff; font-size: 18px; border-bottom: 1px solid #2f2f35; padding-bottom: 10px; }
                    ul { list-style: none; padding: 0; margin-bottom: 20px; }
                    .request-item { display: flex; gap: 6px; margin-bottom: 8px; }
                    .req-left-box { flex: 1; display: flex; align-items: center; padding: 6px 10px; background: #26262c; border-radius: 6px; border: 1px solid #2f2f35; min-width: 0; }
                    .req-num { width: 18px; font-size: 10px; font-weight: bold; color: #9147ff; }
                    .req-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
                    .req-title.completed { text-decoration: line-through; opacity: 0.5; }
                    .req-right-box { display: flex; gap: 3px; padding: 4px 8px; background: #26262c; border-radius: 6px; border: 1px solid #2f2f35; align-items: center; }
                    .req-btn { padding: 3px 5px; font-size: 10px; background: #3a3a3d; border: none; color: #efeff1; border-radius: 4px; cursor: pointer; }
                    .input-wrapper { position: sticky; bottom: 0; background: #0e0e10; padding-top: 15px; border-top: 1px solid #2f2f35; display: flex; gap: 8px; }
                    input { flex: 1; background: #18181b; border: 1px solid #3a3a3d; border-radius: 6px; padding: 10px; color: white; outline: none; }
                    .add-btn { background: #9147ff; border: none; padding: 0 15px; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
                </style>
            </head>
            <body>
                <h2>🎵 실시간 신청 곡 관리</h2>
                <ul id="win-list"></ul>
                <div class="input-wrapper">
                    <input type="text" id="winInput" placeholder="곡 추가...">
                    <button class="add-btn" onclick="window.opener.addFromChild()">추가</button>
                </div>
            </body>
            </html>
        `);

        // 부모 창의 함수를 자식 창에서 쓸 수 있게 연결
        win.addFromChild = () => {
            const val = win.document.getElementById('winInput').value.trim();
            if(!val) return;
            window.requests.push({ title: val, completed: false });
            win.document.getElementById('winInput').value = '';
            window.updateChildList(win);
        };

        window.currentChildWin = win;
        window.updateChildList(win);
    }

    // 전역 요청 목록
    window.requests = [];

    // 자식 창 리스트 업데이트 함수
    window.updateChildList = (win) => {
        if (!win || win.closed) return;
        const list = win.document.getElementById('win-list');
        list.innerHTML = window.requests.map((req, i) => `
            <li class="request-item">
                <div class="req-left-box">
                    <span class="req-num">${i + 1}</span>
                    <span class="req-title ${req.completed ? 'completed' : ''}">${req.title}</span>
                </div>
                <div class="req-right-box">
                    <button class="req-btn" onclick="window.opener.moveReqChild(${i}, -1)">▲</button>
                    <button class="req-btn" onclick="window.opener.moveReqChild(${i}, 1)">▼</button>
                    <button class="req-btn" style="color:#4caf50" onclick="window.opener.toggleChild(${i})">V</button>
                    <button class="req-btn" style="color:#ff4b4b" onclick="window.opener.removeChild(${i})">X</button>
                </div>
            </li>
        `).join('');
    };

    // 자식 창 제어용 함수들
    window.toggleChild = (i) => { window.requests[i].completed = !window.requests[i].completed; window.updateChildList(window.currentChildWin); };
    window.removeChild = (i) => { window.requests.splice(i, 1); window.updateChildList(window.currentChildWin); };
    window.moveReqChild = (i, dir) => {
        if (i + dir < 0 || i + dir >= window.requests.length) return;
        [window.requests[i], window.requests[i + dir]] = [window.requests[i + dir], window.requests[i]];
        window.updateChildList(window.currentChildWin);
    };

    function filterSongs() {
        const filter = document.getElementById('songSearch').value.toUpperCase();
        const rows = document.querySelectorAll("#song-list-body tr");
        rows.forEach(row => {
            const text = row.innerText.toUpperCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    }
</script>
</body>
</html>
