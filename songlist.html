<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Songlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --tag-200: #5c16ff; 
            --tag-300: #ff8c00;
            --tag-guitar: #8b572a; 
            --tag-default: #2f2f35;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 900px; padding: 60px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .header-card { 
            background: var(--card-bg); border-radius: 16px; padding: 30px; border: 1px solid #2f2f35; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); display: flex; align-items: baseline; gap: 12px; }
        
        /* 노래 개수 스타일 */
        .song-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; }
        .sync-info { font-size: 11px; color: #5b5b63; margin-top: 5px; }

        .back-btn { padding: 8px 16px; background: #26262c; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; transition: 0.3s; }
        .back-btn:hover { background: var(--accent); border-color: var(--accent); }

        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-select {
            background: var(--card-bg); border: 1px solid #2f2f35; color: #fff;
            padding: 0 15px; border-radius: 12px; outline: none; cursor: pointer;
            font-size: 14px; min-width: 80px;
        }
        .search-input { 
            flex: 1; background: var(--card-bg); border: 1px solid #2f2f35; padding: 15px 20px; 
            border-radius: 12px; color: #fff; outline: none; font-size: 15px; 
        }

        .song-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f1f23; padding: 15px 20px; font-size: 13px; color: var(--text-sub); text-align: left; border-bottom: 1px solid #2f2f35; }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #26262c; vertical-align: middle; }
        tr:hover { background: #1d1d21; }

        .title-container { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .song-title { font-weight: 500; font-size: 15px; }
        .song-tag { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; color: #ffffff; white-space: nowrap; }

        .tag-200 { background-color: var(--tag-200); }
        .tag-300 { background-color: var(--tag-300); }
        .tag-guitar { background-color: var(--tag-guitar); }
        .tag-none { background-color: var(--tag-default); color: var(--text-sub); }

        .col-num { width: 60px; text-align: center; color: var(--text-sub); font-weight: bold; }
        .col-artist { width: 180px; color: var(--text-sub); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>
                🎶 노래책 
                <span class="song-count-info">
                    총 노래 : <span id="total-count">0</span>곡 | 기타 노래 : <span id="guitar-count">0</span>곡
                </span>
            </h1>
            <div class="sync-info">마지막 업데이트: <span id="last-sync">--:--</span></div>
        </div>
        <a href="index.html" class="back-btn">🏠 홈으로 돌아가기</a>
    </div>

    <div class="search-container">
        <select id="searchType" class="search-select">
            <option value="all">전체</option>
            <option value="title">제목</option>
            <option value="artist">가수</option>
        </select>
        <input type="text" id="songSearch" class="search-input" placeholder="검색어를 입력하세요...">
    </div>

    <div class="song-card">
        <table>
            <thead>
                <tr>
                    <th class="col-num">번호</th>
                    <th>노래제목</th>
                    <th class="col-artist">가수</th>
                </tr>
            </thead>
            <tbody id="song-list-body">
                <tr><td colspan="3" style="text-align:center; padding:50px; color:var(--text-sub);">목록을 불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";

    window.onload = function() {
        fetch(sheetUrl)
            .then(response => response.text())
            .then(csvText => {
                const data = parseCSV(csvText);
                renderSongList(data);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('song-list-body').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:50px;">데이터 로드 실패.</td></tr>';
            });
    };

    function parseCSV(csv) {
        const lines = csv.split('\n');
        const result = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].replace(/"/g, '').trim();
            if (!line) continue;
            const parts = line.split(',');
            if (parts.length >= 2) {
                result.push({ title: parts[0].trim(), artist: parts[1].trim() });
            }
        }
        return result;
    }

    function formatTitleWithTags(rawTitle) {
        const tagRegex = /\[(.*?)\]/g;
        let tags = rawTitle.match(tagRegex) || [];
        let pureTitle = rawTitle.replace(tagRegex, '').trim();

        let html = `<div class="title-container">`;
        html += `<span class="song-title">${pureTitle}</span>`;
        tags.forEach(tag => {
            const tagName = tag.replace('[', '').replace(']', '');
            let colorClass = 'tag-none'; 
            if (tagName.includes('200개')) colorClass = 'tag-200';
            else if (tagName.includes('300개')) colorClass = 'tag-300';
            else if (tagName.includes('기타')) colorClass = 'tag-guitar';
            html += `<span class="song-tag ${colorClass}">${tagName}</span>`;
        });
        html += `</div>`;
        return html;
    }

    function renderSongList(data) {
        const tbody = document.getElementById('song-list-body');
        tbody.innerHTML = ''; 
        let count = 1;
        
        data.forEach((item) => {
            if(item.title.includes("노래제목") || !item.title) return;
            const tr = document.createElement('tr');
            // 기타 노래 판별을 위해 데이터 속성 추가
            if (item.title.includes("[기타]")) {
                tr.setAttribute('data-is-guitar', 'true');
            }
            
            tr.innerHTML = `
                <td class="col-num">${count++}</td>
                <td class="col-title">${formatTitleWithTags(item.title)}</td>
                <td class="col-artist">${item.artist}</td>
            `;
            tbody.appendChild(tr);
        });
        
        updateCounts(); // 갯수 업데이트 호출
        const now = new Date();
        document.getElementById('last-sync').textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
    }

    // 노래 갯수 계산 및 표시 함수
    function updateCounts() {
        const rows = document.querySelectorAll("#song-list-body tr");
        let total = 0;
        let guitar = 0;

        rows.forEach(row => {
            if (row.style.display !== "none") {
                total++;
                if (row.getAttribute('data-is-guitar') === 'true') {
                    guitar++;
                }
            }
        });

        document.getElementById('total-count').textContent = total;
        document.getElementById('guitar-count').textContent = guitar;
    }

    function filterSongs() {
        const filter = document.getElementById('songSearch').value.toUpperCase();
        const type = document.getElementById('searchType').value;
        const rows = document.querySelectorAll("#song-list-body tr");
        let visibleCount = 1;

        rows.forEach(row => {
            const titleText = row.cells[1].textContent.toUpperCase();
            const artistText = row.cells[2].textContent.toUpperCase();
            let isVisible = false;

            if (type === "all") {
                isVisible = titleText.includes(filter) || artistText.includes(filter);
            } else if (type === "title") {
                isVisible = titleText.includes(filter);
            } else if (type === "artist") {
                isVisible = artistText.includes(filter);
            }

            if (isVisible) {
                row.style.display = "";
                row.cells[0].textContent = visibleCount++;
            } else {
                row.style.display = "none";
            }
        });
        
        updateCounts(); // 검색 후에도 갯수 갱신
    }

    document.getElementById('songSearch').addEventListener('keyup', filterSongs);
    document.getElementById('searchType').addEventListener('change', filterSongs);
</script>
</body>
</html>
