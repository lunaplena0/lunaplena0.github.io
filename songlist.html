<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래책 리스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
   <style>
    :root {
        --bg-color: #0e0e10;
        --card-bg: #18181b;
        --accent: #9147ff;
        --text-main: #efeff1;
        --text-sub: #adadb8;
    }

    /* 1. 핵심: 모든 요소의 크기 계산 방식을 변경 (상자가 커지는 것 방지) */
    * { 
        box-sizing: border-box; 
    }

    body { 
        background-color: var(--bg-color); 
        color: var(--text-main); 
        font-family: 'Noto Sans KR', sans-serif; 
        margin: 0; 
        padding: 0; 
        overflow-x: hidden; /* 가로 스크롤 절대 방지 */
    }

    .wrapper { 
        width: 100%; 
        max-width: 900px; 
        margin: 0 auto; 
        padding: 60px 20px; 
        display: flex; 
        flex-direction: column; 
        gap: 20px; 
    }

    /* ... 중간 스타일 (header-card, search-container 등)은 그대로 두셔도 됩니다 ... */

    .header-card { background: var(--card-bg); border-radius: 16px; padding: 30px; border: 1px solid #2f2f35; display: flex; justify-content: space-between; align-items: center; }
    .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); display: flex; align-items: baseline; gap: 12px; }
    .song-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; }
    .sync-info { font-size: 11px; color: #5b5b63; margin-top: 5px; }
    .header-btns { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; cursor: pointer; transition: 0.3s; }
    .special-btn { background: var(--accent); border-color: var(--accent); font-weight: bold; }
    .search-container { display: flex; gap: 10px; width: 100%; }
    .search-input { flex: 1; background: var(--card-bg); border: 1px solid #2f2f35; padding: 15px 20px; border-radius: 12px; color: #fff; outline: none; width: 100%; }
    .song-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; overflow: hidden; width: 100%; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; /* 표 너비 고정 */ }
    th { background: #1f1f23; padding: 15px 20px; font-size: 13px; color: var(--text-sub); text-align: left; }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #26262c; word-break: break-all; }

    /* 태그 스타일 */
    .tag-badge { display: inline-block; padding: 2px 9px; border-radius: 50px; font-size: 10px; font-weight: bold; margin-left: 8px; color: white; vertical-align: middle; text-transform: uppercase; }
    .tag-200 { background-color: #ff4b4b; }
    .tag-300 { background-color: #ff9100; }
    .tag-기타 { background-color: #4caf50; }
    .tag-default { background-color: #5b5b63; }

    /* 📱 모바일 최적화 수정 버전 */
    @media (max-width: 600px) {
        .wrapper {
            padding: 20px 12px; /* 좌우 여백을 더 줄임 */
        }

        .header-card {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            padding: 20px;
        }

        .header-btns {
            width: 100%;
        }

        .header-btns .btn {
            flex: 1;
            text-align: center;
        }

        /* 테이블이 화면을 뚫고 나가지 않게 조절 */
        th:nth-child(1), td:nth-child(1) { width: 45px !important; padding: 12px 8px; } /* 번호 */
        th:nth-child(2), td:nth-child(2) { width: auto !important; padding: 12px 8px; } /* 제목 */
        th:nth-child(3), td:nth-child(3) { 
            width: 90px !important; 
            padding: 12px 8px;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 가수 이름 길면 ... 처리 */
        }
    }
</style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>🎶 OOO 노래책 
                <span class="song-count-info">
                    노래 : <span id="total-count">0</span>곡 | 기타 : <span id="guitar-count">0</span>곡
                </span>
            </h1>
            <div class="sync-info">마지막 업데이트: <span id="last-sync">--:--</span></div>
        </div>
        <div class="header-btns">
            <button class="btn special-btn" onclick="openManageWindow()">신청목록 관리</button>
            <a href="index.html" class="btn">🏠 홈으로</a>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="songSearch" class="search-input" placeholder="곡 제목이나 가수를 검색하세요..." onkeyup="filterSongs()">
    </div>

    <div class="song-card">
        <table>
            <thead><tr><th style="width:80px;">번호</th><th>노래제목</th><th style="width:220px;">가수</th></tr></thead>
            <tbody id="song-list-body"></tbody>
        </table>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";
    
    window.allSongs = [];
    window.requests = JSON.parse(localStorage.getItem('streamerRequests')) || []; 

    window.onload = () => {
        fetch(sheetUrl).then(res => res.text()).then(csv => {
            const lines = csv.split('\n');
            const tbody = document.getElementById('song-list-body');
            
            const headerParts = lines[0].split(',');
            document.getElementById('last-sync').textContent = headerParts[2]?.replace(/"/g,'') || "--:--";
            
            let html = ''; 
            let total = 0, guitar = 0;
            window.allSongs = [];

            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/"/g, '').trim());
                
                if (parts.length < 2 || !parts[0]) continue;

                total++;
                let originalTitle = parts[0];
                const artist = parts[1] || "Unknown";

                // 태그 추출 및 배지 생성 로직
                const tagMatch = originalTitle.match(/^\[([^\]]+)\]/);
                let displayTitle = originalTitle;
                let tagHtml = '';

                if (tagMatch) {
                    const fullTag = tagMatch[0]; // [기타]
                    const tagText = tagMatch[1]; // 기타
                    const pureTitle = originalTitle.replace(fullTag, '').trim();
                    
                    // 태그 내용에 따른 색상 클래스 결정
                    let tagClass = 'tag-default';
                    if (tagText.includes("200")) tagClass = 'tag-200';
                    else if (tagText.includes("300")) tagClass = 'tag-300';
                    else if (tagText.includes("기타")) {
                        tagClass = 'tag-기타';
                        guitar++;
                    }

                    displayTitle = pureTitle; // 제목에서 태그 제거
                    tagHtml = `<span class="tag-badge ${tagClass}">${tagText}</span>`;
                }

                // 자동완성용 데이터에는 태그가 붙은 채로 저장 (구분용)
                window.allSongs.push(originalTitle);

                html += `<tr>
                    <td>${total}</td>
                    <td class="song-title">${displayTitle}${tagHtml}</td>
                    <td class="song-artist">${artist}</td>
                </tr>`;
            }
            
            tbody.innerHTML = html;
            document.getElementById('total-count').textContent = total;
            document.getElementById('guitar-count').textContent = guitar;
            localStorage.setItem('allSongsCache', JSON.stringify(window.allSongs));
        });
    };

    function openManageWindow() {
        window.open("manage.html", "ManageWindow", "width=520,height=700");
    }

    function saveToLocal() {
        localStorage.setItem('streamerRequests', JSON.stringify(window.requests));
    }

    // 검색 기능
    function filterSongs() {
        const filter = document.getElementById('songSearch').value.toUpperCase();
        const rows = document.querySelectorAll("#song-list-body tr");
        
        rows.forEach(row => {
            const titleText = row.querySelector('.song-title').textContent.toUpperCase();
            const artistText = row.querySelector('.song-artist').textContent.toUpperCase();
            if (titleText.includes(filter) || artistText.includes(filter)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    }
</script>
</body>
</html>
