<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Songlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 60px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .header-card { background: var(--card-bg); border-radius: 16px; padding: 30px; border: 1px solid #2f2f35; display: flex; justify-content: space-between; align-items: center; }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); display: flex; align-items: baseline; gap: 12px; }
        .song-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; }
        .sync-info { font-size: 11px; color: #5b5b63; margin-top: 5px; }

        .header-btns { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; cursor: pointer; transition: 0.3s; }
        .special-btn { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-input { flex: 1; background: var(--card-bg); border: 1px solid #2f2f35; padding: 15px 20px; border-radius: 12px; color: #fff; outline: none; }
        .song-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f1f23; padding: 15px 20px; font-size: 13px; color: var(--text-sub); text-align: left; }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #26262c; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>🎶 노래책 
                <span class="song-count-info">
                    총 노래 : <span id="total-count">0</span>곡 | 기타 : <span id="guitar-count">0</span>곡
                </span>
            </h1>
            <div class="sync-info">마지막 업데이트: <span id="last-sync">--:--</span></div>
        </div>
        <div class="header-btns">
            <button class="btn special-btn" onclick="openManageWindow()">💎 신청목록 관리 (새 창)</button>
            <a href="index.html" class="btn">🏠 홈으로</a>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="songSearch" class="search-input" placeholder="곡 제목이나 가수를 검색하세요..." onkeyup="filterSongs()">
    </div>

    <div class="song-card">
        <table>
            <thead><tr><th style="width:60px;">번호</th><th>노래제목</th><th style="width:180px;">가수</th></tr></thead>
            <tbody id="song-list-body"></tbody>
        </table>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";
    
    // 자식 창에서 접근하기 쉽도록 window 객체에 할당
    window.allSongs = [];
    window.requests = []; 

    window.onload = () => {
        fetch(sheetUrl).then(res => res.text()).then(csv => {
            const lines = csv.split('\n');
            const tbody = document.getElementById('song-list-body');
            document.getElementById('last-sync').textContent = lines[0].split(',')[2]?.replace(/"/g,'') || "--:--";
            let html = ''; let total = 0, guitar = 0;
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].replace(/"/g,'').split(',');
                if (parts.length < 2) continue;
                total++;
                if (parts[0].includes("[기타]")) guitar++;
                window.allSongs.push(parts[0].trim());
                html += `<tr><td>${total}</td><td>${parts[0].trim()}</td><td>${parts[1].trim()}</td></tr>`;
            }
            tbody.innerHTML = html;
            document.getElementById('total-count').textContent = total;
            document.getElementById('guitar-count').textContent = guitar;
        });
    };

    // manage.html 파일을 새 창으로 여는 함수
    function openManageWindow() {
        const win = window.open("manage.html", "ManageWindow", "width=520,height=700");
        if (!win) { 
            alert("팝업이 차단되었습니다. 브라우저 설정에서 팝업을 허용해주세요!"); 
        }
    }

    // 자식 창(manage.html)에서 호출할 데이터 관리 함수들
    window.addRequest = (title) => { window.requests.push({ title, completed: false }); };
    window.toggleDone = (i) => { window.requests[i].completed = !window.requests[i].completed; };
    window.removeReq = (i) => { window.requests.splice(i, 1); };
    window.moveReq = (i, dir) => {
        if (i + dir < 0 || i + dir >= window.requests.length) return;
        [window.requests[i], window.requests[i + dir]] = [window.requests[i + dir], window.requests[i]];
    };

    function filterSongs() {
        const filter = document.getElementById('songSearch').value.toUpperCase();
        const rows = document.querySelectorAll("#song-list-body tr");
        rows.forEach(row => {
            const text = row.innerText.toUpperCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    }
</script>
</body>
</html>
