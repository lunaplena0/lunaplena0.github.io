<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Songlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --tag-200: #5c16ff; 
            --tag-300: #ff8c00;
            --tag-guitar: #8b572a; 
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 60px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .header-card { background: var(--card-bg); border-radius: 16px; padding: 30px; border: 1px solid #2f2f35; display: flex; justify-content: space-between; align-items: center; }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); display: flex; align-items: baseline; gap: 12px; }
        .song-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; }
        .sync-info { font-size: 11px; color: #5b5b63; margin-top: 5px; }

        .header-btns { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; cursor: pointer; transition: 0.3s; }
        .special-btn { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        /* 메인 페이지 테이블 스타일 */
        .search-container { display: flex; gap: 10px; width: 100%; }
        .search-input { flex: 1; background: var(--card-bg); border: 1px solid #2f2f35; padding: 15px 20px; border-radius: 12px; color: #fff; outline: none; }
        .song-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f1f23; padding: 15px 20px; font-size: 13px; color: var(--text-sub); text-align: left; }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #26262c; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>🎶 노래책 
                <span class="song-count-info">
                    총 노래 : <span id="total-count">0</span>곡 | 기타 : <span id="guitar-count">0</span>곡
                </span>
            </h1>
            <div class="sync-info">마지막 업데이트: <span id="last-sync">--:--</span></div>
        </div>
        <div class="header-btns">
            <button class="btn special-btn" onclick="openManageWindow()">💎 신청목록 관리 (새 창)</button>
            <a href="index.html" class="btn">🏠 홈으로</a>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="songSearch" class="search-input" placeholder="곡 제목이나 가수를 검색하세요..." onkeyup="filterSongs()">
    </div>

    <div class="song-card">
        <table>
            <thead><tr><th style="width:60px;">번호</th><th>노래제목</th><th style="width:180px;">가수</th></tr></thead>
            <tbody id="song-list-body"></tbody>
        </table>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";
    let allSongs = [];
    let requests = []; // 전역 신청 목록

    window.onload = () => {
        fetch(sheetUrl).then(res => res.text()).then(csv => {
            const lines = csv.split('\n');
            const tbody = document.getElementById('song-list-body');
            document.getElementById('last-sync').textContent = lines[0].split(',')[2]?.replace(/"/g,'') || "--:--";
            let html = ''; let total = 0, guitar = 0;
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].replace(/"/g,'').split(',');
                if (parts.length < 2) continue;
                total++;
                if (parts[0].includes("[기타]")) guitar++;
                allSongs.push(parts[0].trim());
                html += `<tr><td>${total}</td><td>${parts[0].trim()}</td><td>${parts[1].trim()}</td></tr>`;
            }
            tbody.innerHTML = html;
            document.getElementById('total-count').textContent = total;
            document.getElementById('guitar-count').textContent = guitar;
        });
    };

    function openManageWindow() {
        const win = window.open("", "ManageWindow", "width=520,height=700");
        if (!win) { alert("팝업이 차단되었습니다. 허용해주세요!"); return; }

        const htmlContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>신청 목록 관리</title>
                <style>
                    body { background: #0e0e10; color: #efeff1; font-family: sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
                    h2 { color: #9147ff; font-size: 16px; margin: 0 0 15px 0; }
                    #list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
                    .item { display: flex; gap: 6px; margin-bottom: 8px; }
                    .l-box { flex: 1; display: flex; align-items: center; padding: 6px 10px; background: #26262c; border-radius: 6px; border: 1px solid #2f2f35; min-width: 0; }
                    .num { width: 20px; font-size: 11px; font-weight: bold; color: #9147ff; }
                    .tit { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
                    .done { text-decoration: line-through; opacity: 0.5; }
                    .r-box { display: flex; gap: 4px; padding: 4px 8px; background: #26262c; border-radius: 6px; border: 1px solid #2f2f35; }
                    .btn { padding: 3px 6px; font-size: 10px; background: #3a3a3d; border: none; color: white; border-radius: 4px; cursor: pointer; }
                    
                    .in-area { position: relative; padding-top: 15px; border-top: 1px solid #2f2f35; display: flex; gap: 8px; }
                    input { flex: 1; background: #18181b; border: 1px solid #3a3a3d; border-radius: 6px; padding: 10px; color: white; outline: none; }
                    .add-v { background: #9147ff; border: none; padding: 0 15px; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
                    
                    #auto { position: absolute; bottom: 55px; left: 0; width: calc(100% - 75px); background: #26262c; border: 1px solid #9147ff; border-radius: 6px; max-height: 150px; overflow-y: auto; display: none; }
                    .a-item { padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #333; }
                    .a-item:hover { background: #3a3a3d; }
                </style>
            </head>
            <body>
                <h2>🎵 신청 목록 관리</h2>
                <ul id="list"></ul>
                <div class="in-area">
                    <div id="auto"></div>
                    <input type="text" id="in" placeholder="노래 제목 입력..." autocomplete="off">
                    <button class="add-v" id="addBtn">추가</button>
                </div>

                <script>
                    const opener = window.opener;
                    const listEl = document.getElementById('list');
                    const inEl = document.getElementById('in');
                    const autoEl = document.getElementById('auto');

                    function render() {
                        listEl.innerHTML = opener.requests.map((r, i) => \`
                            <li class="item">
                                <div class="l-box">
                                    <span class="num">\${i+1}</span>
                                    <span class="tit \${r.completed ? 'done' : ''}">\${r.title}</span>
                                </div>
                                <div class="r-box">
                                    <button class="btn" onclick="opener.moveReq(\${i}, -1); location.reload();">▲</button>
                                    <button class="btn" onclick="opener.moveReq(\${i}, 1); location.reload();">▼</button>
                                    <button class="btn" style="color:#4caf50" onclick="opener.toggleDone(\${i}); location.reload();">V</button>
                                    <button class="btn" style="color:#ff4b4b" onclick="opener.removeReq(\${i}); location.reload();">X</button>
                                </div>
                            </li>
                        \`).join('');
                        listEl.scrollTop = listEl.scrollHeight;
                    }

                    document.getElementById('addBtn').onclick = () => {
                        const val = inEl.value.trim();
                        if(val) { opener.addRequest(val); inEl.value = ''; autoEl.style.display = 'none'; render(); }
                    };

                    inEl.onkeyup = (e) => {
                        if(e.key === 'Enter') document.getElementById('addBtn').click();
                        const v = inEl.value.toUpperCase();
                        autoEl.innerHTML = '';
                        if(!v) { autoEl.style.display = 'none'; return; }
                        const ms = opener.allSongs.filter(s => s.toUpperCase().includes(v)).slice(0, 10);
                        if(ms.length > 0) {
                            ms.forEach(m => {
                                const d = document.createElement('div');
                                d.className = 'a-item'; d.textContent = m;
                                d.onclick = () => { inEl.value = m; autoEl.style.display = 'none'; document.getElementById('addBtn').click(); };
                                autoEl.appendChild(d);
                            });
                            autoEl.style.display = 'block';
                        } else autoEl.style.display = 'none';
                    };

                    render();
                <\/script>
            </body>
            </html>
        `;

        win.document.open();
        win.document.write(htmlContent);
        win.document.close();
    }

    // 부모 창에서 관리하는 함수들
    function addRequest(title) { requests.push({ title, completed: false }); }
    function toggleDone(i) { requests[i].completed = !requests[i].completed; }
    function removeReq(i) { requests.splice(i, 1); }
    function moveReq(i, dir) {
        if (i + dir < 0 || i + dir >= requests.length) return;
        [requests[i], requests[i + dir]] = [requests[i + dir], requests[i]];
    }

    function filterSongs() {
        const filter = document.getElementById('songSearch').value.toUpperCase();
        const rows = document.querySelectorAll("#song-list-body tr");
        rows.forEach(row => {
            const text = row.innerText.toUpperCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    }
</script>
</body>
</html>
