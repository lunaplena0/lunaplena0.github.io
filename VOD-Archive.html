<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 데이터 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
            --modal-bg: rgba(0, 0, 0, 0.9);
            /* 차트 색상 */
            --c-game: #4a33ff;
            --c-song: #ff3385;
            --c-talk: #33cc85;
            --c-etc: #7a8aa7;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at top right, #051020 0%, #010306 100%);
            color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; 
        }
        body.modal-open { overflow: hidden; }

        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }

        /* 대시보드 스타일 통계 레이아웃 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 원형 그래프 스타일 */
        .chart-box { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .pie-chart {
            width: 140px; height: 140px; border-radius: 50%;
            background: conic-gradient(
                var(--c-game) 0% var(--p-game, 0%), 
                var(--c-song) var(--p-game, 0%) var(--p-song, 0%), 
                var(--c-talk) var(--p-song, 0%) var(--p-talk, 0%),
                var(--c-etc) var(--p-talk, 0%) 100%
            );
            position: relative; margin-bottom: 15px;
        }
        .pie-chart::after {
            content: ""; position: absolute; inset: 25px; background: var(--card-bg); border-radius: 50%;
        }
        .chart-label { font-size: 11px; color: var(--text-sub); display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .label-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* 시간 분석 데이터 */
        .time-stats { display: flex; flex-direction: column; gap: 12px; justify-content: center; }
        .total-info { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 5px; }
        .total-info h2 { font-size: 20px; margin: 0; color: var(--accent); }
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sub-item span { display: block; }
        .sub-val { font-size: 15px; font-weight: bold; color: #fff; margin-top: 2px; }
        .sub-lbl { font-size: 10px; color: var(--text-sub); }

        /* 리스트 & 팝업 스타일 (이전과 동일) */
        .date-group { margin-top: 30px; }
        .date-header { font-size: 16px; font-weight: bold; color: var(--accent); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .vod-list { display: flex; flex-direction: column; gap: 8px; }
        .vod-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; cursor: pointer; transition: 0.2s; }
        .vod-item:hover { border-color: var(--accent); transform: scale(1.01); }
        .vod-thumb { width: 140px; height: 80px; position: relative; }
        .vod-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px 0 0 12px; }
        .duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 5px; border-radius: 4px; }
        .vod-body { padding: 12px 15px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .vod-title { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 팝업 모달 */
        #modal-overlay { position: fixed; inset: 0; background: var(--modal-bg); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); padding: 20px; }
        #modal-content { background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .modal-body { padding: 20px; }
        .info-row { border-left: 3px solid var(--accent); padding-left: 12px; margin-bottom: 15px; display: none; }
        .info-row.is-active { display: block; }
        .info-label { font-size: 10px; color: var(--text-sub); display: block; font-weight: bold; }
        .info-value { font-size: 14px; line-height: 1.6; }
        .btn-action { display: block; width: 100%; padding: 12px; text-align: center; border-radius: 10px; font-weight: bold; text-decoration: none; margin-top: 10px; cursor: pointer; }
        .btn-go { background: var(--accent); color: white; }
        .btn-close { background: #1a202c; color: var(--text-sub); border: none; }

        @media (max-width: 650px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .vod-thumb { width: 100px; height: 60px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="dashboard-grid">
        <div class="stat-card chart-box">
            <div class="pie-chart" id="category-chart"></div>
            <div class="chart-label" id="chart-legend">
                <div class="label-item"><span class="dot" style="background:var(--c-game)"></span>게임</div>
                <div class="label-item"><span class="dot" style="background:var(--c-song)"></span>노래</div>
                <div class="label-item"><span class="dot" style="background:var(--c-talk)"></span>소통</div>
                <div class="label-item"><span class="dot" style="background:var(--c-etc)"></span>기타</div>
            </div>
        </div>
        
        <div class="stat-card time-stats">
            <div class="total-info">
                <span class="sub-lbl">전체 영상 누적 시간</span>
                <h2 id="total-hour">0시간 0분</h2>
            </div>
            <div class="sub-grid">
                <div class="sub-item">
                    <span class="sub-lbl">최장 방송</span>
                    <span class="sub-val" id="max-time">0:00</span>
                </div>
                <div class="sub-item">
                    <span class="sub-lbl">최단 방송</span>
                    <span class="sub-val" id="min-time">0:00</span>
                </div>
                <div class="sub-item">
                    <span class="sub-lbl">평균 시간</span>
                    <span class="sub-val" id="avg-time">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="vod-content"></div>
</div>

<div id="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div id="modal-content">
        <img id="m-thumb" style="width:100%; height:200px; object-fit:cover;" src="">
        <div class="modal-body">
            <div id="m-title" style="font-weight:bold; font-size:16px; margin-bottom:15px;"></div>
            <div class="modal-info-grid">
                <div class="info-row is-active"><span class="info-label">📅 방송 일시</span><span id="m-date" class="info-value"></span></div>
                <div id="row-game" class="info-row"><span class="info-label">🎮 게임 정보</span><span id="m-game" class="info-value"></span></div>
                <div id="row-song" class="info-row"><span class="info-label">🎵 노래 정보</span><span id="m-song" class="info-value"></span></div>
            </div>
            <a id="m-link" href="#" target="_blank" class="btn-action btn-go">영상 시청하기</a>
            <button class="btn-action btn-close" onclick="closeModal()">닫기</button>
        </div>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv";
    
    // 시간 문자열(HH:MM:SS)을 초 단위로 변환
    function timeToSeconds(t) {
        if(!t || t === '-') return 0;
        const p = t.split(':').map(Number);
        return (p[0] * 3600) + (p[1] * 60) + (p[2] || 0);
    }

    // 초 단위를 HH:MM:SS 형식으로 변환
    function secondsToTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    window.onload = () => {
        fetch(sheetUrl + `&t=${new Date().getTime()}`)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(l => l.trim() !== "");
                let vods = [];
                for (let i = 1; i < lines.length; i++) {
                    const p = lines[i].split('\t').map(v => v.trim());
                    if(!p[0]) continue;
                    vods.push({
                        date: p[0], title: p[1], link: p[2], thumb: p[3], 
                        totalTime: p[4], gName: p[6], gTime: p[7], sName: p[8], sTime: p[9], category: p[10]
                    });
                }
                renderList(vods);
                calculateStats(vods);
            });
    };

    function calculateStats(data) {
        let totalSec = 0, maxSec = 0, minSec = Infinity, catCount = {게임:0, 노래:0, 소통:0, 기타:0};
        const timeList = [];

        data.forEach(v => {
            const s = timeToSeconds(v.totalTime);
            if(s > 0) {
                totalSec += s;
                maxSec = Math.max(maxSec, s);
                minSec = Math.min(minSec, s);
                timeList.push(s);
            }
            // 카테고리 집계 (여러개일 경우 첫번째 기준)
            if(v.category.includes('게임')) catCount.게임++;
            else if(v.category.includes('노래')) catCount.노래++;
            else if(v.category.includes('소통')) catCount.소통++;
            else catCount.기타++;
        });

        // 상단 텍스트 업데이트
        document.getElementById('total-hour').textContent = `${Math.floor(totalSec / 3600)}시간 ${Math.floor((totalSec % 3600) / 60)}분`;
        document.getElementById('max-time').textContent = secondsToTime(maxSec);
        document.getElementById('min-time').textContent = secondsToTime(minSec);
        document.getElementById('avg-time').textContent = secondsToTime(Math.floor(totalSec / data.length));

        // 차트 비율 계산
        const total = data.length;
        const pGame = (catCount.게임 / total) * 100;
        const pSong = pGame + (catCount.노래 / total) * 100;
        const pTalk = pSong + (catCount.소통 / total) * 100;

        const chart = document.getElementById('category-chart');
        chart.style.setProperty('--p-game', `${pGame}%`);
        chart.style.setProperty('--p-song', `${pSong}%`);
        chart.style.setProperty('--p-talk', `${pTalk}%`);
    }

    function renderList(data) {
        const container = document.getElementById('vod-content');
        container.innerHTML = '';
        const groups = {};
        data.forEach(v => { if(!groups[v.date]) groups[v.date] = []; groups[v.date].push(v); });

        Object.keys(groups).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'date-group';
            groupDiv.innerHTML = `<div class="date-header">${date}</div><div class="vod-list"></div>`;
            groups[date].forEach(v => {
                const item = document.createElement('div');
                item.className = 'vod-item';
                item.onclick = () => openModal(v);
                item.innerHTML = `
                    <div class="vod-thumb"><img src="${v.thumb}"><span class="duration">${v.totalTime}</span></div>
                    <div class="vod-body"><div class="vod-title">${v.title}</div><div style="font-size:10px; color:var(--text-sub);">${v.category}</div></div>`;
                groupDiv.querySelector('.vod-list').appendChild(item);
            });
            container.appendChild(groupDiv);
        });
    }

    function openModal(v) {
        document.getElementById('m-thumb').src = v.thumb;
        document.getElementById('m-title').textContent = v.title;
        document.getElementById('m-date').textContent = `${v.date} (${v.totalTime})`;
        document.getElementById('m-link').href = v.link;

        const setRow = (id, valId, name, time) => {
            const row = document.getElementById(id);
            if(name && name !== "-") {
                row.classList.add('is-active');
                document.getElementById(valId).innerHTML = name.split(',').map((n, i) => `${n.trim()} <span class="time-badge">(${time.split(',')[i]?.trim() || ''})</span>`).join('<br>');
            } else row.classList.remove('is-active');
        };
        setRow('row-game', 'm-game', v.gName, v.gTime);
        setRow('row-song', 'm-song', v.sName, v.sTime);

        document.getElementById('modal-overlay').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.body.classList.remove('modal-open');
    }
</script>
</body>
</html>
