<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 다시보기 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
            --plus-color: #ffcc00;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #010306 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
        }

        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }

        /* 헤더 섹션 */
        .header-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 25px; 
            border: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); }
        .update-now { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
        
        .btn-home {
            text-decoration: none;
            color: var(--text-main);
            background: #0a1a30;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .btn-home:hover { background: var(--accent); color: #fff; }

        /* 통계 섹션 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value { display: block; font-size: 18px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-sub); text-transform: uppercase; }

        /* 리스트 형식 스타일 */
        .date-group { margin-top: 30px; }
        .date-header { 
            font-size: 18px; 
            font-weight: bold; 
            color: var(--accent); 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        .date-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .vod-list { display: flex; flex-direction: column; gap: 12px; }

        .vod-item {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            display: flex;
            overflow: hidden;
            transition: 0.2s;
        }
        .vod-item:hover { transform: translateX(5px); border-color: var(--accent); background: rgba(51, 133, 255, 0.05); }

        /* 썸네일 (왼쪽 고정) */
        .vod-thumb {
            width: 180px;
            min-width: 180px;
            height: 100px;
            position: relative;
            background: #000;
        }
        .vod-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .duration { 
            position: absolute; bottom: 5px; right: 5px; 
            background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 4px; border-radius: 3px; 
        }

        /* 정보 (오른쪽) */
        .vod-body { padding: 12px 15px; flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .vod-title { 
            font-size: 15px; font-weight: bold; margin-bottom: 8px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        
        .vod-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .tag-game { background: rgba(74, 51, 255, 0.2); color: #88aaff; border: 1px solid #4a33ff; }
        .tag-song { background: rgba(255, 51, 133, 0.2); color: #ff88aa; border: 1px solid #ff3385; }
        .tag-plus { background: var(--plus-color); color: #000; }
        .tag-category { background: rgba(92, 114, 133, 0.2); color: var(--text-sub); border: 1px solid var(--border); }

        @media (max-width: 600px) {
            .vod-thumb { width: 120px; min-width: 120px; height: 70px; }
            .vod-title { font-size: 14px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr; }
            .stat-value { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>바다비 다시보기 아카이브</h1>
            <div id="update-time" class="update-now">데이터 로드 중...</div>
        </div>
        <a href="index.html" class="btn-home">🏠 홈으로</a>
    </div>

    <div class="stats-grid" id="stats-area">
        <div class="stat-item"><span class="stat-value" id="stat-total">0</span><span class="stat-label">Total</span></div>
        <div class="stat-item"><span class="stat-value" id="stat-game">0</span><span class="stat-label">Game</span></div>
        <div class="stat-item"><span class="stat-value" id="stat-song">0</span><span class="stat-label">Song</span></div>
    </div>

    <div id="vod-content">
        </div>

    <footer style="text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 11px; opacity: 0.6;">
        © 2026 바다비 Information Center
    </footer>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv";

    window.onload = () => {
        const cacheBuster = `&t=${new Date().getTime()}`;
        fetch(sheetUrl + cacheBuster)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(line => line.trim() !== "");
                let vods = [];

                for (let i = 1; i < lines.length; i++) {
                    const p = lines[i].split('\t').map(item => item.trim());
                    if(!p[0]) continue;
                    
                    vods.push({
                        date: p[0], title: p[1], link: p[2], thumb: p[3], totalTime: p[4],
                        isPlus: p[5] === '예',
                        gameName: p[6], gameTime: p[7],
                        songName: p[8], songTime: p[9],
                        category: p[10]
                    });
                }
                
                // 날짜 기준 내림차순 정렬 (최신순)
                vods.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                renderList(vods);
                updateStats(vods);
                
                const now = new Date();
                document.getElementById('update-time').textContent = `최근 업데이트: ${now.toLocaleTimeString()}`;
            })
            .catch(err => {
                document.getElementById('vod-content').innerHTML = "<p style='text-align:center;'>데이터 로딩 실패</p>";
            });
    };

    function updateStats(data) {
        document.getElementById('stat-total').textContent = data.length;
        document.getElementById('stat-game').textContent = data.filter(d => d.gameName && d.gameName !== '-').length;
        document.getElementById('stat-song').textContent = data.filter(d => d.songName && d.songName !== '-').length;
    }

    function renderList(data) {
        const container = document.getElementById('vod-content');
        container.innerHTML = '';

        // 날짜별로 그룹화
        const groups = {};
        data.forEach(vod => {
            if (!groups[vod.date]) groups[vod.date] = [];
            groups[vod.date].push(vod);
        });

        // 정렬된 날짜 키 가져오기 (이미 위에서 vods가 정렬되었으므로 순서대로 나옴)
        const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));

        sortedDates.forEach(date => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'date-group';
            
            let itemsHtml = groups[date].map(vod => `
                <a href="${vod.link}" target="_blank" class="vod-item">
                    <div class="vod-thumb">
                        <img src="${vod.thumb}" loading="lazy">
                        <span class="duration">${vod.totalTime}</span>
                    </div>
                    <div class="vod-body">
                        <div class="vod-title">${vod.title}</div>
                        <div class="vod-tags">
                            ${vod.isPlus ? '<span class="tag tag-plus">구독+</span>' : ''}
                            ${vod.gameName && vod.gameName !== '-' ? `<span class="tag tag-game">🎮 ${vod.gameName}</span>` : ''}
                            ${vod.songName && vod.songName !== '-' ? `<span class="tag tag-song">🎵 SONG</span>` : ''}
                            <span class="tag tag-category">${vod.category}</span>
                        </div>
                    </div>
                </a>
            `).join('');

            groupDiv.innerHTML = `
                <div class="date-header">${date}</div>
                <div class="vod-list">${itemsHtml}</div>
            `;
            container.appendChild(groupDiv);
        });
    }
</script>
</body>
</html>
