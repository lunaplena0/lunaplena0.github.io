<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 다시보기 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
            --plus-color: #ffcc00;
            --modal-bg: rgba(0, 0, 0, 0.9);
            
            --cls-game: #4a33ff;
            --cls-song: #ff3385;
            --cls-talk: #33cc85;
            --cls-full: #ff8800;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #010306 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
        }
        body.modal-open { overflow: hidden; }

        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }

        .header-card { 
            background: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); }
        .update-now { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-item { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-value { display: block; font-size: 18px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-sub); }

        .date-group { margin-top: 30px; }
        .date-header { font-size: 18px; font-weight: bold; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .date-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        .vod-list { display: flex; flex-direction: column; gap: 10px; }
        .vod-item {
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
            display: flex; overflow: hidden; transition: 0.2s; cursor: pointer;
        }
        .vod-item:hover { border-color: var(--accent); background: rgba(51, 133, 255, 0.05); }

        .vod-thumb { width: 160px; min-width: 160px; height: 90px; position: relative; }
        .vod-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 4px; border-radius: 3px; }

        .vod-body { padding: 12px 15px; flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .vod-title { font-size: 15px; font-weight: bold; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .tag-plus { background: var(--plus-color); color: #000; }

        /* 팝업 모달 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg); display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px; backdrop-filter: blur(8px);
        }
        #modal-content {
            background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 24px;
            border: 1px solid var(--border); overflow: hidden; position: relative;
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .modal-header-img { width: 100%; height: 200px; object-fit: cover; }
        .modal-body { padding: 25px; }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        
        .modal-info-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .info-row { border-left: 3px solid #1a202c; padding-left: 15px; display: none; }
        .info-row.is-active { display: block; }
        .info-label { font-size: 11px; color: var(--text-sub); display: block; margin-bottom: 4px; font-weight: bold; }
        .info-value { font-size: 14px; color: var(--text-main); line-height: 1.6; }
        
        .badge-cat { padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; color: #fff; display: inline-block; margin-top: 5px; }
        .time-badge { color: var(--accent); font-weight: bold; font-family: monospace; }

        .modal-footer { display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; font-size: 14px; }
        .btn-go { background: var(--accent); color: white; }
        .btn-close { background: #1a202c; color: var(--text-sub); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>바다비 다시보기</h1>
            <div id="update-time" class="update-now">데이터를 불러오는 중...</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><span class="stat-value" id="stat-total">0</span><span class="stat-label">전체 영상</span></div>
        <div class="stat-item"><span class="stat-value" id="stat-game">0</span><span class="stat-label">게임 방송</span></div>
        <div class="stat-item"><span class="stat-value" id="stat-song">0</span><span class="stat-label">노래 방송</span></div>
    </div>

    <div id="vod-content"></div>
</div>

<div id="modal-overlay">
    <div id="modal-content">
        <img id="m-thumb" class="modal-header-img" src="" alt="Thumbnail">
        <div class="modal-body">
            <div id="m-title" class="modal-title"></div>
            <div class="modal-info-grid">
                <div class="info-row is-active">
                    <span class="info-label">📅 방송 일시</span>
                    <span id="m-date" class="info-value"></span>
                </div>
                <div id="row-category" class="info-row">
                    <span class="info-label">📝 컨텐츠 분류</span>
                    <span id="m-category" class="info-value"></span>
                </div>
                <div id="row-game" class="info-row">
                    <span class="info-label">🎮 게임 타임라인</span>
                    <span id="m-game" class="info-value"></span>
                </div>
                <div id="row-song" class="info-row">
                    <span class="info-label">🎵 노래 목록</span>
                    <span id="m-song" class="info-value"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-action btn-close" onclick="closeModal()">닫기</button>
                <a id="m-link" href="#" target="_blank" class="btn-action btn-go">영상 시청하기 ↗</a>
            </div>
        </div>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv";
    
    const hasValue = (val) => val && val.trim() !== "" && val !== "-";

    // 데이터 병합 및 포맷팅 (이름, 이름 + 시간, 시간 -> 이름 (시간))
    function combineData(names, times) {
        if (!hasValue(names)) return "";
        let nameArr = names.split(',');
        let timeArr = hasValue(times) ? times.split(',') : [];

        return nameArr.map((name, idx) => {
            let t = timeArr[idx] ? ` <span class="time-badge">(${timeArr[idx].trim()})</span>` : "";
            return `${name.trim()}${t}`;
        }).join('<br>');
    }

    function getCategoryStyle(cat) {
        if (cat.includes("게임")) return "background: var(--cls-game);";
        if (cat.includes("노래")) return "background: var(--cls-song);";
        if (cat.includes("소통")) return "background: var(--cls-talk);";
        if (cat.includes("풀트")) return "background: var(--cls-full);";
        return "background: #5c7285;";
    }

    window.onload = () => {
        fetch(sheetUrl + `&t=${new Date().getTime()}`)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(line => line.trim() !== "");
                let vods = [];

                for (let i = 1; i < lines.length; i++) {
                    const p = lines[i].split('\t').map(item => item.trim());
                    if(!p[0]) continue;
                    
                    // 이미지 구조에 기반한 인덱스 매칭
                    vods.push({
                        date: p[0],      // A: 날짜
                        title: p[1],     // B: 제목
                        link: p[2],      // C: 링크
                        thumb: p[3],     // D: 썸네일
                        totalTime: p[4], // E: 다시보기 총 시간
                        isPlus: p[5] === '예', // F: 구독플러스여부
                        gName: p[6],     // G: 게임명
                        gTime: p[7],     // H: 게임일시 시간
                        sName: p[8],     // I: 노래명
                        sTime: p[9],     // J: 노래일시 시간
                        category: p[10]  // K: 컨텐츠
                    });
                }
                vods.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderList(vods);
                updateStats(vods);
                document.getElementById('update-time').textContent = `Update: ${new Date().toLocaleString()}`;
            });
    };

    function renderList(data) {
        const container = document.getElementById('vod-content');
        container.innerHTML = '';
        const groups = {};
        data.forEach(v => { if(!groups[v.date]) groups[v.date] = []; groups[v.date].push(v); });

        Object.keys(groups).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'date-group';
            groupDiv.innerHTML = `<div class="date-header">${date}</div><div class="vod-list"></div>`;
            
            groups[date].forEach(vod => {
                const item = document.createElement('div');
                item.className = 'vod-item';
                item.onclick = () => openModal(vod);
                const plusTag = vod.isPlus ? '<span class="tag tag-plus">구독+</span>' : '';

                item.innerHTML = `
                    <div class="vod-thumb"><img src="${vod.thumb}"><span class="duration">${vod.totalTime}</span></div>
                    <div class="vod-body">
                        <div class="vod-title">${vod.title}</div>
                        <div>${plusTag}<span style="font-size:10px; color:var(--text-sub);">${vod.category}</span></div>
                    </div>`;
                groupDiv.querySelector('.vod-list').appendChild(item);
            });
            container.appendChild(groupDiv);
        });
    }

    function openModal(vod) {
        document.getElementById('m-thumb').src = vod.thumb;
        document.getElementById('m-title').textContent = vod.title;
        document.getElementById('m-date').textContent = `${vod.date} (${vod.totalTime})`;
        document.getElementById('m-link').href = vod.link;

        // 분류 표시
        const rowCat = document.getElementById('row-category');
        if(hasValue(vod.category)) {
            rowCat.classList.add('is-active');
            document.getElementById('m-category').innerHTML = `<span class="badge-cat" style="${getCategoryStyle(vod.category)}">${vod.category}</span>`;
        } else { rowCat.classList.remove('is-active'); }

        // 게임 및 노래 병합 표시
        const setRow = (rowId, valId, name, time) => {
            const row = document.getElementById(rowId);
            if(hasValue(name)) {
                row.classList.add('is-active');
                document.getElementById(valId).innerHTML = combineData(name, time);
            } else { row.classList.remove('is-active'); }
        };

        setRow('row-game', 'm-game', vod.gName, vod.gTime);
        setRow('row-song', 'm-song', vod.sName, vod.sTime);

        document.getElementById('modal-overlay').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.body.classList.remove('modal-open');
    }

    document.getElementById('modal-overlay').onclick = (e) => { if(e.target.id === 'modal-overlay') closeModal(); };

    function updateStats(data) {
        document.getElementById('stat-total').textContent = data.length;
        document.getElementById('stat-game').textContent = data.filter(d => d.category.includes("게임")).length;
        document.getElementById('stat-song').textContent = data.filter(d => d.category.includes("노래")).length;
    }
</script>
</body>
</html>
