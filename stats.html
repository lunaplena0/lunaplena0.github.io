<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>노래 통계 분석</title>
    <style>
        /* songlist.html과 유사한 다크 모드 스타일 적용 */
        .stats-container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .stats-card { background: #18181b; border-radius: 16px; padding: 25px; border: 1px solid #2f2f35; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #26262c; color: #efeff1; }
        th { color: #9147ff; font-size: 14px; }
        .count-badge { background: #26262c; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="stats-container">
        <div class="stats-card">
            <h2>📊 가수별 가창 통계</h2>
            <table>
                <thead>
                    <tr>
                        <th>가수명</th>
                        <th>보유 곡 수</th>
                        <th>누적 가창 횟수</th>
                        <th>마지막 가창일</th>
                    </tr>
                </thead>
                <tbody id="stats-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";

        async function loadStats() {
            const res = await fetch(sheetUrl);
            const csv = await res.text();
            const lines = csv.split('\n').slice(1); // 헤더 제외

            const artistMap = {};

            lines.forEach(line => {
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/"/g, '').trim());
                if (parts.length < 2) return;

                const title = parts[0];
                const artist = parts[1] || "Unknown";
                const singCount = parseInt(parts[3]) || 0; // 시트의 4번째 열이 '횟수'라고 가정
                const lastDate = parts[4] || "-";         // 시트의 5번째 열이 '날짜'라고 가정

                if (!artistMap[artist]) {
                    artistMap[artist] = { songCount: 0, totalSing: 0, lastSing: "-" };
                }

                artistMap[artist].songCount += 1;
                artistMap[artist].totalSing += singCount;
                
                // 가장 최근 날짜 비교 (단순 문자열 비교 또는 날짜 객체 변환 필요)
                if (lastDate !== "-" && (artistMap[artist].lastSing === "-" || lastDate > artistMap[artist].lastSing)) {
                    artistMap[artist].lastSing = lastDate;
                }
            });

            renderStats(artistMap);
        }

        function renderStats(artistMap) {
            const tbody = document.getElementById('stats-body');
            // 가창 횟수 많은 순으로 정렬
            const sortedArtists = Object.entries(artistMap).sort((a, b) => b[1].totalSing - a[1].totalSing);

            tbody.innerHTML = sortedArtists.map(([name, data]) => `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td><span class="count-badge">${data.songCount}곡</span></td>
                    <td>${data.totalSing}회</td>
                    <td style="color: #adadb8; font-size: 13px;">${data.lastSing}</td>
                </tr>
            `).join('');
        }

        window.onload = loadStats;
    </script>
</body>
</html>
