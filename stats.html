<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 노래 통계</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
        }

        .wrapper { width: 100%; max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #2f2f35; }
        .header h1 { font-size: 24px; margin: 0; color: var(--accent); }
        .back-btn { padding: 8px 16px; background: #26262c; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; }

        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* 카드 스타일 */
        .stats-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; padding: 20px; overflow: hidden; position: relative; }

        /* 테이블 공통 */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1f1f23; padding: 12px; text-align: left; color: var(--text-sub); font-weight: normal; border-bottom: 2px solid #2f2f35; }
        td { padding: 12px; border-bottom: 1px solid #26262c; }
        
        /* 배지 스타일 */
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; background: #2f2f35; color: var(--text-sub); }
        .count-text { color: var(--accent); font-weight: bold; }

        /* 더보기/접기 버튼 스타일 */
        .toggle-btn {
            width: 100%;
            padding: 12px;
            background: #1f1f23;
            border: none;
            color: var(--accent);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-top: 1px solid #2f2f35;
            transition: 0.2s;
            display: none;
        }
        .toggle-btn:hover { background: #26262c; }

        @media (max-width: 600px) {
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>📊 바다비 노래 통계</h1>
        <a href="songlist.html" class="back-btn">⬅ 노래책으로</a>
    </div>

    <div id="artist-section">
        <div class="section-title">🎤 가수별 보유 곡 현황</div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr>
                        <th>가수명</th>
                        <th>보유 곡 수</th>
                        <th>누적 가창 횟수</th>
                        <th>최근 가창일</th>
                    </tr>
                </thead>
                <tbody id="artist-stats-body">
                    <tr><td colspan="4" style="text-align:center;">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
            <button id="artist-toggle" class="toggle-btn" onclick="toggleDisplay('artist')">▼ 더보기</button>
        </div>
    </div>

    <div id="song-section">
        <div class="section-title">🎵 노래별 상세 기록</div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr>
                        <th>노래 제목</th>
                        <th>가수</th>
                        <th>가창 횟수</th>
                        <th>마지막 기록</th>
                    </tr>
                </thead>
                <tbody id="song-detail-body"></tbody>
            </table>
            <button id="song-toggle" class="toggle-btn" onclick="toggleDisplay('song')">▼ 더보기</button>
        </div>
    </div>
</div>

<script>
    const BOOK_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIfrVC6MakrvA_D8rsQeTT6oaX_0w4bc8I_aaJuoQi4g_AuuvFi-nCP_lnHwvoSAsFKxagrzhoPy_J/pub?gid=0&single=true&output=tsv";
    
    let fullArtistData = [];
    let fullSongData = [];
    let isArtistExpanded = false;
    let isSongExpanded = false;

    async function initStats() {
        try {
            const bookRes = await fetch(BOOK_SHEET_URL);
            const tsvText = await bookRes.text();
            
            // 줄바꿈으로 나누고 빈 줄 제거
            const lines = tsvText.split('\n').filter(line => line.trim() !== "");
            const dataLines = lines.slice(1); // 헤더 제외

            const artistMap = new Map(); 
            const songArray = [];   

            dataLines.forEach((line) => {
                const parts = line.split('\t').map(item => item.trim());

                if (parts.length >= 2 && parts[0] !== "") {
                    const title = parts[0];
                    const artist = parts[1] || "Unknown";

                    // 1. 노래 데이터 수집
                    songArray.push({
                        title: title,
                        artist: artist,
                        count: 0, // 나중에 RECORD_SHEET 데이터가 연결되면 이 값이 변합니다.
                        lastDate: "-"
                    });
                    
                    // 2. 가수 데이터 수집
                    if (!artistMap.has(artist)) {
                        artistMap.set(artist, { songCount: 0, totalSing: 0, lastSing: "-" });
                    }
                    artistMap.get(artist).songCount++; 
                }
            });

            // [정렬 로직 추가]
            // 가수별: 보유 곡 수(songCount)가 많은 순서대로 정렬
            fullArtistData = Array.from(artistMap.entries()).sort((a, b) => b[1].songCount - a[1].songCount);

            // 노래별: 가창 횟수(count)가 많은 순서대로 정렬
            fullSongData = songArray.sort((a, b) => b.count - a.count);

            render('artist');
            render('song');

        } catch (e) {
            console.error("데이터 로드 실패:", e);
            document.getElementById('artist-stats-body').innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
        }
    }

    function render(type) {
        const isExpanded = type === 'artist' ? isArtistExpanded : isSongExpanded;
        const data = type === 'artist' ? fullArtistData : fullSongData;
        const tbody = document.getElementById(`${type === 'artist' ? 'artist-stats-body' : 'song-detail-body'}`);
        const btn = document.getElementById(`${type}-toggle`);

        const displayData = isExpanded ? data : data.slice(0, 5);
        
        if (data.length > 5) {
            btn.style.display = 'block';
            btn.innerText = isExpanded ? '▲ 접기' : `▼ 더보기 (${data.length - 5}개 더 있음)`;
        }

        if (type === 'artist') {
            tbody.innerHTML = displayData.map(([name, info]) => `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td><span class="count-text">${info.songCount}</span> 곡</td>
                    <td>${info.totalSing} 회</td>
                    <td><span class="badge">${info.lastSing}</span></td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = displayData.map(song => `
                <tr>
                    <td>${song.title}</td>
                    <td style="color:var(--text-sub);">${song.artist}</td>
                    <td><span class="count-text">${song.count}</span> 회</td>
                    <td style="font-size:12px; color:var(--text-sub);">${song.lastDate}</td>
                </tr>
            `).join('');
        }
    }

    function toggleDisplay(type) {
        if (type === 'artist') isArtistExpanded = !isArtistExpanded;
        else isSongExpanded = !isSongExpanded;
        render(type);
    }

    window.onload = initStats;
</script>
</body>
</html>
