<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 노래 통계</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 로딩 오버레이 스타일 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(1, 3, 6, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loader-circle {
            width: 50px;
            height: 50px;
            border: 3px solid #003366;
            border-top: 3px solid #3385ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(51, 133, 255, 0.3);
        }

        .loader-text {
            color: #3385ff;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent-bright: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
            --modal-overlay: rgba(0, 0, 0, 0.9);
            --input-bg: #0a1a30;
        }

        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at center, #051020 0%, #010306 100%);
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
            min-height: 100vh;
            overflow: hidden; /* 로딩 중 스크롤 방지 */
        }

        .wrapper { width: 100%; max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 24px; margin: 0; color: var(--accent-bright); }
        .back-btn { padding: 8px 16px; background: #0a1a30; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid var(--border); transition: 0.3s; }
        .back-btn:hover { background: var(--accent-bright); border-color: var(--accent-bright); color: #fff; }

        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--accent-bright); border-left: 4px solid var(--accent-bright); padding-left: 10px; }
        .search-container { margin-bottom: 15px; position: relative; }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
        }
        .search-input:focus { border-color: var(--accent-bright); box-shadow: 0 0 10px rgba(51, 133, 255, 0.2); }

        .stats-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); padding: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

        /* --- 테이블 스타일 시작 (기존 스타일을 이 내용으로 교체하세요) --- */
table { 
    width: 100%; 
    border-collapse: collapse; 
    font-size: 14px; 
    table-layout: fixed; /* 전체 테이블 열 너비 고정 */
}

th { 
    background: #0a1425; 
    padding: 12px; 
    text-align: left; 
    color: var(--accent-bright); 
    font-weight: bold; 
    border-bottom: 2px solid var(--border); 
    text-transform: uppercase; 
    letter-spacing: 1px; 
}

td { 
    padding: 12px; 
    border-bottom: 1px solid var(--border); 
    cursor: pointer; 
    transition: 0.2s;
    /* 텍스트가 너무 길면 '...'으로 처리하여 비율 유지 */
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

tr:hover td { 
    background: rgba(255, 255, 255, 0.03); 
}

/* --- 각 섹션별 구체적인 열 너비 고정 (추가) --- */

/* 1. 가수별 통계 테이블 비율 */
#artist-section th:nth-child(1), #artist-section td:nth-child(1) { width: 40%; } /* 가수명 */
#artist-section th:nth-child(2), #artist-section td:nth-child(2) { width: 20%; } /* 곡 수 */
#artist-section th:nth-child(3), #artist-section td:nth-child(3) { width: 20%; } /* 가창 횟수 */
#artist-section th:nth-child(4), #artist-section td:nth-child(4) { width: 20%; } /* 날짜 */

/* 2. 노래별 상세 기록 테이블 비율 */
#song-section th:nth-child(1), #song-section td:nth-child(1) { width: 45%; } /* 제목 */
#song-section th:nth-child(2), #song-section td:nth-child(2) { width: 25%; } /* 가수 */
#song-section th:nth-child(3), #song-section td:nth-child(3) { width: 15%; } /* 횟수 */
#song-section th:nth-child(4), #song-section td:nth-child(4) { width: 15%; } /* 날짜 */

/* 모바일 화면에서 열 너비 재조정 */
@media (max-width: 600px) {
    th:nth-child(4), td:nth-child(4) { display: none; } /* 4번째 열 숨김 */
    #artist-section th:nth-child(1), #artist-section td:nth-child(1) { width: 50%; }
    #song-section th:nth-child(1), #song-section td:nth-child(1) { width: 60%; }
}
/* --- 테이블 스타일 끝 --- */
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; background: #0a1a30; color: var(--text-sub); border: 1px solid var(--border); }
        .count-text { color: var(--accent-bright); font-weight: bold; }

        .tag-badge { display: inline-block; padding: 2px 9px; border-radius: 50px; font-size: 10px; font-weight: bold; margin-left: 8px; color: white; vertical-align: middle; }
        .tag-200 { background-color: #d32f2f; }
        .tag-300 { background-color: #f57c00; }
        .tag-기타 { background-color: #2e7d32; }
        .tag-default { background-color: #455a64; }

        .toggle-btn {
            width: 100%; padding: 12px; background: #0a1425; border: none; color: var(--accent-bright);
            font-size: 13px; font-weight: bold; cursor: pointer; border-top: 1px solid var(--border); display: none; transition: 0.3s;
        }
        .toggle-btn:hover { background: #0a1a30; color: #fff; }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: var(--modal-overlay); align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 500px; border-radius: 20px;
            border: 1px solid var(--border); position: relative; animation: slideUp 0.3s ease; 
            max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); background: var(--card-bg); z-index: 10; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
        .modal-header h2 { margin: 0; font-size: 18px; color: var(--accent-bright); }
        .modal-header .sub-info { font-size: 13px; color: var(--text-sub); margin-top: 5px; }
        .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; -ms-overflow-style: none; scrollbar-width: none; }
        .modal-body::-webkit-scrollbar { display: none; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .detail-item:last-child { border-bottom: none; }
        .top-close-btn { padding: 6px 14px; background: #0a1a30; border: 1px solid var(--border); border-radius: 8px; color: var(--text-sub); font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-left: 15px; white-space: nowrap; }
        .top-close-btn:hover { background: #d32f2f; border-color: #d32f2f; color: #fff; }

        @media (max-width: 600px) {
    /* 4번째 열(날짜) 숨기기 */
    th:nth-child(4), td:nth-child(4) { display: none; } 
    
    /* 가수 섹션: 가수명 40% / 곡 수 30% / 가창 횟수 30% */
    #artist-section th:nth-child(1), #artist-section td:nth-child(1) { width: 40%; }
    #artist-section th:nth-child(2), #artist-section td:nth-child(2) { width: 30%; }
    #artist-section th:nth-child(3), #artist-section td:nth-child(3) { width: 30%; } 

    /* 노래 섹션: 제목 50% / 가수 30% / 횟수 20% */
    #song-section th:nth-child(1), #song-section td:nth-child(1) { width: 50%; }
    #song-section th:nth-child(2), #song-section td:nth-child(2) { width: 30%; }
    #song-section th:nth-child(3), #song-section td:nth-child(3) { width: 20%; }
}
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader-circle"></div>
    <div class="loader-text">기록을 정리하고 있어요 . . .</div>
</div>

<div class="wrapper">
    <div class="header">
        <h1>📊 바다비 노래 통계</h1>
        <a href="songlist.html" class="back-btn">⬅ 노래책으로</a>
    </div>

    <div id="artist-section">
        <div class="section-title">🎤 가수별 보유 곡 현황</div>
        <div class="search-container">
            <input type="text" id="artist-search" class="search-input" placeholder="가수 이름을 검색하세요..." oninput="onSearch('artist')">
        </div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr>
                        <th>가수명</th>
                        <th onclick="setArtistSort('songCount')" style="cursor:pointer; color:var(--accent-bright);">노래 <span id="sort-icon-count">▼</span></th>
                        <th onclick="setArtistSort('totalSing')" style="cursor:pointer; color:var(--accent-bright);">횟수 <span id="sort-icon-sing"></span></th>
                        <th>최근 가창일</th>
                    </tr>
                </thead>
                <tbody id="artist-stats-body"></tbody>
            </table>
            <button id="artist-toggle" class="toggle-btn" onclick="toggleDisplay('artist')">더보기</button>
        </div>
    </div>

    <div id="song-section">
        <div class="section-title">🎵 노래별 상세 기록</div>
        <div class="search-container">
            <input type="text" id="song-search" class="search-input" placeholder="노래 제목 또는 가수를 검색하세요..." oninput="onSearch('song')">
        </div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr><th>노래 제목</th><th>가수</th><th>횟수</th><th>마지막 기록</th></tr>
                </thead>
                <tbody id="song-detail-body"></tbody>
            </table>
            <button id="song-toggle" class="toggle-btn" onclick="toggleDisplay('song')">더보기</button>
        </div>
    </div>
    <footer style="text-align: center; padding: 15px 20px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 5px;">
        <p style="margin: 0; opacity: 0.7;">팬심으로 제작된 비영리페이지입니다.</p>
    </footer>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h2 id="modal-title">-</h2>
                <div id="modal-subtitle" class="sub-info">-</div>
            </div>
            <button class="top-close-btn" onclick="closeModal()">닫기</button>
        </div>
        <div class="modal-body" id="modal-list"></div>
    </div>
</div>

<script>
    const BOOK_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIfrVC6MakrvA_D8rsQeTT6oaX_0w4bc8I_aaJuoQi4g_AuuvFi-nCP_lnHwvoSAsFKxagrzhoPy_J/pub?gid=0&single=true&output=tsv";
    const STAT_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vReuzG6rmwJOtpxrYtHJELuVxn3BJcW_YWhIrW27Ad5W2W6t__IxlPomhGw5c1j6z8GAPKYz7QCEsYx/pub?gid=1357240589&single=true&output=tsv";
    
    let fullArtistData = [];
    let fullSongData = [];
    let isArtistExpanded = false;
    let isSongExpanded = false;
    let artistSearchQuery = "";
    let songSearchQuery = "";
    let artistSortTarget = 'songCount';

    function parseTitleWithTag(originalTitle) {
        const tagMatch = originalTitle.match(/^\[([^\]]+)\]/);
        let displayTitle = originalTitle;
        let tagHtml = '';
        if (tagMatch) {
            const fullTag = tagMatch[0];
            const tagText = tagMatch[1];
            displayTitle = originalTitle.replace(fullTag, '').trim();
            let tagClass = 'tag-default';
            if (tagText.includes("200")) tagClass = 'tag-200';
            else if (tagText.includes("300")) tagClass = 'tag-300';
            else if (tagText.includes("기타")) tagClass = 'tag-기타';
            tagHtml = `<span class="tag-badge ${tagClass}">${tagText}</span>`;
        }
        return `${displayTitle}${tagHtml}`;
    }

    function setArtistSort(target) {
        artistSortTarget = target;
        document.getElementById('sort-icon-count').innerText = target === 'songCount' ? '▼' : '';
        document.getElementById('sort-icon-sing').innerText = target === 'totalSing' ? '▼' : '';
        render('artist');
    }

    async function initStats() {
    const overlay = document.getElementById('loading-overlay');
    try {
        const cacheBuster = `&t=${new Date().getTime()}`;
        const [bookRes, statRes] = await Promise.all([
            fetch(BOOK_SHEET_URL + cacheBuster),
            fetch(STAT_SHEET_URL + cacheBuster)
        ]);

        const bookText = await bookRes.text();
        const statText = await statRes.text();

        // 빈 줄을 제외하되, 데이터가 있는 모든 행을 가져옵니다.
        const parseTSV = (text) => text.split(/\r?\n/).filter(line => line.trim() !== "");
        
        // 헤더를 제외한 실제 데이터 행
        const bookLines = parseTSV(bookText).slice(1);
        const statLines = parseTSV(statText).slice(1);

        const artistMap = new Map(); 
        const songMap = new Map();

        bookLines.forEach((line, index) => { // index 추가
    const parts = line.split('\t').map(item => item.trim());
    
    if (parts[0]) { // 제목만 있으면 일단 통과
        const title = parts[0];
        const artist = parts[1] || "미지정";
        const dateRaw = parts[2] || "";
        const history = dateRaw ? dateRaw.split(',').map(d => d.trim()).filter(d => d !== "") : [];
        
        // [수정] 제목+가수 대신 '순서+제목'을 키로 사용하여 중복 방지
        const uniqueKey = `${index}_${title}`; 
        
        songMap.set(uniqueKey, { 
            title, 
            artist, 
            history: [...history], 
            count: history.length 
        });
    }
});

        statLines.forEach((line) => {
    const parts = line.split('\t').map(item => item.trim());
    if (parts[0]) { // 제목만 있어도 실행
        const title = parts[0];
        const artist = parts[1] || "미지정";
        const sHistory = parts[2] ? parts[2].split(',').map(d => d.trim()).filter(d => d !== "") : [];
        
        // 중요: songMap을 순회하며 제목과 가수가 일치하는 모든 항목에 기록 추가
        // (중복 제목이 있을 수 있으므로 uniqueKey 대신 제목+가수로 매칭)
        for (let song of songMap.values()) {
            if (song.title === title && song.artist === artist) {
                song.history = [...new Set([...song.history, ...sHistory])].sort();
                song.count = song.history.length;
            }
        }
    }
});

        fullSongData = Array.from(songMap.values()).map(song => {
            const lastDate = song.count > 0 ? song.history[song.history.length - 1] : "-";
            
            if (!artistMap.has(song.artist)) {
                artistMap.set(song.artist, { songCount: 0, totalSing: 0, lastSing: "-" });
            }
            
            const aData = artistMap.get(song.artist);
            aData.songCount += 1;
            aData.totalSing += song.count;
            
            if (lastDate !== "-" && (aData.lastSing === "-" || lastDate > aData.lastSing)) {
                aData.lastSing = lastDate;
            }
            return { ...song, lastDate };
        }).sort((a, b) => b.count - a.count);

        fullArtistData = Array.from(artistMap.entries());
        
        render('artist');
        render('song');

    } catch (e) {
        console.error("데이터 로드 오류:", e);
        document.getElementById('artist-stats-body').innerHTML = `<tr><td colspan="4" style="text-align:center;">데이터 파싱 중 오류가 발생했습니다.</td></tr>`;
    } finally {
        setTimeout(() => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
                document.body.style.overflow = 'auto';
            }, 500);
        }, 800);
    }
}
    function onSearch(type) {
        if (type === 'artist') artistSearchQuery = document.getElementById('artist-search').value.toLowerCase();
        else songSearchQuery = document.getElementById('song-search').value.toLowerCase();
        render(type);
    }

    function render(type) {
        const isExpanded = type === 'artist' ? isArtistExpanded : isSongExpanded;
        const query = type === 'artist' ? artistSearchQuery : songSearchQuery;
        let data = type === 'artist' ? [...fullArtistData] : [...fullSongData];

        if (query) {
            if (type === 'artist') data = data.filter(([name]) => name.toLowerCase().includes(query));
            else data = data.filter(s => s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query));
        }

        if (type === 'artist') data.sort((a, b) => b[1][artistSortTarget] - a[1][artistSortTarget]);

        const tbody = document.getElementById(type === 'artist' ? 'artist-stats-body' : 'song-detail-body');
        const btn = document.getElementById(`${type}-toggle`);
        const displayData = (isExpanded || query) ? data : data.slice(0, 5);
        
        btn.style.display = (data.length > 5 && !query) ? 'block' : 'none';
        if (btn.style.display === 'block') btn.innerText = isExpanded ? '▲ 접기' : `▼ 더보기 (${data.length - 5}개)`;

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-sub); padding:30px;">결과가 없습니다.</td></tr>`;
            return;
        }

        tbody.innerHTML = displayData.map(item => {
            if (type === 'artist') {
                const [name, info] = item;
                return `<tr onclick="showArtistDetail('${name.replace(/'/g, "\\'")}')">
                    <td><strong>${name}</strong></td>
                    <td><span class="count-text">${info.songCount}</span> 곡</td>
                    <td>${info.totalSing} 회</td>
                    <td><span class="badge">${info.lastSing}</span></td>
                </tr>`;
            } else {
                return `<tr onclick="showSongDetail('${item.title.replace(/'/g, "\\'")}', '${item.artist.replace(/'/g, "\\'")}')">
                    <td>${parseTitleWithTag(item.title)}</td>
                    <td style="color:var(--text-sub);">${item.artist}</td>
                    <td><span class="count-text">${item.count}</span> 회</td>
                    <td style="font-size:12px; color:var(--text-sub);">${item.lastDate}</td>
                </tr>`;
            }
        }).join('');
    }

    function showArtistDetail(name) {
        const item = fullArtistData.find(a => a[0] === name);
        if(!item) return;
        document.getElementById('modal-title').innerText = `🎤 ${name}`;
        document.getElementById('modal-subtitle').innerText = `보유: ${item[1].songCount}곡 / 총 가창: ${item[1].totalSing}회`;
        document.getElementById('modal-list').innerHTML = fullSongData.filter(s => s.artist === name).map(s => `
            <div class="detail-item"><span>${parseTitleWithTag(s.title)}</span><span class="count-text">${s.count}회</span></div>
        `).join('');
        document.getElementById('detailModal').style.display = 'flex';
    }

    function showSongDetail(title, artist) {
        const song = fullSongData.find(s => s.title === title && s.artist === artist);
        if(!song) return;
        document.getElementById('modal-title').innerHTML = `🎵 ${parseTitleWithTag(song.title)}`;
        document.getElementById('modal-subtitle').innerText = `가수: ${song.artist} / 총 ${song.count}회 가창`;
        document.getElementById('modal-list').innerHTML = song.history.length > 0 ? song.history.map(d => `
            <div class="detail-item"><span>가창 기록</span><span class="badge">${d}</span></div>
        `).join('') : `<div style="text-align:center; padding:20px; color:var(--text-sub);">기록 없음</div>`;
        document.getElementById('detailModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
    window.onclick = e => { if (e.target == document.getElementById('detailModal')) closeModal(); }
    function toggleDisplay(type) {
        if (type === 'artist') isArtistExpanded = !isArtistExpanded;
        else isSongExpanded = !isSongExpanded;
        render(type);
    }
    window.onload = initStats;
</script>
</body>
</html>
