<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>노래 통계 분석</title>
    <style>
        /* songlist.html과 유사한 다크 모드 스타일 적용 */
        .stats-container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .stats-card { background: #18181b; border-radius: 16px; padding: 25px; border: 1px solid #2f2f35; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #26262c; color: #efeff1; }
        th { color: #9147ff; font-size: 14px; }
        .count-badge { background: #26262c; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="stats-container">
        <div class="stats-card">
            <h2>📊 가수별 가창 통계</h2>
            <table>
                <thead>
                    <tr>
                        <th>가수명</th>
                        <th>보유 곡 수</th>
                        <th>누적 가창 횟수</th>
                        <th>마지막 가창일</th>
                    </tr>
                </thead>
                <tbody id="stats-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
// 시트 주소 설정
const BOOK_SHEET_URL = "https://docs.google.com/spreadsheets/d/1q_P96q2ZwvFRToZ4GAv_0EKVOcLRTR-Y392610eAV04/gviz/tq?tqx=out:csv";
const RECORD_SHEET_URL = "나중에_만들_가창기록_시트_주소";

async function buildStats() {
    // 1. 두 시트의 데이터를 동시에 가져옴
    const [bookRes, recordRes] = await Promise.all([
        fetch(BOOK_SHEET_URL).then(res => res.text()),
        fetch(RECORD_SHEET_URL).then(res => res.text())
    ]);

    const artistStats = {}; // { "가수명": { songs: [], totalSing: 0, lastDate: "" } }

    // 2. 노래책 시트 분석 (가수별 보유 곡 목록 생성)
    const bookRows = bookRes.split('\n').slice(1);
    bookRows.forEach(row => {
        const [title, artist] = parseRow(row); // 행 파싱 함수(쉼표/탭 구분)
        if (!artistStats[artist]) {
            artistStats[artist] = { songs: [], totalSing: 0, lastDate: "-" };
        }
        artistStats[artist].songs.push(title);
    });

    // 3. 가창 기록 시트 분석 (곡 제목으로 가수 찾아서 횟수/날짜 누적)
    const recordRows = recordRes.split('\n').slice(1);
    recordRows.forEach(row => {
        const [title, date, count] = parseRow(row); // 제목, 날짜, 횟수
        
        // 모든 가수를 돌며 해당 곡을 가진 가수를 찾음
        for (const artist in artistStats) {
            if (artistStats[artist].songs.includes(title)) {
                artistStats[artist].totalSing += parseInt(count || 0);
                // 최근 날짜 갱신
                if (artistStats[artist].lastDate === "-" || date > artistStats[artist].lastDate) {
                    artistStats[artist].lastDate = date;
                }
                break; 
            }
        }
    });

    renderTable(artistStats);
}

        function renderStats(artistMap) {
            const tbody = document.getElementById('stats-body');
            // 가창 횟수 많은 순으로 정렬
            const sortedArtists = Object.entries(artistMap).sort((a, b) => b[1].totalSing - a[1].totalSing);

            tbody.innerHTML = sortedArtists.map(([name, data]) => `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td><span class="count-badge">${data.songCount}곡</span></td>
                    <td>${data.totalSing}회</td>
                    <td style="color: #adadb8; font-size: 13px;">${data.lastSing}</td>
                </tr>
            `).join('');
        }

        window.onload = loadStats;
    </script>
</body>
</html>
