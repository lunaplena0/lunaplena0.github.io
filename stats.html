<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 노래 통계</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #9147ff;
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --modal-overlay: rgba(0, 0, 0, 0.85);
            --input-bg: #26262c;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 20px;
        }

        .wrapper { width: 100%; max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #2f2f35; }
        .header h1 { font-size: 24px; margin: 0; color: var(--accent); }
        .back-btn { padding: 8px 16px; background: #26262c; border-radius: 8px; color: var(--text-main); text-decoration: none; font-size: 13px; border: 1px solid #3a3a3d; }

        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .search-container { margin-bottom: 15px; position: relative; }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid #3a3a3d;
            border-radius: 10px;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(145, 71, 255, 0.2); }

        .stats-card { background: var(--card-bg); border-radius: 16px; border: 1px solid #2f2f35; padding: 20px; overflow: hidden; position: relative; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1f1f23; padding: 12px; text-align: left; color: var(--text-sub); font-weight: normal; border-bottom: 2px solid #2f2f35; }
        td { padding: 12px; border-bottom: 1px solid #26262c; cursor: pointer; transition: 0.2s; }
        tr:hover td { background: #1f1f23; }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; background: #2f2f35; color: var(--text-sub); }
        .count-text { color: var(--accent); font-weight: bold; }

        .toggle-btn {
            width: 100%; padding: 12px; background: #1f1f23; border: none; color: var(--accent);
            font-size: 13px; font-weight: bold; cursor: pointer; border-top: 1px solid #2f2f35; display: none;
        }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: var(--modal-overlay); align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 500px; border-radius: 20px;
            border: 1px solid #3a3a3d; position: relative; animation: slideUp 0.3s ease; max-height: 80vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { padding: 20px; border-bottom: 1px solid #2f2f35; position: sticky; top: 0; background: var(--card-bg); z-index: 10; }
        .modal-header h2 { margin: 0; font-size: 18px; color: var(--accent); }
        .modal-header .sub-info { font-size: 13px; color: var(--text-sub); margin-top: 5px; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: var(--text-sub); }
        .modal-body { padding: 20px; }
        .detail-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #26262c; font-size: 14px; }
        .detail-item:last-child { border-bottom: none; }

        @media (max-width: 600px) {
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>📊 바다비 노래 통계</h1>
        <a href="songlist.html" class="back-btn">⬅ 노래책으로</a>
    </div>

    <div id="artist-section">
        <div class="section-title">🎤 가수별 보유 곡 현황</div>
        <div class="search-container">
            <input type="text" id="artist-search" class="search-input" placeholder="가수 이름을 검색하세요..." oninput="onSearch('artist')">
        </div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr><th>가수명</th><th>보유 곡 수</th><th>누적 가창</th><th>최근 가창일</th></tr>
                </thead>
                <tbody id="artist-stats-body">
                    <tr><td colspan="4" style="text-align:center;">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
            <button id="artist-toggle" class="toggle-btn" onclick="toggleDisplay('artist')">▼ 더보기</button>
        </div>
    </div>

    <div id="song-section">
        <div class="section-title">🎵 노래별 상세 기록</div>
        <div class="search-container">
            <input type="text" id="song-search" class="search-input" placeholder="노래 제목 또는 가수를 검색하세요..." oninput="onSearch('song')">
        </div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr><th>노래 제목</th><th>가수</th><th>가창 횟수</th><th>마지막 기록</th></tr>
                </thead>
                <tbody id="song-detail-body"></tbody>
            </table>
            <button id="song-toggle" class="toggle-btn" onclick="toggleDisplay('song')">▼ 더보기</button>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-header">
            <h2 id="modal-title">-</h2>
            <div id="modal-subtitle" class="sub-info">-</div>
        </div>
        <div class="modal-body" id="modal-list"></div>
    </div>
</div>

<script>
    const BOOK_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIfrVC6MakrvA_D8rsQeTT6oaX_0w4bc8I_aaJuoQi4g_AuuvFi-nCP_lnHwvoSAsFKxagrzhoPy_J/pub?gid=0&single=true&output=tsv";
    const STAT_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIfrVC6MakrvA_D8rsQeTT6oaX_0w4bc8I_aaJuoQi4g_AuuvFi-nCP_lnHwvoSAsFKxagrzhoPy_J/pub?gid=142777261&single=true&output=tsv";

    let fullArtistData = [];
    let fullSongData = [];
    let isArtistExpanded = false;
    let isSongExpanded = false;
    let artistSearchQuery = "";
    let songSearchQuery = "";

    async function initStats() {
        try {
            // 두 시트 데이터를 동시에 병렬로 가져옴
            const [bookRes, statRes] = await Promise.all([
                fetch(BOOK_SHEET_URL),
                fetch(STAT_SHEET_URL)
            ]);

            const bookText = await bookRes.text();
            const statText = await statRes.text();

            const parseTSV = (text) => text.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
            const allLines = [...parseTSV(bookText), ...parseTSV(statText)];

            const artistMap = new Map(); 
            const songMap = new Map(); // 중복 노래 합산을 위해 Map 사용

            allLines.forEach((line) => {
                const parts = line.split('\t').map(item => item.trim());
                if (parts.length >= 2 && parts[0] !== "") {
                    const title = parts[0];
                    const artist = parts[1] || "Unknown";
                    const dateRaw = parts[2] || "";
                    const currentHistory = dateRaw ? dateRaw.split(',').map(d => d.trim()).filter(d => d !== "") : [];

                    // 1. 노래 데이터 통합 (Map을 사용하여 제목이 같으면 날짜 합산)
                    if (!songMap.has(title)) {
                        songMap.set(title, { title, artist, history: [] });
                    }
                    const sData = songMap.get(title);
                    sData.history = [...sData.history, ...currentHistory].sort(); // 날짜순 정렬
                    
                    // 2. 가수 데이터 통합
                    if (!artistMap.has(artist)) {
                        artistMap.set(artist, { songCount: 0, totalSing: 0, lastSing: "-", songs: new Set() });
                    }
                }
            });

            // 데이터 가공 (songArray 생성 및 artistMap 수치 계산)
            const songArray = Array.from(songMap.values()).map(song => {
                const count = song.history.length;
                const lastDate = count > 0 ? song.history[count - 1] : "-";
                
                // 가수 데이터 업데이트
                const aData = artistMap.get(song.artist);
                if (aData) {
                    aData.songs.add(song.title);
                    aData.totalSing += count;
                    if (lastDate !== "-" && (aData.lastSing === "-" || lastDate > aData.lastSing)) {
                        aData.lastSing = lastDate;
                    }
                }
                
                return { ...song, count, lastDate };
            });

            // artistMap 최종 정리
            fullArtistData = Array.from(artistMap.entries()).map(([name, data]) => {
                return [name, { ...data, songCount: data.songs.size }];
            }).sort((a, b) => b[1].songCount - a[1].songCount);

            fullSongData = songArray.sort((a, b) => b.count - a.count);

            render('artist');
            render('song');
        } catch (e) {
            console.error("Data Load Error:", e);
            document.getElementById('artist-stats-body').innerHTML = `<tr><td colspan="4" style="text-align:center;">데이터 로딩 중 오류가 발생했습니다. (시트 설정을 확인하세요)</td></tr>`;
        }
    }

    function onSearch(type) {
        if (type === 'artist') artistSearchQuery = document.getElementById('artist-search').value.toLowerCase();
        else songSearchQuery = document.getElementById('song-search').value.toLowerCase();
        render(type);
    }

    function render(type) {
        const isExpanded = type === 'artist' ? isArtistExpanded : isSongExpanded;
        const query = type === 'artist' ? artistSearchQuery : songSearchQuery;
        let data = type === 'artist' ? fullArtistData : fullSongData;

        if (query) {
            if (type === 'artist') {
                data = data.filter(([name]) => name.toLowerCase().includes(query));
            } else {
                data = data.filter(song => 
                    song.title.toLowerCase().includes(query) || 
                    song.artist.toLowerCase().includes(query)
                );
            }
        }

        const tbody = document.getElementById(`${type === 'artist' ? 'artist-stats-body' : 'song-detail-body'}`);
        const btn = document.getElementById(`${type}-toggle`);
        const displayData = (isExpanded || query) ? data : data.slice(0, 5);
        
        if (data.length > 5 && !query) {
            btn.style.display = 'block';
            btn.innerText = isExpanded ? '▲ 접기' : `▼ 더보기 (${data.length - 5}개)`;
        } else {
            btn.style.display = 'none';
        }

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px; color:var(--text-sub);">결과가 없습니다.</td></tr>`;
            return;
        }

        if (type === 'artist') {
            tbody.innerHTML = displayData.map(([name, info]) => `
                <tr onclick="showArtistDetail('${name.replace(/'/g, "\\'")}')">
                    <td><strong>${name}</strong></td>
                    <td><span class="count-text">${info.songCount}</span> 곡</td>
                    <td>${info.totalSing} 회</td>
                    <td><span class="badge">${info.lastSing}</span></td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = displayData.map(song => `
                <tr onclick="showSongDetail('${song.title.replace(/'/g, "\\'")}')">
                    <td>${song.title}</td>
                    <td style="color:var(--text-sub);">${song.artist}</td>
                    <td><span class="count-text">${song.count}</span> 회</td>
                    <td style="font-size:12px; color:var(--text-sub);">${song.lastDate}</td>
                </tr>
            `).join('');
        }
    }

    function showArtistDetail(artistName) {
        const item = fullArtistData.find(([name]) => name === artistName);
        if(!item) return;
        const info = item[1];
        document.getElementById('modal-title').innerText = `🎤 ${artistName}`;
        document.getElementById('modal-subtitle').innerText = `보유 곡: ${info.songCount}곡 / 총 가창: ${info.totalSing}회`;
        const songsByArtist = fullSongData.filter(s => s.artist === artistName);
        document.getElementById('modal-list').innerHTML = songsByArtist.map(s => `
            <div class="detail-item"><span>${s.title}</span><span class="count-text">${s.count}회</span></div>
        `).join('');
        document.getElementById('detailModal').style.display = 'flex';
    }

    function showSongDetail(songTitle) {
        const song = fullSongData.find(s => s.title === songTitle);
        if(!song) return;
        document.getElementById('modal-title').innerText = `🎵 ${song.title}`;
        document.getElementById('modal-subtitle').innerText = `가수: ${song.artist} / 총 ${song.count}회 가창`;
        if (song.history && song.history.length > 0) {
            document.getElementById('modal-list').innerHTML = song.history.map(date => `
                <div class="detail-item"><span>가창 기록</span><span class="badge">${date}</span></div>
            `).join('');
        } else {
            document.getElementById('modal-list').innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-sub);">기록 없음</div>`;
        }
        document.getElementById('detailModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
    window.onclick = function(e) { if (e.target == document.getElementById('detailModal')) closeModal(); }
    function toggleDisplay(type) {
        if (type === 'artist') isArtistExpanded = !isArtistExpanded;
        else isSongExpanded = !isSongExpanded;
        render(type);
    }
    window.onload = initStats;
</script>
</body>
</html>
