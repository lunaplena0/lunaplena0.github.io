<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 노래 통계</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/stats.css"> 
</head>
<body>

<div id="loading-overlay">
    <div id="wave-text" class="wave-text"></div>
</div>

<div class="wrapper">
    <div class="header">
        <h1>📊 바다비 노래 통계</h1>
        <a href="songlist.html" class="back-btn">⬅ 노래책으로</a>
    </div>

    <div id="artist-section">
        <div class="section-title">🎤 가수별 보유 곡 현황</div>
        <div class="search-container">
            <input type="text" id="artist-search" class="search-input" placeholder="가수를 검색하세요..." oninput="onSearch('artist')">
        </div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr>
                        <th>가수명</th>
                        <th onclick="setArtistSort('songCount')" style="cursor:pointer; color:var(--accent-bright);">노래 <span id="sort-icon-count">▼</span></th>
                        <th onclick="setArtistSort('totalSing')" style="cursor:pointer; color:var(--accent-bright);">횟수 <span id="sort-icon-sing"></span></th>
                        <th>최근 가창일</th>
                    </tr>
                </thead>
                <tbody id="artist-stats-body"></tbody>
            </table>
            <button id="artist-toggle" class="toggle-btn" onclick="toggleDisplay('artist')">더보기</button>
        </div>
    </div>

    <div id="song-section">
        <div class="section-title">🎵 노래별 상세 기록</div>
        <div class="search-container">
            <input type="text" id="song-search" class="search-input" placeholder="노래 또는 가수를 검색하세요..." oninput="onSearch('song')">
        </div>
        <div class="stats-card">
            <table>
                <thead>
                    <tr><th>노래 제목</th><th>가수</th><th>횟수</th><th>마지막 기록</th></tr>
                </thead>
                <tbody id="song-detail-body"></tbody>
            </table>
            <button id="song-toggle" class="toggle-btn" onclick="toggleDisplay('song')">더보기</button>
        </div>
    </div>
    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h2 id="modal-title">-</h2>
                <div id="modal-subtitle" class="sub-info">-</div>
            </div>
            <button class="top-close-btn" onclick="closeModal()">닫기</button>
        </div>
        <div class="modal-body" id="modal-list"></div>
    </div>
</div>
<script src="js/loading.js"></script>
<script src="js/stats.js"></script>
</body>
</html>
