<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터넷 방송인 아카이브</title>
    <link rel="stylesheet" href="test/maintest.css">
</head>
<body>

    <!-- 프로필 섹션 -->
    <header class="profile-box">
        <div class="profile-img"></div>
        <div class="profile-info">
            <h1>방송인 이름</h1>
            <p>방송 컨셉 및 한 줄 소개가 들어가는 자리입니다.</p>
        </div>
    </header>

    <!-- 3단 레이아웃 섹션 -->
    <main class="content-container">
        <section class="card">
            <h2>📅 주간 일정</h2>
            <ul>
                <li>월: 정기 휴방</li>
                <li>화: 종합 게임 (20:00)</li>
                <li>수: 저챗 및 소통</li>
            </ul>
        </section>

        <section class="card">
            <h2>📝 게시글 목록</h2>
            <ul>
                <li>[공지] 이번 주 합방 안내</li>
                <li>[기록] 2024년 유행어 모음</li>
                <li>[정보] PC 사양 업데이트</li>
            </ul>
        </section>

        <section class="card">
            <h2>🎬 다시보기</h2>
            <div class="video-placeholder">최근 영상 썸네일</div>
            <p>최신 다시보기 제목...</p>
        </section>
    </main>

</body>
</html>
