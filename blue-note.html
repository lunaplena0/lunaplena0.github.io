<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 울보노트 (Tears Log)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #58a6ff; 
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --border: #2f2f35;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }

        .wrapper { width: 100%; max-width: 800px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }

        .header-card { background: var(--card-bg); border-radius: 16px; padding: 30px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); }
        .cry-count-info { font-size: 14px; color: var(--text-sub); font-weight: normal; margin-left: 10px; }
        
        .search-input { width: 100%; background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; color: #fff; outline: none; }
        .search-input:focus { border-color: var(--accent); }

        .month-group { margin-bottom: 40px; }
        .month-title { font-size: 20px; font-weight: bold; color: var(--accent); margin: 20px 0 15px 5px; display: flex; align-items: center; }
        .month-title::before { content: '📅'; margin-right: 8px; font-size: 16px; }

        .cry-list { display: flex; flex-direction: column; gap: 12px; }
        .cry-item { 
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 18px;
            display: flex; align-items: center; text-decoration: none; color: inherit; transition: 0.2s;
        }
        .cry-item:hover { background: #1f1f23; border-color: var(--accent); transform: translateY(-2px); }

        .cry-date { width: 90px; text-align: center; font-weight: bold; color: var(--text-main); font-size: 14px; line-height: 1.4; border-right: 1px solid #333; margin-right: 20px; }
        .cry-content { flex: 1; }
        .cry-desc { font-size: 16px; font-weight: 500; margin-bottom: 4px; color: #fff; }
        .cry-time { font-size: 13px; color: var(--text-sub); display: flex; align-items: center; gap: 5px; }
        .link-hint { color: var(--accent); font-size: 12px; margin-left: 10px; opacity: 0.7; }

        @media (max-width: 600px) {
            .cry-item { padding: 15px; }
            .cry-date { width: 70px; margin-right: 15px; font-size: 13px; }
            .cry-desc { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>💧 울보노트 <span class="cry-count-info">총 <span id="total-count">0</span>건</span></h1>
            <div style="font-size: 11px; color: #5b5b63; margin-top: 5px;" id="update-time">데이터 로드 중...</div>
        </div>
    </div>

    <input type="text" id="crySearch" class="search-input" placeholder="내용이나 날짜로 검색해 보세요..." onkeyup="filterCries()">

    <div id="main-content"></div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsvaqEEGjtHB20R3qPkIAXyAySm8FnLzcs0rIsZevLuLP65D43gSuoRzYVU0pmhRbvyg5AW-Ce1cmL/pub?gid=0&single=true&output=tsv";

    window.onload = () => {
        fetch(sheetUrl)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(line => line.trim() !== "");
                let cries = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split('\t').map(item => item.trim());
                    if (parts.length < 3) continue;
                    
                    // '26,9' -> '2026년 9월' 변환 로직
                    let displayMonth = parts[0];
                    if (displayMonth.includes(',')) {
                        const [y, m] = displayMonth.split(',');
                        displayMonth = `20${y}년 ${m}월`;
                    }

                    cries.push({ 
                        rawMonth: parts[0], 
                        formattedMonth: displayMonth,
                        date: parts[1], 
                        desc: parts[2], 
                        time: parts[3] || '--:--:--', 
                        link: parts[4] || '#' 
                    });
                }

                renderList(cries);
                document.getElementById('total-count').textContent = cries.length;
                document.getElementById('update-time').textContent = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            });
    };

    function renderList(data) {
        const container = document.getElementById('main-content');
        container.innerHTML = '';
        const groups = {};

        data.forEach(item => {
            if (!groups[item.formattedMonth]) groups[item.formattedMonth] = [];
            groups[item.formattedMonth].push(item);
        });

        Object.keys(groups).sort().reverse().forEach(month => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'month-group';
            groupDiv.innerHTML = `
                <div class="month-title">${month}</div>
                <div class="cry-list">
                    ${groups[month].map(cry => `
                        <a href="${cry.link}" target="_blank" class="cry-item">
                            <div class="cry-date">${cry.date}</div>
                            <div class="cry-content">
                                <div class="cry-desc">${cry.desc}</div>
                                <div class="cry-time">🕒 ${cry.time} <span class="link-hint">다시보기 ↗</span></div>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
            container.appendChild(groupDiv);
        });
    }

    function filterCries() {
        const val = document.getElementById('crySearch').value.toUpperCase();
        document.querySelectorAll('.cry-item').forEach(item => {
            item.style.display = item.textContent.toUpperCase().includes(val) ? "flex" : "none";
        });
        document.querySelectorAll('.month-group').forEach(group => {
            const hasVisible = Array.from(group.querySelectorAll('.cry-item')).some(i => i.style.display !== 'none');
            group.style.display = hasVisible ? "block" : "none";
        });
    }
</script>
</body>
</html>
