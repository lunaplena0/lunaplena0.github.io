<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 울보노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #58a6ff; 
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --border: #2f2f35;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }

        .wrapper { width: 100%; max-width: 800px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 15px; }

        /* 헤더 상자 */
        .header-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 20px 25px; 
            border: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between;
            align-items: center;
        }

        .header-info h1 { margin: 0; font-size: 24px; color: var(--accent); }
        .update-now { font-size: 11px; color: #5b5b63; margin-top: 4px; }
        
        .btn-home {
            text-decoration: none;
            color: var(--text-main);
            background: #26262c;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .btn-home:hover { background: #3f3f46; border-color: var(--accent); }

        /* 통계 상자 (헤더 아래로 분리) */
        .stats-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px 22px;
            border: 1px solid var(--border);
            line-height: 1.6;
            margin-top: 5px;
        }
        .stats-total { font-weight: bold; color: var(--accent); font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .stats-total::before { content: '📊'; font-size: 14px; }
        .stats-detail { font-size: 13px; color: var(--text-sub); }
        .year-block { margin-bottom: 6px; padding-left: 5px; border-left: 2px solid #2f2f35; }

        /* 리스트 스타일 */
        .month-group { margin-top: 15px; margin-bottom: 15px; }
        .month-title { font-size: 19px; font-weight: bold; color: var(--accent); margin: 0 0 15px 5px; display: flex; align-items: center; }
        .month-title::before { content: '📅'; margin-right: 8px; font-size: 16px; }

        .cry-list { display: flex; flex-direction: column; gap: 6px; }
        .cry-item { 
            background: var(--card-bg); 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            padding: 5px 15px; 
            display: flex; 
            align-items: stretch; 
            text-decoration: none; 
            color: inherit; 
            transition: 0.2s;
            min-height: 50px;
        }
        .cry-item:hover { background: #1f1f23; border-color: var(--accent); transform: translateY(-2px); }

        .cry-date { 
            width: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold; 
            color: var(--text-main); 
            font-size: 12px;
            line-height: 1.3; 
            border-right: 1px solid #333; 
            margin-right: 15px; 
            padding: 8px 0;
            flex-shrink: 0; 
            text-align: center;
            white-space: pre-line;
        }

        .cry-content { 
            flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; padding: 2px 0;
        }

        .cry-desc { 
            font-size: 15px; font-weight: 500; margin-bottom: 6px; color: #fff; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
        }

        .cry-time { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 5px; line-height: 1; }
        .link-hint { color: var(--accent); font-size: 11px; margin-left: 10px; padding: 2px 6px; border: 1px solid rgba(88, 166, 255, 0.3); border-radius: 4px; }

        @media (max-width: 600px) {
            .header-card { flex-direction: column; align-items: flex-start; gap: 12px; }
            .btn-home { align-self: stretch; text-align: center; }
            .cry-item { padding: 4px 10px; min-height: 45px; }
            .cry-date { width: 70px; margin-right: 10px; font-size: 11px; }
            .cry-desc { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>바다비 울보노트</h1>
            <div id="update-time" class="update-now">데이터 로드 중...</div>
        </div>
        <a href="index.html" class="btn-home">🏠 메인으로 돌아가기</a>
    </div>
    
    <div class="stats-container" id="stats-area">
        데이터를 분석하고 있습니다...
    </div>

    <div id="main-content"></div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsvaqEEGjtHB20R3qPkIAXyAySm8FnLzcs0rIsZevLuLP65D43gSuoRzYVU0pmhRbvyg5AW-Ce1cmL/pub?gid=0&single=true&output=tsv";

    window.onload = () => {
        fetch(sheetUrl)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(line => line.trim() !== "");
                let cries = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split('\t').map(item => item.trim());
                    if (parts.length < 3) continue;
                    
                    let displayMonth = parts[0];
                    if (displayMonth.includes(',')) {
                        const [y, m] = displayMonth.split(',');
                        displayMonth = `20${y}년 ${m}월`;
                    }

                    cries.push({ 
                        rawMonth: parts[0], 
                        formattedMonth: displayMonth,
                        date: parts[1], 
                        desc: parts[2], 
                        time: parts[3] || '--:--:--', 
                        link: parts[4] || '#' 
                    });
                }

                renderList(cries);
                renderStats(cries);
                
                const now = new Date();
                const timeString = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('update-time').textContent = `최근 업데이트: ${timeString}`;
            });
    };

    // 1. 기준 날짜 설정 (원하는 시작 날짜로 변경하세요)
const startDate = new Date("2025-09-04"); 

function renderStats(data) {
    const statsArea = document.getElementById('stats-area');
    const total = data.length;
    const stats = {};

    // 오늘 날짜와 시작 날짜 차이 계산
    const today = new Date();
    const diffTime = Math.abs(today - startDate);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); // 총 일수
    
    // 평균 주기 계산 (소수점 첫째자리까지)
    const averageCycle = (diffDays / total).toFixed(1);

    data.forEach(item => {
        const [y, m] = item.rawMonth.split(',').map(Number);
        const year = `20${y}년`;
        const month = `${m}월`;
        if (!stats[year]) stats[year] = { months: {}, yearTotal: 0 };
        if (!stats[year].months[month]) stats[year].months[month] = 0;
        stats[year].months[month]++;
        stats[year].yearTotal++;
    });

    // 상단 요약 텍스트 수정
    let statsHtml = `
        <div class="stats-summary" style="margin-bottom: 12px;">
            <span class="stats-total" style="margin-bottom: 4px;">전체 기록: ${total}회</span>
            <div style="font-size: 13px; color: var(--text-sub);">
                📅 <strong>${startDate.toLocaleDateString()}</strong>로부터 <strong>${diffDays}일</strong>째 기록 중<br>
                📉 약 <strong>${averageCycle}일</strong>에 한 번 꼴로 울고 계시네요!
            </div>
        </div>
    `;
    
    statsHtml += `<div class="stats-detail" style="border-top: 1px solid var(--border); padding-top: 10px;">`;
    
    // 연도 정렬
    Object.keys(stats).sort((a, b) => a.localeCompare(b)).forEach(year => {
        const yearData = stats[year];
        const monthDetails = Object.keys(yearData.months)
            .sort((a, b) => parseInt(a) - parseInt(b))
            .map(m => `${m} ${yearData.months[m]}회`)
            .join(', ');
            
        statsHtml += `<div class="year-block"><strong>${year} 합계 ${yearData.yearTotal}회</strong> (${monthDetails})</div>`;
    });
    
    statsHtml += `</div>`;
    statsArea.innerHTML = statsHtml;
}
    function renderList(data) {
        const container = document.getElementById('main-content');
        container.innerHTML = '';

        // 1. 데이터 정렬: 과거순 (2026년 -> 2027년 순서)
        data.sort((a, b) => {
            const [yearA, monthA] = a.rawMonth.split(',').map(Number);
            const [yearB, monthB] = b.rawMonth.split(',').map(Number);

            if (yearA !== yearB) return yearA - yearB; // 년도 오름차순
            if (monthA !== monthB) return monthA - monthB; // 월 오름차순

            const getDateNum = (dateStr) => {
                const firstDate = dateStr.split('~')[0];
                return parseFloat(firstDate);
            };
            const dateA = getDateNum(a.date);
            const dateB = getDateNum(b.date);
            
            if (dateA !== dateB) return dateA - dateB; // 날짜 오름차순
            return a.time.localeCompare(b.time); // 시간 오름차순
        });

        // 2. 그룹화 (월별)
        const groups = {};
        data.forEach(item => {
            if (!groups[item.formattedMonth]) groups[item.formattedMonth] = [];
            groups[item.formattedMonth].push(item);
        });

        // 3. 그룹(월) 타이틀 출력 순서: 과거 월이 위로 오도록 정렬
        const sortedMonthKeys = Object.keys(groups).sort((a, b) => {
            const parseM = (s) => {
                const match = s.match(/(\d+)년\s+(\d+)월/);
                if (!match) return 0;
                return parseInt(match[1]) * 100 + parseInt(match[2]);
            };
            return parseM(a) - parseM(b); // 작은 숫자(과거)가 위로
        });

        // 4. 화면 출력
        sortedMonthKeys.forEach(month => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'month-group';
            groupDiv.innerHTML = `
                <div class="month-title">${month}</div>
                <div class="cry-list">
                    ${groups[month].map(cry => `
                        <a href="${cry.link}" target="_blank" class="cry-item">
                            <div class="cry-date">${cry.date.replace(' ~ ', '\n').replace('~', '\n')}</div>
                            <div class="cry-content">
                                <div class="cry-desc">${cry.desc}</div>
                                <div class="cry-time">🕒 ${cry.time} <span class="link-hint">다시보기 ↗</span></div>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
            container.appendChild(groupDiv);
        });
    }
</script>
</body>
</html>
