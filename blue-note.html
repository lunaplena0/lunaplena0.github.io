<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 울보노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #58a6ff; 
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --border: #2f2f35;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }

        .wrapper { width: 100%; max-width: 800px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }

        /* 헤더 디자인 수정 */
        .header-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 30px; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; /* 세로 배치로 변경하여 정보 정렬 */
            gap: 10px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .header-info h1 { margin: 0; font-size: 26px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .cry-count-info { font-size: 15px; color: var(--text-sub); font-weight: normal; }
        
        .update-now { 
            font-size: 12px; 
            color: #5b5b63; 
            background: #26262c;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .search-input { width: 100%; background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(88, 166, 255, 0.1); }

        .month-group { margin-bottom: 40px; }
        .month-title { font-size: 20px; font-weight: bold; color: var(--accent); margin: 20px 0 15px 5px; display: flex; align-items: center; }
        .month-title::before { content: '📅'; margin-right: 8px; font-size: 16px; }

        .cry-list { display: flex; flex-direction: column; gap: 6px; }
        .cry-item { 
            background: var(--card-bg); 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            /* 위아래 여백을 5px로 최소화, 좌우는 15px */
            padding: 5px 15px; 
            display: flex; 
            align-items: stretch; /* 내부 요소들이 상자 높이에 꽉 차게 */
            text-decoration: none; 
            color: inherit; 
            transition: 0.2s;
            min-height: 50px; /* 너무 납작해지지 않게 최소 높이만 지정 */
        }
        .cry-item:hover { background: #1f1f23; border-color: var(--accent); transform: translateY(-2px); }

        .cry-date { 
            width: 75px; /* 폭을 90px -> 75px로 줄여서 두 줄 유도 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold; 
            color: var(--text-main); 
            font-size: 12px; /* 폰트 크기를 살짝 줄여 균형 유지 */
            line-height: 1.3; 
            border-right: 1px solid #333; 
            margin-right: 15px; 
            padding: 8px 0;
            flex-shrink: 0; 
            text-align: center;
            white-space: pre-line; /* \n 코드를 줄바꿈으로 인식 */
        }

        .cry-content { 
            flex: 1; 
            min-width: 0; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* 내용 중앙 정렬 */
            padding: 4px 0;
        }

        .cry-desc { 
            font-size: 15px; 
            font-weight: 500; 
            margin-bottom: 2px; 
            color: #fff; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .cry-time { 
            font-size: 12px; 
            color: var(--text-sub); 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        .link-hint { color: var(--accent); font-size: 11px; margin-left: 10px; padding: 2px 6px; border: 1px solid rgba(88, 166, 255, 0.3); border-radius: 4px; }

        /* 모바일 대응도 함께 수정 */
        @media (max-width: 600px) {
            .cry-item { padding: 4px 10px; min-height: 45px; }
            .cry-date { width: 75px; margin-right: 10px; font-size: 11px; }
            .cry-desc { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-top">
            <div class="header-info">
                <h1>바다비 울보노트<span class="cry-count-info">총 <span id="total-count">0</span>건</span></h1>
            </div>
            <div id="update-time" class="update-now">데이터를 가져오는 중...</div>
        </div>
        <div style="font-size: 11px; color: #5b5b63;">방송 중 감동의 순간을 기록합니다.</div>
    </div>

    <input type="text" id="crySearch" class="search-input" placeholder="내용이나 날짜로 검색해 보세요..." onkeyup="filterCries()">

    <div id="main-content"></div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsvaqEEGjtHB20R3qPkIAXyAySm8FnLzcs0rIsZevLuLP65D43gSuoRzYVU0pmhRbvyg5AW-Ce1cmL/pub?gid=0&single=true&output=tsv";

    window.onload = () => {
        fetch(sheetUrl)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(line => line.trim() !== "");
                let cries = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split('\t').map(item => item.trim());
                    if (parts.length < 3) continue;
                    
                    let displayMonth = parts[0];
                    if (displayMonth.includes(',')) {
                        const [y, m] = displayMonth.split(',');
                        displayMonth = `20${y}년 ${m}월`;
                    }

                    cries.push({ 
                        rawMonth: parts[0], 
                        formattedMonth: displayMonth,
                        date: parts[1], 
                        desc: parts[2], 
                        time: parts[3] || '--:--:--', 
                        link: parts[4] || '#' 
                    });
                }

                renderList(cries);
                document.getElementById('total-count').textContent = cries.length;
                
                // 갱신 시간 표시 로직
                const now = new Date();
                const timeString = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('update-time').textContent = `최근 업데이트: ${timeString}`;
            });
    };

    function renderList(data) {
        const container = document.getElementById('main-content');
        container.innerHTML = '';

        // 1. 데이터 정렬 로직 (빠른 날짜 기준: 년도 -> 월 -> 날짜 -> 시간 순)
        data.sort((a, b) => {
            // 년도와 월 비교 (rawMonth: "26,9")
            const [yearA, monthA] = a.rawMonth.split(',').map(Number);
            const [yearB, monthB] = b.rawMonth.split(',').map(Number);

            if (yearA !== yearB) return yearA - yearB; // 년도 오름차순 (과거년도 먼저)
            if (monthA !== monthB) return monthA - monthB; // 월 오름차순 (과거월 먼저)

            // 날짜 비교 (date: "9.24~9.25" 에서 앞의 날짜인 9.24 추출)
            const getDateNum = (dateStr) => {
                const firstDate = dateStr.split('~')[0]; // "9.24"
                return parseFloat(firstDate);
            };
            const dateA = getDateNum(a.date);
            const dateB = getDateNum(b.date);
            if (dateA !== dateB) return dateA - dateB; // 날짜 오름차순

            // 시간 비교 (time: "0:45:45")
            return a.time.localeCompare(b.time); // 시간 오름차순
        });

        // 2. 그룹화 (월별)
        const groups = {};
        data.forEach(item => {
            if (!groups[item.formattedMonth]) groups[item.formattedMonth] = [];
            groups[item.formattedMonth].push(item);
        });

        // 3. 그룹(월) 출력 순서 결정 (과거 월부터 정렬)
        const sortedMonthKeys = Object.keys(groups).sort((a, b) => {
            const parseM = (s) => {
                const match = s.match(/(\d+)년\s+(\d+)월/);
                if (!match) return 0;
                return parseInt(match[1]) * 100 + parseInt(match[2]);
            };
            return parseM(a) - parseM(b); // 과거 월이 위로
        });

        // 4. 화면에 출력
        sortedMonthKeys.forEach(month => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'month-group';
            groupDiv.innerHTML = `
                <div class="month-title">${month}</div>
                <div class="cry-list">
                    ${groups[month].map(cry => `
                        <a href="${cry.link}" target="_blank" class="cry-item">
                            <div class="cry-date">${cry.date.replace(' ~ ', '\n').replace('~', '\n')}</div>
                            <div class="cry-content">
                                <div class="cry-desc">${cry.desc}</div>
                                <div class="cry-time">🕒 ${cry.time} <span class="link-hint">다시보기 ↗</span></div>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
            container.appendChild(groupDiv);
        });
    }

    function filterCries() {
        const val = document.getElementById('crySearch').value.toUpperCase();
        document.querySelectorAll('.cry-item').forEach(item => {
            item.style.display = item.textContent.toUpperCase().includes(val) ? "flex" : "none";
        });
        document.querySelectorAll('.month-group').forEach(group => {
            const hasVisible = Array.from(group.querySelectorAll('.cry-item')).some(i => i.style.display !== 'none');
            group.style.display = hasVisible ? "block" : "none";
        });
    }
</script>
</body>
</html>
