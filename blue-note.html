<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 울보노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #18181b;
            --accent: #58a6ff; 
            --text-main: #efeff1;
            --text-sub: #adadb8;
            --border: #2f2f35;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }

        .wrapper { width: 100%; max-width: 800px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }

        .header-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 25px 30px; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-info h1 { margin: 0; font-size: 26px; color: var(--accent); }
        
        /* 메인으로 돌아가기 버튼 */
        .btn-home {
            text-decoration: none;
            color: var(--text-main);
            background: #26262c;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .btn-home:hover { background: #3f3f46; border-color: var(--accent); }

        .update-now { 
            font-size: 12px; 
            color: #5b5b63; 
            margin-top: 5px;
        }
        
        /* 통계 섹션 스타일 */
        .stats-container {
            background: rgba(88, 166, 255, 0.05);
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px dashed var(--border);
            line-height: 1.6;
        }
        .stats-total { font-weight: bold; color: var(--accent); font-size: 16px; margin-bottom: 5px; display: block; }
        .stats-detail { font-size: 14px; color: var(--text-sub); }
        .year-block { margin-bottom: 4px; }

        .month-group { margin-bottom: 40px; }
        .month-title { font-size: 20px; font-weight: bold; color: var(--accent); margin: 20px 0 15px 5px; display: flex; align-items: center; }
        .month-title::before { content: '📅'; margin-right: 8px; font-size: 16px; }

        .cry-list { display: flex; flex-direction: column; gap: 6px; }
        .cry-item { 
            background: var(--card-bg); 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            padding: 5px 15px; 
            display: flex; 
            align-items: stretch; 
            text-decoration: none; 
            color: inherit; 
            transition: 0.2s;
            min-height: 50px;
        }
        .cry-item:hover { background: #1f1f23; border-color: var(--accent); transform: translateY(-2px); }

        .cry-date { 
            width: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold; 
            color: var(--text-main); 
            font-size: 12px;
            line-height: 1.3; 
            border-right: 1px solid #333; 
            margin-right: 15px; 
            padding: 8px 0;
            flex-shrink: 0; 
            text-align: center;
            white-space: pre-line;
        }

        .cry-content { 
            flex: 1; 
            min-width: 0; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2px 0;
        }

        .cry-desc { 
            font-size: 15px; 
            font-weight: 500; 
            margin-bottom: 6px; 
            color: #fff; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            line-height: 1.2;
        }

        .cry-time { 
            font-size: 12px; 
            color: var(--text-sub); 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            line-height: 1; 
        }
        .link-hint { color: var(--accent); font-size: 11px; margin-left: 10px; padding: 2px 6px; border: 1px solid rgba(88, 166, 255, 0.3); border-radius: 4px; }

        @media (max-width: 600px) {
            .header-info h1 { font-size: 22px; }
            .cry-item { padding: 4px 10px; min-height: 45px; }
            .cry-date { width: 70px; margin-right: 10px; font-size: 11px; }
            .cry-desc { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-top">
            <div class="header-info">
                <h1>바다비 울보노트</h1>
                <div id="update-time" class="update-now">데이터를 가져오는 중...</div>
            </div>
            <a href="index.html" class="btn-home">🏠 메인으로 돌아가기</a>
        </div>
        
        <div class="stats-container" id="stats-area">
            통계를 계산하고 있습니다...
        </div>
    </div>

    <div id="main-content"></div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsvaqEEGjtHB20R3qPkIAXyAySm8FnLzcs0rIsZevLuLP65D43gSuoRzYVU0pmhRbvyg5AW-Ce1cmL/pub?gid=0&single=true&output=tsv";

    window.onload = () => {
        fetch(sheetUrl)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(line => line.trim() !== "");
                let cries = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split('\t').map(item => item.trim());
                    if (parts.length < 3) continue;
                    
                    let displayMonth = parts[0];
                    if (displayMonth.includes(',')) {
                        const [y, m] = displayMonth.split(',');
                        displayMonth = `20${y}년 ${m}월`;
                    }

                    cries.push({ 
                        rawMonth: parts[0], 
                        formattedMonth: displayMonth,
                        date: parts[1], 
                        desc: parts[2], 
                        time: parts[3] || '--:--:--', 
                        link: parts[4] || '#' 
                    });
                }

                renderList(cries);
                renderStats(cries);
                
                const now = new Date();
                const timeString = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('update-time').textContent = `최근 업데이트: ${timeString}`;
            });
    };

    function renderStats(data) {
        const statsArea = document.getElementById('stats-area');
        const total = data.length;
        
        // 데이터 구조화: { 연도: { 월: 횟수, total: 연도합계 } }
        const stats = {};
        data.forEach(item => {
            const [y, m] = item.rawMonth.split(',').map(Number);
            const year = `20${y}년`;
            const month = `${m}월`;
            
            if (!stats[year]) stats[year] = { months: {}, yearTotal: 0 };
            if (!stats[year].months[month]) stats[year].months[month] = 0;
            
            stats[year].months[month]++;
            stats[year].yearTotal++;
        });

        // HTML 생성
        let statsHtml = `<span class="stats-total">총 ${total}회 기록됨</span>`;
        statsHtml += `<div class="stats-detail">`;
        
        // 연도 내림차순 정렬 (최신 연도부터)
        Object.keys(stats).sort((a, b) => b.localeCompare(a)).forEach(year => {
            const yearData = stats[year];
            const monthDetails = Object.keys(yearData.months)
                .sort((a, b) => parseInt(a) - parseInt(b)) // 월 오름차순
                .map(m => `${m} ${yearData.months[m]}회`)
                .join(', ');
            
            statsHtml += `<div class="year-block"><strong>${year} 총 ${yearData.yearTotal}회</strong> (${monthDetails})</div>`;
        });
        
        statsHtml += `</div>`;
        statsArea.innerHTML = statsHtml;
    }

    function renderList(data) {
        const container = document.getElementById('main-content');
        container.innerHTML = '';

        data.sort((a, b) => {
            const [yearA, monthA] = a.rawMonth.split(',').map(Number);
            const [yearB, monthB] = b.rawMonth.split(',').map(Number);
            if (yearA !== yearB) return yearA - yearB;
            if (monthA !== monthB) return monthA - monthB;
            const getDateNum = (dateStr) => {
                const firstDate = dateStr.split('~')[0];
                return parseFloat(firstDate);
            };
            const dateA = getDateNum(a.date);
            const dateB = getDateNum(b.date);
            if (dateA !== dateB) return dateA - dateB;
            return a.time.localeCompare(b.time);
        });

        const groups = {};
        data.forEach(item => {
            if (!groups[item.formattedMonth]) groups[item.formattedMonth] = [];
            groups[item.formattedMonth].push(item);
        });

        const sortedMonthKeys = Object.keys(groups).sort((a, b) => {
            const parseM = (s) => {
                const match = s.match(/(\d+)년\s+(\d+)월/);
                if (!match) return 0;
                return parseInt(match[1]) * 100 + parseInt(match[2]);
            };
            return parseM(a) - parseM(b);
        });

        sortedMonthKeys.forEach(month => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'month-group';
            groupDiv.innerHTML = `
                <div class="month-title">${month}</div>
                <div class="cry-list">
                    ${groups[month].map(cry => `
                        <a href="${cry.link}" target="_blank" class="cry-item">
                            <div class="cry-date">${cry.date.replace(' ~ ', '\n').replace('~', '\n')}</div>
                            <div class="cry-content">
                                <div class="cry-desc">${cry.desc}</div>
                                <div class="cry-time">🕒 ${cry.time} <span class="link-hint">다시보기 ↗</span></div>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
            container.appendChild(groupDiv);
        });
    }
</script>
</body>
</html>
