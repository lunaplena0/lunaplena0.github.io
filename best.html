<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 페이지 | 바다비 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mainpages.css">
    <link rel="stylesheet" href="best/best.css">
</head>
<body>
<div class="wrapper">
    <header class="card header-box">
    <div class="title-group">
        <h1 class="page-title">베스트 스트리머 계산기</h1>
        <p class="page-desc">베스트 스트리머 계산기</p>
    </div>
    <a href="index.html" class="btn">← 메인으로</a>
</header>

    <main class="card content-card">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 15px; padding-bottom: 10px;">
        <h2 style="margin: 0; border: none;">상세 정보</h2>
        <button onclick="resetData()" style="background:none; border:none; color:var(--text-sub); cursor:pointer; font-size:12px; text-decoration:underline;">
            데이터 초기화하기
        </button>
    </div>

    <div id="content-area">
        <div class="calculator-container">
            <div class="input-group">
                <label>평균 동접 (가중치 40%) <span id="val-viewer" style="color:var(--accent-bright); margin-left:5px;">(0점)</span></label>
                <input type="number" id="score-viewer" placeholder="0" oninput="updateScores()">
            </div>

            <div class="input-group">
                <label>애청자 수 (가중치 40%) <span id="val-fan" style="color:var(--accent-bright); margin-left:5px;">(0점)</span></label>
                <input type="number" id="score-fan" placeholder="0" oninput="updateScores()">
            </div>

            <div class="input-group">
                <label>누적 방송 시간 (가중치 20%) <span id="val-time" style="color:var(--accent-bright); margin-left:5px;">(0점)</span></label>
                <input type="number" id="score-time" placeholder="0" oninput="updateScores()">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 18px;">
                <div class="input-group" style="margin-bottom: 0;">
                    <label>최근 3개월 방송 일수</label>
                    <input type="number" id="day-val" placeholder="일수" oninput="updateScores()">
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <label>
                        스트리머 교육 <a href="https://bjedu.sooplive.com/" target="_blank" style="text-decoration:none; color:var(--accent-bright); font-size:11px;">[수강 ▶]</a>
                    </label>
                    <input type="number" id="edu-val" placeholder="개수" oninput="updateScores()">
                </div>
            </div>

            <div class="input-group" style="flex-direction: row; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px;">
                <label style="margin-bottom: 0; font-size: 13px;">
                    최근 3개월 정지 기록 없음 
                    <a href="https://member.sooplive.com/app/user_penalty.php?szWork=getPenalty" target="_blank" style="text-decoration:none; color:var(--accent-bright); margin-left:5px;">[확인 ▶]</a>
                </label>
                <input type="checkbox" id="punish-check" onchange="updateScores()" style="width:20px; height:20px; cursor:pointer;">
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">

            <h4 style="font-size: 14px; color: var(--accent-bright); margin-bottom: 15px;">추가 가산점 (최대 15점)</h4>
            
            <div class="input-group">
                <label>등록 VOD 개수</label>
                <select id="add-vod-count" onchange="updateScores()">
                    <option value="0">0개 (0점)</option>
                    <option value="1">1~3개 (1점)</option>
                    <option value="2">4~6개 (2점)</option>
                    <option value="3">7~9개 (3점)</option>
                    <option value="4">10~12개 (4점)</option>
                    <option value="5">13개 이상 (5점)</option>
                </select>
            </div>

            <div class="input-group">
                <label>다시보기 유지율</label>
                <select id="add-vod-rate" onchange="updateScores()">
                    <option value="0">70% 미만 (0점)</option>
                    <option value="1">70% 이상 (1점)</option>
                    <option value="3">80% 이상 (3점)</option>
                    <option value="5">90% 이상 (5점)</option>
                </select>
            </div>

            <div class="input-group" style="flex-direction: row; justify-content: space-between; align-items: center; background: rgba(51, 133, 255, 0.05); padding: 12px; border-radius: 8px;">
                <label style="margin-bottom: 0; font-size: 13px;">전문 자격 보유 (충족 시 5점)</label>
                <input type="checkbox" id="add-expert" onchange="updateScores()" style="width:20px; height:20px; cursor:pointer;">
            </div>

            <div class="result-box" id="result-panel">
                <div style="font-size: 14px; color: var(--text-sub); margin-bottom: 5px;">나의 예상 점수</div>
                <div id="total-score">0.0</div>
                
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="score-bar"></div>
                </div>
                
                <div id="result-desc" style="margin-top: 25px; line-height: 1.6; font-size: 14px;">
                    지표를 입력해 주세요.
                </div>
            </div>
        </div>
    </div>
</main>
    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>
</div>
    <script src="best/best.js"></script>
</body>
</html>
