<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 페이지 | 바다비 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mainpages.css">
    <link rel="stylesheet" href="best/best.css">
</head>
<body>
<div class="wrapper">
    <header class="card header-box">
    <div class="title-group">
        <h1 class="page-title">페이지 제목</h1>
        <p class="page-desc">이 페이지에 대한 간단한 보조 설명을 이곳에 작성하세요.</p>
    </div>
    <a href="index.html" class="btn">← 메인으로</a>
</header>

    <main class="card content-card">
        <h2>상세 정보</h2>
        <div id="content-area">
         <div id="content-area">
    <style>
        .calc-section { margin-bottom: 25px; }
        .cond-item { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; border-bottom: 1px solid var(--border);
        }
        .cond-label { font-size: 14px; color: var(--text-main); font-weight: 500; }
        .cond-input-wrap { display: flex; align-items: center; gap: 8px; }
        .cond-input { 
            width: 80px; padding: 6px; border: 1px solid var(--border); 
            border-radius: 4px; text-align: right; background: var(--bg-body); color: var(--text-main);
        }
        .unit { font-size: 13px; color: var(--text-sub); }
        
        .check-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .shortcut { font-size: 12px; color: #3498db; text-decoration: none; margin-left: 5px; }

        #result-panel {
            margin-top: 20px; padding: 20px; border-radius: 10px;
            text-align: center; display: none; transition: all 0.3s;
        }
        .pass { background: rgba(76, 175, 80, 0.1); border: 1px solid #4caf50; color: #4caf50; }
        .fail { background: rgba(244, 67, 54, 0.1); border: 1px solid #f44336; color: #f44336; }
    </style>

    <div class="calc-section">
        <div class="cond-item">
            <span class="cond-label">누적 방송 시간</span>
            <div class="cond-input-wrap">
                <input type="number" id="time-val" class="cond-input" placeholder="0">
                <span class="unit">시간 / 100</span>
            </div>
        </div>
        <div class="cond-item">
            <span class="cond-label">애청자 수</span>
            <div class="cond-input-wrap">
                <input type="number" id="fan-val" class="cond-input" placeholder="0">
                <span class="unit">명 / 500</span>
            </div>
        </div>
        <div class="cond-item">
            <span class="cond-label">최근 3개월 방송 일수</span>
            <div class="cond-input-wrap">
                <input type="number" id="day-val" class="cond-input" placeholder="0">
                <span class="unit">일 / 30</span>
            </div>
        </div>
        <div class="cond-item">
            <span class="cond-label">최근 3개월 정지 기록 없음 <a href="#" class="shortcut">▶</a></span>
            <input type="checkbox" id="punish-check" style="width:18px; height:18px;">
        </div>
        <div class="cond-item">
            <span class="cond-label">스트리머 교육 (5개 이상) <a href="#" class="shortcut">▶</a></span>
            <div class="cond-input-wrap">
                <input type="number" id="edu-val" class="cond-input" placeholder="0">
                <span class="unit">개 / 5</span>
            </div>
        </div>
    </div>

    <button onclick="calculateBestBJ()" class="btn" style="width: 100%; height: 50px; font-weight: bold;">조건 충족 확인</button>

    <div id="result-panel">
        <h3 id="result-title" style="margin: 0 0 10px 0;">결과 확인</h3>
        <p id="result-desc" style="margin: 0; font-size: 14px;"></p>
    </div>
</div>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>
</div>
    <script src="best/best.js"></script>
</body>
</html>
