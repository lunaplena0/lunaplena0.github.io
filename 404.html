<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>길을 잃었어요</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent-bright: #3385ff;
            --accent-glow: rgba(51, 133, 255, 0.15);
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 모바일에서 불필요한 스크롤 방지 */
            overflow: hidden; 
            touch-action: manipulation;
        }

        .container {
    /* 너비를 85% -> 80%로 줄이고, 최대 너비도 400px -> 340px로 제한 */
    width: 80%;
    max-width: 340px; 
    text-align: center;
    z-index: 10;
    padding: 10px 0; /* 위아래 여백 축소 */
}
        .description {
    font-size: 14px; /* 글씨 크기를 살짝 줄여 상자와의 비율을 맞춤 */
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: 25px; /* 상자와의 간격 축소 */
    color: var(--text-main);
    word-break: keep-all;
    opacity: 0.85;
}

        .nav-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px; /* 곡률을 살짝 줄여 더 단단한 느낌 부여 */
    overflow: hidden;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
}

       .nav-item {
    display: flex;
    flex-direction: column; /* 중앙 정렬을 위해 세로 배치 */
    align-items: center;
    justify-content: center;
    padding: 15px 10px; /* 패딩을 18px -> 15px로 줄여 상자 높이 축소 */
    border-bottom: 1px solid var(--border);
    gap: 8px; /* 텍스트와 버튼 사이 간격 축소 */
}

        .nav-item:last-child {
            border-bottom: none;
        }

        /* 모바일 터치 피드백 */
        .nav-item:active {
            background: rgba(51, 133, 255, 0.05);
        }

        .nav-title {
    font-size: 13px; /* 제목 크기 조정 */
    color: var(--text-main);
}

        .move-btn {
    min-width: 80px; /* 버튼 너비 축소 */
    font-size: 10px; /* 버튼 글씨 크기 축소 */
    padding: 6px 15px; /* 버튼 내부 여백 축소 */
}

        /* 데스크톱 호버 효과 */
        @media (min-width: 769px) {
            .nav-item:hover { background: rgba(255, 255, 255, 0.03); }
            .move-btn:hover {
                background: var(--accent-bright);
                color: #fff;
                box-shadow: 0 0 12px var(--accent-glow);
                transform: translateY(-1px);
            }
            .container {
        width: 90%; /* 모바일에서 여백을 조금 더 넓힘 */
    }
    .description {
        font-size: 15px;
        text-align: center;
    }
        }

        /* 배경 장식용 물방울 */
        .bubble {
            position: absolute;
            background: rgba(51, 133, 255, 0.08);
            border-radius: 50%;
            bottom: -60px;
            z-index: 0;
            animation: rise 12s infinite ease-in;
            pointer-events: none; /* 클릭 방해 금지 */
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            30% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <p class="description">
        입력하신 주소는 아직 존재하지 않거나,<br>
        깊은 바다 밑으로 가라앉아 찾을 수 없습니다.
    </p>

    <div class="nav-box">
        <a href="index.html" class="nav-item">
            <span class="nav-title">🏠 메인 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
        <a href="songlist.html" class="nav-item">
            <span class="nav-title">📖 노래책 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
        <a href="stats.html" class="nav-item">
            <span class="nav-title">📊 노래통계 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
        <a href="blue-note.html" class="nav-item">
            <span class="nav-title">💧 눈물모음 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
    </div>
</div>

<script>
    function createBubbles() {
        // 모바일 기기 성능을 고려해 개수를 적절히 제한 (8개)
        const bubbleCount = 8; 
        for (let i = 0; i < bubbleCount; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 40 + 15 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 8 + 10 + 's';
            bubble.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(bubble);
        }
    }
    createBubbles();
</script>

</body>
</html>
