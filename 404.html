<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>길을 잃었어요</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent-bright: #3385ff;
            --accent-glow: rgba(51, 133, 255, 0.15);
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 모바일에서 불필요한 스크롤 방지 */
            overflow: hidden; 
            touch-action: manipulation;
        }

       .container {
    /* 너비를 더 줄여서 아주 콤팩트하게 만듭니다 */
    width: 75%;
    max-width: 280px; 
    text-align: center;
    z-index: 10;
}

.description {
    font-size: 13px; /* 텍스트 크기 축소 */
    margin-bottom: 20px;
    line-height: 1.5;
}

.nav-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px; /* 좀 더 날렵한 곡률 */
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
}

.nav-item {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center; /* 가로 중앙 정렬 유지 */
    padding: 12px 15px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    
    /* 추가된 부분: 밑줄 및 보라색 제거 */
    text-decoration: none; 
    color: inherit; 
}

.nav-title {
    font-size: 12.5px; /* 제목 크기 최적화 */
    color: var(--text-main);
    text-align: left;
}

        .nav-item:last-child {
            border-bottom: none;
        }

        /* 모바일 터치 피드백 */
        .nav-item:active {
            background: rgba(51, 133, 255, 0.05);
        }


        /* 데스크톱 호버 효과 */
        @media (min-width: 769px) {
            .nav-item:hover { background: rgba(255, 255, 255, 0.03); }
            .container {
        width: 90%; /* 모바일에서 여백을 조금 더 넓힘 */
    }
    .description {
        font-size: 15px;
        text-align: center;
    }
        }

        /* 배경 장식용 물방울 */
        .bubble {
    position: absolute;
    background: rgba(51, 133, 255, 0.08);
    border-radius: 50%;
    /* bottom 대신 top으로 위치를 제어하거나, 초기 위치를 화면 안으로 당깁니다 */
    top: 100%; 
    z-index: 0;
    animation: rise 12s infinite ease-in;
    pointer-events: none;
}

        @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 0.4; }
    100% { transform: translateY(-120vh) scale(1.3); opacity: 0; }
}
    </style>
</head>
<body>

<div class="container">
    <p class="description">
        입력하신 주소는 아직 존재하지 않거나,<br>
        깊은 바다 밑으로 가라앉아 찾을 수 없습니다.
    </p>

    <div class="nav-box">
        <a href="index.html" class="nav-item">
            <span class="nav-title">🏠 메인 페이지</span>
        </a>
        <a href="songlist.html" class="nav-item">
            <span class="nav-title">📖 노래책 페이지</span>
        </a>
        <a href="stats.html" class="nav-item">
            <span class="nav-title">📊 노래통계 페이지</span>
        </a>
        <a href="blue-note.html" class="nav-item">
            <span class="nav-title">💧 눈물모음 페이지</span>
        </a>
    </div>
</div>

<script>
    function createBubbles() {
        // 모바일 기기 성능을 고려해 개수를 적절히 제한 (8개)
        const bubbleCount = 8; 
        for (let i = 0; i < bubbleCount; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 40 + 15 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 8 + 10 + 's';
            bubble.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(bubble);
        }
    }
    createBubbles();
</script>

</body>
</html>
