<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>길을 잃었어요</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent-bright: #3385ff;
            --accent-glow: rgba(51, 133, 255, 0.15);
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 모바일에서 불필요한 스크롤 방지 */
            overflow: hidden; 
            touch-action: manipulation;
        }

        .container {
            width: 85%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
            /* 모바일에서 위아래 여백 확보 */
            padding: 20px 0;
        }

        .description {
            font-size: 16px; /* 모바일 표준 크기 */
            font-weight: 400;
            line-height: 1.8;
            margin-bottom: 30px;
            color: var(--text-main);
            word-break: keep-all; /* 단어 단위 줄바꿈으로 가독성 향상 */
            opacity: 0.9;
        }

        .nav-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .nav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px; /* 터치하기 편하도록 세로 패딩 확대 */
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
            text-decoration: none; /* 항목 전체 클릭 대비 */
        }

        .nav-item:last-child {
            border-bottom: none;
        }

        /* 모바일 터치 피드백 */
        .nav-item:active {
            background: rgba(51, 133, 255, 0.05);
        }

        .nav-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .move-btn {
            background: #0a1a30;
            color: var(--accent-bright);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            padding: 8px 16px;
            border: 1px solid var(--accent-bright);
            border-radius: 8px;
            transition: all 0.2s ease;
            flex-shrink: 0; /* 버튼이 찌그러지지 않게 방지 */
        }

        /* 데스크톱 호버 효과 */
        @media (min-width: 769px) {
            .nav-item:hover { background: rgba(255, 255, 255, 0.03); }
            .move-btn:hover {
                background: var(--accent-bright);
                color: #fff;
                box-shadow: 0 0 12px var(--accent-glow);
                transform: translateY(-1px);
            }
        }

        /* 배경 장식용 물방울 */
        .bubble {
            position: absolute;
            background: rgba(51, 133, 255, 0.08);
            border-radius: 50%;
            bottom: -60px;
            z-index: 0;
            animation: rise 12s infinite ease-in;
            pointer-events: none; /* 클릭 방해 금지 */
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            30% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <p class="description">
        입력하신 주소는 아직 존재하지 않거나,<br>
        깊은 바다 밑으로 가라앉아 찾을 수 없습니다.
    </p>

    <div class="nav-box">
        <a href="index.html" class="nav-item">
            <span class="nav-title">🏠 메인 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
        <a href="songlist.html" class="nav-item">
            <span class="nav-title">📖 노래책 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
        <a href="stats.html" class="nav-item">
            <span class="nav-title">📊 노래통계 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
        <a href="blue-note.html" class="nav-item">
            <span class="nav-title">💧 눈물모음 페이지</span>
            <span class="move-btn">이동하기</span>
        </a>
    </div>
</div>

<script>
    function createBubbles() {
        // 모바일 기기 성능을 고려해 개수를 적절히 제한 (8개)
        const bubbleCount = 8; 
        for (let i = 0; i < bubbleCount; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 40 + 15 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 8 + 10 + 's';
            bubble.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(bubble);
        }
    }
    createBubbles();
</script>

</body>
</html>
