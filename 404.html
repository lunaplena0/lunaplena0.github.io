<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>길을 잃었어요</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 기존 메인 페이지와 동일한 테마색 */
            --bg-color: #010306;
            --card-bg: #030812;
            --accent-bright: #3385ff;
            --accent-glow: rgba(51, 133, 255, 0.15);
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #051020 0%, #02050a 100%);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
        }

        /* 안내 문구 스타일 */
        .description {
            font-size: 17px;
            font-weight: 400;
            line-height: 1.7;
            margin-bottom: 35px;
            color: var(--text-main);
            word-break: keep-all;
        }

        /* 목차 박스 */
        .nav-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .nav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .nav-item:last-child {
            border-bottom: none;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .nav-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* 이동하기 버튼 */
        .move-btn {
            background: #0a1a30;
            color: var(--accent-bright);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 7px 14px;
            border: 1px solid var(--accent-bright);
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .move-btn:hover {
            background: var(--accent-bright);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* 배경 물방울 효과 */
        .bubble {
            position: absolute;
            background: rgba(51, 133, 255, 0.07);
            border-radius: 50%;
            bottom: -100px;
            z-index: 0;
            animation: rise 15s infinite linear;
        }

        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <p class="description">
        입력하신 주소는 아직 존재하지 않거나,<br>
        깊은 바다 밑으로 가라앉아 찾을 수 없습니다.
    </p>

    <div class="nav-box">
        <div class="nav-item">
            <span class="nav-title">🏠 메인 페이지</span>
            <a href="index.html" class="move-btn">이동하기</a>
        </div>
        <div class="nav-item">
            <span class="nav-title">📖 노래책 페이지</span>
            <a href="songlist.html" class="move-btn">이동하기</a>
        </div>
        <div class="nav-item">
            <span class="nav-title">📊 노래통계 페이지</span>
            <a href="stats.html" class="move-btn">이동하기</a>
        </div>
        <div class="nav-item">
            <span class="nav-title">💧 눈물모음 페이지</span>
            <a href="blue-note.html" class="move-btn">이동하기</a>
        </div>
    </div>
</div>

<script>
    // 배경 방울 생성 (정적이지 않도록 최소한의 연출)
    function createBubbles() {
        for (let i = 0; i < 10; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 50 + 10 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 10 + 10 + 's';
            bubble.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(bubble);
        }
    }
    createBubbles();
</script>

</body>
</html>
