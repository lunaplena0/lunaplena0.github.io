<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가사 선택 플레이어</title>
    <style>
        body { background: transparent; color: white; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        
        /* 가사 표시 영역 */
        #lyrics-box { 
            font-size: 42px; font-weight: bold; 
            text-shadow: 3px 3px 15px rgba(0,0,0,1); 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            line-height: 1.4; padding: 0 40px;
        }

        /* 컨트롤 패널 (OBS 상호작용 창에서만 보임) */
        .admin-panel {
            position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.85);
            padding: 15px; border-radius: 8px; text-align: left; font-size: 14px;
            max-width: 350px; border: 1px solid #444;
        }
        
        select { width: 100%; padding: 8px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #555; }
        
        .controls { display: flex; gap: 5px; margin-bottom: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-reset { background: #e74c3c; color: white; }
        .btn-load { background: #3498db; color: white; width: 100%; margin-bottom: 5px; }

        .status { font-family: monospace; font-size: 18px; color: #ffd700; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="lyrics-box">시트 데이터를 불러오는 중...</div>

    <div class="admin-panel">
        <label>🎵 노래 선택</label>
        <select id="song-select">
            <option value="">노래를 선택하세요</option>
        </select>
        <button class="btn-load" onclick="selectSong()">가사 로드</button>
        
        <div class="controls">
            <button class="btn-start" onclick="startSync()">시작 (Space)</button>
            <button class="btn-reset" onclick="resetSync()">리셋 (R)</button>
        </div>
        <div class="status">TIME: <span id="current-time">0.00</span>s</div>
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgjgI5Ut2uiEeXFOGUBb4tvYv-ghCfSfAvA1rvaYKuxiIH-vt02INQ34CaeksH6ZwGyXEKGeAh2p7L/pub?output=tsv';

        let allSongs = []; // 시트의 전체 노래 데이터
        let currentLyrics = []; // 선택된 노래의 파싱된 가사
        let startTime = 0;
        let isRunning = false;
        let animationFrame;

        // 1. 시트 전체 목록 불러오기
        async function fetchSheetList() {
            try {
                const res = await fetch(TSV_URL);
                const data = await res.text();
                const rows = data.split('\n').map(r => r.split('\t'));

                const selectElement = document.getElementById('song-select');
                allSongs = rows.slice(1); // 헤더 제외

                allSongs.forEach((cols, index) => {
                    if (cols[0] && cols[1]) {
                        const option = document.createElement('option');
                        option.value = index;
                        option.text = `${cols[0]} - ${cols[1]}`; // 제목 - 가수
                        selectElement.appendChild(option);
                    }
                });
                document.getElementById('lyrics-box').innerText = "노래를 선택해 주세요.";
            } catch (e) {
                document.getElementById('lyrics-box').innerText = "목록 로드 실패";
            }
        }

        // 2. 선택한 노래의 가사 파싱하기
        function selectSong() {
            const index = document.getElementById('song-select').value;
            if (index === "") return;

            const selectedRow = allSongs[index];
            const rawLyrics = selectedRow[2]; // C열 가사 데이터

            currentLyrics = [];
            const lines = rawLyrics.split(/[\r\n]+/);
            lines.forEach(line => {
                const match = line.match(/\[(\d{2}):(\d{2}\.\d+)\]/);
                if (match) {
                    const seconds = (parseFloat(match[1]) * 60) + parseFloat(match[2]);
                    const text = line.replace(/\[.*?\]/, "").trim();
                    if (text) currentLyrics.push({ time: seconds, text: text });
                }
            });
            currentLyrics.sort((a, b) => a.time - b.time);
            
            resetSync();
            document.getElementById('lyrics-box').innerText = `로드 완료: ${selectedRow[0]}`;
        }

        // 3. 타이머 제어
        function startSync() {
            if (isRunning || currentLyrics.length === 0) return;
            startTime = performance.now();
            isRunning = true;
            update();
        }

        function resetSync() {
            isRunning = false;
            cancelAnimationFrame(animationFrame);
            document.getElementById('current-time').innerText = "0.00";
            document.getElementById('lyrics-box').innerText = "준비 완료";
        }

        function update() {
            if (!isRunning) return;
            const elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('current-time').innerText = elapsed.toFixed(2);

            let currentText = "";
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentLyrics[i].time <= elapsed) {
                    currentText = currentLyrics[i].text;
                } else { break; }
            }

            const box = document.getElementById('lyrics-box');
            if (box.innerText !== currentText) box.innerText = currentText;

            animationFrame = requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') startSync();
            if (e.code === 'KeyR') resetSync();
        });

        fetchSheetList();
    </script>
</body>
</html>
