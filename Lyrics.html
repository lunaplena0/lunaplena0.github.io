<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가사 선택 플레이어</title>
    <style>
        body { 
            background: transparent; 
            color: white; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* 가사 표시 영역 - OBS 송출 화면 */
        #lyrics-box { 
            font-size: 48px; 
            font-weight: bold; 
            text-shadow: 3px 3px 15px rgba(0,0,0,1), -1px -1px 2px rgba(0,0,0,0.5); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            line-height: 1.5; 
            padding: 0 50px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* 컨트롤 패널 (OBS 상호작용 창 전용) */
        .admin-panel {
            position: fixed; 
            top: 10px; 
            left: 10px; 
            background: rgba(20, 20, 20, 0.9);
            padding: 20px; 
            border-radius: 12px; 
            text-align: left; 
            font-size: 14px;
            max-width: 320px; 
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 9999;
        }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #bbb; }
        select { 
            width: 100%; padding: 10px; margin-bottom: 12px; 
            background: #333; color: white; border: 1px solid #555; 
            border-radius: 4px; outline: none;
        }
        
        .controls { display: flex; gap: 8px; margin-bottom: 12px; }
        button { 
            flex: 1; padding: 12px; cursor: pointer; 
            border: none; border-radius: 6px; font-weight: bold; 
            transition: filter 0.2s;
        }
        button:active { filter: brightness(0.8); }
        
        .btn-load { background: #3498db; color: white; width: 100%; margin-bottom: 8px; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-reset { background: #e74c3c; color: white; }

        .status { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 18px; 
            color: #ffd700; 
            margin-top: 8px; 
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="lyrics-box">시트 데이터를 불러오는 중...</div>

    <div class="admin-panel">
        <label>🎵 노래 목록</label>
        <select id="song-select">
            <option value="">노래를 선택하세요</option>
        </select>
        <button class="btn-load" onclick="selectSong()">가사 로드 (Load)</button>
        
        <div class="controls">
            <button class="btn-start" onclick="startSync()">시작 (Space)</button>
            <button class="btn-reset" onclick="resetSync()">리셋 (R)</button>
        </div>
        <div class="status">
            <span>ELAPSED:</span>
            <span><span id="current-time">0.00</span>s</span>
        </div>
    </div>

    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgjgI5Ut2uiEeXFOGUBb4tvYv-ghCfSfAvA1rvaYKuxiIH-vt02INQ34CaeksH6ZwGyXEKGeAh2p7L/pub?output=tsv';

        let allSongs = [];
        let currentLyrics = [];
        let startTime = 0;
        let isRunning = false;
        let animationFrame;

        async function fetchSheetList() {
            try {
                const res = await fetch(TSV_URL);
                if(!res.ok) throw new Error('네트워크 응답이 올바르지 않습니다.');
                const data = await res.text();
                const rows = data.trim().split('\n').map(r => r.split('\t'));

                const selectElement = document.getElementById('song-select');
                allSongs = rows.slice(1);

                allSongs.forEach((cols, index) => {
                    if (cols[0]) {
                        const option = document.createElement('option');
                        option.value = index;
                        option.text = `${cols[0]} - ${cols[1] || 'Unknown'}`;
                        selectElement.appendChild(option);
                    }
                });
                document.getElementById('lyrics-box').innerText = "준비 완료: 노래를 선택해 주세요.";
            } catch (e) {
                console.error(e);
                document.getElementById('lyrics-box').innerText = "데이터 로드 실패 (URL 확인 필요)";
            }
        }

        function selectSong() {
            const index = document.getElementById('song-select').value;
            if (index === "") return;

            const selectedRow = allSongs[index];
            const rawLyrics = selectedRow[2] || "";

            currentLyrics = [];
            const lines = rawLyrics.split(/[\r\n]+/);
            lines.forEach(line => {
                const match = line.match(/\[(\d{2}):(\d{2}\.\d+)\]/);
                if (match) {
                    const seconds = (parseFloat(match[1]) * 60) + parseFloat(match[2]);
                    const text = line.replace(/\[.*?\]/g, "").trim();
                    if (text) currentLyrics.push({ time: seconds, text: text });
                }
            });
            currentLyrics.sort((a, b) => a.time - b.time);
            
            resetSync();
            document.getElementById('lyrics-box').innerText = `로드 완료: ${selectedRow[0]}`;
        }

        function startSync() {
            if (isRunning || currentLyrics.length === 0) return;
            startTime = performance.now();
            isRunning = true;
            update();
        }

        function resetSync() {
            isRunning = false;
            cancelAnimationFrame(animationFrame);
            document.getElementById('current-time').innerText = "0.00";
            document.getElementById('lyrics-box').innerText = "대기 중...";
        }

        function update() {
            if (!isRunning) return;
            const elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('current-time').innerText = elapsed.toFixed(2);

            let currentText = "";
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentLyrics[i].time <= elapsed) {
                    currentText = currentLyrics[i].text;
                } else { break; }
            }

            const box = document.getElementById('lyrics-box');
            if (box.innerText !== currentText) {
                box.innerText = currentText;
            }

            animationFrame = requestAnimationFrame(update);
        }

        // 키보드 이벤트 핸들러
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // 스크롤 방지
                startSync();
            }
            if (e.code === 'KeyR') resetSync();
        });

        fetchSheetList();
    </script>
</body>
</html>
