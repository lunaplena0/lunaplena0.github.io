<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LRC Lyric Player</title>
    <style>
        body { background: transparent; color: white; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #player-container { width: 560px; height: 315px; margin: 20px auto; display: block; } /* 필요 없으면 display: none; */
        #lyrics-box { 
            font-size: 36px; 
            font-weight: bold; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9); 
            color: #ffffff; 
            margin-top: 20px;
            padding: 0 20px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="player-container"><div id="video-placeholder"></div></div>
    <div id="lyrics-box">데이터 로딩 중...</div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // 1. 구글 시트 웹 게시(CSV) 주소
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgjgI5Ut2uiEeXFOGUBb4tvYv-ghCfSfAvA1rvaYKuxiIH-vt02INQ34CaeksH6ZwGyXEKGeAh2p7L/pub?output=tsv'; 

        let player;
        let lyrics = [];
        let updateInterval;

        // 시간 형식 [01:12.738]을 초 단위(float)로 변환하는 함수
        function parseTime(timeStr) {
            const match = timeStr.match(/\[(\d{2}):(\d{2}\.\d+)\]/);
            if (match) {
                const mins = parseFloat(match[1]);
                const secs = parseFloat(match[2]);
                return (mins * 60) + secs;
            }
            return 0;
        }

        async function loadSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                // CSV 파싱 (쉼표로 구분되지만 가사 안에 쉼표가 있을 수 있으므로 주의가 필요할 수 있음)
                const rows = data.split('\n').slice(1); 

                // 예시 구조: A(제목), B(가수), C(가사/URL 등)
                // 가사는 C열(index 2)에 뭉쳐져 있는 상태를 가정
                let fullLyricsText = "";
                let videoId = "ioNng23DkIM"; // 기본값 (추후 시트에서 추출 가능)

                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 3) {
                        fullLyricsText += cols[2] + "\n"; // C열 데이터 합치기
                    }
                });

                // LRC 형식 파싱
                const lines = fullLyricsText.split('\n');
                lyrics = [];
                lines.forEach(line => {
                    const time = parseTime(line);
                    const text = line.replace(/\[.*?\]/, "").trim();
                    if (text) {
                        lyrics.push({ time, text });
                    }
                });

                // 시간순 정렬
                lyrics.sort((a, b) => a.time - b.time);

                if (player && videoId) {
                    player.cueVideoById(videoId);
                    document.getElementById('lyrics-box').innerText = "재생 준비 완료";
                }
            } catch (e) {
                document.getElementById('lyrics-box').innerText = "데이터 로드 실패";
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('video-placeholder', {
                height: '315', width: '560',
                events: { 'onStateChange': onPlayerStateChange }
            });
            loadSheetData();
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                updateInterval = setInterval(() => {
                    const now = player.getCurrentTime();
                    let current = { text: "" };
                    
                    // 현재 시간에 맞는 가사 찾기
                    for (let i = 0; i < lyrics.length; i++) {
                        if (lyrics[i].time <= now) {
                            current = lyrics[i];
                        } else {
                            break;
                        }
                    }
                    document.getElementById('lyrics-box').innerText = current.text;
                }, 100);
            } else {
                clearInterval(updateInterval);
            }
        }
    </script>
</body>
</html>
