<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가사 플레이어 - 주소 직접 입력</title>
    <style>
        body { 
            background: #222; 
            color: white; 
            font-family: 'Pretendard', sans-serif; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        /* 입력창 영역 스타일 */
        .input-area {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        #video-placeholder { 
            width: 560px; 
            height: 315px; 
            background: #000; /* 영상 로드 전 배경 */
        }
        #lyrics-box { 
            font-size: 32px; 
            margin-top: 30px; 
            text-shadow: 2px 2px 8px black; 
            min-height: 1.5em; 
            color: #ffd700; /* 가사 강조색 */
        }
    </style>
</head>
<body>

    <div class="input-area">
        <input type="text" id="youtube-url" placeholder="유튜브 주소를 입력하세요">
        <button onclick="loadVideo()">영상 로드</button>
    </div>

    <div id="video-placeholder"></div>
    <div id="lyrics-box">주소를 입력하고 로드 버튼을 눌러주세요.</div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let updateInterval;
        
        // 가사 데이터 (추후 구글 시트 연동 가능)
        const testLyrics = [
            { time: 0, text: "재생 대기 중..." },
            { time: 3, text: "노래가 시작되었습니다!" },
            { time: 7, text: "입력하신 주소로 영상이 재생됩니다." },
            { time: 12, text: "가사와 싱크가 맞는지 확인해보세요." }
        ];

        // 유튜브 ID 추출 함수
        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        // 유튜브 API 초기화 (플레이어 객체만 먼저 생성)
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('video-placeholder', {
                height: '315',
                width: '560',
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 버튼 클릭 시 호출되는 함수
        function loadVideo() {
            const url = document.getElementById('youtube-url').value;
            const videoId = extractVideoID(url);

            if (videoId) {
                player.loadVideoById(videoId); // 영상 즉시 교체 및 로드
                document.getElementById('lyrics-box').innerText = "영상을 재생하세요.";
            } else {
                alert("올바른 유튜브 주소를 입력해주세요!");
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                if (updateInterval) clearInterval(updateInterval);
                
                updateInterval = setInterval(() => {
                    const currentTime = player.getCurrentTime();
                    let currentLyric = testLyrics[0]; 
                    
                    for (let i = 0; i < testLyrics.length; i++) {
                        if (testLyrics[i].time <= currentTime) {
                            currentLyric = testLyrics[i];
                        } else {
                            break;
                        }
                    }
                    document.getElementById('lyrics-box').innerText = currentLyric.text;
                }, 100);
            } else {
                clearInterval(updateInterval);
            }
        }
    </script>
</body>
</html>
