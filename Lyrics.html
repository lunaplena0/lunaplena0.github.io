<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Manual Sync Lyrics</title>
    <style>
        /* OBS 송출을 위해 배경은 투명하게, 글자는 잘 보이게 설정 */
        body { background: transparent; color: white; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        
        #lyrics-box { 
            font-size: 48px; font-weight: bold; 
            text-shadow: 3px 3px 15px rgba(0,0,0,1), -2px -2px 10px rgba(0,0,0,1); 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            line-height: 1.4; padding: 0 40px;
        }

        /* 설정 창 - OBS 상호작용 창에서만 사용 */
        .admin-panel {
            position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
            padding: 15px; border-radius: 8px; text-align: left; font-size: 14px;
        }
        button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-reset { background: #e74c3c; color: white; }
        .timer-display { font-family: monospace; font-size: 20px; color: #ffd700; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="lyrics-box">가사를 불러오는 중...</div>

    <div class="admin-panel">
        <button class="btn-start" onclick="startSync()">시작 (Space)</button>
        <button class="btn-reset" onclick="resetSync()">리셋 (R)</button>
        <div class="timer-display">TIME: <span id="current-time">0.00</span>s</div>
    </div>

    <script>
        // 사용자님의 TSV 주소
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgjgI5Ut2uiEeXFOGUBb4tvYv-ghCfSfAvA1rvaYKuxiIH-vt02INQ34CaeksH6ZwGyXEKGeAh2p7L/pub?output=tsv';

        let lyrics = [];
        let startTime = 0;
        let isRunning = false;
        let animationFrame;

        // 1. 구글 시트에서 가사 데이터 가져오기 (TSV 파싱)
        async function fetchLyrics() {
            try {
                const res = await fetch(TSV_URL);
                const data = await res.text();
                const rows = data.split('\n').map(r => r.split('\t'));

                lyrics = [];
                // C열(index 2)에서 LRC 형식 가사 추출
                rows.slice(1).forEach(cols => {
                    if (cols[2]) {
                        const lines = cols[2].split(/[\r\n]+/);
                        lines.forEach(line => {
                            const match = line.match(/\[(\d{2}):(\d{2}\.\d+)\]/);
                            if (match) {
                                const seconds = (parseFloat(match[1]) * 60) + parseFloat(match[2]);
                                const text = line.replace(/\[.*?\]/, "").trim();
                                if (text) lyrics.push({ time: seconds, text: text });
                            }
                        });
                    }
                });
                lyrics.sort((a, b) => a.time - b.time);
                document.getElementById('lyrics-box').innerText = "준비 완료! 시작 버튼을 누르세요.";
            } catch (e) {
                document.getElementById('lyrics-box').innerText = "시트 로드 실패";
            }
        }

        // 2. 타이머 로직
        function startSync() {
            if (isRunning) return;
            startTime = performance.now();
            isRunning = true;
            update();
        }

        function resetSync() {
            isRunning = false;
            cancelAnimationFrame(animationFrame);
            document.getElementById('current-time').innerText = "0.00";
            document.getElementById('lyrics-box').innerText = "준비 완료";
        }

        function update() {
            if (!isRunning) return;

            const elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('current-time').innerText = elapsed.toFixed(2);

            // 현재 시간에 맞는 가사 찾기
            let currentText = "";
            for (let i = 0; i < lyrics.length; i++) {
                if (lyrics[i].time <= elapsed) {
                    currentText = lyrics[i].text;
                } else {
                    break;
                }
            }

            const box = document.getElementById('lyrics-box');
            if (box.innerText !== currentText) {
                box.innerText = currentText;
            }

            animationFrame = requestAnimationFrame(update);
        }

        // 단축키 지원 (OBS 상호작용 창 클릭 후 사용 가능)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') startSync();
            if (e.code === 'KeyR') resetSync();
        });

        fetchLyrics();
    </script>
</body>
</html>
