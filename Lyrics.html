<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가사 & 유튜브 링크 입력 테스트</title>
    <style>
        body { 
            background: #222; 
            color: white; 
            font-family: 'Pretendard', sans-serif; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        #video-placeholder { 
            width: 560px; 
            height: 315px; 
            border-radius: 8px; 
        }
        #lyrics-box { 
            font-size: 32px; 
            margin-top: 30px; 
            text-shadow: 2px 2px 8px black; 
            min-height: 1.5em; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="video-placeholder"></div>
    <div id="lyrics-box">영상을 재생하면 가사가 나옵니다.</div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // 1. [유튜브 링크 입력] 여기에 주소를 직접 넣으세요!
        const TEST_VIDEO_URL = 'https://www.youtube.com/watch?v=ioNng23DkIM'; 
        
        // 2. 가사 데이터
        const testLyrics = [
            { time: 0, text: "(준비 중)" },
            { time: 5, text: "테스트 가사 1번입니다" },
            { time: 10, text: "유튜브 링크 연동 성공!" },
            { time: 15, text: "가사가 잘 나오나요?" }
        ];

        // 유튜브 링크에서 ID만 추출하는 함수
        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        let player;
        const videoId = extractVideoID(TEST_VIDEO_URL);

        function onYouTubeIframeAPIReady() {
            if (!videoId) {
                document.getElementById('lyrics-box').innerText = "유튜브 주소가 올바르지 않습니다.";
                return;
            }

            player = new YT.Player('video-placeholder', {
                height: '315',
                width: '560',
                videoId: videoId,
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        let updateInterval;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                updateInterval = setInterval(() => {
                    const currentTime = player.getCurrentTime();
                    let currentLyric = testLyrics[0]; 
                    for (let i = 0; i < testLyrics.length; i++) {
                        if (testLyrics[i].time <= currentTime) {
                            currentLyric = testLyrics[i];
                        } else {
                            break;
                        }
                    }
                    document.getElementById('lyrics-box').innerText = currentLyric.text;
                }, 100);
            } else {
                clearInterval(updateInterval);
            }
        }
    </script>
</body>
</html>
