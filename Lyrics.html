<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LRC Lyric Player (TSV)</title>
    <style>
        body { background: transparent; color: white; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #player-container { width: 560px; height: 315px; margin: 20px auto; display: block; }
        #lyrics-box { 
            font-size: 38px; 
            font-weight: bold; 
            text-shadow: 3px 3px 12px rgba(0,0,0,1); 
            color: #ffffff; 
            margin-top: 20px;
            padding: 0 20px;
            line-height: 1.5;
            min-height: 2em;
        }
        .input-area { margin: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
        input { width: 300px; padding: 8px; }
    </style>
</head>
<body>
    <div class="input-area">
        <input type="text" id="youtube-url" placeholder="유튜브 주소를 입력하세요">
        <button onclick="loadVideo()">영상 로드</button>
    </div>

    <div id="player-container"><div id="video-placeholder"></div></div>
    <div id="lyrics-box">주소를 입력하고 로드 버튼을 눌러주세요.</div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgjgI5Ut2uiEeXFOGUBb4tvYv-ghCfSfAvA1rvaYKuxiIH-vt02INQ34CaeksH6ZwGyXEKGeAh2p7L/pub?output=tsv';

        let player;
        let lyrics = [];
        let updateInterval;

        // [01:12.738] 형식을 초 단위로 변환
        function parseTime(timeStr) {
            const match = timeStr.match(/\[(\d{2}):(\d{2}\.\d+)\]/);
            if (match) {
                return (parseFloat(match[1]) * 60) + parseFloat(match[2]);
            }
            return null;
        }

        async function fetchLyricsFromSheet() {
            try {
                const response = await fetch(TSV_URL);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split('\t')); // 탭(TSV) 기준으로 분리

                lyrics = [];
                // C열(index 2)에 있는 모든 행의 가사 데이터를 통합 파싱
                rows.slice(1).forEach(cols => {
                    if (cols[2]) {
                        const lines = cols[2].split(/[\r\n]+/); // 한 셀 안의 줄바꿈 처리
                        lines.forEach(line => {
                            const time = parseTime(line);
                            const text = line.replace(/\[.*?\]/, "").trim();
                            if (time !== null && text) {
                                lyrics.push({ time, text });
                            }
                        });
                    }
                });

                lyrics.sort((a, b) => a.time - b.time);
                console.log("가사 로드 완료:", lyrics);
            } catch (e) {
                console.error("데이터 로드 실패:", e);
                document.getElementById('lyrics-box').innerText = "시트 로드 실패";
            }
        }

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('video-placeholder', {
                height: '315', width: '560',
                events: { 'onStateChange': onPlayerStateChange }
            });
            fetchLyricsFromSheet();
        }

        function loadVideo() {
            const url = document.getElementById('youtube-url').value;
            const videoId = extractVideoID(url);
            if (videoId) {
                player.loadVideoById(videoId);
                document.getElementById('lyrics-box').innerText = "재생 버튼을 눌러주세요.";
            } else {
                alert("유튜브 주소를 확인해주세요.");
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                if (updateInterval) clearInterval(updateInterval);
                updateInterval = setInterval(() => {
                    const now = player.getCurrentTime();
                    let current = { text: "" };
                    for (let i = 0; i < lyrics.length; i++) {
                        if (lyrics[i].time <= now) current = lyrics[i];
                        else break;
                    }
                    document.getElementById('lyrics-box').innerText = current.text;
                }, 100);
            } else {
                clearInterval(updateInterval);
            }
        }
    </script>
</body>
</html>
