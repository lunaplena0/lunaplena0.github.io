<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOD 기록함</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="js/common.js"></script>
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/vodlist.css"> 
</head>
<body>
<div id="loading-overlay">
    <div id="wave-text" class="wave-text"></div>
</div>
<div class="wrapper">
    <div class="card profile-box">
        <div class="profile-info">
            <h1>🎬 VOD 기록함</h1>
            <p>바다비 VOD 통계 및 기록</p>
        </div>
        <div class="header-buttons">
    <a href="#" class="link-btn btn-summary" onclick="openSummary(event)">📅 요약 보고서</a>
    <a href="index.html" class="link-btn btn-back">돌아가기</a>
</div>
    </div>

    <div class="bottom-section">
        <div class="card">
    <h2>📊 전체 다시보기 통계</h2>
    <div class="item-row">
        <span class="stat-label">전체 누적 시간</span>
        <span id="statTotalTime" class="stat-value">-</span>
    </div>
    <div class="item-row">
        <span class="stat-label">구독+ 방송시간 및 비율</span>
        <span id="statPlusTimeRatio" class="stat-value" style="color:#ffcc00;">-</span>
    </div>
    <div class="item-row">
        <span class="stat-label">최대 방송시간</span>
        <span id="statMaxTime" class="stat-value">-</span>
    </div>
    <div class="item-row">
        <span class="stat-label">평균 방송시간</span>
        <span id="statAvgTime" class="stat-value">-</span>
    </div>
    <div class="item-row">
        <span class="stat-label">최소 방송시간</span>
        <span id="statMinTime" class="stat-value">-</span>
    </div>
</div>

        <div class="card">
            <h2>📈 통합 태그 비중 (Top 5)</h2>
        </div>

        <div class="card">
            <h2>🏆 전체 태그 순위</h2>
            <div class="rank-grid">
                
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🎥 최근 다시보기 기록 (최신순)</h2>
        <div class="vod-list">
            
            </div>
    </div>

    <footer style="text-align: center; margin-top: 20px; padding: 10px 0; color: var(--text-sub); font-size: 10px; opacity: 0.6; width: 100%;">
        © 바다비 비공식 데이터 센터
    </footer>
</div>
<div id="vodModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <div class="modal-body">
            <img id="modalThumb" src="" class="modal-thumb">
            <div class="modal-details">
                <h3 id="modalTitle">제목</h3>
                <div class="modal-info-grid">
                    <div class="info-item">
                        <label>방송 날짜</label>
                        <span id="modalDate">0000-00-00</span>
                    </div>
                    <div class="info-item">
                        <label>방송 시간</label>
                        <span id="modalDuration">00:00:00</span>
                    </div>
                </div>
                <div id="modalTags" class="modal-tags"></div>
            </div>
        </div>
    </div>
</div>
   <div id="summaryModal" class="modal">
    <div class="modal-content" style="max-width: 850px; width: 95%;"> 
        <span class="close-btn" onclick="closeSummary()">&times;</span>
        
        <div class="modal-body" style="padding: 25px;">
            <div style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                
                <div class="card" style="margin:0; flex-direction: row; justify-content: space-between; align-items: center; background: linear-gradient(145deg, #051020, #02050a);">
                    <h2 style="border:none; font-size: 20px; line-height: 1.4; color: var(--accent-bright); margin:0;">
                        📅 방송 분석 리포트
                    </h2>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="selectYear" class="btn-back" style="padding: 6px 12px; border-radius: 6px; background: #16243a; color: white; border: 1px solid var(--border);"></select>
                        <select id="selectMonth" class="btn-back" style="padding: 6px 12px; border-radius: 6px; background: #16243a; color: white; border: 1px solid var(--border);">
                            <option value="all">연간 전체</option>
                            <option value="01">1월</option><option value="02">2월</option><option value="03">3월</option>
                            <option value="04">4월</option><option value="05">5월</option><option value="06">6월</option>
                            <option value="07">7월</option><option value="08">8월</option><option value="09">9월</option>
                            <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
                        </select>
                    </div>
                </div>

                <div class="card" style="margin:0; flex-direction: row; justify-content: space-around; padding: 25px; text-align: center;">
                    <div class="summary-item" style="background:none; padding:0;">
                        <label style="font-size: 11px; color: var(--text-sub); display: block; margin-bottom: 8px;">총 방송 시간</label>
                        <div id="rptTotalTime" style="font-size: 1.5rem; color: var(--accent-bright); font-weight: bold;">-</div>
                        <small id="diffTotalTime" class="diff-text"></small>
                    </div>
                    <div style="width: 1px; background: var(--border); height: 40px; align-self: center;"></div>
                    <div class="summary-item" style="background:none; padding:0;">
                        <label style="font-size: 11px; color: var(--text-sub); display: block; margin-bottom: 8px;">평균 방송 시간</label>
                        <div id="rptAvgTime" style="font-size: 1.3rem; font-weight: bold;">-</div>
                        <small id="diffAvgTime" class="diff-text"></small>
                    </div>
                    <div style="width: 1px; background: var(--border); height: 40px; align-self: center;"></div>
                    <div class="summary-item" style="background:none; padding:0;">
                        <label style="font-size: 11px; color: var(--text-sub); display: block; margin-bottom: 8px;">방송 횟수</label>
                        <div id="rptCount" style="font-size: 1.5rem; font-weight: bold;">-</div>
                        <small id="diffCount" class="diff-text"></small>
                    </div>
                </div>

                <div class="card" style="margin:0;">
                    <h2 style="font-size: 14px; margin-bottom: 15px;">📝 카테고리별 요약</h2>
                    <div id="rptCategory" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px;">
                        </div>
                </div>
                
                <div class="card" style="margin:0;">
                    <h2 style="font-size: 14px; margin-bottom: 15px;">📊 전체 태그 순위</h2>
                    <div id="rptTags" class="rank-grid" style="grid-template-columns: repeat(3, 1fr); column-gap: 20px;">
                        </div>
                </div>

                <div class="card" style="margin:0;">
                    <h2 style="font-size: 14px; margin-bottom: 15px;">🎥 방송 목록</h2>
                    <div id="rptVodList" class="vod-list" style="max-height: 400px; overflow-y: auto;">
                        </div>
                </div>

            </div>
        </div>
    </div>
</div>
    
    <script src="js/loading.js"></script>
<script src="js/vodlist.js"></script>
</body>
</html>
