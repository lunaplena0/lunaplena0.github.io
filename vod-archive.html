<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 다시보기 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010306;
            --card-bg: #030812;
            --accent: #3385ff;
            --text-main: #f0faff;
            --text-sub: #5c7285;
            --border: #0a1425;
            --modal-bg: rgba(0, 0, 0, 0.9);
            --plus-color: #ffcc00;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at top right, #051020 0%, #010306 100%);
            color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; 
        }
        body.modal-open { overflow: hidden; }

        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }

        /* 헤더 */
        .header-card { 
            background: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-info h1 { margin: 0; font-size: 22px; color: var(--accent); }
        .btn-home { text-decoration: none; color: var(--text-main); background: #0a1a30; padding: 8px 14px; border-radius: 8px; font-size: 13px; border: 1px solid var(--border); transition: 0.3s; }

        /* 대시보드 */
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; }
        .total-info h2 { font-size: 26px; margin: 5px 0 0 0; color: var(--accent); }
        .divider { border: 0; height: 1px; background: var(--border); margin: 20px 0; }
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sub-val { font-size: 14px; font-weight: bold; color: #fff; display: block; margin-top: 2px; }
        .sub-lbl { font-size: 10px; color: var(--text-sub); display: block; }

        /* 차트 */
        .chart-box { align-items: center; text-align: center; }
        #category-chart {
            width: 120px; height: 120px; border-radius: 50%;
            position: relative; margin-bottom: 20px;
            background: conic-gradient(#333 0% 100%);
        }
        #category-chart::after { content: ""; position: absolute; inset: 22px; background: var(--card-bg); border-radius: 50%; }
        .chart-legend { font-size: 11px; color: var(--text-sub); display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.03); padding: 4px 8px; border-radius: 6px; }
        .legend-percent { color: var(--text-main); font-weight: bold; margin-left: 2px; }
        .dot { width: 8px; height: 8px; border-radius: 2px; }

        /* 리스트 관련 */
        .date-header { font-size: 16px; font-weight: bold; color: var(--accent); margin: 35px 0 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .vod-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; cursor: pointer; transition: 0.2s; overflow: hidden; margin-bottom: 12px; }
        .vod-thumb { width: 140px; height: 80px; position: relative; min-width: 140px; }
        .vod-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 5px; border-radius: 4px; }
        .vod-body { padding: 12px 15px; display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; }
        
        .vod-title { 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 8px;
            width: 100%;
        }
        .title-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        /* [핵심] 모든 태그 디자인 강제 통일 */
       .tag-common {
    display: inline-flex !important; /* flex 유지 */
    align-items: center !important;  /* 수직 중앙 */
    justify-content: center !important; /* 수평 중앙 */
    
    /* 높이와 폰트 크기 고정 */
    height: 22px !important; 
    padding: 0 10px !important; /* 여백을 조금 더 줌 */
    border-radius: 4px;
    font-size: 11px !important;
    font-weight: 800;
    white-space: nowrap;
    
    /* [핵심] line-height를 높이와 똑같이 주면 글자가 중앙으로 옵니다 */
    line-height: 22px !important; 
    box-sizing: border-box;
}
       .tag-plus { background: var(--plus-color); color: #000; flex-shrink: 0; }
        .cat-badge {
    margin-right: 6px !important;
    margin-bottom: 6px !important;
    /* min-width 삭제 (글자 길이에 맞게) */
}

        /* 모달 상세 */
        #modal-overlay { position: fixed; inset: 0; background: var(--modal-bg); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); padding: 20px; }
        #modal-content { background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; max-height: 90vh; overflow-y: auto; }
        .modal-body { padding: 20px; }
        .info-row { border-left: 3px solid var(--border); padding-left: 12px; margin-bottom: 18px; display: none; }
        .info-row.is-active { display: block; }
        
        .m-val-text { font-size: 14px; line-height: 1.8; color: var(--text-main); }
        .m-prefix { color: var(--accent); font-weight: bold; margin-right: 6px; font-size: 13px; }
        .m-time { color: var(--text-sub); font-family: monospace; font-size: 12px; margin-left: 5px; }

        .btn-action { display: block; width: 100%; padding: 14px; text-align: center; border-radius: 12px; font-weight: bold; text-decoration: none; margin-top: 10px; cursor: pointer; border: none; font-size: 14px; }
        .btn-go { background: var(--accent); color: white; }
        .btn-close { background: #1a202c; color: var(--text-sub); }

        /* 모바일 최적화 */
        @media (max-width: 650px) { 
            .dashboard-grid { grid-template-columns: 1fr; } 
            .header-info h1 { font-size: 18px; }
            .total-info h2 { font-size: 22px; }
            .vod-thumb { width: 110px; height: 65px; min-width: 110px; }
            .vod-title { font-size: 13px; }
            .m-val-text { font-size: 13px; }
            
           .tag-common {
        height: 20px !important; /* 모바일 높이 고정 */
        line-height: 20px !important; /* 높이와 일치시켜 중앙 정렬 */
        font-size: 10px !important;
        padding: 0 8px !important;
    }

    .cat-badge {
        margin-right: 4px !important;
        margin-bottom: 4px !important;
    }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>바다비 다시보기 아카이브</h1>
            <div id="update-time" style="font-size:11px; color:var(--text-sub); margin-top:4px;">불러오는 중...</div>
        </div>
        <a href="index.html" class="btn-home">🏠 홈으로</a>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <div class="total-info">
                <span style="font-size:11px; color:var(--text-sub);">전체 영상 누적 시청 시간</span>
                <h2 id="total-hour">0시간 0분</h2>
            </div>
            <hr class="divider">
            <div class="sub-grid">
                <div class="sub-item"><span class="sub-lbl">최장 방송</span><span class="sub-val" id="max-time">0:00:00</span></div>
                <div class="sub-item"><span class="sub-lbl">최단 방송</span><span class="sub-val" id="min-time">0:00:00</span></div>
                <div class="sub-item"><span class="sub-lbl">평균 시간</span><span class="sub-val" id="avg-time">0:00:00</span></div>
            </div>
        </div>
        <div class="stat-card chart-box">
            <div id="category-chart"></div>
            <div id="legend" class="chart-legend"></div>
        </div>
    </div>

    <div id="vod-content"></div>
</div>

<div id="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div id="modal-content">
        <img id="m-thumb" style="width:100%; height:200px; object-fit:cover;">
        <div class="modal-body">
            <div id="m-title-area" style="margin-bottom:20px;">
                <div id="m-title" style="font-weight:bold; font-size:17px; line-height:1.4;"></div>
                <div id="m-plus" style="margin-top:8px;"></div>
            </div>
            
            <div class="info-row is-active">
                <span class="sub-lbl" style="margin-bottom:5px;">📅 방송 정보</span>
                <span id="m-date" class="m-val-text"></span>
            </div>
            
            <div id="row-cat" class="info-row is-active">
                <span class="sub-lbl" style="margin-bottom:5px;">🔖 컨텐츠 분류</span>
                <div id="m-cat-val"></div>
            </div>
            
            <div id="row-game" class="info-row">
                <span class="sub-lbl" style="margin-bottom:5px;">🎮 게임 리스트</span>
                <div id="m-game" class="m-val-text"></div>
            </div>
            
            <div id="row-song" class="info-row">
                <span class="sub-lbl" style="margin-bottom:5px;">🎵 노래 리스트</span>
                <div id="m-song" class="m-val-text"></div>
            </div>

            <a id="m-link" href="#" target="_blank" class="btn-action btn-go">영상 시청하기 ↗</a>
            <button class="btn-action btn-close" onclick="closeModal()">닫기</button>
        </div>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv";
    
    const catColors = {
        '게임': '#4a33ff', '노래': '#ff3385', '소통': '#33cc85', 'ASMR': '#9d56ff',
        '풀트': '#ff8800', '시네티': '#00d4ff', '대회': '#ff3333', '합방': '#ff3333', '기타': '#7a8aa7'
    };

    function getColor(name) {
        for(let key in catColors) { if(name.includes(key)) return catColors[key]; }
        return catColors['기타'];
    }

    function timeToSeconds(t) {
        if(!t || t === '-') return 0;
        const p = t.split(':').map(Number);
        return (p[0] * 3600) + (p[1] * 60) + (p[2] || 0);
    }

    function secondsToTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    window.onload = () => {
        fetch(sheetUrl + `&t=${new Date().getTime()}`)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(l => l.trim() !== "");
                let vods = [];
                for (let i = 1; i < lines.length; i++) {
                    const p = lines[i].split('\t').map(v => v.trim());
                    if(!p[0]) continue;
                    vods.push({
                        date: p[0], title: p[1], link: p[2], thumb: p[3], 
                        totalTime: p[4], isPlus: p[5] === '예',
                        gName: p[6], gTime: p[7], sName: p[8], sTime: p[9], category: p[10]
                    });
                }
                vods.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderList(vods);
                calculateAllStats(vods);
                document.getElementById('update-time').textContent = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            });
    };

    function calculateAllStats(data) {
        let totalSec = 0, maxSec = 0, minSec = Infinity;
        let catMap = {};
        data.forEach(v => {
            const s = timeToSeconds(v.totalTime);
            if(s > 0) { totalSec += s; maxSec = Math.max(maxSec, s); minSec = Math.min(minSec, s); }
            const cats = v.category.split(/[,/ ]+/).filter(c => c.trim() !== "");
            cats.forEach(c => { catMap[c] = (catMap[c] || 0) + 1; });
        });
        document.getElementById('total-hour').textContent = `${Math.floor(totalSec / 3600)}시간 ${Math.floor((totalSec % 3600) / 60)}분`;
        document.getElementById('max-time').textContent = secondsToTime(maxSec);
        document.getElementById('min-time').textContent = secondsToTime(minSec);
        document.getElementById('avg-time').textContent = secondsToTime(Math.floor(totalSec / data.length));
        const sortedCats = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
        const totalCount = Object.values(catMap).reduce((a, b) => a + b, 0);
        let currentPos = 0;
        const gradientParts = sortedCats.map(([name, count]) => {
            const start = currentPos; const end = currentPos + (count / totalCount * 100);
            currentPos = end; return `${getColor(name)} ${start}% ${end}%`;
        });
        document.getElementById('category-chart').style.background = `conic-gradient(${gradientParts.join(', ')})`;
        const legend = document.getElementById('legend');
        legend.innerHTML = sortedCats.map(([name, count]) => {
            const percent = Math.round((count / totalCount) * 100);
            return `<div class="legend-item"><span class="dot" style="background:${getColor(name)}"></span>${name}<span class="legend-percent">${percent}%</span></div>`;
        }).join('');
    }

    function renderList(data) {
        const container = document.getElementById('vod-content');
        container.innerHTML = '';
        const groups = {};
        data.forEach(v => { if(!groups[v.date]) groups[v.date] = []; groups[v.date].push(v); });
        Object.keys(groups).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'date-group';
            groupDiv.innerHTML = `<div class="date-header">${date}</div><div class="vod-list"></div>`;
            groups[date].forEach(v => {
                const item = document.createElement('div');
                item.className = 'vod-item';
                item.onclick = () => openModal(v);
                const plusTag = v.isPlus ? `<span class="tag-common tag-plus">구독+</span>` : '';
                item.innerHTML = `
                    <div class="vod-thumb"><img src="${v.thumb}"><span class="duration">${v.totalTime}</span></div>
                    <div class="vod-body">
                        <div class="vod-title">
                            <span class="title-text">${v.title}</span>
                            ${plusTag}
                        </div>
                        <div style="font-size:10px; color:var(--text-sub); display:flex; gap:5px; flex-wrap:wrap;">
                            ${v.category.split(/[,/ ]+/).map(c => `<span style="color:${getColor(c)}">● ${c}</span>`).join('')}
                        </div>
                    </div>`;
                groupDiv.querySelector('.vod-list').appendChild(item);
            });
            container.appendChild(groupDiv);
        });
    }

    function openModal(v) {
        document.getElementById('m-thumb').src = v.thumb;
        document.getElementById('m-title').textContent = v.title;
        document.getElementById('m-date').textContent = `${v.date} (${v.totalTime})`;
        document.getElementById('m-link').href = v.link;
        
        // 팝업 내 구독 태그 (인라인 스타일 제거)
        document.getElementById('m-plus').innerHTML = v.isPlus ? `<span class="tag-common tag-plus">구독 플러스 전용 다시보기</span>` : '';
        
        const catContainer = document.getElementById('m-cat-val');
        catContainer.innerHTML = v.category.split(/[,/ ]+/).map(c => 
            `<span class="tag-common cat-badge" style="background:${getColor(c)}">${c}</span>`
        ).join('');

        const setRow = (id, valId, prefix, name, time) => {
            const row = document.getElementById(id);
            if(name && name !== "-") {
                row.classList.add('is-active');
                const names = name.split(',');
                const times = time.split(',');
                document.getElementById(valId).innerHTML = names.map((n, i) => 
                    `<div><span class="m-prefix">${prefix}</span>${n.trim()}<span class="m-time">(${times[i]?.trim() || ''})</span></div>`
                ).join('');
            } else row.classList.remove('is-active');
        };

        setRow('row-game', 'm-game', '게임', v.gName, v.gTime);
        setRow('row-song', 'm-song', '노래', v.sName, v.sTime);

        document.getElementById('modal-overlay').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.body.classList.remove('modal-open');
    }
</script>
</body>
</html>
