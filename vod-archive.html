<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다시보기 기록함</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link id="favicon" rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="js/common.js"></script>
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/vod-archive.css">
</head>
<body class="loading">

<div id="loading-overlay">
    <div id="wave-text" class="wave-text"></div>
</div>

<div class="wrapper">
    <div class="header-card" style="display: flex; justify-content: space-between; align-items: center; gap: 15px;">
    <div class="header-info" style="flex: 1;">
        <h1 style="margin: 0;">다시보기 기록함</h1>
        <div id="update-time" style="font-size:11px; color:var(--text-sub); margin-top:4px;">불러오는 중...</div>
    </div>

    <div class="header-buttons" style="display: flex; gap: 8px; flex-shrink: 0;">
        <button class="btn-analysis-report" onclick="openAnalysisModal()" style="margin: 0; padding: 8px 12px; font-size: 13px;">
            📊 상세 분석
        </button>
        <a href="index.html" class="btn-home" style="margin: 0; white-space: nowrap;">🏠 홈으로</a>
    </div>
</div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <div style="display: flex; justify-content: space-around; align-items: center; padding: 10px 0;">
                <div style="text-align: center; flex: 1;">
                    <span style="font-size:11px; color:var(--text-sub); display:block; margin-bottom:6px;">전체 누적 시간</span>
                    <h2 id="total-hour" style="margin: 0; font-size: 24px; font-weight: 700; color: var(--accent);">0시간 0분</h2>
                </div>
                <div style="width: 1px; height: 40px; background: var(--border);"></div>
                <div style="text-align: center; flex: 1;">
    <span style="font-size:11px; color:#e6e02e; font-weight: bold; display:block; margin-bottom:6px;">⭐ 구독플러스 비중</span>
    
    <div style="display: flex; align-items: baseline; justify-content: center; gap: 6px;">
        <span id="plus-hour" style="font-size: 18px; font-weight: bold; color: #fff;">0시간 0분</span>
        <span id="plus-ratio" style="font-size: 11px; color: #e6e02e; font-weight: bold; opacity: 0.9;"> (0.0%)</span>
    </div>
</div>
            </div>
            <hr class="divider">
            <div class="sub-grid">
                <div style="text-align: center;"><span class="sub-lbl">최장 방송</span><span class="sub-val" id="max-time">0:00:00</span></div>
                <div style="text-align: center;"><span class="sub-lbl">최단 방송</span><span class="sub-val" id="min-time">0:00:00</span></div>
                <div style="text-align: center;"><span class="sub-lbl">평균 시간</span><span class="sub-val" id="avg-time">0:00:00</span></div>
            </div>
        </div>

        <div class="stat-card chart-box">
            <div id="category-chart"></div>
            <div id="legend" class="chart-legend"></div>
        </div>
    </div>

    <div id="tag-filter-container"></div>
    <div id="vod-content"></div>
    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px; width: 100%; box-sizing: border-box;">
    <p style="margin: 0; opacity: 0.8; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word;">
        <strong style="display: block; margin-bottom: 5px; color: var(--text-main); font-size: 12px;">바다비 비공식 팬 아카이브</strong>
        모든 권리는 원저작권자(바다비/SOOP)에게 있으며 요청 시 수정·삭제됩니다.<br>
        <span style="display: inline-block;">비영리로 운영되며, 정보 갱신 시 데이터 반영에 차이가 있을 수 있습니다.</span>
    </p>
</footer>
</div>

<div id="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div id="modal-content">
        <img id="m-thumb" style="width:100%; height:200px; object-fit:cover;">
        <div style="padding: 20px;">
            <div id="m-title-area" style="margin-bottom:20px;">
                <div id="m-title" style="font-weight:bold; font-size:17px; line-height:1.4;"></div>
                <div id="m-plus" style="margin-top:8px;"></div>
            </div>
            <div style="border-left: 3px solid var(--border); padding-left: 12px; margin-bottom: 18px;">
                <span style="font-size:11px; color:var(--text-sub); display:block; margin-bottom:5px;">📅 방송 정보</span>
                <span id="m-date" style="font-size:14px; color:var(--text-main);"></span>
            </div>
            <div id="row-game" style="display:none; margin-bottom:15px;">
    <span style="font-size:11px; color:#70a1ff; font-weight:bold; display:block; margin-bottom:5px;">🎮 게임</span>
    <div id="m-game" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);"></div>
</div>

<div id="row-song" style="display:none; margin-bottom:15px;">
    <span style="font-size:11px; color:#ff7eb9; font-weight:bold; display:block; margin-bottom:5px;">🎵 노래</span>
    <div id="m-song" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);"></div>
</div>

<div id="row-talk" style="display:none; margin-bottom:15px;">
    <span style="font-size:11px; color:#2ed573; font-weight:bold; display:block; margin-bottom:5px;">💬 소통</span>
    <div id="m-talk" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);"></div>
</div>

<div id="row-content" style="display:none; margin-bottom:15px;">
    <div style="font-size:11px; color:var(--accent); font-weight:bold; margin-bottom:5px;">🎬 컨텐츠</div>
    <div id="m-content" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);"></div>
</div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <a id="m-link" href="#" target="_blank" class="btn-action btn-go">시청하기 ↗</a>
                <button class="btn-action btn-close" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>
</div>

<div id="analysis-overlay" onclick="if(event.target === this) closeAnalysisModal()">
    <div class="analysis-content">
        <div class="analysis-header">
            <h3 style="margin:0; font-size:18px; color:var(--accent);">📊 기간별 상세 분석</h3>
            <div class="analysis-controls">
                <select id="analysis-year" onchange="renderAnalysis()"></select>
                <select id="month-select" onchange="renderAnalysis()">
                    <option value="all">전체 월</option>
                    </select>
                <select id="analysis-type" onchange="renderAnalysis()">
                    <option value="month">월별 보기</option>
                    <option value="year">연도별 요약</option>
                </select>
            </div>
        </div>
        
        <div id="analysis-result">
            </div>

        <div class="analysis-footer">
            <button class="btn-action btn-close" style="width: 100%;" onclick="closeAnalysisModal()">닫기</button>
        </div>
    </div>
</div>
<script src="js/loading.js"></script>
<script src="js/vod-archive.js"></script>
    
</body>
</html>
