<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 다시보기 기록함</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [기존 스타일 완벽 복구] */
        :root { --bg-color: #010306; --card-bg: #030812; --accent: #3385ff; --text-main: #f0faff; --text-sub: #5c7285; --border: #0a1425; --modal-bg: rgba(0, 0, 0, 0.9); }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); background-image: radial-gradient(circle at top right, #051020 0%, #010306 100%); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        body.modal-open { overflow: hidden; }
        body.loading { overflow: hidden; }

        .wrapper { width: 100%; max-width: 900px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* 헤더 */
        .header-card { background: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .header-info h1 { margin: 0; font-size: 22px; color: var(--accent); }
        .btn-home { text-decoration: none; color: var(--text-main); background: #0a1a30; padding: 8px 14px; border-radius: 8px; font-size: 13px; border: 1px solid var(--border); transition: 0.3s; }

        /* 대시보드 */
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; }
        .divider { border: 0; height: 1px; background: var(--border); margin: 20px 0; }
        
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sub-val { font-size: 14px; font-weight: bold; color: #fff; display: block; margin-top: 2px; }
        .sub-lbl { font-size: 10px; color: var(--text-sub); display: block; }

        /* 차트 */
        .chart-box { align-items: center; text-align: center; }
        #category-chart { width: 110px; height: 110px; border-radius: 50%; position: relative; margin-bottom: 15px; }
        #category-chart::after { content: ""; position: absolute; inset: 20px; background: var(--card-bg); border-radius: 50%; }
        .chart-legend { font-size: 11px; color: var(--text-sub); display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }

        /* 리스트 스타일 (기존 콤팩트 스타일 유지) */
        .date-header { font-size: 16px; font-weight: bold; color: var(--accent); margin: 35px 0 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .vod-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; cursor: pointer; transition: 0.2s; overflow: hidden; margin-bottom: 12px; height: 85px; }
        .vod-item:hover { border-color: var(--accent); background: rgba(51, 133, 255, 0.05); }
        .vod-thumb { width: 150px; height: 100%; position: relative; min-width: 150px; }
        .vod-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 5px; border-radius: 4px; }
        .vod-body { padding: 10px 15px; display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; }
        .vod-title { font-size: 14px; font-weight: bold; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 태그 스타일 */
        .tag-common { display: inline-flex; align-items: center; justify-content: center; height: 18px; padding: 0 8px; border-radius: 5px; font-size: 10px; font-weight: 800; white-space: nowrap; }
        .tag-plus { background: #121f33; color: #e6e02e; border: 1px solid #e6e02e; }

        /* 모달 (기존 레이아웃 복구) */
        #modal-overlay, #analysis-overlay { position: fixed; inset: 0; background: var(--modal-bg); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); padding: 20px; }
        #modal-content { background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; max-height: 90vh; overflow-y: auto; scrollbar-width: none; }
        #modal-content::-webkit-scrollbar { display: none; }
        
        .modal-body { padding: 20px; }
        .info-row { border-left: 3px solid var(--border); padding-left: 12px; margin-bottom: 18px; display: none; }
        .info-row.is-active { display: block; }
        .m-val-text { font-size: 13px; line-height: 1.7; color: var(--text-main); }
        
        .btn-action { flex: 1; padding: 14px; text-align: center; border-radius: 12px; font-weight: bold; text-decoration: none; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; }
        .btn-go { background: var(--accent); color: white; }
        .btn-close { background: #1a202c; color: #a0aec0; }

        /* 로딩 */
        #loading-overlay { position: fixed; inset: 0; background: #010306; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader-circle { width: 40px; height: 40px; border: 3px solid #0a1425; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="loading">

<div id="loading-overlay">
    <div class="loader-circle"></div>
    <div style="color:var(--accent); margin-top:15px; font-size:13px; letter-spacing:1px;">기록함을 불러오고 있습니다...</div>
</div>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>바다비 다시보기 기록함</h1>
            <div id="update-time" style="font-size:11px; color:var(--text-sub); margin-top:4px;">불러오는 중...</div>
        </div>
        <a href="index.html" class="btn-home">🏠 홈으로</a>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <div style="display: flex; justify-content: space-around; align-items: center; text-align: center;">
                <div style="flex:1;">
                    <span class="sub-lbl">누적 시청 시간</span>
                    <h2 id="total-hour" style="margin:5px 0 0 0; font-size:22px; color:var(--accent);">0시간</h2>
                </div>
                <div style="width:1px; height:30px; background:var(--border);"></div>
                <div style="flex:1;">
                    <span class="sub-lbl" style="color:#e6e02e;">⭐ 구독플러스</span>
                    <h2 id="plus-hour" style="margin:5px 0 0 0; font-size:18px;">0시간</h2>
                </div>
            </div>
            <hr class="divider">
            <div class="sub-grid">
                <div style="text-align:center;"><span class="sub-lbl">최장</span><span id="max-time" class="sub-val">-</span></div>
                <div style="text-align:center;"><span class="sub-lbl">최단</span><span id="min-time" class="sub-val">-</span></div>
                <div style="text-align:center;"><span class="sub-lbl">평균</span><span id="avg-time" class="sub-val">-</span></div>
            </div>
            <button onclick="openAnalysisModal()" style="margin-top:15px; width:100%; padding:10px; background:rgba(51,133,255,0.1); border:1px dashed var(--accent); color:var(--accent); border-radius:8px; cursor:pointer; font-size:11px; font-weight:bold;">📊 기간별 상세 분석 리포트</button>
        </div>
        <div class="stat-card chart-box">
            <div id="category-chart"></div>
            <div id="legend" class="chart-legend"></div>
        </div>
    </div>

    <div id="vod-content"></div>
</div>

<div id="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div id="modal-content">
        <img id="m-thumb" style="width:100%; height:200px; object-fit:cover;">
        <div class="modal-body">
            <div id="m-title-area" style="margin-bottom:20px;">
                <div id="m-title" style="font-weight:bold; font-size:17px; line-height:1.4;"></div>
                <div id="m-plus" style="margin-top:8px;"></div>
            </div>
            
            <div class="info-row is-active">
                <span class="sub-lbl">📅 방송 정보</span>
                <span id="m-date" class="m-val-text"></span>
            </div>

            <div id="row-game" class="info-row">
                <span class="sub-lbl">🎮 게임 리스트</span>
                <div id="m-game" class="m-val-text"></div>
            </div>

            <div id="row-song" class="info-row">
                <span class="sub-lbl">🎵 노래 리스트</span>
                <div id="m-song" class="m-val-text"></div>
            </div>

            <div id="row-talk" class="info-row">
                <span class="sub-lbl">💬 소통 및 컨텐츠</span>
                <div id="m-talk" class="m-val-text"></div>
            </div>

            <div class="modal-footer" style="display:flex; gap:10px; margin-top:20px;">
                <a id="m-link" href="#" target="_blank" class="btn-action btn-go">시청하기 ↗</a>
                <button class="btn-action btn-close" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>
</div>

<div id="analysis-overlay">
    <div style="background:var(--card-bg); width:100%; max-width:500px; max-height:80vh; border-radius:20px; border:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden;">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; font-size:16px; color:var(--accent);">📊 기간별 분석</h3>
            <select id="analysis-year" onchange="renderAnalysis()" style="background:#0a1a30; color:#fff; border:1px solid var(--border); border-radius:4px; padding:3px 6px; font-size:12px;"></select>
        </div>
        <div id="analysis-result" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <div style="padding:10px; border-top:1px solid var(--border);">
            <button onclick="closeAnalysisModal()" style="width:100%; padding:10px; background:#1a202c; color:#a0aec0; border:none; border-radius:10px; cursor:pointer;">닫기</button>
        </div>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv";
    let allVods = [];

    const catColors = { '게임': '#70a1ff', '노래': '#ff7eb9', '소통': '#2ed573', 'ASMR': '#cd84f1', '합방': '#fffa65', '기타': '#d2dae2' };
    const tagBaseStyle = `display:inline-flex; align-items:center; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:bold; background:#121f33; line-height:1.2; margin-right:4px; margin-top:4px; border:1px solid;`;

    function getColor(name) { for (let key in catColors) { if (name.includes(key)) return catColors[key]; } return catColors['기타']; }
    function timeToSeconds(t) { if (!t || t === '-') return 0; const p = t.split(':').map(Number); return (p[0] * 3600) + (p[1] * 60) + (p[2] || 0); }
    function secondsToTime(s) { const h = Math.floor(s / 3600); const m = Math.floor((s % 3600) / 60); const sec = s % 60; return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`; }

    // 기존 데이터 파싱 함수 (복구)
    function parseEntry(data) {
        if (!data || data === '-') return [];
        return data.split('\n').filter(line => line.trim() !== "").map(line => {
            const match = line.match(/^(.*?)\((.*?)\)$/);
            return match ? { name: match[1].trim(), time: match[2].trim() } : { name: line.trim(), time: "" };
        });
    }

    window.onload = () => {
        fetch(sheetUrl + `&t=${new Date().getTime()}`)
            .then(res => res.text())
            .then(tsv => {
                const lines = tsv.split(/\r?\n/).filter(l => l.trim() !== "");
                allVods = [];
                for (let i = 1; i < lines.length; i++) {
                    const p = lines[i].split('\t').map(v => v.trim());
                    if (!p[0]) continue;
                    allVods.push({
                        date: p[0], title: p[1], link: p[2], thumb: p[3], totalTime: p[4],
                        isPlus: p[5] === '예' || p[5] === 'O',
                        gData: p[7], sData: p[8], tData: p[9], cData: p[10], category: p[11] || "기타"
                    });
                }
                allVods.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderList(allVods);
                calculateStats(allVods);
                document.getElementById('update-time').textContent = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
                document.getElementById('loading-overlay').style.display = 'none';
                document.body.classList.remove('loading');
            });
    };

    function renderList(data) {
        const container = document.getElementById('vod-content');
        container.innerHTML = '';
        const groups = {};
        data.forEach(v => { if (!groups[v.date]) groups[v.date] = []; groups[v.date].push(v); });
        Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
            const groupDiv = document.createElement('div');
            groupDiv.innerHTML = `<div class="date-header">${date}</div><div class="vod-list"></div>`;
            groups[date].forEach(v => {
                const item = document.createElement('div');
                item.className = 'vod-item';
                item.onclick = () => openModal(v);
                item.innerHTML = `
                    <div class="vod-thumb"><img src="${v.thumb}"><span class="duration">${v.totalTime}</span></div>
                    <div class="vod-body">
                        <div class="vod-title">
                            <span class="title-text">${v.title}</span>
                            ${v.isPlus ? '<span class="tag-common tag-plus">구독+</span>' : ''}
                        </div>
                        <div style="display:flex; flex-wrap:wrap;">
                            ${v.category.split(/[,/ ]+/).filter(c => c.trim()).map(c => `<span style="${tagBaseStyle} color:${getColor(c)}; border-color:${getColor(c)}40;">${c}</span>`).join('')}
                        </div>
                    </div>`;
                groupDiv.querySelector('.vod-list').appendChild(item);
            });
            container.appendChild(groupDiv);
        });
    }

    // 모달 열기 함수 (기존 로직 완벽 복구)
    function openModal(v) {
        document.getElementById('m-thumb').src = v.thumb;
        document.getElementById('m-title').textContent = v.title;
        document.getElementById('m-date').textContent = `${v.date} (${v.totalTime})`;
        document.getElementById('m-link').href = v.link;
        document.getElementById('m-plus').innerHTML = v.isPlus ? `<span class="tag-common tag-plus" style="padding: 2px 8px; font-size: 11px;">구독플러스 전용</span>` : '';

        const renderSection = (rowId, valId, data, prefix) => {
            const row = document.getElementById(rowId);
            const val = document.getElementById(valId);
            const items = parseEntry(data);
            const color = getColor(prefix);
            if (items.length > 0) {
                row.classList.add('is-active');
                val.innerHTML = items.map(item => `
                    <div style="margin-bottom:6px; font-size:13px;">
                        <span style="display:inline-block; padding:1px 5px; font-size:9px; font-weight:bold; border-radius:3px; background:#121f33; color:${color}; border:1px solid ${color}40; margin-right:6px;">${prefix}</span>
                        <span style="color:var(--text-main);">${item.name}</span>
                        ${item.time ? `<span style="color:var(--text-sub); font-size:11px; margin-left:4px;">(${item.time})</span>` : ""}
                    </div>`).join('');
            } else { row.classList.remove('is-active'); }
        };

        renderSection('row-game', 'm-game', v.gData, '게임');
        renderSection('row-song', 'm-song', v.sData, '노래');
        renderSection('row-talk', 'm-talk', v.tData + (v.cData && v.cData !== '-' ? '\n' + v.cData : ''), '소통');

        document.getElementById('modal-overlay').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.body.classList.remove('modal-open'); }

    // 통계 및 분석 함수들
    function calculateStats(data) {
        let totalSec = 0, plusSec = 0, maxSec = 0, minSec = Infinity, catMap = {};
        data.forEach(v => {
            const s = timeToSeconds(v.totalTime);
            totalSec += s; if(v.isPlus) plusSec += s;
            maxSec = Math.max(maxSec, s); if(s > 0) minSec = Math.min(minSec, s);
            v.category.split(/[,/ ]+/).forEach(c => { if(c.trim()) catMap[c] = (catMap[c] || 0) + 1; });
        });
        document.getElementById('total-hour').textContent = `${Math.floor(totalSec / 3600)}시간`;
        document.getElementById('plus-hour').textContent = `${Math.floor(plusSec / 3600)}시간`;
        document.getElementById('max-time').textContent = secondsToTime(maxSec);
        document.getElementById('min-time').textContent = minSec === Infinity ? "0:00:00" : secondsToTime(minSec);
        document.getElementById('avg-time').textContent = secondsToTime(Math.floor(totalSec / (data.length || 1)));

        // 차트 렌더링
        const sortedCats = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
        const totalCount = Object.values(catMap).reduce((a,b)=>a+b, 0);
        let currentPos = 0;
        const gradient = sortedCats.map(([n, c]) => {
            const start = currentPos; const end = currentPos + (c / totalCount * 100);
            currentPos = end; return `${getColor(n)} ${start}% ${end}%`;
        });
        document.getElementById('category-chart').style.background = `conic-gradient(${gradient.join(', ')})`;
        document.getElementById('legend').innerHTML = sortedCats.slice(0, 5).map(([n, c]) => `<div class="legend-item"><span class="dot" style="background:${getColor(n)}"></span>${n}</div>`).join('');
    }

    function openAnalysisModal() {
        document.getElementById('analysis-overlay').style.display = 'flex';
        const years = [...new Set(allVods.map(v => v.date.split('-')[0]))].sort().reverse();
        document.getElementById('analysis-year').innerHTML = years.map(y => `<option value="${y}">${y}년</option>`).join('');
        renderAnalysis();
    }
    function closeAnalysisModal() { document.getElementById('analysis-overlay').style.display = 'none'; }

    function renderAnalysis() {
        const year = document.getElementById('analysis-year').value;
        const filtered = allVods.filter(v => v.date.startsWith(year));
        const months = {};
        filtered.forEach(v => {
            const m = v.date.substring(0, 7);
            if(!months[m]) months[m] = { time: 0, count: 0 };
            months[m].time += timeToSeconds(v.totalTime);
            months[m].count++;
        });
        document.getElementById('analysis-result').innerHTML = Object.keys(months).sort().reverse().map(m => `
            <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border);">
                <div><b style="color:var(--accent);">${m}</b> <span style="font-size:11px; color:var(--text-sub); margin-left:5px;">${months[m].count}회 방송</span></div>
                <div style="font-size:13px;">${Math.floor(months[m].time / 3600)}시간</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
