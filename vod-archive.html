<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 다시보기 기록함</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
   
    <link rel="stylesheet" href="style-vod-archive.css">
</head>
<body class="loading">

<div id="loading-overlay">
    <div class="loader-circle"></div>
    <div class="loader-text">소중한 기록들을 꺼내오고 있어요 . . .</div>
</div>

<div class="wrapper">
    <div class="header-card">
        <div class="header-info">
            <h1>바다비 다시보기 기록함</h1>
            <div id="update-time" style="font-size:11px; color:var(--text-sub); margin-top:4px;">불러오는 중...</div>
        </div>
        <a href="index.html" class="btn-home">🏠 홈으로</a>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <div style="display: flex; justify-content: space-around; align-items: center; padding: 10px 0;">
                <div style="text-align: center; flex: 1;">
                    <span style="font-size:11px; color:var(--text-sub); display:block; margin-bottom:6px;">전체 누적 시간</span>
                    <h2 id="total-hour" style="margin: 0; font-size: 24px; font-weight: 700; color: var(--accent);">0시간 0분</h2>
                </div>
                <div style="width: 1px; height: 40px; background: var(--border);"></div>
                <div style="text-align: center; flex: 1;">
                    <span style="font-size:11px; color:#e6e02e; font-weight: bold; display:block; margin-bottom:6px;">⭐ 구독플러스 비중</span>
                    <span id="plus-hour" style="font-size: 18px; font-weight: bold; color: #fff; display:block;">0시간 0분</span>
                    <span id="plus-ratio" style="font-size: 11px; color: #e6e02e; font-weight: bold; opacity: 0.9;">(0.0%)</span>
                </div>
            </div>
            <hr class="divider">
            <div class="sub-grid">
                <div style="text-align: center;"><span class="sub-lbl">최장 방송</span><span class="sub-val" id="max-time">0:00:00</span></div>
                <div style="text-align: center;"><span class="sub-lbl">최단 방송</span><span class="sub-val" id="min-time">0:00:00</span></div>
                <div style="text-align: center;"><span class="sub-lbl">평균 시간</span><span class="sub-val" id="avg-time">0:00:00</span></div>
            </div>
            <button onclick="openAnalysisModal()" style="margin-top: 20px; width: 100%; padding: 12px; background: rgba(51, 133, 255, 0.1); border: 1px dashed var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;">📊 기간별 상세 분석 리포트 보기</button>
        </div>

        <div class="stat-card chart-box">
            <div id="category-chart"></div>
            <div id="legend" class="chart-legend"></div>
        </div>
    </div>

    <div id="tag-filter-container"></div>
    <div id="vod-content"></div>
</div>

<div id="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div id="modal-content">
        <img id="m-thumb" style="width:100%; height:200px; object-fit:cover;">
        <div style="padding: 20px;">
            <div id="m-title-area" style="margin-bottom:20px;">
                <div id="m-title" style="font-weight:bold; font-size:17px; line-height:1.4;"></div>
                <div id="m-plus" style="margin-top:8px;"></div>
            </div>
            <div style="border-left: 3px solid var(--border); padding-left: 12px; margin-bottom: 18px;">
                <span style="font-size:11px; color:var(--text-sub); display:block; margin-bottom:5px;">📅 방송 정보</span>
                <span id="m-date" style="font-size:14px; color:var(--text-main);"></span>
            </div>
            <div id="row-game" style="display:none; margin-bottom:15px;"><span style="font-size:11px; color:var(--text-sub); display:block; margin-bottom:5px;">🎮 게임</span><div id="m-game"></div></div>
            <div id="row-song" style="display:none; margin-bottom:15px;"><span style="font-size:11px; color:var(--text-sub); display:block; margin-bottom:5px;">🎵 노래</span><div id="m-song"></div></div>
            <div id="row-talk" style="display:none; margin-bottom:15px;"><span style="font-size:11px; color:var(--text-sub); display:block; margin-bottom:5px;">💬 소통</span><div id="m-talk"></div></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <a id="m-link" href="#" target="_blank" class="btn-action btn-go">시청하기 ↗</a>
                <button class="btn-action btn-close" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>
</div>

<div id="analysis-overlay">
    <div class="analysis-content">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; font-size:18px; color:var(--accent);">📊 기간별 상세 분석</h3>
            <div style="display:flex; gap:8px;">
                <select id="analysis-year" onchange="renderAnalysis()" style="background:#0a1a30; color:#fff; border:1px solid var(--border); border-radius:6px; padding:4px 8px;"></select>
                <select id="analysis-type" onchange="renderAnalysis()" style="background:#0a1a30; color:#fff; border:1px solid var(--border); border-radius:6px; padding:4px 8px;">
                    <option value="month">월별 보기</option>
                    <option value="year">연도별 요약</option>
                </select>
            </div>
        </div>
        <div id="analysis-result"></div>
        <div style="padding:15px; border-top:1px solid var(--border);">
            <button onclick="closeAnalysisModal()" style="width:100%; padding:12px; background:#1a202c; color:#a0aec0; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">창 닫기</button>
        </div>
    </div>
</div>

<script src="script-vod-archive.js"></script>
</body>
</html>
