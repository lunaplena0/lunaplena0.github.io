<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타임라인 변환기 | 바다비 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mainpages.css">
    <style>
        /* 추가 스타일 */
        .option-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .option-group input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .option-group label {
            font-size: 14px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <header class="card header-box">
        <div class="title-group">
            <h1 class="page-title">타임라인 변환기</h1>
            <p class="page-desc">포맷 변환 후 자유롭게 수정하고 복사하세요.</p>
        </div>
        <a href="index.html" class="btn">← 메인으로</a>
    </header>

    <main class="card content-card">
        <div id="content-area">
            <div style="margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                    <label id="inputLabel" style="font-size: 13px; color: var(--text-sub);">텍스트 입력</label>
                    <button onclick="resetAll()" style="background: none; border: 1px solid #ff4d4d; color: #ff4d4d; font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer;">입력 초기화 ↻</button>
                </div>
                <textarea id="inputText" style="width: 100%; height: 150px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text-main); resize: vertical; box-sizing: border-box; font-family: inherit;" placeholder="여기에 내용을 입력하세요..."></textarea>
            </div>

            <div class="option-group">
                <input type="checkbox" id="etcCheck">
                <label for="etcCheck">[기타] 머리말 추가</label>
            </div>

            <div class="btn-group">
                <button onclick="convertTimeline()" class="btn" style="flex: 1; background: #007aff; color: #fff; font-weight: bold; padding: 12px; border: none; cursor: pointer;">형식 변환하기 ↓</button>
                <button onclick="extractTimesOnly()" class="btn" style="flex: 1; background: #ff9500; color: #fff; font-weight: bold; padding: 12px; border: none; cursor: pointer;">1단계: 시간만 추출 ⏱️</button>
                <button onclick="replaceWithNewSongs()" class="btn" style="flex: 1; background: #34c759; color: #fff; font-weight: bold; padding: 12px; border: none; cursor: pointer;">2단계: 노래 제목 교체 ⇄</button>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-sub);">변환 결과 (수정 가능)</label>
                <textarea id="outputText" style="width: 100%; height: 150px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.2); color: #00ffcc; resize: vertical; box-sizing: border-box; font-family: inherit; line-height: 1.5;" placeholder="변환된 결과가 여기에 표시됩니다."></textarea>
            </div>
            
            <button onclick="copyToClipboard()" class="btn" style="width: 100%; background: var(--text-main); color: #000; font-weight: bold; padding: 12px; border: none; cursor: pointer;">수정된 결과 복사하기</button>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px 10px; color: var(--text-sub); font-size: 11px; border-top: 1px solid var(--border); margin-top: 20px;">
        <p><strong>바다비 비공식 팬 아카이브</strong></p>
    </footer>
</div>

<script>
    // 추출한 시간을 임시 보관할 배열
    let extractedTimes = [];

    function resetAll() {
        if(confirm("입력한 내용과 결과를 모두 삭제하시겠습니까?")) {
            document.getElementById('inputText').value = "";
            document.getElementById('outputText').value = "";
            document.getElementById('etcCheck').checked = false;
            extractedTimes = [];
            document.getElementById('inputText').focus();
        }
    }

    // [기존 기능] 원본 데이터를 쉼표 포맷으로 변환하는 함수
    function convertTimeline() {
        const input = document.getElementById('inputText').value;
        const isEtc = document.getElementById('etcCheck').checked;
        const lines = input.split('\n');
        const resultList = [];
        const timeRegex = /(\d{1,2}:\d{2}:\d{2}|\d{1,2}:\d{2})/;

        lines.forEach(line => {
            const timeMatch = line.match(timeRegex);
            if (timeMatch) {
                const time = timeMatch[0];
                let titlePart = line.split(time)[1].trim();
                titlePart = titlePart.replace(/[🎵🎶▶️]/g, '').trim();
                
                let finalTitle = titlePart.split('-')[0].trim();
                finalTitle = finalTitle.replace(/,/g, '');

                if (finalTitle) {
                    const prefix = isEtc ? "[기타] " : "";
                    resultList.push(`${prefix}${finalTitle}(${time})`);
                }
            }
        });

        document.getElementById('outputText').value = resultList.join(', ');
    }

    // [새 기능 - 1단계] 원본 텍스트에서 시간만 추출해서 기억하는 함수
    function extractTimesOnly() {
        const input = document.getElementById('inputText').value;
        if (!input.trim()) {
            alert("원본 타임라인 텍스트를 입력창에 먼저 넣어주세요.");
            return;
        }

        // 정규식으로 시간 패턴 추출
        const timeRegex = /(\d{1,2}:\d{2}:\d{2}|\d{1,2}:\d{2})/g;
        const matches = input.match(timeRegex);

        if (!matches || matches.length === 0) {
            alert("텍스트에서 시간 형식(예: 02:20:29)을 찾을 수 없습니다.");
            return;
        }

        // 메모리에 저장 및 결과창에 안내용 표시
        extractedTimes = matches;
        document.getElementById('outputText').value = `[시스템] 총 ${extractedTimes.length}개의 시간이 추출되어 기억되었습니다!\n\n이제 '입력창'의 내용을 모두 지우고, 교체할 새 노래 목록(줄바꿈 혹은 쉼표 구분)을 넣은 뒤 [2단계: 노래 제목 교체] 버튼을 눌러주세요.`;
        
        // 입력창 비우고 포커스 주기
        document.getElementById('inputText').value = "";
        document.getElementById('inputText').focus();
    }

    // [새 기능 - 2단계] 새로 입력된 곡 목록과 1단계에서 기억한 시간을 조합하는 함수
    function replaceWithNewSongs() {
        const input = document.getElementById('inputText').value;
        const isEtc = document.getElementById('etcCheck').checked;

        if (extractedTimes.length === 0) {
            alert("1단계: 시간만 추출 버튼을 먼저 눌러서 시간을 기억시켜야 합니다.");
            return;
        }
        if (!input.trim()) {
            alert("입력창에 새로 교체할 노래 목록을 입력해주세요.");
            return;
        }

        // 입력된 새 곡 목록을 줄바꿈(\n) 또는 쉼표(,) 기준으로 분리하여 배열화
        // 양쪽 공백 및 빈 줄 제거
        const newSongs = input.split(/[\n,]+/)
                              .map(song => song.trim())
                              .filter(song => song.length > 0);

        const resultList = [];
        const prefix = isEtc ? "[기타] " : "";

        // 기억해둔 시간들을 순서대로 돌면서 새 노래 목록과 매칭
        extractedTimes.forEach((time, index) => {
            if (index < newSongs.length) {
                // 형식: 02:20:29 🎵 안녕 - 조이
                resultList.push(`${time} ${prefix}${newSongs[index]}`);
            } else {
                // 매칭할 노래 제목이 부족할 경우 시간만 표시
                resultList.push(`${time} ${prefix}🎵 (매칭할 새 노래 없음)`);
            }
        });

        // 결과창에 줄바꿈 형태로 최종 출력
        document.getElementById('outputText').value = resultList.join('\n');
    }

    function copyToClipboard() {
        const output = document.getElementById('outputText');
        if (!output.value || output.value.includes('[시스템]')) {
            alert('복사할 유효한 내용이 없습니다.');
            return;
        }
        
        output.select();
        output.setSelectionRange(0, 99999);

        try {
            document.execCommand('copy');
            alert('클립보드에 복사되었습니다!');
        } catch (err) {
            alert('복사에 실패했습니다.');
        }
    }
</script>
</body>
</html>
