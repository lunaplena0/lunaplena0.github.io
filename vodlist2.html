<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다비 VOD 통계 아카이브</title>
    <!-- Tailwind CSS & FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        marine: {
                            deep: '#060e16',    /* 심해 배경 */
                            void: '#0a1622',      
                            reef: '#112235',    /* 카드 배경 */
                            shallow: '#1a334d',   /* 호버 강조색 */
                            foam: '#e3f2fd',      /* 메인 텍스트 */
                            spray: '#8fa5b5',     /* 서브 텍스트 */
                            cyan: '#00e5ff',      /* 네온 사이언 */
                            mint: '#05ffa6',      /* 네온 그린 */
                            coral: '#ff5c8a',     /* 산호초 핑크 */
                            border: 'rgba(0, 229, 255, 0.12)'
                        }
                    },
                    fontFamily: {
                        display: ['Noto Sans KR', 'sans-serif'],
                        body: ['Noto Sans KR', 'sans-serif']
                    }
                }
            }
        }
    </script> 
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #060e16;
            background-image: radial-gradient(circle at 50% 0%, #0d233a 0%, #060e16 70%);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(6, 14, 22, 0.5); }
        ::-webkit-scrollbar-thumb {
            background: #112235;
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #00e5ff; }
        .word-keep { word-break: keep-all; overflow-wrap: break-word; }
        /* 제목 2줄 제한 및 말줄임표 처리 클래스 */
        .vod-title-clamp {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: normal;
        }
    </style>
</head>
<body class="text-marine-spray min-h-screen pb-20 overflow-x-hidden">

    <!-- 상단 네비게이션 바 -->
    <nav class="border-b border-marine-border bg-marine-deep/90 backdrop-blur-md sticky top-0 z-40 px-4 py-3.5 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-display font-black text-sm tracking-widest text-marine-foam">BABABI ARCHIVE</span>
            
            <!-- 디자인이 변경된 메인으로 버튼 -->
            <a href="test.html" class="px-3.5 py-1.5 bg-marine-cyan/10 hover:bg-marine-cyan hover:text-marine-deep border border-marine-cyan/30 text-marine-cyan transition-all duration-300 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-sm">
                <i class="fa-solid fa-house text-[10px]"></i>
                <span>메인으로</span>
            </a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <!-- 페이지 타이틀 섹션 -->
        <div class="mb-6">
            <h1 class="font-bold text-2xl text-marine-foam flex items-center gap-2.5">
                <i class="fa-solid fa-chart-pie text-marine-cyan"></i> VOD 방송 통계 및 아카이브
            </h1>
            <p class="text-xs text-marine-spray mt-1">월별 탭을 선택해 해당 기간의 방송 기록을 확인하세요.</p>
        </div>

        <!-- [1] 상단 요약 통계 카드 영역 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <div class="bg-marine-reef border border-marine-border rounded-2xl p-4 shadow-lg">
                <span class="text-[11px] text-marine-spray block mb-1">총 수집 VOD</span>
                <span id="stat-total-vod" class="text-xl font-black text-marine-foam">0개</span>
            </div>
            <div class="bg-marine-reef border border-marine-border rounded-2xl p-4 shadow-lg">
                <span class="text-[11px] text-marine-spray block mb-1">총 방송 시간</span>
                <span id="stat-total-time" class="text-xl font-black text-marine-cyan">0시간 0분</span>
            </div>
            <div class="bg-marine-reef border border-marine-border rounded-2xl p-4 shadow-lg">
                <span class="text-[11px] text-marine-spray block mb-1">구독+ 방송</span>
                <span id="stat-sub-vod" class="text-xl font-black text-purple-400">0회</span>
            </div>
            <div class="bg-marine-reef border border-marine-border rounded-2xl p-4 shadow-lg">
                <span class="text-[11px] text-marine-spray block mb-1">성인인증 방송</span>
                <span id="stat-adult-vod" class="text-xl font-black text-marine-coral">0회</span>
            </div>
        </div>

        <!-- [1-1] 태그(컨텐츠 종류) 분석 아코디언 영역 -->
        <div class="bg-marine-reef border border-marine-border rounded-2xl mb-8 shadow-lg overflow-hidden">
            <button onclick="toggleTagAnalysis()" class="w-full px-5 py-3.5 flex justify-between items-center bg-marine-shallow/30 hover:bg-marine-shallow/60 transition-colors text-left">
                <span class="font-bold text-xs sm:text-sm text-marine-foam flex items-center gap-2">
                    <i class="fa-solid fa-tags text-marine-mint"></i> 컨텐츠 종류(태그) 비중 분석
                </span>
                <div class="flex items-center gap-2">
                    <span class="text-[11px] text-marine-spray">통계 펼치기/접기</span>
                    <i class="fa-solid fa-chevron-down text-xs text-marine-cyan transition-transform duration-300" id="tag-analysis-icon"></i>
                </div>
            </button>
            <div id="tag-analysis-box" class="hidden p-5 border-t border-marine-border/30 bg-marine-deep/40">
                <p class="text-xs text-marine-spray mb-4">전체 VOD에 등록된 컨텐츠 태그의 사용 빈도와 비중을 분석한 결과입니다.</p>
                <div id="tag-stats-container" class="space-y-3">
                    <!-- 자바스크립트로 동적 생성 -->
                </div>
            </div>
        </div>

        <!-- [2] VOD 상세 리스트 그리드 및 테이블 컨테이너 -->
        <div class="bg-marine-reef border border-marine-border rounded-3xl p-5 sm:p-6 shadow-xl">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 pb-4 border-b border-marine-border/40">
                <h2 class="font-bold text-base text-marine-foam flex items-center gap-2">
                    <i class="fa-solid fa-list-ul text-marine-mint"></i> 월별 VOD 아카이브
                </h2>
                <!-- 검색 입력창 -->
                <div class="w-full md:w-72">
                    <input type="text" id="vod-search" placeholder="제목, 태그, 구독+, 성인인증 검색..." oninput="debounceFilterVODs()" class="w-full bg-marine-deep border border-marine-border rounded-xl px-3 py-2 text-xs text-marine-foam focus:outline-none focus:border-marine-cyan transition-colors">
                </div>
            </div>

            <!-- 월별 선택 탭 버튼 생성 영역 -->
            <div id="month-tabs-container" class="flex flex-wrap gap-2 mb-6 pb-4 border-b border-marine-border/30">
                <!-- 자바스크립트로 동적 생성 -->
            </div>

            <!-- VOD 목록 출력 영역 -->
            <div id="vod-list-container" class="space-y-4">
                <div class="text-center py-12 text-xs text-marine-spray animate-pulse">구글 시트에서 데이터를 불러오는 중입니다...</div>
            </div>

            <!-- 더보기 버튼 영역 -->
            <div id="load-more-container" class="mt-8 text-center hidden">
                <button onclick="loadMoreVODs()" class="px-6 py-2.5 bg-marine-shallow/60 hover:bg-marine-shallow border border-marine-border text-marine-foam rounded-xl text-xs font-bold transition-all shadow-sm">
                    <i class="fa-solid fa-chevron-down mr-1 text-marine-cyan"></i> 더보기 (<span id="remaining-count">0</span>개 남음)
                </button>
            </div>
        </div>

    </div>

    <!-- 스크립트 영역 -->
    <script>
        const VOD_TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfTHMy1hImniay9QEPDcMq5C4Yo5yFpmRtBlWo6UXK-FNxABQYbtfGpEsKom2O-OIJPnEi8LLy1Qqx/pub?gid=0&single=true&output=tsv';
        
        let allVodData = [];
        let filteredVodData = []; 
        let groupedByMonth = {};
        let selectedMonth = ''; 
        let displayLimit = 10;  
        let searchTimer = null; 

        async function loadVodData() {
            try {
                const cacheBuster = `&t=${new Date().getTime()}`;
                const response = await fetch(VOD_TSV_URL + cacheBuster, {
                    cache: 'no-store',
                    headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' }
                });

                if (!response.ok) throw new Error('Network error');

                const text = await response.text();
                const rows = text.split(/\r?\n/).map(row => row.split('\t'));

                allVodData = rows.slice(1)
                    .filter(r => r[0] && r[1] && r[1].trim() !== "")
                    .map((r, index) => ({
                        id: index,
                        date: r[0]?.trim() || '',
                        title: r[1]?.trim() || '',
                        link: r[2]?.trim() || '#',
                        thumbnail: r[3]?.trim() || '',
                        vodTime: r[4]?.trim() || '-',
                        subPlus: r[5]?.trim() || '아니요',
                        adult: r[6]?.trim() || '아니요',
                        gameTime: r[7]?.trim() || '',
                        songTime: r[8]?.trim() || '',
                        talkTime: r[9]?.trim() || '',
                        contentTime: r[10]?.trim() || '',
                        contentType: r[11]?.trim() || ''
                    }));

                allVodData.sort((a, b) => b.date.localeCompare(a.date));
                filteredVodData = [...allVodData]; 

                updateGlobalStats(allVodData);
                renderTagAnalysis(allVodData);
                processMonthGrouping(filteredVodData);

            } catch (e) {
                console.error("VOD Data Load Error:", e);
                document.getElementById('vod-list-container').innerHTML = `
                    <div class="text-center py-12 text-xs text-marine-coral">
                        데이터를 불러오지 못했습니다. 구글 시트 웹 게시 상태를 확인해주세요.
                    </div>`;
            }
        }

        function formatTotalBroadcastTime(data) {
            let totalSeconds = 0;

            data.forEach(item => {
                totalSeconds += timeToSeconds(item.vodTime);
            });

            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);

            if (hours > 0) {
                return `${hours.toLocaleString()}시간 ${minutes}분`;
            } else {
                return `${minutes}분`;
            }
        }

        function updateGlobalStats(data) {
            document.getElementById('stat-total-vod').innerText = `${data.length}개`;
            document.getElementById('stat-total-time').innerText = formatTotalBroadcastTime(data);
            document.getElementById('stat-sub-vod').innerText = `${data.filter(v => v.subPlus.includes('예') || v.subPlus.includes('O')).length}회`;
            document.getElementById('stat-adult-vod').innerText = `${data.filter(v => v.adult.includes('예') || v.adult.includes('O')).length}회`;
        }

        function renderTagAnalysis(data) {
            const container = document.getElementById('tag-stats-container');
            const tagCounts = {};
            let totalTagOccurrences = 0;

            data.forEach(item => {
                if (item.contentType && item.contentType.trim() !== "" && item.contentType !== "-") {
                    const tags = item.contentType.split(',');
                    tags.forEach(tag => {
                        const cleanTag = tag.trim();
                        if (cleanTag) {
                            tagCounts[cleanTag] = (tagCounts[cleanTag] || 0) + 1;
                            totalTagOccurrences++;
                        }
                    });
                }
            });

            const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);

            if (sortedTags.length === 0) {
                container.innerHTML = `<div class="text-xs text-marine-spray text-center py-4">등록된 컨텐츠 태그가 없습니다.</div>`;
                return;
            }

            let html = '';
            sortedTags.forEach(([tag, count]) => {
                const percentage = totalTagOccurrences > 0 ? ((count / totalTagOccurrences) * 100).toFixed(1) : 0;
                
                html += `
                    <div>
                        <div class="flex justify-between items-center text-xs mb-1">
                            <span class="text-marine-foam font-bold">#${tag}</span>
                            <span class="text-marine-spray font-mono">${count}회 <span class="text-marine-cyan font-semibold">(${percentage}%)</span></span>
                        </div>
                        <div class="w-full bg-marine-deep rounded-full h-2 overflow-hidden border border-marine-border/40">
                            <div class="bg-gradient-to-r from-marine-cyan to-marine-mint h-full rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function toggleTagAnalysis() {
            const box = document.getElementById('tag-analysis-box');
            const icon = document.getElementById('tag-analysis-icon');

            if (box.classList.contains('hidden')) {
                box.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                box.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function processMonthGrouping(data) {
            groupedByMonth = {};
            data.forEach(item => {
                const monthKey = item.date.substring(0, 7); 
                if (!groupedByMonth[monthKey]) {
                    groupedByMonth[monthKey] = [];
                }
                groupedByMonth[monthKey].push(item);
            });

            const months = Object.keys(groupedByMonth);
            if (months.length > 0) {
                if (!selectedMonth || !groupedByMonth[selectedMonth]) {
                    selectedMonth = months[0];
                }
            } else {
                selectedMonth = '';
            }

            renderMonthTabs();
            renderVODStats();
        }

        function renderMonthTabs() {
            const tabsContainer = document.getElementById('month-tabs-container');
            const months = Object.keys(groupedByMonth);

            if (months.length === 0) {
                tabsContainer.innerHTML = '';
                return;
            }

            let html = '';
            months.forEach(month => {
                const [year, mm] = month.split('-');
                const label = `${year}년 ${parseInt(mm, 10)}월`;
                const count = groupedByMonth[month].length;
                const isActive = (month === selectedMonth);

                const activeClass = isActive 
                    ? 'bg-marine-cyan text-marine-deep font-black border-marine-cyan shadow-md shadow-marine-cyan/20' 
                    : 'bg-marine-deep/60 text-marine-spray hover:text-marine-foam border-marine-border';

                html += `
                    <button onclick="changeMonth('${month}')" class="px-3.5 py-1.5 rounded-xl border text-xs transition-all flex items-center gap-1.5 ${activeClass}">
                        <span>${label}</span>
                        <span class="text-[10px] px-1.5 py-0.2 rounded-full ${isActive ? 'bg-marine-deep text-marine-cyan' : 'bg-marine-reef text-marine-spray'}">${count}</span>
                    </button>
                `;
            });

            tabsContainer.innerHTML = html;
        }

        function changeMonth(month) {
            selectedMonth = month;
            displayLimit = 10; 
            renderMonthTabs();
            renderVODStats();
        }

        function timeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 3) {
                return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            } else if (parts.length === 2) {
                return (parts[0] * 60) + parts[1];
            }
            return 0;
        }

        function formatDetailItemsAsList(text, baseUrl) {
            if (!text || text.trim() === "" || text === "-") return '<span class="text-marine-spray/50 italic text-[11px]">기록 없음</span>';
            
            const items = text.split(',');
            let html = '<div class="space-y-1.5 mt-1">';
            
            items.forEach(item => {
                const trimmed = item.trim();
                if (trimmed) {
                    const match = trimmed.match(/(.*?)\((\d{2}:\d{2}:\d{2}|\d{2}:\d{2})\)/);
                    
                    if (match) {
                        const titlePart = match[1].trim();
                        const timeStr = match[2];
                        const totalSeconds = timeToSeconds(timeStr);
                        const targetUrl = `${baseUrl}?change_second=${totalSeconds}`;

                        html += `
                            <div class="flex items-center justify-between bg-marine-deep/70 border border-marine-border/40 rounded-lg px-2.5 py-1.5 text-[11px]">
                                <span class="text-marine-foam font-medium truncate pr-2">${titlePart || '타임라인 기록'}</span>
                                <a href="${targetUrl}" target="_blank" class="shrink-0 px-2 py-0.5 bg-marine-cyan/10 hover:bg-marine-cyan hover:text-marine-deep text-marine-cyan border border-marine-cyan/30 rounded font-mono font-bold transition-colors flex items-center gap-1">
                                    <i class="fa-solid fa-play text-[9px]"></i> ${timeStr}
                                </a>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="bg-marine-deep/70 border border-marine-border/40 rounded-lg px-2.5 py-1.5 text-[11px] text-marine-foam">
                                ${trimmed}
                            </div>
                        `;
                    }
                }
            });
            html += '</div>';
            return html;
        }

        function renderVODStats() {
            const container = document.getElementById('vod-list-container');
            const loadMoreContainer = document.getElementById('load-more-container');
            const remainingCountSpan = document.getElementById('remaining-count');

            const monthData = groupedByMonth[selectedMonth] || [];

            if (monthData.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-xs text-marine-spray">해당 월에 등록된 VOD 데이터가 없습니다.</div>`;
                loadMoreContainer.classList.add('hidden');
                return;
            }

            const currentData = monthData.slice(0, displayLimit);
            let html = '<div class="space-y-4">';

            currentData.forEach(item => {
                const isSub = item.subPlus.includes('예') || item.subPlus.includes('O');
                const isAdult = item.adult.includes('예') || item.adult.includes('O');

                const tagsHtml = item.contentType ? item.contentType.split(',').map(tag => 
                    `<span class="px-2 py-0.5 bg-marine-reef border border-marine-border text-marine-spray rounded-md text-[10px] font-semibold">#${tag.trim()}</span>`
                ).join('') : '';

                html += `
                    <div class="bg-marine-deep/60 border border-marine-border/60 rounded-2xl p-4 hover:border-marine-cyan/40 transition-all">
                        <div class="flex flex-col lg:flex-row gap-4 items-start lg:items-center justify-between">
                            <!-- 썸네일 및 기본 정보 -->
                            <div class="flex items-start gap-3.5 min-w-0 flex-grow">
                                <a href="${item.link}" target="_blank" class="relative aspect-[16/9] w-36 sm:w-44 rounded-xl overflow-hidden shrink-0 bg-marine-void border border-marine-border/40 group block">
                                    <img src="${item.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt="썸네일" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect width=\'100\' height=\'100\' fill=\'%23112235\'/><text x=\'50%\' y=\'50%\' fill=\'%238fa5b5\' font-size=\'12\' text-anchor=\'middle\' dominant-baseline=\'middle\'>No Image</text></svg>'">
                                    <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition"></div>
                                </a>
                                <div class="min-w-0 flex-grow">
                                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                                        <span class="text-[10px] text-marine-cyan font-bold bg-marine-cyan/10 px-2 py-0.5 rounded border border-marine-cyan/20">${item.date}</span>
                                        <span class="text-[10px] text-marine-spray"><i class="fa-regular fa-clock mr-1"></i>${item.vodTime}</span>
                                        ${isSub ? '<span class="px-1.5 py-0.2 bg-purple-500/10 border border-purple-500/30 text-purple-400 rounded text-[9px] font-bold">구독+</span>' : ''}
                                        ${isAdult ? '<span class="px-1.5 py-0.2 bg-red-500/10 border border-red-500/30 text-red-400 rounded text-[9px] font-bold">19</span>' : ''}
                                    </div>
                                    <a href="${item.link}" target="_blank" class="text-xs sm:text-sm font-bold text-marine-foam hover:text-marine-cyan transition-colors block mb-2 vod-title-clamp">
                                        ${item.title}
                                    </a>
                                    <div class="flex flex-wrap gap-1 mt-1">
                                        ${tagsHtml}
                                    </div>
                                </div>
                            </div>

                            <!-- 버튼 영역 -->
                            <div class="flex items-center gap-2 shrink-0 self-end lg:self-center w-full lg:w-auto justify-end">
                                <button onclick="toggleDetail(${item.id})" id="btn-toggle-${item.id}" class="px-3 py-2 bg-marine-shallow/40 hover:bg-marine-shallow border border-marine-border text-marine-foam rounded-xl text-xs font-bold transition-all shadow-sm flex items-center gap-1.5">
                                    <i class="fa-solid fa-chart-bar text-marine-cyan"></i> 상세 통계 <i class="fa-solid fa-chevron-down text-[10px] transition-transform duration-300" id="icon-toggle-${item.id}"></i>
                                </button>
                                <a href="${item.link}" target="_blank" class="px-3.5 py-2 bg-marine-cyan/10 hover:bg-marine-cyan hover:text-marine-deep border border-marine-cyan/30 text-marine-cyan hover:text-marine-deep rounded-xl text-xs font-bold transition-all shadow-sm flex items-center gap-1.5">
                                    다시보기 <i class="fa-solid fa-external-link-alt text-[10px]"></i>
                                </a>
                            </div>
                        </div>

                        <!-- 상세 아코디언 영역 (PC 4열 가로 배치 / 모바일 1열) -->
                        <div id="detail-box-${item.id}" class="hidden mt-4 pt-4 border-t border-marine-border/35 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3.5 text-xs">
                            <div class="bg-marine-reef/60 p-3.5 rounded-2xl border border-marine-border/30">
                                <span class="font-bold text-marine-cyan flex items-center gap-1.5 mb-2"><i class="fa-solid fa-gamepad"></i> 게임 시간</span>
                                ${formatDetailItemsAsList(item.gameTime, item.link)}
                            </div>
                            <div class="bg-marine-reef/60 p-3.5 rounded-2xl border border-marine-border/30">
                                <span class="font-bold text-marine-mint flex items-center gap-1.5 mb-2"><i class="fa-solid fa-music"></i> 노래 시간</span>
                                ${formatDetailItemsAsList(item.songTime, item.link)}
                            </div>
                            <div class="bg-marine-reef/60 p-3.5 rounded-2xl border border-marine-border/30">
                                <span class="font-bold text-marine-coral flex items-center gap-1.5 mb-2"><i class="fa-solid fa-comments"></i> 소통 시간</span>
                                ${formatDetailItemsAsList(item.talkTime, item.link)}
                            </div>
                            <div class="bg-marine-reef/60 p-3.5 rounded-2xl border border-marine-border/30">
                                <span class="font-bold text-yellow-400 flex items-center gap-1.5 mb-2"><i class="fa-solid fa-puzzle-piece"></i> 컨텐츠 시간</span>
                                ${formatDetailItemsAsList(item.contentTime, item.link)}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;

            const remainingCount = monthData.length - displayLimit;
            if (remainingCount > 0) {
                remainingCountSpan.innerText = remainingCount;
                loadMoreContainer.classList.remove('hidden');
            } else {
                loadMoreContainer.classList.add('hidden');
            }
        }

        function loadMoreVODs() {
            displayLimit += 10;
            renderVODStats();
        }

        function toggleDetail(id) {
            const detailBox = document.getElementById(`detail-box-${id}`);
            const icon = document.getElementById(`icon-toggle-${id}`);
            
            if (detailBox.classList.contains('hidden')) {
                detailBox.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                detailBox.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function debounceFilterVODs() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                filterVODs();
            }, 150); 
        }

        function filterVODs() {
            const keyword = document.getElementById('vod-search').value.toLowerCase().trim();
            
            filteredVodData = allVodData.filter(v => {
                const titleMatch = v.title.toLowerCase().includes(keyword);
                const tagMatch = v.contentType.toLowerCase().includes(keyword);
                
                // 구독+ 여부 판별 문자열 구성
                const isSub = v.subPlus.includes('예') || v.subPlus.includes('O');
                const subKeywords = ['구독', '구독+'];
                const subMatch = subKeywords.some(k => keyword.includes(k)) && isSub;

                // 성인인증 여부 판별 문자열 구성
                const isAdult = v.adult.includes('예') || v.adult.includes('O');
                const adultKeywords = ['성인', '성인인증', '19'];
                const adultMatch = adultKeywords.some(k => keyword.includes(k)) && isAdult;

                return titleMatch || tagMatch || subMatch || adultMatch;
            });
            
            processMonthGrouping(filteredVodData);
            renderTagAnalysis(filteredVodData);
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadVodData();
        });
    </script>
</body>
</html>
